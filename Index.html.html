  72: {
    month: `March`,
    day: 12,
    title: `SEEING THINGS AS THE PERSON AT FAULT DOES`,
    body: `“Whenever someone has done wrong by you, immediately consider what notion of good or evil they had in doing it. For when you see that, you’ll feel compassion, instead of astonishment or rage. For you may yourself have the same notions of good and evil, or similar ones, in which case you’ll make an allowance for what they’ve done. But if you no longer hold the same notions, you’ll be more readily gracious for their error.”

—MARCUS AURELIUS, MEDITATIONS, 7.26

Socrates, perhaps the wisest person to ever live, used to say that “nobody does wrong willingly.” Meaning that no one is wrong on purpose either. Nobody *thinks* they’re wrong, even when they are. They think they’re right, they’re just mistaken. Otherwise, they wouldn’t think it anymore!

Could it be that the slights you’ve experienced or the harm that others have done to you was not inflicted intentionally? What if they simply thought they were doing the right thing—for them, even for you? It’s like the memorial for Confederate soldiers at Arlington (obviously a cause that was wrongly fought for by people doing wrong), which states, in part, that the Confederate soldiers served “in simple obedience to duty, as they understood it*.*” Again—they understood wrongly, but it was their genuine understanding, just as Lincoln was genuine when he ended his famous Cooper Union speech by saying, “Let us, to the end, dare to do our duty as we understand it.”

How much more tolerant and understanding would you be today if you could see the actions of other people as attempts to do the right thing? Whether you agree or not, how radically would this lens change your perspective on otherwise offensive or belligerent actions?`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  73: {
    month: `March`,
    day: 13,
    title: `ONE DAY IT WILL ALL MAKE SENSE`,
    body: `“Whenever you find yourself blaming providence, turn it around in your mind and you will see that what has happened is in keeping with reason.”

—EPICTETUS, DISCOURSES, 3.17.1

Part of the reason we fight against the things that happen is that we’re so focused on *our* plan that we forget that there might be a bigger plan we don’t know about. Is it not the case that plenty of times something we thought was a disaster turned out to be, with the passage of time, a lucky break? We also forget that we’re not the only people who matter and that our loss might be someone else’s gain.

This sense of being wronged is a simple awareness problem. We need to remember that all things are guided by reason—but that it is a vast and universal reason that we cannot always see. That the surprise hurricane was the result of a butterfly flapping its wings a hemisphere away or that misfortune we have experienced is simply the prelude to a pleasant and enviable future.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,

  74: {
    month: `March`,
    day: 14,
    title: `SELF-DECEPTION IS OUR ENEMY`,
    body: `“Zeno would also say that nothing is more hostile to a firm grasp on knowledge than self-deception.”

—DIOGENES LAERTIUS, LIVES OF THE EMINENT PHILOSOPHERS, 7.23

Self-deception, delusions of grandeur—these aren’t just annoying personality traits. Ego is more than just off-putting and obnoxious. Instead, it’s the sworn enemy of our ability to learn and grow.

As Epictetus put it, “It is impossible for a person to begin to learn what he thinks he already knows.” Today, we will be unable to improve, unable to learn, unable to earn the respect of others if we think we’re already perfect, a genius admired far and wide. In this sense, ego and self-deception are the enemies of the things we wish to have because we delude ourselves into believing that we already possess them.

So we must meet ego with the hostility and contempt that it insidiously deploys against us—to keep it away, if only for twenty-four hours at a time.`,
    theme: `Awareness`,

  75: {
    month: `March`,
    day: 15,
    title: `THE PRESENT IS ALL WE POSSESS`,
    body: `“Were you to live three thousand years, or even a countless multiple of that, keep in mind that no one ever loses a life other than the one they are living, and no one ever lives a life other than the one they are losing. The longest and the shortest life, then, amount to the same, for the present moment lasts the same for all and is all anyone possesses. No one can lose either the past or the future, for how can someone be deprived of what’s not theirs?”

—MARCUS AURELIUS, MEDITATIONS, 2.14

Today, notice how often you look for more. That is, wanting the past to be more than what it was (different, better, still here, etc.) or wanting the future to unfold exactly as you expect (with hardly a thought as to how that might affect other people).

When you do this, you’re neglecting the present moment. Talk about ungrateful! There’s a saying—attributed to Bil Keane, the cartoonist—worth remembering: “Yesterday’s the past, tomorrow’s the future, but today is a gift. That’s why it’s called the present.” This present is in our possession—but it has an expiration date, a quickly approaching one. If you enjoy all of it, it will be enough. It can last a whole lifetime.`,

  76: {
    month: `March`,
    day: 16,
    title: `THAT SACRED PART OF YOU`,
    body: `“Hold sacred your capacity for understanding. For in it is all, that our ruling principle won’t allow anything to enter that is either inconsistent with nature or with the constitution of a logical creature. It’s what demands due diligence, care for others, and obedience to God.”

—MARCUS AURELIUS, MEDITATIONS, 3.9

The fact that you can think, the fact that you can read this book, the fact that you are able to reason in and out of situations—all of this is what gives you the ability to improve your circumstances and become better. It’s important to appreciate this ability, because it’s a genuine ability. Not everyone is so lucky.

Seriously—what you take for granted, others wouldn’t even think to dream of.

Take a little time today to remember that you’re blessed with the capacity to use logic and reason to navigate situations and circumstances. This gives you unthinkable power to alter your circumstances and the circumstances of others. And remember that with power comes responsibility.`,

  77: {
    month: `March`,
    day: 17,
    title: `THE BEAUTY OF CHOICE`,
    body: `“You are not your body and hair-style, but your capacity for choosing well. If your choices are beautiful, so too will you be.”

—EPICTETUS, DISCOURSES, 3.1.39b–40a

It’s that line in the movie *Fight Club*: “You are not your job, you’re not how much money you have in the bank. You are not the car you drive. You’re not the contents of your wallet.” Obviously our friend Epictetus never saw that movie or read the book—but apparently the consumerism of the 1990s existed in ancient Rome too.

It’s easy to confuse the image we present to the world for who we actually are, especially when media messaging deliberately blurs that distinction.

You might *look *beautiful today, but if that was the result of vain obsession in the mirror this morning, the Stoics would ask, are you *actually *beautiful? A body built from hard work is admirable. A body built to impress gym rats is not.

That’s what the Stoics urge us to consider. Not how things appear, but what effort, activity, and choices they are a result of.`,

  78: {
    month: `March`,
    day: 18,
    title: `IMPOSSIBLE WITHOUT YOUR CONSENT`,
    body: `“Today I escaped from the crush of circumstances, or better put, I threw them out, for the crush wasn’t from outside me but in my own assumptions.”

—MARCUS AURELIUS, MEDITATIONS, 9.13

On tough days we might say, “My work is overwhelming,” or “My boss is really frustrating.” If only we could understand that this is impossible. Someone can’t frustrate *you*, work can’t overwhelm *you*—these are external objects, and they have no access to your mind. Those emotions you feel, as real as they are, come from the inside, not the outside.

The Stoics use the word *hypolêpsis*, which means “taking up”—of perceptions, thoughts, and judgments by our mind. What we assume, what we willingly generate in our mind, that’s on us. We can’t blame other people for making us feel stressed or frustrated any more than we can blame them for our jealousy. The cause is within us. They’re just the target.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,

  79: {
    month: `March`,
    day: 19,
    title: `TIMELESS WISDOM`,
    body: `“For there are two rules to keep at the ready—that there is nothing good or bad outside my own reasoned choice, and that we shouldn’t try to lead events but to follow them.”

—EPICTETUS, DISCOURSES, 3.10.18

In the mid-twentieth century, there was an Indian Jesuit priest named Anthony de Mello. Born in Bombay when it was still under British control, de Mello was an amalgam of many different cultures and perspectives: East, West; he even trained as a psychotherapist. It’s interesting when one sees timeless wisdom develop across schools, across epochs and ideas. Here is a quote from de Mello’s book, *The Way to Love*, that sounds almost exactly like Epictetus:

“The cause of my irritation is not in this person but in me.”

Remember, each individual has a choice. You are always the one in control. The cause of irritation—or our notion that something is bad—that comes from us, from our labels or our expectations. Just as easily, we can change those labels; we can change our entitlement and decide to accept and love what’s happening around us. And this wisdom has been repeated and independently discovered in every century and every country since time began.`,
    theme: `Awareness`,

  80: {
    month: `March`,
    day: 20,
    title: `READY AND AT HOME`,
    body: `“I may wish to be free from torture, but if the time comes for me to endure it, I’ll wish to bear it courageously with bravery and honor. Wouldn’t I prefer not to fall into war? But if war does befall me, I’ll wish to carry nobly the wounds, starvation, and other necessities of war. Neither am I so crazy as to desire illness, but if I must suffer illness, I’ll wish to do nothing rash or dishonorable. The point is not to wish for these adversities, but for the virtue that makes adversities bearable.”

—SENECA, MORAL LETTERS, 67.4

President James Garfield was a great man—raised in humble circumstances, self-educated, and eventually a Civil War hero—whose presidency was cut short by an assassin’s bullet. In his brief time in office, he faced a bitterly divided country as well as a bitterly and internally divided Republican Party. During one fight, which challenged the very authority of his office, he stood firm, telling an adviser: “Of course I deprecate war, but if it is brought to my door the bringer will find me at home.”

That’s what Seneca is saying here. We’d be crazy to *want* to face difficulty in life. But we’d be equally crazy to pretend that it isn’t going to happen. Which is why when it knocks on our door—as it very well may this morning—let’s make sure we’re prepared to answer. Not the way we are when a surprise visitor comes late at night, but the way we are when we’re waiting for an important guest: dressed, in the right head space, ready to go.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  81: {
    month: `March`,
    day: 21,
    title: `THE BEST RETREAT IS IN HERE, NOT OUT THERE`,
    body: `“People seek retreats for themselves in the country, by the sea, or in the mountains. You are very much in the habit of yearning for those same things. But this is entirely the trait of a base person, when you can, at any moment, find such a retreat in yourself. For nowhere can you find a more peaceful and less busy retreat than in your own soul—especially if on close inspection it is filled with ease, which I say is nothing more than being well-ordered. Treat yourself often to this retreat and be renewed.”

—MARCUS AURELIUS, MEDITATIONS, 4.3.1

Do you have a vacation coming up? Are you looking forward to the weekend so you can have some peace and quiet? *Maybe,* you think, *after things settle down* or *after I get this over with*. But how often has that ever actually worked?

The Zen meditation teacher Jon Kabat-Zinn coined a famous expression: “Wherever you go, there you are.” We can find a retreat at any time by looking inward. We can sit with our eyes closed and feel our breath go in and out. We can turn on some music and tune out the world. We can turn off technology or shut off those rampant thoughts in our head. *That *will provide us peace. Nothing else.`,

    discipline: `The Discipline of Perception`,

  82: {
    month: `March`,
    day: 22,
    title: `THE SIGN OF TRUE EDUCATION`,
    body: `“What is it then to be properly educated? It is learning to apply our natural preconceptions to the right things according to Nature, and beyond that to separate the things that lie within our power from those that don’t.”

—EPICTETUS, DISCOURSES, 1.22.9–10a

A degree on a wall means you’re educated as much as shoes on your feet mean you’re walking. It’s a start, but hardly sufficient.

Otherwise, how could so many “educated” people make unreasonable decisions? Or miss so many obvious things? Partly it’s because they forget that they ought to focus only on that which lies within their power to control. A surviving fragment from the philosopher Heraclitus expresses that reality:

“Many who have learned

from Hesiod the countless names

of gods and monsters

never understand

that night and day are one.”

Just as you can walk plenty well without shoes, you don’t need to step into a classroom to understand the basic, fundamental reality of nature and of our proper role in it. Begin with awareness and reflection. Not just once, but every single second of every single day.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  83: {
    month: `March`,
    day: 23,
    title: `THE STRAITJACKETED SOUL`,
    body: `“The diseases of the rational soul are long-standing and hardened vices, such as greed and ambition—they have put the soul in a straitjacket and have begun to be permanent evils inside it. To put it briefly, this sickness is an unrelenting distortion of judgment, so things that are only mildly desirable are vigorously sought after.”

—SENECA, MORAL LETTERS, 75.11

In the financial disaster of the late 2000s, hundreds of smart, rational people lost trillions of dollars’ worth of wealth. How could such smart people have been so foolish? These people knew the system, knew how the markets were supposed to work, and had managed billions, if not trillions, of dollars. And yet, almost to a person, they were wrong—and wrong to the tune of global market havoc.

It’s not hard to look at that situation and understand that greed was some part of the problem. Greed was what led people to create complex markets that no one understood in the hope of making a quick buck. Greed caused other people to make trades on strange pools of debt. Greed prevented anyone from calling out this situation for what it was—a house of cards just waiting for the slightest breeze to knock it all down.

It doesn’t do you much good to criticize those folks after the fact. It’s better to look at how greed and vices might be having a similar effect in your own life. What lapses in judgment might your vices be causing you? What “sicknesses” might you have?

And how can your rational mind step in and regulate them?`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  84: {
    month: `March`,
    day: 24,
    title: `THERE IS PHILOSOPHY IN EVERYTHING`,
    body: `“Eat like a human being, drink like a human being, dress up, marry, have children, get politically active—suffer abuse, bear with a headstrong brother, father, son, neighbor, or companion. Show us these things so we can see that you truly have learned from the philosophers.”

—EPICTETUS, DISCOURSES, 3.21.5–6

Plutarch, a Roman biographer as well as an admirer of the Stoics, didn’t begin his study of the greats of Roman literature until late in life. But, as he recounts in his biography of Demosthenes, he was surprised at how quickly it all came to him. He wrote, “It wasn’t so much that the words brought me into a full understanding of events, as that, somehow, I had a personal experience of the events that allowed me to follow closely the meaning of the words.”

This is what Epictetus means about the study of philosophy. Study, yes, but go live your life as well. It’s the only way that you’ll actually understand what any of it means. And more important, it’s only from your actions and choices over time that it will be possible to see whether you took any of the teachings to heart.

Be aware of that today when you’re going to work, going on a date, deciding whom to vote for, calling your parents in the evening, waving to your neighbor as you walk to your door, tipping the delivery man, saying goodnight to someone you love. All of that is philosophy. All of it is experience that brings meaning to the words.`,

    discipline: `The Discipline of Perception`,

    day: 25,
    title: `WEALTH AND FREEDOM ARE FREE`,
    body: `“. . . freedom isn’t secured by filling up on your heart’s desire but by removing your desire.”

There are two ways to be wealthy—to get everything you want or to want everything you have. Which is easier right here and right now? The same goes for freedom. If you chafe and fight and struggle for more, you will never be free. If you could find and focus on the pockets of freedom you already have? Well, then you’d be free right here, right now.`,

  86: {
    month: `March`,
    day: 26,
    title: `WHAT RULES YOUR RULING REASON?`,
    body: `“How does your ruling reason manage itself? For in that is the key to everything. Whatever else remains, be it in the power of your choice or not, is but a corpse and smoke.”

—MARCUS AURELIUS, MEDITATIONS, 12.33

The Roman satirist Juvenal is famous for this question: *Quis custodiet ipsos custodes?* (Who watches the watchmen?) In a way, this is what Marcus is asking himself—and what you might ask yourself throughout the day. What influences the ruling reason that guides your life?

This means an exploration of subjects like evolutionary biology, psychology, neurology, and even the subconscious. Because these deeper forces shape even the most disciplined, rational minds. You can be the most patient person in the world, but if science shows we make poor decisions on an empty stomach—what good is all that patience?

So don’t stop at Stoicism, but explore the forces that drive and make Stoicism possible. Learn what underpins this philosophy you’re studying, how the body and mind tick. Understand not only your ruling reason—the watchmen—but whoever and whatever rules that too.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,

  87: {
    month: `March`,
    day: 27,
    title: `PAY WHAT THINGS ARE WORTH`,
    body: `“Diogenes of Sinope said we sell things of great value for things of very little, and vice versa.”

—DIOGENES LAERTIUS, LIVES OF THE EMINENT PHILOSOPHERS, 6.2.35b

You can buy a Plume Blanche diamond-encrusted sofa for close to two hundred thousand dollars. It’s also possible to hire one person to kill another person for five hundred dollars. Remember that next time you hear someone ramble on about how the market decides what things are worth. The market might be rational . . . but the people who comprise it are not.

Diogenes, who founded the Cynic school, emphasized the true worth (*axia*) of things, a theme that persisted in Stoicism and was strongly reflected in both Epictetus and Marcus. It’s easy to lose track. When the people around you dump a fortune into trinkets they can’t take with them when they die, it might seem like a good investment for you to make too.

But of course it isn’t. The good things in life cost what they cost. The unnecessary things are not worth it at any price. The key is being aware of the difference.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  88: {
    month: `March`,
    day: 28,
    title: `COWARDICE AS A DESIGN PROBLEM`,
    body: `“Life without a design is erratic. As soon as one is in place, principles become necessary. I think you’ll concede that nothing is more shameful than uncertain and wavering conduct, and beating a cowardly retreat. This will happen in all our affairs unless we remove the faults that seize and detain our spirits, preventing them from pushing forward and making an all-out effort.”

—SENECA, MORAL LETTERS, 95.46

The opposing team comes out strong, establishes an early lead, and you never had time to recover. You walk into a business meeting, are caught off guard, and the whole thing goes poorly. A delicate conversation escalates into a shouting match. You switched majors halfway through college and had to start your coursework over and graduate late. Sound familiar?

It’s the chaos that ensues from not having a plan. Not because plans are perfect, but because people without plans—like a line of infantrymen without a strong leader—are much more likely to get overwhelmed and fall apart. The Super Bowl–winning coach Bill Walsh used to avoid this risk by scripting the beginning of his games. “If you want to sleep at night before the game,” he said in a lecture on game planning, “have your first 25 plays established in your own mind the night before that. You can walk into the stadium and you can start the game without that stress factor.” You’ll also be able to ignore a couple of early points or a surprise from your opponent. It’s irrelevant to you—you already have your marching orders.

Don’t try to make it up on the fly. Have a plan.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  89: {
    month: `March`,
    day: 29,
    title: `WHY DO YOU NEED TO IMPRESS THESE PEOPLE AGAIN?`,
    body: `“If you should ever turn your will to things outside your control in order to impress someone, be sure that you have wrecked your whole purpose in life. Be content, then, to be a philosopher in all that you do, and if you wish also to be seen as one, show yourself first that you are and you will succeed.”

—EPICTETUS, ENCHIRIDION, 23

Is there anything sadder than the immense lengths we’ll go to impress someone? The things we’ll do to earn someone’s approval can seem, when examined in retrospect, like the result of some temporary form of insanity. Suddenly we’re wearing uncomfortable, ridiculous clothes we’ve been told are cool, eating differently, talking differently, eagerly waiting for a call or text. If we did these things because *we* liked it, that would be one thing. But that’s not what it is. It’s just a means to an end—to get someone to give us the nod.

The irony, as Marcus Aurelius points out repeatedly, is that the people whose opinion we covet are not all that great. They’re flawed—they’re distracted and wowed by all sorts of silly things themselves. We know this and yet we don’t want to think about it. To quote *Fight Club* again, “We buy things we don’t need, to impress people we don’t like.”

Doesn’t that sound pretty ridiculous? But more than that, isn’t it about as far as possible as you can get from the serenity and security that philosophy can provide?`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  90: {
    month: `March`,
    day: 30,
    title: `REASON IN ALL THINGS`,
    body: `“Hurry to your own ruling reason, to the reason of the Whole, and to your neighbor’s. To your own mind to make it just; to the mind of the Whole to remember your place in it; and to your neighbor’s mind to learn whether it’s ignorant or of sound knowledge—while recognizing it’s like yours.”

—MARCUS AURELIUS, MEDITATIONS, 9.22

If our lives are not ruled by reason, what are they ruled by? Impulse? Whim? Mimicry? Unthinking habit? As we examine our past behavior, it’s sad how often we find this to be the case—that we were not acting consciously or deliberately but instead by forces we did not bother to evaluate. It also happens that these are the instances that we’re mostly likely to regret.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,

  91: {
    month: `March`,
    day: 31,
    title: `YOU’RE A PRODUCT OF YOUR TRAINING`,
    body: `“Chasing what can’t be done is madness. But the base person is unable to do anything else.”

—MARCUS AURELIUS, MEDITATIONS, 5.17

A dog that’s allowed to chase cars will chase cars. A child who is never given any boundaries will become spoiled. An investor without discipline is not an investor—he’s a gambler. A mind that isn’t in control of itself, that doesn’t understand its power to regulate itself, will be jerked around by external events and unquestioned impulses.

That can’t be how you’d like tomorrow to go. So you must be aware of that. You must put in place training and habits now to replace ignorance and ill discipline. Only then will you begin to behave and act differently. Only then will you stop seeking the impossible, the shortsighted, and the unnecessary.

## APRIL

## UNBIASED THOUGHT`,

  92: {

    title: `THE COLOR OF YOUR THOUGHTS`,
    body: `“Your mind will take the shape of what you frequently hold in thought, for the human spirit is colored by such impressions.”

—MARCUS AURELIUS, MEDITATIONS, 5.16

If you bend your body into a sitting position every day for a long enough period of time, the curvature of your spine changes. A doctor can tell from a radiograph (or an autopsy) whether someone sat at a desk for a living. If you shove your feet into tiny, narrow dress shoes each day, your feet begin to take on that form as well.

The same is true for our mind. If you hold a perpetually negative outlook, soon enough everything you encounter will seem negative. Close it off and you’ll become closed-minded. Color it with the wrong thoughts and your life will be dyed the same.`,

  93: {
    month: `April`,
    day: 2,
    title: `BE WARY OF WHAT YOU LET IN`,
    body: `“Drama, combat, terror, numbness, and subservience—every day these things wipe out your sacred principles, whenever your mind entertains them uncritically or lets them slip in.”

—MARCUS AURELIUS, MEDITATIONS, 10.9

How much harder is it to do the right thing when you’re surrounded by people with low standards? How much harder is it to be positive and empathetic inside the negativity bubble of television chatter? How much harder is it to focus on your own issues when you’re distracted with other people’s drama and conflict?

We’ll inevitably be exposed to these influences at some point, no matter how much we try to avoid them. But when we are, there is nothing that says we have to allow those influences to penetrate our minds. We have the ability to put our guard up and decide what we actually allow in. Uninvited guests might arrive at your home, but you don’t have to ask them to stay for dinner. You don’t have to let them into your mind.`,

  94: {
    month: `April`,
    day: 3,
    title: `DECEIVED AND DIVIDED`,
    body: `“Circumstances are what deceive us—you must be discerning in them. We embrace evil before good. We desire the opposite of what we once desired. Our prayers are at war with our prayers, our plans with our plans.”

—SENECA, MORAL LETTERS, 45.6

A woman says she wants to meet a nice guy and get married—yet she spends all her time around jerks. A man says that he wishes he could find a great job, but he hasn’t actually bothered to do the looking. Business executives try to pursue two different strategies at the same time—straddling it’s called—and they are shocked when they succeed at neither.

All of these people, just as is often true for us too, are deceived and divided. One hand is working against the other. As Martin Luther King Jr. once put it, “There is something of a civil war going on within all of our lives,” a war inside each individual between the good parts of their soul and the bad.

The Stoics say that that war is usually a result of our conflicting desires, our screwed-up judgments or biased thoughts. We don’t stop and ask: *OK, what do I really want? What am I actually after here?* If we did, we’d notice the contradictory and inconsistent wishes that we have. And then we’d stop working against ourselves.`,

  95: {

    day: 4,
    title: `DON’T LET THIS GO TO YOUR HEAD`,
    body: `“Make sure you’re not made ‘Emperor,’ avoid that imperial stain. It can happen to you, so keep yourself simple, good, pure, saintly, plain, a friend of justice, god-fearing, gracious, affectionate, and strong for your proper work. Fight to remain the person that philosophy wished to make you. Revere the gods, and look after each other. Life is short—the fruit of this life is a good character and acts for the common good.”

—MARCUS AURELIUS, MEDITATIONS, 6.30

It is difficult even to conceive of what life must have been like for Marcus Aurelius—he wasn’t born emperor, nor did he obtain the position deliberately. It was simply thrust upon him. Nevertheless, he was suddenly the richest man in the world, head of the most powerful army on earth, ruling over the largest empire in history, considered a god among men.

It’s no wonder he wrote little messages like this one to remind himself not to spin off the planet. Without them, he might have lost his sense of what was important—falling prey to the lies from all the people who needed things from him. And here we are, whatever we happen to be doing, at risk of spinning off ourselves.

  96: {
    month: `April`,
    day: 5,
    title: `TRUST, BUT VERIFY`,
    body: `“First off, don’t let the force of the impression carry you away. Say to it, ‘hold up a bit and let me see who you are and where you are from—let me put you to the test’ . . .”

—EPICTETUS, DISCOURSES, 2.18.24

One of the wonders of your mind is the quickness with which it can comprehend and categorize things. As Malcolm Gladwell wrote in *Blink*, we are constantly making split-second decisions based on years of experience and knowledge as well as using the same skill to confirm prejudices, stereotypes, and assumptions. Clearly, the former thinking is a source of strength, whereas the latter is a great weakness.

We lose very little by taking a beat to consider our own thoughts. *Is this really so bad? What do I really know about this person? Why do I have such strong feelings here? Is anxiety really adding much to the situation? What’s so special about **__________**?*

By asking these questions—by putting our impressions to the test as Epictetus recommends—we’re less likely to be carried away by them or make a move on a mistaken or biased one. We’re still free to use our instincts, but we should always, as the Russian proverb says, “trust, but verify.”`,

  97: {
    month: `April`,
    day: 6,
    title: `PREPARE YOURSELF FOR NEGATIVITY`,
    body: `“When you first rise in the morning tell yourself: I will encounter busybodies, ingrates, egomaniacs, liars, the jealous and cranks. They are all stricken with these afflictions because they don’t know the difference between good and evil. Because I have understood the beauty of good and the ugliness of evil, I know that these wrong-doers are still akin to me . . . and that none can do me harm, or implicate me in ugliness—nor can I be angry at my relatives or hate them. For we are made for cooperation.”

—MARCUS AURELIUS, MEDITATIONS, 2.1

You can be certain as clockwork that at some point today you’re going to interact with someone who seems like a jerk (as we all have been). The question is: Are you going to be ready for it?

This exercise calls to mind a joke from the eighteenth-century writer and witticist Nicolas Chamfort, who remarked that if you “swallow a toad every morning,” you’ll be fortified against anything else disgusting that might happen the rest of the day. Might it not be better to understand up front—right when you wake up—that other people often behave in selfish or ignorant ways (the toad) than it is to nibble it throughout the day?

But there is a second part to this, just as there is a second half of Marcus’s quote: “No one can implicate me in ugliness—nor can I be angry at my relative or hate him.” The point of this preparation is not to write off everyone in advance. It’s that, maybe, because you’ve prepared for it, you’ll be able to act with patience, forgiveness, and understanding.`,
    theme: `Unbiased Thought`,
    discipline: `The Discipline of Perception`,

  98: {
    month: `April`,
    day: 7,
    title: `EXPECT TO CHANGE YOUR OPINIONS`,
    body: `“There are two things that must be rooted out in human beings—arrogant opinion and mistrust. Arrogant opinion expects that there is nothing further needed, and mistrust assumes that under the torrent of circumstance there can be no happiness.”

—EPICTETUS, DISCOURSES, 3.14.8

How often do we begin some project certain we know exactly how it will go? How often do we meet people and think we know exactly who and what they are? And how often are these assumptions proved to be completely and utterly wrong?

Remember, if there is one core teaching at the heart of this philosophy, it’s that we’re not as smart and as wise as we’d like to think we are. If we ever do want to become wise, it comes from the questioning and from humility—not, as many would like to think, from certainty, mistrust, and arrogance.`,

  99: {
    month: `April`,
    day: 8,
    title: `THE COST OF ACCEPTING COUNTERFEITS`,
    body: `“When it comes to money, where we feel our clear interest, we have an entire art where the tester uses many means to discover the worth . . . just as we give great attention to judging things that might steer us badly. But when it comes to our own ruling principle, we yawn and doze off, accepting any appearance that flashes by without counting the cost.”

—EPICTETUS, DISCOURSES, 1.20.8; 11

When coins were much more rudimentary, people had to spend a lot of time testing them to confirm the currency they’d just received was genuine. The Greek word *dokimazein* means “to assay” or check the quality of a mineral ore. Merchants were often skilled enough that they could test coinage by throwing it against a hard surface and listen to the note it rang. Even today, though, if someone were to hand you a hundred-dollar bill, you might rub it between your fingers or hold it up to the light, just to confirm it wasn’t a fake.

All this for an imaginary currency, an invention of society. The point of this metaphor is to highlight how much effort we put into making sure money is real, whereas we accept potentially life-changing thoughts or assumptions without so much as a question. One ironic assumption along these lines: that having a lot of money makes you wealthy. Or that because a lot of people believe something, it must be true.

  100: {
    month: `April`,
    day: 9,
    title: `TEST YOUR IMPRESSIONS`,
    body: `“From the very beginning, make it your practice to say to every harsh impression, ‘you are an impression and not at all what you appear to be.’ Next, examine and test it by the rules you possess, the first and greatest of which is this—whether it belongs to the things in our control or not in our control, and if the latter, be prepared to respond, ‘It is nothing to me.’”

—EPICTETUS, ENCHIRIDION, 1.5

In an overly quantified world of policies and processes, some are swinging back in the other direction. Bold leaders will “trust their gut.” A spiritual guru will say that it’s important to “let your body guide you.” A friend trying to help us with a difficult decision might ask, “What *feels* right here?”

These approaches to decision making contradict voluminous case studies in which people’s instincts have led them right into trouble. Our senses are wrong all the time! As animals subjected to the slow force of evolution, we have developed all sorts of heuristics, biases, and emotional responses that might have worked well on the savannah but are totally counterproductive in today’s world.

Part of Stoicism is cultivating the awareness that allows you to step back and analyze your own senses, question their accuracy, and proceed only with the positive and constructive ones. Sure, it’s tempting to throw discipline and order to the wind and go with what feels right—but if our many youthful regrets are any indication, what *feels* right *right now* doesn’t always stand up well over time. Hold your senses suspect. Again, trust, but always verify.`,

  101: {
    month: `April`,
    day: 10,
    title: `JUDGMENTS CAUSE DISTURBANCE`,
    body: `“It isn’t events themselves that disturb people, but only their judgments about them.”

  102: {
    month: `April`,
    day: 11,
    title: `IF YOU WANT TO LEARN, BE HUMBLE`,
    body: `“Throw out your conceited opinions, for it is impossible for a person to begin to learn what he thinks he already knows.”

—EPICTETUS, DISCOURSES, 2.17.1

Of all the Stoics, Epictetus is the closest one to a true teacher. He had a school. He hosted classes. In fact, his wisdom is passed down to us through a student who took really good lecture notes. One of the things that frustrated Epictetus about philosophy students—and has frustrated all college professors since time began—is how students claim to want to be taught but really secretly believe they already know everything.

The reality is that we’re all guilty of thinking we know it all, and we’d all learn more if we could set that attitude aside. As smart or successful as we may be, there is always someone who is smarter, more successful, and wiser than us. Emerson put it well: “Every man I meet is my master in some point, and in that I learn of him.”

  103: {
    month: `April`,
    day: 12,
    title: `REJECT TANTALIZING GIFTS`,
    body: `“Atreus: Who would reject the flood of fortune’s gifts?

Thyestes: Anyone who has experienced how easily they flow back.”

—SENECA, THYESTES, 536

T*hyestes* is one of Seneca’s darkest and most disturbing plays. Even two thousand years later it remains a classic of the revenge genre. Without spoiling it, the quote above comes from the scene in which Atreus is attempting to lure his hated brother Thyestes into a cruel trap by offering him tempting and generous gifts. At first, Thyestes declines, to the complete bafflement of his enemy.

We are typically surprised when someone turns down an expensive gift or a position of honor or success. General William T. Sherman emphatically rejected offers to run for president of the United States, saying at one point: “I will not accept if nominated and will not serve if elected.” If his friend Ulysses S. Grant had made such a “Shermanesque statement” (as such rejections are now known), Grant certainly would have preserved his own legacy from the disastrous turn of events it suffered.

Despite his initial misgivings, Thyestes is ultimately tempted and persuaded to accept “fortune’s gifts,” . . . which turned out to be a ruse hiding devastating tragedy. Not every opportunity is fraught with danger, but the play was intended to remind us that our attraction toward what is new and shiny can lead us into serious trouble.`,

  104: {
    month: `April`,
    day: 13,
    title: `LESS IS MORE`,
    body: `“Don’t act grudgingly, selfishly, without due diligence, or to be a contrarian. Don’t overdress your thought in fine language. Don’t be a person of too many words and too many deeds. . . . Be cheerful, not wanting outside help or the relief others might bring. A person needs to stand on their own, not be propped up.”

In most areas of life, the saying “Less is more” stands true. For instance, the writers we admire tend to be masters of economy and brevity. What they leave out is just as important—sometimes more important—than what they leave in. There is a poem by Philip Levine titled “He Would Never Use One Word Where None Would Do.” And from *Hamlet*, the best of all—the retort from Queen Gertrude after a long, rhetorical speech from Polonius: “More matter with less art,” she tells him. Get to the point!

Imagine the emperor of Rome, with his captive audience and unlimited power, telling himself not to be a person of “too many words and too many deeds.” Let that be a reminder the next time you feel self-indulgent or a little full of yourself, the next time you feel like impressing people.`,

  105: {
    month: `April`,
    day: 14,
    title: `BECOMING AN EXPERT IN WHAT MATTERS`,
    body: `“Believe me, it’s better to produce the balance-sheet of your own life than that of the grain market.”

—SENECA, ON THE BREVITY OF LIFE, 18.3b

The things that some people manage to be experts in: fantasy sports, celebrity trivia, derivatives and commodities markets, thirteenth-century hygiene habits of the clergy.

We can get very good at what we’re *paid* to do, or adept at a hobby we wish we could be paid to do. Yet our own lives, habits, and tendencies might be a mystery to us.

Seneca was writing this important reminder to his father-in-law, who, as it happened, was for a time in charge of Rome’s granary. But then his position was revoked for political purposes. Who really cares, Seneca was saying, now you can focus that energy on your inner life.

At the end of your time on this planet, what expertise is going to be more valuable—your understanding of matters of living and dying, or your knowledge of the ’87 Bears? Which will help your children more—your insight into happiness and meaning, or that you followed breaking political news every day for thirty years?`,
    theme: `Unbiased Thought`,

  106: {
    month: `April`,
    day: 15,
    title: `PAY YOUR TAXES`,
    body: `“Nothing will ever befall me that I will receive with gloom or a bad disposition. I will pay my taxes gladly. Now, all the things which cause complaint or dread are like the taxes of life—things from which, my dear Lucilius, you should never hope for exemption or seek escape.”

—SENECA, MORAL LETTERS, 96.2

As your income taxes come due, you might be like many people—complaining at what you have to fork over to the government. Forty percent of everything I make goes to these people? And for what?!

First off, taxes go to a lot of programs and services you almost certainly take for granted. Second, you think you’re so special? People have been complaining about their taxes for thousands of years, and now they’re dead. Get over it. Third, this is a good problem to have. Far better than, say, making so little there is nothing left to pay the government or living in an anarchy and having to pay for every basic service in a struggle against nature.

But more important, income taxes are not the only taxes you pay in life. They are just the financial form. Everything we do has a toll attached to it. Waiting around is a tax on traveling. Rumors and gossip are the taxes that come from acquiring a public persona. Disagreements and occasional frustration are taxes placed on even the happiest of relationships. Theft is a tax on abundance and having things that other people want. Stress and problems are tariffs that come attached to success. And on and on and on.

There are many forms of taxes in life. You can argue with them, you can go to great—but ultimately futile—lengths to evade them, or you can simply pay them and enjoy the fruits of what you get to keep.`,
    theme: `Unbiased Thought`,
    discipline: `The Discipline of Perception`,
  },
  107: {
    month: `April`,
    day: 16,
    title: `OBSERVE CAUSE AND EFFECT`,
    body: `“Pay close attention in conversation to what is being said, and to what follows from any action. In the action, immediately look for the target, in words, listen closely to what’s being signaled.”

—MARCUS AURELIUS, MEDITATIONS, 7.4

Through the work of the psychologist Albert Ellis, Stoicism has reached millions of people through what’s known as cognitive-behavioral therapy (CBT). As a form of a therapy, CBT helps patients identify destructive patterns in their thoughts and behavior so they can, over time, direct and influence them in a more positive direction.

Of course, Marcus Aurelius had no formal training in psychology, but his words here are as important as any doctor’s. He’s asking you to become an observer of your own thoughts and the actions those thoughts provoke. Where do they come from? What biases do they contain? Are they constructive or destructive? Do they cause you to make mistakes or engage in behavior you later regret? Look for patterns; find where cause meets effect.

Only when this is done can negative behavior patterns be broken; only then can real life improvements be made.`,
    theme: `Unbiased Thought`,
    discipline: `The Discipline of Perception`,
  },
  108: {
    month: `April`,
    day: 17,
    title: `NO HARM, NO FOUL`,
    body: `“Do away with the opinion I am harmed, and the harm is cast away too. Do away with being harmed, and harm disappears.”

—MARCUS AURELIUS, MEDITATIONS, 4.7

A word can have multiple meanings. One usage can be harsh and another might be completely innocent. The same word can mean a cruel slur or a pile of sticks. In the same way, something said sarcastically differs drastically from something that was pointed and mean.

The interpretation of a remark or a word has an immense amount of power. It’s the difference between a laugh and hurt feelings. The difference between a fight breaking out and two people connecting.

This is why it is so important to control the biases and lenses we bring to our interactions. When you hear or see something, which interpretation do you jump to? What is your default interpretation of someone else’s intentions?

If being upset or hurt is something you’d like to experience less often, then make sure your interpretations of others’ words make that possible. Choose the right inference from someone’s actions or from external events, and it’s a lot more likely that you’ll have the right response.`,

    discipline: `The Discipline of Perception`,
  },
  109: {
    month: `April`,
    day: 18,
    title: `OPINIONS ARE LIKE . . .`,
    body: `“What is bad luck? Opinion. What are conflict, dispute, blame, accusation, irreverence, and frivolity? They are all opinions, and more than that, they are opinions that lie outside of our own reasoned choice, presented as if they were good or evil. Let a person shift their opinions only to what belongs in the field of their own choice, and I guarantee that person will have peace of mind, whatever is happening around them.”

Opinions. Everyone’s got one.

No wonder we feel upset and angry so often! But what if we let these opinions go? Let’s try weeding (*ekkoptein*; cutting or knocking out) them out of our lives so that things simply *are.* Not good or bad, not colored with opinion or judgment. Just *are.*`,

  110: {

    day: 19,
    title: `OUR SPHERE OF IMPULSES`,
    body: `“Epictetus says we must discover the missing art of assent and pay special attention to the sphere of our impulses—that they are subject to reservation, to the common good, and that they are in proportion to actual worth.”

—MARCUS AURELIUS, MEDITATIONS, 11.37

Here we have the emperor, the most powerful man in the world, quoting in his diary the wisdom of a former slave (and from what we know, Marcus might have had direct notes from Epictetus’s lectures via one of his former students). That wisdom was ultimately about surrender and serving the common good—about the limits of our power and the importance of checking our impulses—something every person in authority needs to hear.

Power and powerlessness seem so rarely to enter the same orbit—but when they do it can change the world. Think about President Abraham Lincoln meeting with, corresponding with, and learning from Frederick Douglass, another former slave of considerable wisdom and insight.

In any case, all those men lived by the principles expressed here: that in our lives—whether we’re experiencing great power or powerlessness—it’s critical to leave room for what may happen and keep the common good and the actual worth of things front and center. And, above all, be willing to learn from anyone and everyone, regardless of their station in life.`,
    theme: `Unbiased Thought`,
    discipline: `The Discipline of Perception`,
  },
  111: {
    month: `April`,
    day: 20,
    title: `REAL GOOD IS SIMPLE`,
    body: `“Here’s a way to think about what the masses regard as being ‘good’ things. If you would first start by setting your mind upon things that are unquestionably good—wisdom, self-control, justice, courage—with this preconception you’ll no longer be able to listen to the popular refrain that there are too many good things to experience in a lifetime.”

—MARCUS AURELIUS, MEDITATIONS, 5.12

Is it that controversial to say that there are the things that people value (and pressure you to value as well)—and there are the things that are actually good? Or to question whether wealth and fame are all they are cracked up to be? As Seneca observed in one of his plays:

“If only the hearts of the wealthy were opened to all!

How great the fears high fortune stirs up within them.”

For centuries, people have assumed that wealth would be a wonderful cure-all for their unhappiness or problems. Why else would they have worked so hard for it? But when people actually acquired the money and status they craved, they discovered it wasn’t quite what they had hoped. The same is true of so many things we covet without really thinking.

On the other hand, the “good” that the Stoics advocate is simpler and more straightforward: wisdom, self-control, justice, courage. No one who achieves these quiet virtues experiences buyer’s remorse.`,
    theme: `Unbiased Thought`,
    discipline: `The Discipline of Perception`,
  },
  112: {
    month: `April`,
    day: 21,
    title: `DON’T LET YOUR ATTENTION SLIDE`,
    body: `“When you let your attention slide for a bit, don’t think you will get back a grip on it whenever you wish—instead, bear in mind that because of today’s mistake everything that follows will be necessarily worse. . . . Is it possible to be free from error? Not by any means, but it is possible to be a person always stretching to avoid error. For we must be content to at least escape a few mistakes by never letting our attention slide.”

—EPICTETUS, DISCOURSES, 4.12.1; 19

Winifred Gallagher, in her book *Rapt*, quotes David Meyer, a cognitive scientist at the University of Michigan: “Einstein didn’t invent the theory of relativity while he was multitasking at the Swiss patent office.” It came after, when he *really* had time to focus and study. Attention matters—and in an era in which our attention is being fought for by every new app, website, article, book, tweet, and post, its value has only gone up.

Part of what Epictetus is saying here is that attention is a habit, and that letting your attention slip and wander builds bad habits and enables mistakes.

You’ll never complete all your tasks if you allow yourself to be distracted with every tiny interruption. Your attention is one of your most critical resources. Don’t squander it!`,

    day: 22,
    title: `THE MARKS OF A RATIONAL PERSON`,

  114: {
    month: `April`,
    day: 23,
    title: `THE MIND IS ALL YOURS`,
    body: `“You have been formed of three parts—body, breath, and mind. Of these, the first two are yours insofar as they are only in your care. The third alone is truly yours.”

—MARCUS AURELIUS, MEDITATIONS, 12.3

The body can be ravaged by disease or injured or disabled in a sudden accident. It can be imprisoned or subjected to torture. The breath can suddenly cease because our time has come, or because someone has taken it from us. Breathing can grow labored because of exertion or illness as well. But up until the very end, our mind is ours.

It’s not that the other two parts of life that Marcus mentions—our body and our breath—don’t matter. They’re just less “ours” than our mind. You wouldn’t spend much time fixing up a house that you rent, would you? Our mind is ours—free and clear. Let’s make sure we treat it right.`,

    discipline: `The Discipline of Perception`,

  115: {
    month: `April`,
    day: 24,
    title: `A PRODUCTIVE USE FOR CONTEMPT`,
    body: `“Just as when meat or other foods are set before us we think, this is a dead fish, a dead bird or pig; and also, this fine wine is only the juice of a bunch of grapes, this purple-edged robe just sheep’s wool dyed in a bit of blood from a shellfish; or of sex, that it is only rubbing private parts together followed by a spasmic discharge—in the same way our impressions grab actual events and permeate them, so we see them as they really are.”

—MARCUS AURELIUS, MEDITATIONS, 6.13

There is one Stoic exercise that might well be described as contemptuous expressions. Stoics use an almost cynical language as a way to dismantle some of the fanciest or most coveted parts of life. Marcus’s joke about sex—why would he say something like that? Well, if you take a second to consider sex in such an absurd light, you may be less likely to do something shameful or embarrassing in the pursuit of it. It’s a counterbalance to the natural bias we have toward something that feels really good.

We can apply this same way of thinking to a lot of things that people prize. Consider that envy-inducing photo you see on social media—imagine the person painstakingly staging it. What about that job promotion that means so much? Look at the lives of other so-called successful people. Still think it holds magical power? Money, which we want more of and are reluctant to part with—consider how covered in bacteria and filth it is. That beautiful, perfect person you’re admiring from afar? Remember that if they’re single, other people must have dumped them at some point. There must be *something* wrong with them.

This exercise won’t turn you into a cynic. But it will provide some much-needed objectivity.`,

    discipline: `The Discipline of Perception`,

  116: {
    month: `April`,
    day: 25,
    title: `THERE’S NOTHING WRONG WITH BEING WRONG`,
    body: `“If anyone can prove and show to me that I think and act in error, I will gladly change it—for I seek the truth, by which no one has ever been harmed. The one who is harmed is the one who abides in deceit and ignorance.”

—MARCUS AURELIUS, MEDITATIONS, 6.21

Someone once attempted to argue with the philosopher Cicero by quoting something he had said or written. This person claimed Cicero was saying one thing now but had believed something different in the past. His response: “I live from one day to the next! If something strikes me as probable, I say it; and that is how, unlike everyone else, I remain a free agent.”

No one should be ashamed at changing his mind—that’s what the mind is for. “A foolish consistency is the hobgoblin of little minds,” Emerson said, “adored by little statesmen and philosophers and divines.” That’s why we go to such lengths to learn and expose ourselves to wisdom. It would be embarrassing if we *didn’t* end up finding out if we were wrong in the past.

Remember: you’re a free agent. When someone points out a legitimate flaw in your belief or in your actions, they’re not criticizing you. They’re presenting a better alternative. Accept it!`,

  117: {
    month: `April`,
    day: 26,
    title: `THINGS HAPPEN IN TRAINING`,
    body: `“When your sparring partner scratches or head-butts you, you don’t then make a show of it, or protest, or view him with suspicion or as plotting against you. And yet you keep an eye on him, not as an enemy or with suspicion, but with a healthy avoidance. You should act this way with all things in life. We should give a pass to many things with our fellow trainees. For, as I’ve said, it’s possible to avoid without suspicion or hate.”

—MARCUS AURELIUS, MEDITATIONS, 6.20

By seeing each day and each situation as a kind of training exercise, the stakes suddenly become a lot lower. The way you interpret your own mistakes and the mistakes of others is suddenly a lot more generous. It’s certainly a more resilient attitude than going around acting like the stakes of every encounter put the championship on the line.

When you catch an elbow or an unfair blow today, shake off the pain and remind yourself: *I’m learning. My sparring partner is learning too. This is practice for both of us—that’s all. I know a bit more about him or her, and from my reaction, they’re going to learn a little bit more about me too.*`,

  118: {
    month: `April`,
    day: 27,
    title: `TURN IT INSIDE OUT`,
    body: `“Turn it inside out and see what it is like—what it becomes like when old, sick, or prostituting itself. How short-lived the praiser and praised, the one who remembers and the remembered. Remembered in some corner of these parts, and even there not in the same way by all, or even by one. And the whole earth is but a mere speck.”

Stoicism is about looking at things from every angle—and certain situations are easier to understand from different perspectives. In potentially negative situations, the objective, even superficial gaze might actually be superior. That view might let us see things clearly without diving too much into what they might represent or what might have caused them. In other situations, particularly those that involve something impressive or praiseworthy, another approach, like that of contemptuous expressions, is helpful. By examining situations from the inside out, we can be less daunted by them, less likely to be swayed by them.

  119: {
    month: `April`,
    day: 28,
    title: `WANTS MAKE YOU A SERVANT`,
    body: `“Tantalus: The highest power is—

Thyestes: No power, if you desire nothing.”

—SENECA, THYESTES, 440

In the modern world, our interactions with tyranny are a bit more voluntary than they were in ancient times. We put up with our controlling boss, though we could probably get a different job if we wanted. We change how we dress or refrain from saying what we actually think? Because we want to fit in with some cool group. We put up with cruel critics or customers? Because we want their approval. In these cases, their power exists because of our wants. You change that, and you’re free.

The late fashion photographer Bill Cunningham occasionally declined to invoice magazines for his work. When a young upstart asked him why that was, Cunningham’s response was epic: “If you don’t take money, they can’t tell you what to do, kid.”

Remember: taking the money, wanting the money—proverbially or literally—makes you a servant to the people who have it. Indifference to it, as Seneca put it, turns the highest power into *no power*, at least as far as your life is concerned.`,

  120: {
    month: `April`,
    day: 29,
    title: `WASHING AWAY THE DUST OF LIFE`,
    body: `“Watch the stars in their courses and imagine yourself running alongside them. Think constantly on the changes of the elements into each other, for such thoughts wash away the dust of earthly life.”

—MARCUS AURELIUS, MEDITATIONS, 7.47

It is almost impossible to stare up at the stars and not feel something. As cosmologist Neil deGrasse Tyson has explained, the cosmos fills us with complicated emotions. On the one hand, we feel an infinitesimal smallness in comparison to the vast universe; on the other, an extreme connectedness to this larger whole.

Obviously, given that we’re in our bodies every day, it’s tempting to think that’s the most important thing in the world. But we counteract that bias by looking at nature—at things much bigger than us. A line from Seneca, which has since become a proverb, expresses Marcus’s insight well: *Mundus ipse est ingens deorum omnium templum* (The world itself is a huge temple of all the gods).

Looking at the beautiful expanse of the sky is an antidote to the nagging pettiness of earthly concerns. And it is good and sobering to lose yourself in that as often as you can.`,

  121: {
    month: `April`,
    day: 30,
    title: `WHAT IS IN KEEPING WITH YOUR CHARACTER?`,
    body: `“Just as what is considered rational or irrational differs for each person, in the same way what is good or evil and useful or useless differs for each person. This is why we need education, so that we might learn how to adjust our preconceived notions of the rational and irrational in harmony with nature. In sorting this out, we don’t simply rely on our estimate of the value of external things, but also apply the rule of what is in keeping with one’s character.”

—EPICTETUS, DISCOURSES, 1.2.5–7

It is easy to get wrapped up in our own opinions of things. It’s as if we’re adhering to invisible scripts—following instructions or patterns we don’t even understand. The more you question these scripts and the more you subject them to the rigorous test of your education, the more you’ll be your own compass. You’ll have convictions and thoughts that are your own and belong to no one else.

Character is a powerful defense in a world that would love to be able to seduce you, buy you, tempt you, and change you. If you know what you believe and why you believe it, you’ll avoid poisonous relationships, toxic jobs, fair-weather friends, and any number of ills that afflict people who haven’t thought through their deepest concerns. That’s your education. That’s why you do this work.

  123: {
    month: `May`,
    day: 2,
    title: `BE THE PERSON YOU WANT TO BE`,
    body: `“First tell yourself what kind of person you want to be, then do what you have to do. For in nearly every pursuit we see this to be the case. Those in athletic pursuit first choose the sport they want, and then do that work.”

An archer is highly unlikely to hit a target she did not aim for. The same goes for you, whatever your target. You are *certain* to miss the target if you don’t bother to draw back and fire. Our perceptions and principles guide us in the selection of what we want—but ultimately our actions determine whether we get there or not.

  124: {
    month: `May`,
    day: 3,
    title: `SHOW, NOT TELL, WHAT YOU KNOW`,
    body: `“Those who receive the bare theories immediately want to spew them, as an upset stomach does its food. First digest your theories and you won’t throw them up. Otherwise they will be raw, spoiled, and not nourishing. After you’ve digested them, show us the changes in your reasoned choices, just like the shoulders of gymnasts display their diet and training, and as the craft of artisans show in what they’ve learned.”

—EPICTETUS, DISCOURSES, 3.21.1–3

Many of the Stoic aphorisms are simple to remember and even sound smart when quoted. But that’s not what philosophy is really about. The goal is to turn these words into *works.* As Musonius Rufus put it, the justification for philosophy is when “one brings together sound teaching with sound conduct.”

  125: {
    month: `May`,
    day: 4,
    title: `WHAT’S TRULY IMPRESSIVE`,
    body: `“How much better is it to be known for doing well by many than for living extravagantly? How much more worthy than spending on sticks and stones is it to spend on people?”

—MUSONIUS RUFUS, LECTURES, 19.91.26–28

Think of all you know about the lifestyles of the rich and the famous. That so-and-so bought a home for so many millions. That so-and-so travels with their own barber. That so-and-so owns a pet tiger or an elephant.

The exact same gossip and notoriety was popular in Roman times. Certain Romans were known for the thousands of sesterces they spent on their koi ponds. Others were notorious for orgiastic parties and sumptuous feasts. The works of Roman poets such as Juvenal and Martial abound with tidbits about these types.

The conspicuously wealthy earn and ultimately get what they want out of spending: their reputation. But what an empty one! Is it really that impressive to spend, spend, spend? Given the funds, who *wouldn’t* be able to do that?

Marcus Aurelius courageously sold off some of the imperial furnishings to pay down war debts. More recently, José Mujica, the former president of Uruguay, stood out for giving 90 percent of his presidential salary to charity and driving a twenty-five-year-old car. Who can do stuff like that? Not everyone. So who’s the more impressive?`,

  126: {
    month: `May`,

    title: `YOU ARE THE PROJECT`,

  127: {
    month: `May`,
    day: 6,
    title: `RIGHTEOUSNESS IS BEAUTIFUL`,
    body: `“Then what makes a beautiful human being? Isn’t it the presence of human excellence? Young friend, if you wish to be beautiful, then work diligently at human excellence. And what is that? Observe those whom you praise without prejudice. The just or the unjust? The just. The even-tempered or the undisciplined? The even-tempered. The self-controlled or the uncontrolled? The self-controlled. In making yourself that kind of person, you will become beautiful—but to the extent you ignore these qualities, you’ll be ugly, even if you use every trick in the book to appear beautiful.”

—EPICTETUS, DISCOURSES, 3.1.6b–9

Contemporary notions of beauty are ridiculous. Our standards for what’s attractive are incredibly *un-*Stoic in that we prize and extol things people have almost no control over—high cheekbones, complexion, height, piercing eyes.

  130: {
    month: `May`,
    day: 9,
    title: `CARPE DIEM`,
    body: `“Let us therefore set out whole-heartedly, leaving aside our many distractions and exert ourselves in this single purpose, before we realize too late the swift and unstoppable flight of time and are left behind. As each day arises, welcome it as the very best day of all, and make it your own possession. We must seize what flees.”

  131: {
    month: `May`,
    day: 10,
    title: `DON’T BE INSPIRED, BE INSPIRATIONAL`,
    body: `“Let us also produce some bold act of our own—and join the ranks of the most emulated.”

—SENECA, MORAL LETTERS, 98.13b

It was common in Greek and Roman times, just as it is now, for politicians to pander to their audience. They would lavish effusive praise on the crowd, on their country, on inspiring military victories of the past. How many times have you heard a political candidate say, “This is the greatest country in the history of the world”? As orator Demosthenes pointed out, we’ll gladly sit for hours to hear a speaker who stands in front of some famous or sacred landmark, “praising [our] ancestors, describing their exploits and enumerating their trophies.”

But what does this flattery accomplish? Nothing. Worse, the admiration of shiny accolades distracts us from their true purpose. Also, as Demosthenes explains, it betrays the very ancestors who inspire us. He concluded his speech to the Athenian people with words that Seneca would later echo and still resounds centuries later. “Reflect, then,” he said, “that your ancestors set up those trophies, not that you may gaze at them in wonder, but that you may also imitate the virtues of the men who set them up.”

The same goes for the quotes in this book and for other inspiring words you might hear. Don’t just admire them. Use them. Follow their example.`,

  132: {
    month: `May`,
    day: 11,
    title: `GUILT IS WORSE THAN JAIL`,
    body: `“The greatest portion of peace of mind is doing nothing wrong. Those who lack self-control live disoriented and disturbed lives.”

—SENECA, MORAL LETTERS, 105.7

Consider the fugitives who willingly turn themselves in after years on the run. Why would they do that? They were free, one step ahead of the law, but they gave up! Because the guilt and the stress of the fugitive life eventually gets worse than the prospect of lost freedom—in fact, it was its own kind of prison.

It’s the same reason why, as a child, you might have confessed to a lie to completely unsuspecting parents. It’s the reason why one partner might voluntarily admit to a crushing infidelity—even though the other partner had no idea. “Why are you telling me this?!” the betrayed shouts as she walks out the door. “Because things have been going so well and I couldn’t take it anymore!”

There are immense costs of doing wrong, not only to society, but to the perpetrator. Look at the lives of most people who reject ethics and discipline, and the chaos and misery that so often follows. This punishment is almost always as bad or worse than whatever society metes out.

This is why so many petty criminals confess or voluntarily surrender. They don’t always stick to it, but at the lowest moment, they finally realize: this is no way to live. They want the peace of mind that comes with doing *right*. And so do you.`,

    discipline: `The Discipline of Action`,
  },
  133: {
    month: `May`,
    day: 12,
    title: `KINDNESS IS ALWAYS THE RIGHT RESPONSE`,
    body: `“Kindness is invincible, but only when it’s sincere, with no hypocrisy or faking. For what can even the most malicious person do if you keep showing kindness and, if given the chance, you gently point out where they went wrong—right as they are trying to harm you?”

—MARCUS AURELIUS, MEDITATIONS, 11.18.5.9a

What if the next time you were treated meanly, you didn’t just restrain yourself from fighting back—what if you responded with unmitigated kindness? What if you could “love your enemies, do good to those who hate you”? What kind of effect do you think that would have?

The Bible says that when you can do something nice and caring to a hateful enemy, it is like “heap[ing] burning coals on his head.” The expected reaction to hatred is more hatred. When someone says something pointed or mean today, they expect you to respond in kind—not with *kindness.* When that doesn’t happen, they are embarrassed. It’s a shock to their system—it makes them and you better.

Most rudeness, meanness, and cruelty are a mask for deep-seated weakness. Kindness in these situations is only possible for people of great strength. You have that strength. Use it.`,

    discipline: `The Discipline of Action`,

  134: {
    month: `May`,
    day: 13,
    title: `FUELING THE HABIT BONFIRE`,
    body: `“Every habit and capability is confirmed and grows in its corresponding actions, walking by walking, and running by running . . . therefore, if you want to do something make a habit of it, if you don’t want to do that, don’t, but make a habit of something else instead. The same principle is at work in our state of mind. When you get angry, you’ve not only experienced that evil, but you’ve also reinforced a bad habit, adding fuel to the fire.”

—EPICTETUS, DISCOURSES, 2.18.1–5

Think about your activities of the last week as well as what you have planned for today and the week that follows. The person you’d like to be, or the person you see yourself as—how closely do your actions actually correspond to him or her? Which fire are you fueling? Which person are you becoming?`,

  135: {
    month: `May`,
    day: 14,
    title: `OUR WELL-BEING LIES IN OUR ACTIONS`,
    body: `“Those obsessed with glory attach their well-being to the regard of others, those who love pleasure tie it to feelings, but the one with true understanding seeks it only in their own actions. . . . Think on the character of the people one wishes to please, the possessions one means to gain, and the tactics one employs to such ends. How quickly time erases such things, and how many will yet be wiped away.”

—MARCUS AURELIUS, MEDITATIONS, 6:51, 59

If your happiness is dependent on accomplishing certain goals, what happens if fate intervenes? What if you’re snubbed? If outside events interrupt? What if you do achieve everything but find that nobody is impressed? That’s the problem with letting your happiness be determined by things you can’t control. It’s an insane risk.

If an actor focuses on the public reception to a project—whether critics like it or whether it’s a hit, they will be constantly disappointed and hurt. But if they love their *performance*—and put everything they have into making it the best that they’re capable of—they will always find satisfaction in their job. Like them, we should take pleasure from our actions—in taking the right actions—rather than the results that come from them.

Our ambition should not be to win, then, but to play with our full effort. Our intention is not to be thanked or recognized, but to help and to do what we think is right. Our focus is not on what happens to us but on how we respond. In this, we will always find contentment and resilience.`,
    theme: `Right Action`,
    discipline: `The Discipline of Action`,
  },
  136: {
    month: `May`,
    day: 15,
    title: `COUNT YOUR BLESSINGS`,
    body: `“Don’t set your mind on things you don’t possess as if they were yours, but count the blessings you actually possess and think how much you would desire them if they weren’t already yours. But watch yourself, that you don’t value these things to the point of being troubled if you should lose them.”

—MARCUS AURELIUS, MEDITATIONS, 7.27

We regularly covet what other people have. We desperately try to keep up with the Joneses, all the while the Joneses are miserable trying to keep up with us.

It would be funny if it weren’t so sad. So today, stop trying to get what other people have. Fight your urge to gather and hoard. That’s not the right way to live and act. Appreciate and take advantage of what you already do have, and let that attitude guide your actions.`,
    theme: `Right Action`,
    discipline: `The Discipline of Action`,
  },
  137: {
    month: `May`,
    day: 16,
    title: `THE CHAIN METHOD`,
    body: `“If you don’t wish to be a hot-head, don’t feed your habit. Try as a first step to remain calm and count the days you haven’t been angry. I used to be angry every day, now every other day, then every third or fourth . . . if you make it as far as 30 days, thank God! For habit is first weakened and then obliterated. When you can say ‘I didn’t lose my temper today, or the next day, or for three or four months, but kept my cool under provocation,’ you will know you are in better health.”

—EPICTETUS, DISCOURSES, 2.18.11b–14

The comedian Jerry Seinfeld once gave a young comic named Brad Isaac some advice about how to write and create material. Keep a calendar, he told him, and each day that you write jokes, put an X. Soon enough, you get a chain going—and then your job is to simply *not* break the chain. Success becomes a matter of momentum. Once you get a little, it’s easier to keep it going.

Whereas Seinfeld used the chain method to build a positive habit, Epictetus was saying that it can also be used to eliminate a negative one. It’s not all that different than taking sobriety “one day at a time.” Start with one day doing whatever it is, be it managing your temper or wandering eyes or procrastination. Then do the same the following day and the day after that. Build a chain and then work not to break it. Don’t ruin your streak.`,
    theme: `Right Action`,
    discipline: `The Discipline of Action`,

  138: {
    month: `May`,
    day: 17,
    title: `THE STOIC IS A WORK IN PROGRESS`,
    body: `“Show me someone sick and happy, in danger and happy, dying and happy, exiled and happy, disgraced and happy. Show me! By God, how much I’d like to see a Stoic. But since you can’t show me someone that perfectly formed, at least show me someone actively forming themselves so, inclined in this way. . . . Show me!”

—EPICTETUS, DISCOURSES, 2.19.24–25a, 28

Instead of seeing philosophy as an end to which one aspires, see it as something one *applies*. Not occasionally, but over the course of a life—making incremental progress along the way. Sustained execution, not shapeless epiphanies.

Epictetus loved to shake his students out of their smug satisfaction with their own progress. He wanted to remind them—and now you—of the constant work and serious training needed every day if we are ever to approach that perfect form.

It’s important for us to remember in our own journey to self-improvement: one never *arrives*. The sage—the perfect Stoic who behaves perfectly in every situation—is an ideal, not an end.`,

  139: {

    day: 18,
    title: `HOW YOU DO ANYTHING IS HOW YOU DO EVERYTHING`,
    body: `“Pay attention to what’s in front of you—the principle, the task, or what’s being portrayed.”

—MARCUS AURELIUS, MEDITATIONS, 8.22

It’s fun to think about the future. It’s easy to ruminate on the past. It’s harder to put that energy into what’s in front of us right at this moment—especially if it’s something we don’t want to do. We think: *This is just a job; it isn’t who I am. It doesn’t matter.* But it does matter. Who knows—it might be the last thing you ever do. Here lies Dave, buried alive under a mountain of unfinished business*.*

  140: {
    month: `May`,
    day: 19,
    title: `LEARN, PRACTICE, TRAIN`,
    body: `“That’s why the philosophers warn us not to be satisfied with mere learning, but to add practice and then training. For as time passes we forget what we learned and end up doing the opposite, and hold opinions the opposite of what we should.”

—EPICTETUS, DISCOURSES, 2.9.13–14

Very few people can simply watch an instructional video or hear something explained and then know, backward and forward, how to do it. Most of us actually have to *do *something several times in order to truly learn. One of the hallmarks of the martial arts, military training, and athletic training of almost any kind is the hours upon hours upon hours of monotonous practice. An athlete at the highest level will train for years to perform movements that can last mere seconds—or less. The two-minute drill, how to escape from a chokehold, the perfect jumper. Simply knowing isn’t enough. It must be absorbed into the muscles and the body. It must become part of us. Or we risk losing it the second that we experience stress or difficulty.

It is true with philosophical principles as well. You can’t just hear something once and expect to rely on it when the world is crashing down around us. Remember, Marcus Aurelius wasn’t writing his meditations for other people. He was actively meditating *for himself.* Even as a successful, wise, and experienced man, he was until the last days of his life practicing and training himself to do the right thing. Like a black belt, he was still showing up to the dojo every day to roll; like a professional athlete, he still showed up to practice each week—even though others probably thought it was unnecessary.`,
    theme: `Right Action`,
    discipline: `The Discipline of Action`,

  141: {
    month: `May`,
    day: 20,
    title: `QUALITY OVER QUANTITY`,
    body: `“What’s the point of having countless books and libraries, whose titles could hardly be read through in a lifetime. The learner is not taught, but burdened by the sheer volume, and it’s better to plant the seeds of a few authors than to be scattered about by many.”

—SENECA, ON TRANQUILITY OF MIND, 9.4

There is no prize for having read the most books before you die. Even if you were the most dedicated reader in the world—a book a day, even—your collection would probably never be bigger than a small branch library. You’ll never even come close to matching what’s stored in the servers at Google Books or keep up with the hundreds of thousands of new titles published on Amazon each year.

What if, when it came to your reading and learning, you prioritized quality over quantity? What if you read the few great books deeply instead of briefly skimming all the new books? Your shelves might be emptier, but your brain and your life would be fuller.`,
