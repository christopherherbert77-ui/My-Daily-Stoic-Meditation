  142: {
    month: `May`,
    day: 21,
    title: `WHAT KIND OF BOXER ARE YOU?`,
    body: `“But what is philosophy? Doesn’t it simply mean preparing ourselves for what may come? Don’t you understand that really amounts to saying that if I would so prepare myself to endure, then let anything happen that will? Otherwise, it would be like the boxer exiting the ring because he took some punches. Actually, you can leave the boxing ring without consequence, but what advantage would come from abandoning the pursuit of wisdom? So, what should each of us say to every trial we face? This is what I’ve trained for, for this my discipline!”

—EPICTETUS, DISCOURSES, 3.10.6–7

The Stoics loved to use boxing and wrestling metaphors the way we use baseball and football analogies today. This is probably because the sport of *pankration*—literally, “all strength,” but a purer form of mixed martial arts than one sees today—in the UFC was integral to boyhood and manhood in Greece and Rome. (In fact, recent analysis has found instances of “cauliflower ear,” a common grappling injury, on Greek statues.) The Stoics refer to fighting because it’s what they knew.

Seneca writes that unbruised prosperity is weak and easy to defeat in the ring, but “a man who has been at constant feud with misfortunes acquires a skin calloused by suffering.” This man, he says, fights all the way to the ground and never gives up.

  143: {
    month: `May`,
    day: 22,
    title: `TODAY IS THE DAY`,
    body: `“You get what you deserve. Instead of being a good person today, you choose instead to become one tomorrow.”

—MARCUS AURELIUS, MEDITATIONS, 8.22

“I don’t complain about the lack of time . . . what little I have will go far enough. Today—this day—will achieve what no tomorrow will fail to speak about. I will lay siege to the gods and shake up the world.”

We almost always know *what* the right thing is. We know we should not get upset, that we shouldn’t take this personally, that we should walk to the health food store instead of swinging by the drive-through, that we need to sit down and focus for an hour. The tougher part is deciding to do it in a given moment.

What stops us? The author Steven Pressfield calls this force The Resistance. As he put it in *The War of Art*, “We don’t tell ourselves, ‘I’m never going to write my symphony.’ Instead we say, ‘I’m going to write my symphony; I’m just going to start tomorrow.’”

  144: {
    month: `May`,
    day: 23,
    title: `SHOW ME HOW TO LIVE`,
    body: `“Show me that the good life doesn’t consist in its length, but in its use, and that it is possible—no, entirely too common—for a person who has had a long life to have lived too little.”

—SENECA, MORAL LETTERS, 49.10b

There’s no need to show Seneca. Show yourself. That no matter how many years you’re ultimately given, your life can be clearly and earnestly said to have been a long and full one. We all know someone like that—someone we lost too early but even now think, *If I could do half of what they did, I’ll consider my life well lived.*

  145: {
    month: `May`,
    day: 24,
    title: `MAKING YOUR OWN GOOD FORTUNE`,
    body: `“You say, good fortune used to meet you at every corner. But the fortunate person is the one who gives themselves a good fortune. And good fortunes are a well-tuned soul, good impulses and good actions.”

—MARCUS AURELIUS, MEDITATIONS, 5.36

What is the more productive notion of good luck? One that is defined by totally random factors outside your control, or a matter of probability that can be increased—though not guaranteed—by the right decisions and the right preparation? Obviously, the latter. This is why successful yet mysteriously “lucky” people seem to gravitate toward it.

According to the wonderful site Quote Investigator, versions of this idea date back at least to the sixteenth century in the proverb “Diligence is the mother of good luck.” In the 1920s, Coleman Cox put a modern spin on it by saying, “I am a great believer in luck. The harder I work, the more of it I seem to have.” (That saying has been incorrectly attributed to Thomas Jefferson, who said nothing of the kind.) Today, we say, “Luck is where hard work meets opportunity.” Or is it typically flipped?

Today, you can hope that good fortune and good luck magically come your way. Or you can prepare yourself to get lucky by focusing on doing the right thing at the right time—and, ironically, render luck mostly unnecessary in the process.`,

  146: {
    month: `May`,
    day: 25,
    title: `WHERE TO FIND JOY`,
    body: `“Joy for human beings lies in proper human work. And proper human work consists in: acts of kindness to other human beings, disdain for the stirrings of the senses, identifying trustworthy impressions, and contemplating the natural order and all that happens in keeping with it.”

—MARCUS AURELIUS, MEDITATIONS, 8.26

When dog trainers are brought in to work with a dysfunctional or unhappy dog, they usually start with one question: “Do you take it for walks?” They ask because dogs were bred to do certain tasks—to do work—and when deprived of this essential part of their nature, they suffer and act out. This is true no matter how spoiled and nice their life might be.

The same is true for humans. When you hear the Stoics brush aside certain emotions or material luxuries, it’s not because they don’t enjoy them. It’s not because the Stoic life is one bereft of happiness or fun. The Stoics simply mean to help us find our essence—to experience the joy of our proper human work.`,

  147: {
    month: `May`,
    day: 26,
    title: `STOP CARING WHAT PEOPLE THINK`,
    body: `“I’m constantly amazed by how easily we love ourselves above all others, yet we put more stock in the opinions of others than in our own estimation of self. . . . How much credence we give to the opinions our peers have of us and how little to our very own!”

—MARCUS AURELIUS, MEDITATIONS, 12.4

How quickly we can disregard our own feelings about something and adopt someone else’s. We think a shirt looks good at the store but will view it with shame and scorn if our spouse or a coworker makes an offhand remark. We can be immensely happy with our own lives—until we find out that someone we don’t even like has more. Or worse and more precariously, we don’t feel good about our accomplishments or talents until some third party validates them.

Like most Stoic exercises, this one attempts to teach us that although we control our own opinions, we don’t control what other people think—about us least of all. For this reason, putting ourselves at the mercy of those opinions and trying to gain the approval of others are a dangerous endeavor.

  148: {
    month: `May`,
    day: 27,
    title: `SWEAT THE SMALL STUFF`,
    body: `“Well-being is realized by small steps, but is truly no small thing.”

—ZENO, QUOTED IN DIOGENES LAERTIUS, LIVES OF THE EMINENT PHILOSOPHERS, 7.1.26

The famous biographer Diogenes Laertius attributes this quote to Zeno but admits that it might have also been said by Socrates, meaning that it may be a quote of a quote of a quote. But does it really matter? Truth is truth.

In this case, the truth is one we know well: the little things add up. Someone is a good person not because they say they are, but because they take good actions. One does not magically get one’s act together—it is a matter of many individual choices. It’s a matter of getting up at the right time, making your bed, resisting shortcuts, investing in yourself, doing your work. And make no mistake: while the individual action is small, its cumulative impact is not.

  149: {
    month: `May`,
    day: 28,
    title: `THE FIRST TWO THINGS BEFORE ACTING`,
    body: `“The first thing to do—don’t get worked up. For everything happens according to the nature of all things, and in a short time you’ll be nobody and nowhere, even as the great emperors Hadrian and Augustus are now. The next thing to do—consider carefully the task at hand for what it is, while remembering that your purpose is to be a good human being. Get straight to doing what nature requires of you, and speak as you see most just and fitting—with kindness, modesty, and sincerity.”

—MARCUS AURELIUS, MEDITATIONS, 8.5

Imagine, for a second, what Marcus’s life as an emperor must have been like. He would preside over the Senate. He would lead the troops in battle, direct the grand strategy of the army as its highest commander. He would also hear appeals—from citizens, from lawyers, from foreign governments. In other words, like most people in power, he was called on to make decisions: all day, every day, decision after decision.

His formula for decision making is a battle-tested method for doing and acting right—literally. Which is why we ought to try to use it ourselves.

First, don’t get upset—because that will color your decision negatively and make it harder than it needs to be.

Second, remember the purpose and principles you value most. Running potential actions through this filter will eliminate the bad choices and highlight the right ones.

Don’t get upset.

Do the right thing.

That’s it.`,

  150: {
    month: `May`,
    day: 29,
    title: `WORK IS THERAPY`,
    body: `“Work nourishes noble minds.”

—SENECA, MORAL LETTERS, 31.5

You know that feeling you get when you haven’t been to the gym in a few days? A bit doughy. Irritable. Claustrophobic. Uncertain. Others get a similar feeling when they’ve been on vacation for too long or right after they first retire. The mind and the body are there to be used—they begin to turn on themselves when not put to some productive end.

It’s sad to think that this kind of frustration is an everyday reality for a lot of people. They leave so much of their potential unfulfilled because they have jobs where they don’t really do much or because they have too much time on their hands. Worse is when we try to push these feelings away by buying things, going out, fighting, creating drama—indulging in the empty calories of existence instead of finding the real nourishment.

  151: {
    month: `May`,
    day: 30,
    title: `WORKING HARD OR HARDLY WORKING?`,
    body: `“I can’t call a person a hard worker just because I hear they read and write, even if working at it all night. Until I know what a person is working for, I can’t deem them industrious. . . . I *can* if the end they work for is their own ruling principle, having it be and remain in constant harmony with Nature.”

—EPICTETUS, DISCOURSES, 4.4.41; 43

What are the chances that the busiest person you know is actually the most productive? We tend to associate busyness with goodness and believe that spending many hours at work should be rewarded.

  153: {
    month: `June`,
    day: 1,
    title: `ALWAYS HAVE A MENTAL REVERSE CLAUSE`,
    body: `“Indeed, no one can thwart the purposes of your mind—for they can’t be touched by fire, steel, tyranny, slander, or anything.”

—MARCUS AURELIUS, MEDITATIONS, 8.41

Obstacles are a part of life—things happen, stuff gets in our way, situations go awry. But nothing can stop the Stoic mind when it’s operating properly, because in every course of action, it has retained “a reverse clause.”

What’s that? It’s a backup option. If a friend betrays us, our reverse clause is to learn from how this happened and how to forgive this person’s mistake. If we’re thrown in prison, our reverse clause is that we can refuse to be broken by this change of events and try to be of service to our fellow prisoners. When a technical glitch erases our work, our reverse clause is that we can start fresh and do it better this time. Our progress can be impeded or disrupted, but the mind can always be changed—it retains the power to redirect the path.

Part of this is remembering the usual course of things—Murphy’s Law states that “if anything can go wrong, it will.” So we keep this reverse clause handy because we know we’re probably going to have to use it. No one can thwart that.`,

  154: {
    month: `June`,
    day: 2,
    title: `PLATO’S VIEW`,
    body: `“How beautifully Plato put it. Whenever you want to talk about people, it’s best to take a bird’s-eye view and see everything all at once—of gatherings, armies, farms, weddings and divorces, births and deaths, noisy courtrooms or silent spaces, every foreign people, holidays, memorials, markets—all blended together and arranged in a pairing of opposites.”

—MARCUS AURELIUS, MEDITATIONS, 7.48

There is a beautiful dialogue called “Icaromenippus, an Aerial Expedition” by the poet Lucian in which the narrator is given the ability to fly and sees the world from above. Turning his eyes earthward, he sees how comically small even the richest people, the biggest estates, and entire empires look from above. All their battles and concerns were made petty in perspective.

In ancient times, this exercise was only theoretical—the highest anyone could get was the top of a mountain or a building a few stories tall. But as technology has progressed, humans have been able to actually take that bird’s-eye view—and greater.

Edgar Mitchell, an astronaut, was one of the first people to see the earth from outer space. As he later recounted:

“In outer space you develop an instant global consciousness, a people orientation, an intense dissatisfaction with the state of the world, and a compulsion to do something about it. From out there on the moon, international politics look so petty. You want to grab a politician by the scruff of the neck and drag him a quarter of a million miles out and say, ‘Look at that, you son of a bitch.’”

Many a problem can be solved with the perspective of Plato’s view. Use it.`,

    discipline: `The Discipline of Action`,

  155: {
    month: `June`,
    day: 3,
    title: `IT IS WELL TO BE FLEXIBLE`,
    body: `“He can’t serve in the military? Let him seek public office. Must he live in the private sector? Let him be a spokesperson. Is he condemned to silence? Let him aid his fellow citizens by silent public witness. Is it dangerous to enter the Forum? Let him display himself, in private homes, at public events and gatherings, as a good associate, faithful friend, and moderate tablemate. Has he lost the duties of a citizen? Let him exercise those of a human being.”

—SENECA, ON TRANQUILITY OF MIND, 4.3

Shortly before his death, as victory in the Civil War was finally within his grasp, Lincoln told a story to an audience of generals and admirals about a man who had approached him for a high-ranking government appointment. First, the man asked if he might be made a foreign minister. Upon being turned down, the man asked for a more modest position. Upon being turned down again, he asked for a job as a low-level customs officer. Finding he could not get even that, he finally just asked Lincoln for an old pair of trousers. “Ah,” Lincoln laughed as he concluded the story, “it is well to be humble.”

This story embodies the flexibility and determination of Stoicism. If we can’t do *this*, then perhaps we can try *that.* And if we can’t do *that, *then perhaps we can try some *other* thing. And if that thing is impossible, there is always another. Even if that final thing is just being a good human being—we always have some opportunity to practice our philosophy, to make some contribution.`,

    title: `THIS IS WHAT WE’RE HERE FOR`,
    body: `“Why then are we offended? Why do we complain? This is what we’re here for.”

  157: {
    month: `June`,
    day: 5,
    title: `BLOW YOUR OWN NOSE`,
    body: `“We cry to God Almighty, how can we escape this agony? Fool, don’t you have hands? Or could it be God forgot to give you a pair? Sit and pray your nose doesn’t run! Or, rather just wipe your nose and stop seeking a scapegoat.”

—EPICTETUS, DISCOURSES, 2.16.13

The world is unfair. The game is rigged. So-and-so has it out for you. Maybe these theories are true, but practically speaking—for the right here and now—what good are they to you? That government report or that sympathetic news article isn’t going to pay the bills or rehab your broken leg or find that bridge loan you need. Succumbing to the self-pity and “woe is me” narrative accomplishes nothing—nothing except sapping you of the energy and motivation you need to *do something about your problem.*

  158: {
    month: `June`,
    day: 6,
    title: `WHEN TO STICK AND WHEN TO QUIT`,
    body: `“Think of those who, not by fault of inconsistency but by lack of effort, are too unstable to live as they wish, but only live as they have begun.”

—SENECA, ON TRANQUILITY OF MIND, 2.6b

In *The Dip*, Seth Godin draws an interesting analogy from the three types of people you see in line at the supermarket. One gets in a short line and sticks to it no matter how slow it is or how much faster the others seem to be going. Another changes lines repeatedly based on whatever he thinks might save a few seconds. And a third switches only once—when it’s clear her line is delayed and there is a clear alternative—and then continues with her day. He’s urging you to ask: Which type are you?

Seneca is also advising us to be this third type. Just because you’ve begun down one path doesn’t mean you’re committed to it *forever*, especially if that path turns out to be flawed or impeded. At that same time, this is not an excuse to be flighty or incessantly noncommittal. It takes courage to decide to do things differently and to make a change, as well as discipline and awareness to know that the notion of “Oh, but this looks *even* better” is a temptation that cannot be endlessly indulged either.`,

  159: {
    month: `June`,
    day: 7,
    title: `FINDING THE RIGHT MENTORS`,
    body: `“We like to say that we don’t get to choose our parents, that they were given by chance—yet we can truly choose whose children we’d like to be.”

—SENECA, ON THE BREVITY OF LIFE, 15.3a

We are fortunate enough that some of the greatest men and women in history have recorded their wisdom (and folly) in books and journals. Many others have had their lives chronicled by a careful biographer—from Plutarch to Boswell to Robert Caro. The literature available at your average library amounts to millions of pages and thousands of years of knowledge, insight, and experience.

Maybe your parents were poor role models, or you lacked a great mentor. Yet if we choose to, we can easily access the wisdom of those who came before us—those whom we aspire to be like.

We not only owe it to ourselves to seek out this hard-won knowledge, we owe it to the people who took the time to record their experiences to try to carry on the traditions and follow their examples—to be the promising children of these noble parents.`,
    theme: `Problem Solving`,
    discipline: `The Discipline of Action`,
  },
  160: {
    month: `June`,
    day: 8,
    title: `BRICK BY BORING BRICK`,
    body: `“You must build up your life action by action, and be content if each one achieves its goal as far as possible—and no one can keep you from this. But there will be some external obstacle! Perhaps, but no obstacle to acting with justice, self-control, and wisdom. But what if some other area of my action is thwarted? Well, gladly accept the obstacle for what it is and shift your attention to what is given, and another action will immediately take its place, one that better fits the life you are building.”

—MARCUS AURELIUS, MEDITATIONS, 8.32

Elite athletes in collegiate and professional sports increasingly follow a philosophy known as “The Process.” It’s a philosophy created by University of Alabama coach Nick Saban, who taught his players to ignore the big picture—important games, winning championships, the opponent’s enormous lead—and focus instead on doing the absolutely smallest things well—practicing with full effort, finishing a specific play, converting on a single possession. A season lasts months, a game lasts hours, catching up might be four touchdowns away, but a single play is only a few seconds. And games and seasons are *constituted* by seconds.

If teams follow The Process, they tend to win. They overcome obstacles and eventually make their way to the top without ever having focused on the obstacles directly. If you follow The Process in your life—assembling the right actions in the right order, one right after another—you too will do well. Not only that, you will be better equipped to make quick work of the obstacles along that path. You’ll be too busy putting one foot in front of the next to even notice the obstacles were there.`,
    theme: `Problem Solving`,
    discipline: `The Discipline of Action`,
  },
  161: {
    month: `June`,
    day: 9,
    title: `SOLVE PROBLEMS EARLY`,
    body: `“There is no vice which lacks a defense, none that at the outset isn’t modest and easily intervened—but after this the trouble spreads widely. If you allow it to get started you won’t be able to control when it stops. Every emotion is at first weak. Later it rouses itself and gathers strength as it moves along—it’s easier to slow it down than to supplant it.”

—SENECA, MORAL LETTERS, 106.2b–3a

“Rivers,” Publilius Syrus reminds us with an epigram, “are easiest to cross at their source.” That’s what Seneca means too. The raging waters and deadly currents of bad habits, ill discipline, chaos, and dysfunction—somewhere they began as no more than just a slight trickle. Somewhere they are a placid lake or pond, even a bubbling underground spring.

Which would you rather do—nearly drown in a dangerous crossing in a few weeks or cross now while it’s still easy? It’s up to you.`,
    theme: `Problem Solving`,
    discipline: `The Discipline of Action`,
  },
  162: {
    month: `June`,
    day: 10,
    title: `YOU CAN DO IT`,
    body: `“If you find something very difficult to achieve yourself, don’t imagine it impossible—for anything possible and proper for another person can be achieved as easily by you.”

—MARCUS AURELIUS, MEDITATIONS, 6.19

There are two kinds of people in this world. The first looks at others who have accomplished things and thinks: *Why them? Why not me?* The other looks at those same people and thinks: *If they can do it, why can’t I?*

One is zero-sum and jealous (if you win, I lose). The other is non-zero-sum (there’s plenty to go around) and sees the success of others as an *inspiration.* Which attitude will propel you onward and upward? Which will drive you to bitterness and despair?

Who will you be?`,
    theme: `Problem Solving`,
    discipline: `The Discipline of Action`,

  163: {
    month: `June`,
    day: 11,
    title: `JUST DON’T MAKE THINGS WORSE`,
    body: `“How much more harmful are the consequences of anger and grief than the circumstances that aroused them in us!”

—MARCUS AURELIUS, MEDITATIONS, 11.18.8

The first rule of holes, goes the adage, is that “if you find yourself in a hole, stop digging.” This might be the most violated piece of commonsense wisdom in the world. Because what most of us do when something happens, goes wrong, or is inflicted on us is make it worse—first, by getting angry or feeling aggrieved, and next, by flailing around before we have much in the way of a plan.

Today, give yourself the most simple and doable of tasks: just don’t make stuff worse. Whatever happens, don’t add angry or negative emotions to the equation. Don’t react for the sake of reacting. Leave it as it is. Stop digging. Then plan your way out.`,

    discipline: `The Discipline of Action`,

  164: {
    month: `June`,
    day: 12,
    title: `A TRAINED MIND IS BETTER THAN ANY SCRIPT`,
    body: `“In this way you must understand how laughable it is to say, ‘Tell me what to do!’ What advice could I possibly give? No, a far better request is, ‘Train my mind to adapt to any circumstance.’ . . . In this way, if circumstances take you off script . . . you won’t be desperate for a new prompting.”

—EPICTETUS, DISCOURSES, 2.2.20b–1; 24b–25a

It would be nice if someone could show us exactly what to do in every situation. Indeed, this is what we spend a good portion of our lives doing: preparing for this, studying for that. Saving for or anticipating some arbitrary point in the future. But plans, as the boxer Mike Tyson pointed out, last only until you’re punched in the face.

Stoics do not seek to have the answer for every question or a plan for every contingency. Yet they’re also not worried. Why? Because they have confidence that they’ll be able to adapt and change with the circumstances. Instead of looking for instruction, they cultivate skills like creativity, independence, self-confidence, ingenuity, and the ability to problem solve. In this way, they are resilient instead of rigid. We can practice the same.

  165: {
    month: `June`,
    day: 13,
    title: `LIFE IS A BATTLEFIELD`,
    body: `“Don’t you know life is like a military campaign? One must serve on watch, another in reconnaissance, another on the front line. . . . So it is for us—each person’s life is a kind of battle, and a long and varied one too. You must keep watch like a soldier and do everything commanded. . . . You have been stationed in a key post, not some lowly place, and not for a short time but for life.”

—EPICTETUS, DISCOURSES, 3.24.31–36

The writer Robert Greene often uses the phrase “As in war, so in life.” It’s an aphorism worth keeping close, because our life is a battle both literally and figuratively. As a species, we fight to survive on a planet indifferent to our survival. As individuals, we fight to survive among a species whose population numbers in the billions. Even inside our own bodies, diverse bacteria battle it out. *Vivere est militare.* (To live is to fight.)

Today, you’ll be fighting for your goal, fighting against impulses, fighting to be the person you want to be. So what are the attributes necessary to win these many wars?

Discipline

Fortitude

Courage

Clearheadedness

Selflessness

Sacrifice

  166: {
    month: `June`,
    day: 14,
    title: `TRY THE OTHER HANDLE`,
    body: `“Every event has two handles—one by which it can be carried, and one by which it can’t. If your brother does you wrong, don’t grab it by his wronging, because this is the handle incapable of lifting it. Instead, use the other—that he is your brother, that you were raised together, and then you will have hold of the handle that carries.”

—EPICTETUS, ENCHIRIDION, 43

The famous journalist William Seabrook suffered from such debilitating alcoholism that in 1933 he committed himself to an insane asylum, which was then the only place to get treatment for addiction. In his memoir, *Asylum*, he tells the story of the struggle to turn his life around inside the facility. At first, he stuck to his addict way of thinking—and as a result, he was an outsider, constantly getting in trouble and rebelling against the staff. He made almost no progress and was on the verge of being asked to leave.

Then one day this very quote from Epictetus—about everything having two handles—occurred to him. “I took hold now by the other handle,” he related later, “and carried on.” He actually began to have a good time there. He focused on his recovery with real enthusiasm. “I suddenly found it wonderful, strange, and beautiful, to be sober. . . . It was as if a veil, or scum, or film had been stripped from all things visual and auditory.” It’s an experience shared by many addicts when they finally stop doing things their way and actually open themselves to the perspectives and wisdom and lessons of those who have gone before them.

There is no promise that trying things this way—of grabbing the different handle—will have such momentous results for you. But why continue to lift by the handle that hasn’t worked?`,
    theme: `Problem Solving`,
    discipline: `The Discipline of Action`,

  167: {
    month: `June`,
    day: 15,
    title: `LISTENING ACCOMPLISHES MORE THAN SPEAKING`,
    body: `“To the youngster talking nonsense Zeno said, ‘The reason why we have two ears and only one mouth is so we might listen more and talk less.’”

—DIOGENES LAERTIUS, LIVES OF EMINENT PHILOSOPHERS, 7.1.23

Why do the wise have so few problems compared with the rest of us? There are a few simple reasons.

First, the wise seem to manage expectations as much as possible. They rarely expect what isn’t possible in the first place.

Second, the wise always consider both the best and worst case scenarios. They don’t just think about what they *wish* to happen, but also what very realistically *can* happen if things were to suddenly turn.

Third, the wise act with a reverse clause—meaning that they not only consider what might go wrong, but they are prepared for that to be exactly what they *want* to happen—it is an opportunity for excellence and virtue.

  168: {
    month: `June`,

    title: `NO SHAME IN NEEDING HELP`,
    body: `“Don’t be ashamed of needing help. You have a duty to fulfill just like a soldier on the wall of battle. So what if you are injured and can’t climb up without another soldier’s help?”

  169: {
    month: `June`,
    day: 17,
    title: `OFFENSE OR DEFENSE?`,
    body: `“Fortune doesn’t have the long reach we suppose, she can only lay siege to those who hold her tight. So, let’s step back from her as much as possible.”

—SENECA, MORAL LETTERS, 82.5b–6

Machiavelli, who supposedly admired Seneca, says in *The Prince* that “fortune is a woman, and it is necessary, in order to keep her down, to beat her and struggle with her.” Even for the sixteenth century, it’s pretty horrifying imagery. But for a ruthless and endlessly ambitious ruler, it was par for the course. Is that the nasty lifestyle you’re after?

Now compare that view with Seneca’s. Not only is he saying that the more you struggle with fortune, the more vulnerable you are to it, but he’s also saying that the better path to security is in the “impregnable wall” of philosophy. “Philosophy,” he says, helps us tame the “mad frenzy of our greed and tamps down the fury of our fears.”

In sports or war, the metaphor here would be the choice between a strategy of endless, exhausting offense and a strategy of resilient, flexible defense. Which will you play? What kind of person are you?

  170: {
    month: `June`,
    day: 18,
    title: `PREPARED AND ACTIVE`,
    body: `“Let Fate find us prepared and active. Here is the great soul—the one who surrenders to Fate. The opposite is the weak and degenerate one, who struggles with and has a poor regard for the order of the world, and seeks to correct the faults of the gods rather than their own.”

Whatever happens today, let it find us prepared and active: ready for problems, ready for difficulties, ready for people to behave in disappointing or confusing ways, ready to accept and make it work for us. Let’s not wish we could turn back time or remake the universe according to our preference. Not when it would be far better and far easier to remake ourselves.`,

  171: {
    month: `June`,
    day: 19,
    title: `STAY FOCUSED ON THE PRESENT`,
    body: `“Don’t let your reflection on the whole sweep of life crush you. Don’t fill your mind with all the bad things that might still happen. Stay focused on the present situation and ask yourself why it’s so unbearable and can’t be survived.”

—MARCUS AURELIUS, MEDITATIONS, 8.36

When you look back at some of the most impressive, even scary, things that you’ve done or endured, how were they possible? How were you able to see past the danger or the poor odds? As Marcus described, you were too busy with the details to let the whole sweep of the situation crush you. In fact, you probably didn’t even think about it at the time.

A character in Chuck Palahniuk’s novel *Lullaby *says, “The trick to forgetting the big picture is to look at everything close up.” Sometimes grasping the big picture is important, and the Stoics have helped us with that before. A lot of times, though, it’s counterproductive and overwhelming to be thinking of everything that lies ahead. So by focusing exclusively on the present, we’re able to avoid or remove those intimidating or negative thoughts from our frame of view.

A man walking a tightrope tries not to think about how high up he is. An undefeated team tries not to think about their perfect winning streak. Like us, they’re better off putting one foot in front of the other and considering everything else to be extraneous.`,

  172: {
    month: `June`,
    day: 20,
    title: `CALM IS CONTAGIOUS`,
    body: `“If then it’s not that the things you pursue or avoid are coming at you, but rather that you in a sense are seeking them out, at least try to keep your judgment of them steady, and they too will remain calm and you won’t be seen chasing after or fleeing from them.”

—MARCUS AURELIUS, MEDITATIONS, 11.11

There is a maxim that Navy SEALs pass from officer to officer, man to man. In the midst of chaos, even in the fog of war, their battle-tested advice is this: “Calm is contagious.”

Especially when that calm is coming from the man or woman in charge. If the men begin to lose their wits, if the group is unsure of what to do next, it’s the leader’s job to do one thing: instill calm—not by force but by example.

That’s who you want to be, whatever your line of work: the casual, relaxed person in every situation who tells everyone else to take a breath and not to worry. Because you’ve got this. Don’t be the agitator, the paranoid, the worrier, or the irrational. Be the calm, not the liability.

  173: {
    month: `June`,
    day: 21,
    title: `TAKE A WALK`,
    body: `“We should take wandering outdoor walks, so that the mind might be nourished and refreshed by the open air and deep breathing.”

—SENECA, ON TRANQUILITY OF MIND, 17.8

In a notoriously loud city like Rome, it was impossible to get much peace and quiet. The noises of wagons, the shouting of vendors, the hammering of a blacksmith—all filled the streets with piercing violence (to say nothing of the putrid smells of a city with poor sewage and sanitation). So philosophers went on a lot of walks—to get where they needed to go, to clear their heads, to get fresh air.

Throughout the ages, philosophers, writers, poets, and thinkers have found that walking offers an additional benefit—time and space for better work. As Nietzsche would later say: “It is only ideas gained from walking that have any worth.”

Today, make sure you take a walk. And in the future, when you get stressed or overwhelmed, take a walk. When you have a tough problem to solve or a decision to make, take a walk. When you want to be creative, take a walk. When you need to get some air, take a walk. When you have a phone call to make, take a walk. When you need some exercise, take a long walk. When you have a meeting or a friend over, take a walk together.

Nourish yourself and your mind and solve your problems along the way.`,

    discipline: `The Discipline of Action`,

  174: {
    month: `June`,
    day: 22,
    title: `THE DEFINITION OF INSANITY`,
    body: `“If you are defeated once and tell yourself you will overcome, but carry on as before, know in the end you’ll be so ill and weakened that eventually you won’t even notice your mistake and will begin to rationalize your behavior.”

—EPICTETUS, DISCOURSES, 2.18.31

It’s been said that the definition of insanity is trying the same thing over and over again but expecting a different result. Yet that’s exactly what most people do. They tell themselves: *Today, I won’t get angry. Today, I won’t gorge myself.* But they don’t actually *do* anything differently. They try the same routine and hope it will work this time. Hope is not a strategy!

Failure is a part of life we have little choice over. Learning from failure, on the other hand, is optional. We have to choose to learn. We must consciously opt to do things differently—to tweak and change until we actually get the result we’re after. But that’s hard.

  175: {
    month: `June`,
    day: 23,
    title: `THE LONG WAY AROUND`,
    body: `“You could enjoy this very moment all the things you are praying to reach by taking the long way around—if you’d stop depriving yourself of them.”

—MARCUS AURELIUS, MEDITATIONS, 12.1

Ask most people what they’re working toward and you’ll get an answer like: “I’m trying to become a [insert profession].” Or they’ll tell you they’re trying to get appointed to some impressive committee or position, become a millionaire, get discovered, become famous, whatever. Now you ask a couple more questions, such as “Why are you doing that?” or “What are you hoping it will be like when you get it?” and you find at the very core of it, people want freedom, they want happiness, and they want the respect of their peers.

A Stoic looks at all this and shakes his head at the immense effort and expense we put into chasing things that are simple and straightforward to acquire. It’s as if we prefer to spend years building a complicated Rube Goldberg machine instead of just reaching out and picking up what we want. It’s like looking all over for your sunglasses and then realizing they were on your head the whole time.

  176: {
    month: `June`,
    day: 24,
    title: `THE TRULY EDUCATED AREN’T QUARRELSOME`,
    body: `“The beautiful and good person neither fights with anyone nor, as much as they are able, permits others to fight . . . this is the meaning of getting an education—learning what is your own affair and what is not. If a person carries themselves so, where is there any room for fighting?”

—EPICTETUS, DISCOURSES, 4.5.1; 7b–8a

Socrates famously traveled around Athens, approaching the people he disagreed with most, and engaging them in long discussions. In these discussions—or what record we have of them—there are many examples of his conversation mates getting exasperated, upset, or aggravated by his many questions. Indeed, the people of Athens eventually got so upset, they sentenced Socrates to death.

But Socrates never seemed to get upset himself. Even when talking about matters of life and death, he always kept his cool. He was much more interested in hearing what the other person had to say than making sure he was heard or—as most of us insist upon—winning the argument.

The next time you face a political dispute or a personal disagreement, ask yourself: *Is there any reason to fight about this? Is arguing going to help solve anything? *Would an educated or wise person really be as quarrelsome as you might initially be inclined to be? Or would they take a breath, relax, and resist the temptation for conflict? Just think of what you could accomplish—and how much better you would feel—if you could conquer the need to fight and win every tiny little thing.`,

  177: {
    month: `June`,
    day: 25,
    title: `THE WISE DON’T HAVE “PROBLEMS”`,
    body: `“This is why we say that nothing happens to the wise person contrary to their expectations.”

—SENECA, ON TRANQUILITY OF MIND, 13.3b

Hesiod, the poet, said that “the best treasure is a sparing tongue.” Robert Greene considers it a law of power: Always Say Less Than Necessary.

  178: {
    month: `June`,
    day: 26,
    title: `TRY THE OPPOSITE`,
    body: `“What assistance can we find in the fight against habit? Try the opposite!”

—EPICTETUS, DISCOURSES, 1.27.4

Viktor Frankl, the brilliant psychologist and Holocaust survivor, cured patients suffering from phobias or neurotic habits using a method he called “paradoxical intention.” Let’s say a patient couldn’t sleep. The standard therapy would have been something obvious, like relaxation techniques. Frankl instead encouraged the patient to try *not* to fall asleep. He found that shifting focus off the problem deflected the patient’s obsessive attention away from it and allowed them to eventually sleep normally.

Fans of the TV show *Seinfeld* might remember an episode called “The Opposite” where George Costanza magically improves his life by doing the *opposite* of whatever he’d normally do. “If every instinct you have is wrong,” Jerry says to him, “then the opposite would have to be right.” The larger point is that sometimes our instincts or habits get stuck in a bad pattern that pushes us further from our natural, healthy selves.

  179: {
    month: `June`,
    day: 27,
    title: `ADVERSITY REVEALS`,
    body: `“How does it help, my husband, to make misfortune heavier by complaining about it? This is more fit for a king—to seize your adversities head on. The more precarious his situation, the more imminent his fall from power, the more firmly he should be resolved to stand and fight. It isn’t manly to retreat from fortune.”

As the CEO of Charles Schwab, Walt Bettinger hires hundreds of people each year and interviews hundreds more. Over his lifetime, we can safely assume he’s had his share of hits, misses, and surprises when it comes to bringing people on board. But consider one technique he’s used as he’s gotten older: he takes a candidate to breakfast and asks the restaurant’s manager to purposely mess up the candidate’s breakfast order.

He’s testing to see how they react. Do they get upset? Do they act rudely? Do they let this little event spoil the meeting? Do they handle the inconvenience with grace and kindness?

  180: {
    month: `June`,
    day: 28,
    title: `NO SELF-FLAGELLATION NEEDED`,
    body: `“Philosophy calls for simple living, but not for penance—it’s quite possible to be simple without being crude.”

—SENECA, MORAL LETTERS, 5.5

Marcus’s meditations are filled with self-criticism and so are the writings of other Stoics. It’s important to remember, however, that that’s as far as it goes. There was no self-flagellation, no paying penance, no self-esteem issues from guilt or self-loathing. You never hear them call themselves worthless pieces of crap, nor do they ever starve or cut themselves as punishment. Their self-criticism is *constructive*.

Laying into yourself, unduly depriving yourself, punishing yourself—that’s self-flagellation, not self-improvement.

  181: {
    month: `June`,
    day: 29,
    title: `NO EXCUSES`,
    body: `“It is possible to curb your arrogance, to overcome pleasure and pain, to rise above your ambition, and to not be angry with stupid and ungrateful people—yes, even to care for them.”

—MARCUS AURELIUS, MEDITATIONS, 8.8

“I was just born this way.” “I never learned anything different.” “My parents set a terrible example.” “Everyone else does it.” What are these? Excuses that people use to justify staying as they are instead of striving to become better.

Of course it’s possible to curb our arrogance, control our anger, and be a caring person. How do you think others do it? Certainly their parents weren’t perfect; they didn’t come out of the womb incapable of ego or immune to temptation. They worked on it. They made it a priority. They solved it like they would solve any other problem: by dedicating themselves to finding a solution, making incremental progress until they did.

  182: {
    month: `June`,
    day: 30,
    title: `THE OBSTACLE IS THE WAY`,
    body: `“While it’s true that someone can impede our actions, they can’t impede our intentions and our attitudes, which have the power of being conditional and adaptable. For the mind adapts and converts any obstacle to its action into a means of achieving it. That which is an impediment to action is turned to advance action. The obstacle on the path becomes the way.”

—MARCUS AURELIUS, MEDITATIONS, 5.20

Today, things will happen that will be contrary to your plans. If not today, then certainly tomorrow. As a result of these obstacles, you will not be able to do what you planned. This is not as bad as it seems, because your mind is infinitely elastic and adaptable. You have the power to use the Stoic exercise of turning obstacles upside down, which takes one negative circumstance and uses it as an opportunity to practice an unintended virtue or form of excellence.

If something prevents you from getting to your destination on time, then this is a chance to practice patience.

If an employee makes an expensive mistake, this is a chance to teach a valuable lesson.

If a computer glitch erases your work, it’s a chance to start over with a clean slate.

If someone hurts you, it’s a chance to practice forgiveness.

If something is hard, it is a chance to get stronger.

Try this line of thinking and see whether there is a situation in which one could *not* find some virtue to practice or derive some benefit. There isn’t one. Every impediment can advance action in some form or another.

    month: `July`,
    day: 1,
    title: `DO YOUR JOB`,
    body: `“Whatever anyone does or says, for my part I’m bound to the good. In the same way an emerald or gold or purple might always proclaim: ‘whatever anyone does or says, I must be what I am and show my true colors.’”

—MARCUS AURELIUS, MEDITATIONS, 7.15

The Stoics believed that every person, animal, and thing has a purpose or a place in nature. Even in ancient Greek and Roman times, they vaguely understood that the world was composed of millions of tiny atoms. It was this idea—this sense of an interconnected cosmos—that underpinned their sense that every person and every action was part of a larger system. Everyone had a job—a specific duty. Even people who did bad things—they were doing their job of being evil because evil is a part of life.

The most critical part of this system was the belief that you, the student who has sought out Stoicism, have the most important job: to be good! To be wise. “To remain the person that philosophy wished to make us.”

Do your job today. Whatever happens, whatever other people’s jobs happen to be, do yours. *Be good.*`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  184: {
    month: `July`,
    day: 2,
    title: `ON DUTY AND CIRCUMSTANCE`,
    body: `“Never shirk the proper dispatch of your duty, no matter if you are freezing or hot, groggy or well-rested, vilified or praised, not even if dying or pressed by other demands. Even dying is one of the important assignments of life and, in this as in all else, make the most of your resources to do well the duty at hand.”

—MARCUS AURELIUS, MEDITATIONS, 6.2

W*ill this make me rich? Will people be impressed? How hard do I need to try? How long will this take? What’s in it for me? Should I do this other thing instead?* These are the questions we ask ourselves amid the day’s opportunities and obligations.

Marcus Aurelius had many responsibilities, as those who hold executive power do. He judged cases, heard appeals, sent troops into battle, appointed administrators, approved budgets. A lot rode on his choices and actions. Should he do this or that? What about this concern or that concern? When would he get to enjoy himself? The simple reminder above was a way to cut through the Gordian knot of incentives, complaints, fears, and competing interests.

It’s what we must use to decide what to do in each and every phase of life. Morality can be complicated—but the *right thing* is usually clear and intuitive enough to feel in our gut. Our duty is rarely easy, but it is important. It’s also usually the harder choice. But we must do it.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  185: {
    month: `July`,
    day: 3,
    title: `TURN HAVE TO INTO GET TO`,
    body: `“The task of a philosopher: we should bring our will into harmony with whatever happens, so that nothing happens against our will and nothing that we wish for fails to happen.”

—EPICTETUS, DISCOURSES, 2.14.7

A long To-Do list seems intimidating and burdensome—all these things we *have* to do in the course of a day or a week. But a *Get To Do* list sounds like a privilege—all the things we’re excited about the opportunity to experience. This isn’t just semantic playing. It is a central facet of the philosopher’s worldview.

Today, don’t try to impose your will on the world. Instead see yourself as fortunate to receive and respond to the will *in* the world.

Stuck in traffic? A few wonderful minutes to relax and sit. Your car broke down after idling for so long? Ah, what a nice nudge to take a long walk the rest of the way. A swerving car driven by a distracted, cell-phone-wielding idiot nearly hit you as you were walking and soaked you head to toe with muddy water? What a reminder about how precarious our existence is and how silly it is to get upset about something as trivial as being late or having trouble with your commute!

Kidding aside, it might not seem like it makes a big difference to see life as something you *have* to do versus *get* to do, but there is. A huge, magnificent difference.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  186: {
    month: `July`,
    day: 4,
    title: `PROTECT THE FLAME`,
    body: `“Protect your own good in all that you do, and as concerns everything else take what is given as far as you can make reasoned use of it. If you don’t, you’ll be unlucky, prone to failure, hindered and stymied.”

—EPICTETUS, DISCOURSES, 4.3.11

The goodness inside you is like a small flame, and you are its keeper. It’s your job, today and every day, to make sure that it has enough fuel, that it doesn’t get obstructed or snuffed out.

Every person has their own version of the flame and is responsible for it, just as you are. If they all fail, the world will be much darker—that is something you don’t control. But so long as your flame flickers, there will be some light in the world.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  187: {
    month: `July`,
    day: 5,
    title: `NO ONE SAID IT’D BE EASY`,
    body: `“Good people will do what they find honorable to do, even if it requires hard work; they’ll do it even if it causes them injury; they’ll do it even if it will bring danger. Again, they won’t do what they find base, even if it brings wealth, pleasure, or power. Nothing will deter them from what is honorable, and nothing will lure them into what is base.”

—SENECA, MORAL LETTERS, 76.18

If doing good was easy, everyone would do it. (And if doing bad wasn’t tempting or attractive, nobody would do it.) The same goes for your duty. If *anyone* could do it, it would have been assigned to someone else. But instead it was assigned to you.

Thankfully, you’re not like everyone. You’re not afraid of doing what is hard. You can resist superficially attractive rewards. Can’t you?`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  188: {
    month: `July`,
    day: 6,
    title: `RISE AND SHINE`,
    body: `“On those mornings you struggle with getting up, keep this thought in mind—I am awakening to the work of a human being. Why then am I annoyed that I am going to do what I’m made for, the very things for which I was put into this world? Or was I made for this, to snuggle under the covers and keep warm? It’s so pleasurable. Were you then made for pleasure? In short, to be coddled or to exert yourself?”

—MARCUS AURELIUS, MEDITATIONS, 5.1

It’s comforting to think that even two thousand years ago the emperor of Rome (who was reportedly a bit of an insomniac) was giving himself a pep talk in order to summon up the willpower to throw the blankets off each morning and get out of bed. From the time we’re first sent off to school until we retire, we’re faced with that same struggle. It’d be nicer to shut our eyes and hit the snooze button a few more times. But we can’t.

Because we have a job to do. Not only do we have the calling we’ve dedicated ourselves to, but we have the larger cause that the Stoics speak about: the greater good. We cannot be of service to ourselves, to other people, or to the world unless we get up and get working—the earlier the better. So c’mon. Get in the shower, have your coffee, and get going.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  189: {
    month: `July`,
    day: 7,
    title: `OUR DUTY TO LEARN`,
    body: `“This is what you should teach me, how to be like Odysseus—how to love my country, wife and father, and how, even after suffering shipwreck, I might keep sailing on course to those honorable ends.”

—SENECA, MORAL LETTERS, 88.7b

Many schoolteachers teach *The Odyssey* all wrong. They teach the dates, they debate whether Homer was really the author or not, whether he was blind, they explain the oral tradition, they tell students what a Cyclops is or how the Trojan Horse worked.

Seneca’s advice to someone studying the classics is to forget all that. The dates, the names, the places—they hardly matter. What matters is the *moral. *If you got everything else wrong from *The Odyssey*, but you left understanding the importance of perseverance, the dangers of hubris, the risks of temptation and distraction? Then you really learned something.

We’re not trying to ace tests or impress teachers. We are reading and studying to live, to be good human beings—always and forever.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  190: {
    month: `July`,
    day: 8,
    title: `STOP MONKEYING AROUND`,
    body: `“Enough of this miserable, whining life. Stop monkeying around! Why are you troubled? What’s new here? What’s so confounding? The one responsible? Take a good look. Or just the matter itself? Then look at that. There’s nothing else to look at. And as far as the gods go, by now you could try being more straightforward and kind. It’s the same, whether you’ve examined these things for a hundred years, or only three.”

—MARCUS AURELIUS, MEDITATIONS, 9.37

“Character,” Joan Didion would write in one of her best essays, “the willingness to accept responsibility for one’s own life—is the source from which self-respect springs.”

Marcus is urging us not to waste time complaining about what we haven’t got or how things have worked out. We have to quit monkeying around and be the owners of our own lives. Character can be developed, and when it is, self-respect will ensue. But that means starting and getting serious about it. Not later, not after certain questions have been answered or distractions dealt with, but now. Right now. Taking responsibility is the first step.

To be without this character is the worst of all fates. As Didion put it in “On Self-Respect,” “To live without self-respect is to lie awake some night, beyond the reach of warm milk, the phenobarbital, and the sleeping hand on the coverlet, counting up the sins of commission and omission, the trusts betrayed, the promises subtly broken, the gifts irrevocably wasted through sloth or cowardice or carelessness.”

You’re so much better than that.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  191: {
    month: `July`,
    day: 9,
    title: `THE PHILOSOPHER KING`,
    body: `“For I believe a good king is from the outset and by necessity a philosopher, and the philosopher is from the outset a kingly person.”

—MUSONIUS RUFUS, LECTURES, 8.33.32–34

The Israeli general Herzl Halevi believes that philosophy is essential in his role as a leader and warrior. “People used to tell me that business administration is for the practical life and philosophy is for the spirit,” he said. “Through the years I found it is exactly the opposite—I used philosophy much more practically.” War and leadership offer an unending series of ethical decisions that require priorities, balance, and clarity. That’s what philosophy helps with.

Plato knew this when he imagined a utopia ruled by a philosopher king. “Either philosophers should become kings,” he said in *The Republic*, “or those now called kings should truly and sufficiently undertake philosophy.” Marcus Aurelius was quite literally that philosopher king.

What does that have to do with you? There are fewer kings these days, but we’re all leaders in one way or another—of families, of companies, of a team, of an audience, of a group of friends, of ourselves. It’s the study of philosophy that cultivates our reason and ethics so that we can do our job well. We can’t just wing it—too many people are counting on us to do it right.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  192: {
    month: `July`,
    day: 10,
    title: `LOVE THE HUMBLE ART`,
    body: `“Love the humble art you have learned, and take rest in it. Pass through the remainder of your days as one who whole-heartedly entrusts all possessions to the gods, making yourself neither a tyrant nor a slave to any person.”

—MARCUS AURELIUS, MEDITATIONS, 4.31

Stop by a comedy club any weekend night in New York or Los Angeles and you’re likely to find some of the world’s biggest and most commercially successful comedians in there, workshopping their craft for just a handful of people. Though they make a fortune in movies or on the road, there they are, practicing the most basic form of their art.

If you ask any of them: “Why are you doing this? Why do you still perform?” The answer is usually: “Because I’m good at it. Because I love it. Because I want to get better. Because I thrive on connecting with an audience. Because I just can’t *not* do it.”

It’s not work for them to get up on stage at Carolines or the Comedy Cellar at 1 a.m. It’s invigorating. They don’t *have* to do it. They’re free, and they *choose* this.

Whatever humble art you practice: Are you sure you’re making time for it? Are you loving what you do enough to make the time? Can you trust that if you put in the effort, the rest will take care of itself? Because it will. Love the craft, be a craftsman.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  193: {
    month: `July`,
    day: 11,
    title: `THE START-UP OF YOU`,
    body: `“But what does Socrates say? ‘Just as one person delights in improving his farm, and another his horse, so I delight in attending to my own improvement day by day.’”

—EPICTETUS, DISCOURSES, 3.5.14

The rage these days is to start your own company—to be an *entrepreneur*. There is no question, building a business from scratch can be an immensely rewarding pursuit. It’s why people put their whole lives into doing it, working countless hours and taking countless risks.

But shouldn’t we be just as invested in building *ourselves* as we would be to any company?

Like a start-up, we begin as just an idea: we’re incubated, put out into the world where we develop slowly, and then, over time, we accumulate partners, employees, customers, investors, and wealth. Is it really so strange to treat your own life as seriously as you might treat an idea for a business? Which one *really* is the matter of life and death?`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  194: {
    month: `July`,
    day: 12,
    title: `SOME SIMPLE RULES`,
    body: `“In your actions, don’t procrastinate. In your conversations, don’t confuse. In your thoughts, don’t wander. In your soul, don’t be passive or aggressive. In your life, don’t be all about business.”

—MARCUS AURELIUS, MEDITATIONS, 8.51

Simple is rarely easy. But now that you have these rules, make it your duty to put them into practice—with the first item on your to-do list, with the first conversation you have, with your soul, and, of course, with the life you make for yourself. Not just today, but every day.

Write that on the blackboard and don’t forget it.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  195: {
    month: `July`,
    day: 13,
    title: `A LEADER LEADS`,
    body: `“One person, on doing well by others, immediately accounts the expected favor in return. Another is not so quick, but still considers the person a debtor and knows the favor. A third kind of person acts as if not conscious of the deed, rather like a vine producing a cluster of grapes without making further demands, like a horse after its race, or a dog after its walk, or a bee after making its honey. Such a person, having done a good deed, won’t go shouting from rooftops but simply moves on to the next deed just like the vine produces another bunch of grapes in the right season.”

—MARCUS AURELIUS, MEDITATIONS, 5.6

Have you ever heard someone else repeat one of your ideas as though it were their own? Did you ever notice a younger sibling or relative mimic your behavior, perhaps the way you dress or the music you listen to? Maybe you moved to a new neighborhood and a bunch of hipsters followed. When we are young and inexperienced, we can react negatively to these situations. *Stop copying me! I was here first!*

As we mature, we start to see them in a different light. We understand that stepping up and helping is a service that leaders provide to the world. It’s our duty to do this—in big situations and small ones. If we expect to be leaders, we must see that thankless service comes with the job. We must do what leaders do, because it’s what leaders do—not for the credit, not for the thanks, not for the recognition. It’s our duty.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  196: {
    month: `July`,
    day: 14,
    title: `A LITTLE KNOWLEDGE IS DANGEROUS`,
    body: `“Every great power is dangerous for the beginner. You must therefore wield them as you are able, but in harmony with nature.”

—EPICTETUS, DISCOURSES, 3.13.20

Great teachers are usually hardest on their most promising students. When teachers see potential, they want it to be fully realized. But great teachers are also aware that natural ability and quick comprehension can be quite dangerous to the student if left alone. Early promise can lead to overconfidence and create bad habits. Those who pick things up quickly are notorious for skipping the basic lessons and ignoring the fundamentals.

Don’t get carried away. Take it slow. Train with humility.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  197: {
    month: `July`,
    day: 15,
    title: `DOING THE RIGHT THING IS ENOUGH`,
    body: `“When you’ve done well and another has benefited by it, why like a fool do you look for a third thing on top—credit for the good deed or a favor in return?”

—MARCUS AURELIUS, MEDITATIONS, 7.73

The answer to the question “Why did you do the right thing?” should always be “Because it was the right thing to do.” After all, when you hear or see another person do that—especially when they might have endured some hardship or difficulty as a consequence for doing that right thing—do you not think, *There, that is a human being at their fi**nest*?

So why on earth do you need thanks or recognition for having done the right thing? It’s your job.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  198: {
    month: `July`,
    day: 16,
    title: `PROGRESS OF THE SOUL`,
    body: `“To what service is my soul committed? Constantly ask yourself this and thoroughly examine yourself by seeing how you relate to that part called the ruling principle. Whose soul do I have now? Do I have that of a child, a youth . . . a tyrant, a pet, or a wild animal?”

—MARCUS AURELIUS, MEDITATIONS, 5.11

To what are you committed? What cause, what mission, what purpose? What are you doing? And more important, why are you doing it? How does what you do every day reflect, in some way, the values you claim to care about? Are you acting in a way that’s consistent with something you value, or are you wandering, unmoored to anything other than your own ambition?

When you examine these questions, you might be uncomfortable with the answers. That’s good. That means you’ve taken the first step to correcting your behavior—to being better than those wild creatures Marcus mentions. It also means you’re closer to discovering what your duty calls you to do in life. And once you discover it, you’ve moved a little bit closer to fulfilling it.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  199: {
    month: `July`,
    day: 17,
    title: `DON’T ABANDON OTHERS . . . OR YOURSELF`,
    body: `“As you move forward along the path of reason, people will stand in your way. They will never be able to keep you from doing what’s sound, so don’t let them knock out your goodwill for them. Keep a steady watch on both fronts, not only for well-based judgments and actions, but also for gentleness with those who would obstruct our path or create other difficulties. For getting angry is also a weakness, just as much as abandoning the task or surrendering under panic. For doing either is an equal desertion—the one by shrinking back and the other by estrangement from family and friend.”

—MARCUS AURELIUS, MEDITATIONS, 11.9

As we begin to make progress in our lives, we’ll encounter the limitations of the people around us. It’s like a diet. When everyone is eating unhealthy, there is a kind of natural alignment. But if one person starts eating healthy, suddenly there are opposing agendas. Now there’s an argument about where to go for dinner.

Just as you must not abandon your new path simply because other people may have a problem with it, you must not abandon those other folks either. Don’t simply write them off or leave them in the dust. Don’t get mad or fight with them. After all, they’re at the same place you were not long ago.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  200: {
    month: `July`,
    day: 18,
    title: `EACH THE MASTER OF THEIR OWN DOMAIN`,
    body: `“My reasoned choice is as indifferent to the reasoned choice of my neighbor, as to his breath and body. However much we’ve been made for cooperation, the ruling reason in each of us is master of its own affairs. If this weren’t the case, the evil in someone else could become my harm, and God didn’t mean for someone else to control my misfortune.”

—MARCUS AURELIUS, MEDITATIONS, 8.56

The foundation of a free country is that your freedom to swing your fist ends where someone else’s nose begins. That is, someone else is free to do what they like until it interferes with your physical body and space. This saying can work as a great personal philosophy as well.

But living that way will require two important assumptions. First, you ought to live your own life in such a way that it doesn’t negatively impose on others. Second, you have to be open-minded and accepting enough to let others do the same.

Can you do that? Even when you really, really disagree with the choices they’re making? Can you understand that their life is their business and yours is your own? And that you’ve got plenty to wrestle with yourself without bothering anyone else?`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  201: {
    month: `July`,
    day: 19,
    title: `FORGIVE THEM BECAUSE THEY DON’T KNOW`,
    body: `“As Plato said, every soul is deprived of truth against its will. The same holds true for justice, self-control, goodwill to others, and every similar virtue. It’s essential to constantly keep this in your mind, for it will make you more gentle to all.”

—MARCUS AURELIUS, MEDITATIONS, 7.63

As he wound his way up Via Dolorosa to the top of Calvary Hill, Jesus (or *Christus* as he would have been known to Seneca and other Roman contemporaries) had suffered immensely. He’d been beaten, flogged, stabbed, forced to bear his own cross, and was set to be crucified on it next to two common criminals. There he watched the soldiers roll dice to see who would get to keep his clothes, listened as the people sneered and taunted him.

Whatever your religious inclinations, the words that Jesus spoke next—considering they came as he was subjected to unimaginable human suffering—send chills down your spine. Jesus looked upward and said simply, “Father, forgive them, for they know not what they do.”

That is the same truth that Plato spoke centuries earlier and that Marcus spoke almost two centuries after Jesus; other Christians must have spoken this truth as they were cruelly executed by the Romans under Marcus’s reign: Forgive them; they are deprived of truth. They wouldn’t do this if they weren’t.

Use this knowledge to be gentle and gracious.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  202: {
    month: `July`,
    day: 20,
    title: `MADE FOR JUSTICE`,
    body: `“The unjust person acts against the gods. For insofar as the nature of the universe made rational creatures for the sake of each other, with an eye toward mutual benefit based on true value and never for harm, anyone breaking nature’s will obviously acts against the oldest of gods.”

—MARCUS AURELIUS, MEDITATIONS, 9.1.1

We say of the most heinous acts that they are crimes against nature. We consider certain things to be an affront against humanity, saying, “This violates everything we hold dear.” However much we differ in religion, upbringing, politics, class, or gender, we can come together in agreement there.

Why? Because our sense of justice goes marrow deep. We don’t like it when people cut in line; we don’t like freeloaders; we pass laws that protect the defenseless; and we pay our taxes, agreeing, in part, to redistribute our wealth to those in need. At the same time, if we think we can get away with it, we might try to cheat or bend the rules. To paraphrase Bill Walsh, when left to our own devices, many of us individuals seek lower ground like water.

The key, then, is to support our natural inclination to justice with strong boundaries and strong commitments—to embrace, as Lincoln urged a divided, angry nation to do, “the better angels of our nature.”`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  203: {
    month: `July`,
    day: 21,
    title: `MADE FOR WORKING TOGETHER`,
    body: `“Whenever you have trouble getting up in the morning, remind yourself that you’ve been made by nature for the purpose of working with others, whereas even unthinking animals share sleeping. And it’s our own natural purpose that is more fitting and more satisfying.”

—MARCUS AURELIUS, MEDITATIONS, 8.12

If a dog spends all day in bed—your bed, most likely—that’s fine. It’s just *being* a dog. It doesn’t have anywhere to be, no other obligation other than being itself. According to the Stoics, we humans have a higher obligation—not to the gods but to each other. What gets us out of bed each morning—even when we fight it like Marcus did—is* praxeis koinonikas apodidonai* (to render works held in common). Civilization and country are great projects we build together and have been building together with our ancestors for millennia. We are made for cooperation (*synergia*) with each other.

So if you need an extra boost to get out of bed this morning, if you need something more than caffeine can offer, use this. People are depending on you. Your purpose is to help us render this great work together. And we’re waiting and excited for you to show up.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  204: {
    month: `July`,
    day: 22,
    title: `NO ONE HAS A GUN TO YOUR HEAD`,
    body: `“Nothing is noble if it’s done unwillingly or under compulsion. Every noble deed is voluntary.”

—SENECA, MORAL LETTERS, 66.16b

You don’t *have* to do the right thing. You always have the option to be selfish, rude, awful, shortsighted, pedantic, evil, or stupid. In fact, sometimes there are incentives to break bad. Certainly, not every criminal gets caught.

But how does this line of thinking usually work out for people? What’s that life like?

You don’t have to do the right thing, just as you don’t have to do your duty. You *get* to. You *want* to.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  205: {
    month: `July`,
    day: 23,
    title: `RECEIVE HONORS AND SLIGHTS EXACTLY THE SAME WAY`,
    body: `“Receive without pride, let go without attachment.”

—MARCUS AURELIUS, MEDITATIONS, 8.33

In the midst of the breakdown of the Roman Republic, during the civil war between Pompey and Caesar, Pompey made the decision to give control of the military fleet to Cato. It was a massive honor and hugely powerful position. But then a few days later, responding to the protests of his jealous inner circle, Pompey reversed his decision and took the command away.

It could have been seen as an enormous public humiliation—to be given a promotion and then have it taken away. The record shows that Cato’s reaction was basically nothing. He responded to the honor and the dishonor the same way: with indifference and acceptance. He certainly didn’t let it affect his support for the cause. In fact, after the snub, he worked to rally the soldiers before battle with inspirational speeches—the very men who should have been under his command.

That’s what Marcus is saying. Do not take the slights of the day personally—or the exciting rewards and recognitions either, especially when duty has assigned you an important cause. Trivial details like the rise and fall of your position say nothing about you as a person. Only your behavior—as Cato’s did—will.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  206: {
    month: `July`,
    day: 24,
    title: `SOMEWHERE SOMEONE’S DYING`,
    body: `“Whenever disturbing news is delivered to you, bear in mind that no news can ever be relevant to your reasoned choice. Can anyone break news to you that your assumptions or desires are wrong? No way! But they can tell you someone died—even so, what is that to you?”

—EPICTETUS, DISCOURSES, 3.18.1–2

A well-meaning friend might ask you today: “What do you think about [insert tragedy from the other side of the world]?” You, in your equally well-meaning concern, might say, “I just feel awful about it.”

In this scenario, both of you have put aside your reasoned choice without doing a single thing for the victims suffering from the actual tragedy. It can be so easy to get distracted by, even consumed by, horrible news from all over the world. The proper response of the Stoic to these events is not to *not* care, but mindless, meaningless sympathy does very little either (and comes at the cost of one’s own serenity, in most cases). If there is something you can actually do to help these suffering people, then, yes, the disturbing news (and your reaction to it) has relevance to your reasoned choice. If *emoting* is the end of your participation, then you ought to get back to your own individual duty—to yourself, to your family, to your country.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  207: {
    month: `July`,
    day: 25,
    title: `WHAT’S ON YOUR TOMBSTONE?`,
    body: `“When you see someone often flashing their rank or position, or someone whose name is often bandied about in public, don’t be envious; such things are bought at the expense of life. . . . Some die on the first rungs of the ladder of success, others before they can reach the top, and the few that make it to the top of their ambition through a thousand indignities realize at the end it’s only for an inscription on their gravestone.”

—SENECA, ON THE BREVITY OF LIFE, 20

Sometimes our professional commitments can become an end unto themselves. A politician might justify the neglect of his family for his office, or a writer might believe her “genius” excuses antisocial or selfish behavior. Anyone with some perspective can see that, in fact, the politician is really just in love with fame, and the writer enjoys being condescending and feeling superior. Workaholics always make excuses for their selfishness.

While these attitudes can lead to impressive accomplishments, their cost is rarely justified. The ability to work hard and long is admirable. But you are a human *being*, not a human *doing.* Seneca points out that we’re not animals. “Is it really so pleasant to die in harness?” he asked. Aleksandr Solzhenitsyn put it better: “Work is what horses die of. Everybody should know that.”`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,

  208: {
    month: `July`,
    day: 26,
    title: `WHEN GOOD MEN DO NOTHING`,
    body: `“Often injustice lies in what you aren’t doing, not only in what you are doing.”

—MARCUS AURELIUS, MEDITATIONS, 9.5

History abounds with evidence that humanity is capable of doing evil, not only actively but passively. In some of our most shameful moments—from slavery to the Holocaust to segregation to the murder of Kitty Genovese—guilt wasn’t limited to perpetrators but to ordinary citizens who, for a multitude of reasons, declined to get involved. It’s that old line: all evil needs to prevail is for good men to do nothing.

It’s not enough to just *not* do evil. You must also be a force for good in the world, as best you can.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  209: {
    month: `July`,
    day: 27,
    title: `WHERE IS ANYTHING BETTER?`,
    body: `“Indeed, if you find anything in human life better than justice, truth, self-control, courage—in short, anything better than the sufficiency of your own mind, which keeps you acting according to the demands of true reason and accepting what fate gives you outside of your own power of choice—I tell you, if you can see anything better than this, turn to it heart and soul and take full advantage of this greater good you’ve found.”

—MARCUS AURELIUS, MEDITATIONS, 3.6.1

We’ve all chased things we thought would matter. At some point, we all thought that money would be the answer, that success was the highest prize, that the undying love of a beautiful person would finally make us feel warm inside. What do we find when we actually attain these sacred objects? Not that they are empty or meaningless—only those who have never had them think that—but what we find is that they are not enough.

Money creates problems. Climbing one mountain exposes another, higher peak. There is never enough love.

There is something better out there: real virtue. It is its own reward. Virtue is the one good that reveals itself to be more than we expect and something that one cannot have in degrees. We simply have it or we don’t. And that is why virtue—made up as it is of justice, honesty, discipline, and courage—is the only thing worth striving for.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,

  210: {
    month: `July`,
    day: 28,
    title: `CHECK YOUR PRIVILEGE`,
    body: `“Some people are sharp and others dull; some are raised in a better environment, others in worse, the latter, having inferior habits and nurture, will require more by way of proof and careful instruction to master these teachings and to be formed by them—in the same way that bodies in a bad state must be given a great deal of care when perfect health is sought.”

—MUSONIUS RUFUS, LECTURES, 1.1.33–1.3.1–3.

At the end of a frustrating exchange, you might find yourself thinking, *Ugh, this person is such an idiot.* Or asking, *Why can’t they just do things right?*

But not everyone has had the advantages that you’ve had. That’s not to say that your own life has been easy—you just had a head start over some people. That’s why it is our duty to understand and be patient with others.

Philosophy is spiritual formation, care of the soul. Some need more care than others, just as some have a better metabolism or were born taller than others. The more forgiving and tolerant you can be of others—the more you can be aware of your various privileges and advantages—the more helpful and patient you will be.`,
