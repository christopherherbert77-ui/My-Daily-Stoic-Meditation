  76: {
    month: `March`,
    day: 16,
    book: `III`,
    entry: 16,
    title: `Book III, 16`,
    body: `Body, soul, intelligence: to the body belong sensations, to the soul appetites, to the intelligence principles. To receive the impressions of forms by means of appearances belongs even to animals; to be pulled by the strings of desire belongs both to wild beasts and to men who have made themselves into women, and to a Phalaris and a Nero: and to have the intelligence that guides to the things which appear suitable belongs also to those who do not believe in the gods, and who betray their country, and do their impure deeds when they have shut the doors. If then everything else is common to all that I have mentioned, there remains that which is peculiar to the good man, to be pleased and content with what happens, and with the thread which is spun for him; and not to defile the divinity which is planted in his breast, nor disturb it by a crowd of images, but to preserve it tranquil, following it obediently as a god, neither saying anything contrary to the truth, nor doing anything contrary to justice. And if all men refuse to believe that he lives a simple, modest, and contented life, he is neither angry with any of them, nor does he deviate from the way which leads to the end of life, to which a man ought to come pure, tranquil, ready to depart, and without any compulsion perfectly reconciled to his lot.`,
  },
  77: {
    month: `March`,
    day: 17,
    book: `III`,
    entry: 1,
    title: `Book III, 1`,
    body: `We ought to consider not only that our life is daily wasting away and a smaller part of it is left, but another thing also must be taken into the account, that if a man should live longer it is quite uncertain whether the understanding will still continue sufficient for the comprehension of things, and retain the power of contemplation which strives to acquire the knowledge of the divine and the human. For if he shall begin to fall into dotage, perspiration and nutrition and imagination and appetite, and whatever else there is of the kind, will not fail; but the power of making use of ourselves, and filling up the measure of our duty, and clearly separating all appearances, and considering whether a man should now depart from life, and whatever else of the kind absolutely requires a disciplined reason, all this is already extinguished. We must make haste then, not only because we are daily nearer to death, but also because the conception of things and the understanding of them cease first.`,
  },
  78: {
    month: `March`,
    day: 18,
    book: `III`,
    entry: 2,
    title: `Book III, 2`,
    body: `We ought to observe also that even the things which follow after the things which are produced according to nature contain something pleasing and attractive. For instance, when bread is baked some parts are split at the surface, and these parts which thus open, and have a certain fashion contrary to the purpose of the baker’s art, are beautiful in a manner, and in a peculiar way excite a desire for eating. And again, figs, when they are quite ripe, gape open, and in the ripe olives the very circumstance of their being near to rottenness adds a peculiar beauty to the fruit. And the ears of corn bending down, and the lion’s eyebrows, and the foam which flows from the mouth of wild boars, and many other things—though they are far from being beautiful, if a man should examine them severally—still, because they are consequent upon the things which are formed by nature, help to adorn them, and they please the mind; so that if a man should have a feeling and deeper insight with respect to the things which are produced in the universe, there is hardly one of those which follow by way of consequence which will not seem to him to be in a manner disposed so as to give pleasure. And so he will see even the real gaping jaws of wild beasts with no less pleasure than those which painters and sculptors show by imitation; and in an old woman and an old man he will be able to see a certain maturity and comeliness; and the attractive loveliness of young persons he will be able to look on with chaste eyes; and many such things will present themselves, not pleasing to every man, but to him only who has become truly familiar with nature and her works.`,
  },
  79: {
    month: `March`,

    book: `III`,
    entry: 3,
    title: `Book III, 3`,
    body: `Hippocrates after curing many diseases himself fell sick and died. The Chaldæi foretold the deaths of many, and then fate caught them too. Alexander, and Pompeius, and Caius Cæsar, after so often completely destroying whole cities, and in battle cutting to pieces many ten thousands of cavalry and infantry, themselves too at last departed from life. Heraclitus, after so many speculations on the conflagration of the universe, was filled with water internally and died smeared all over with mud. And lice destroyed Democritus; and other lice killed Socrates. What means all this? Thou hast embarked, thou hast made the voyage, thou art come to shore; get out. If indeed to another life, there is no want of gods, not even there. But if to a state without sensation, thou wilt cease to be held by pains and pleasures, and to be a slave to the vessel which is as much inferior as that which serves it is superior; for the one is intelligence and deity; the other is earth and corruption.`,

  80: {
    month: `March`,
    day: 20,
    book: `III`,
    entry: 4,
    title: `Book III, 4`,
    body: `Do not waste the remainder of thy life in thoughts about others, when thou dost not refer thy thoughts to some object of common utility. For thou losest the opportunity of doing something else when thou hast such thoughts as these. What is such a person doing, and why, and what is he saying, and what is he thinking of, and what is he contriving, and whatever else of the kind makes us wander away from the observation of our own ruling power. We ought then to check in the series of our thoughts everything that is without a purpose and useless, but most of all the overcurious feeling and the malignant; and a man should use himself to think of those things only about which if one should suddenly ask, What hast thou now in thy thoughts? With perfect openness thou mightest immediately answer, This or That; so that from thy words it should be plain that everything in thee is simple and benevolent, and such as befits a social animal, one that cares not for thoughts about pleasure or sensual enjoyments at all, nor has any rivalry or envy and suspicion, or anything else for which thou wouldst blush if thou shouldst say that thou hadst it in thy mind. For the man who is such and no longer delays being among the number of the best, is like a priest and minister of the gods, using too the [deity] which is planted within him, which makes the man uncontaminated by pleasure, unharmed by any pain, untouched by any insult, feeling no wrong, a fighter in the noblest fight, one who cannot be overpowered by any passion, dyed deep with justice, accepting with all his soul everything which happens and is assigned to him as his portion; and not often, nor yet without great necessity and for the general interest, imagining what another says, or does, or thinks. For it is only what belongs to himself that he makes the matter for his activity; and he constantly thinks of that which is allotted to himself out of the sum total of things, and he makes his own acts fair, and he is persuaded that his own portion is good. For the lot which is assigned to each man is carried along with him and carries him along with it. And he remembers also that every rational animal is his kinsman, and that to care for all men is according to man’s nature; and a man should hold on to the opinion not of all but of those only who confessedly live according to nature. But as to those who live not so, he always bears in mind what kind of men they are both at home and from home, both by night and by day, and what they are, and with what men they live an impure life. Accordingly, he does not value at all the praise which comes from such men, since they are not even satisfied with themselves.`,

    entry: 6,
    title: `Book III, 6`,
    body: `If thou findest in human life anything better than justice, truth, temperance, fortitude, and, in a word, anything better than thy own mind’s self-satisfaction in the things which it enables thee to do according to right reason, and in the condition that is assigned to thee without thy own choice; if, I say, thou seest anything better than this, turn to it with all thy soul, and enjoy that which thou hast found to be the best. But if nothing appears to be better than the deity which is planted in thee, which has subjected to itself all thy appetites, and carefully examines all the impressions, and, as Socrates said, has detached itself from the persuasions of sense, and has submitted itself to the gods, and cares for mankind; if thou findest everything else smaller and of less value than this, give place to nothing else, for if thou dost once diverge and incline to it, thou wilt no longer without distraction be able to give the preference to that good thing which is thy proper possession and thy own; for it is not right that anything of any other kind, such as praise from the many, or power, or enjoyment of pleasure, should come into competition with that which is rationally and politically [or, practically] good. All these things, even though they may seem to adapt themselves [to the better things] in a small degree, obtain the superiority all at once, and carry us away. But do thou, I say, simply and freely choose the better, and hold to it. But that which is useful is the better. Well then, if it is only useful to thee as a rational being, keep to it; but if it is only useful to thee as an animal, say so, and maintain thy judgment without arrogance; only take care that thou makest the inquiry by a sure method.`,

    entry: 7,
    title: `Book III, 7`,
    body: `Never value anything as profitable to thyself which shall compel thee to break thy promise, to lose thy self-respect, to hate any man, to suspect, to curse, to act the hypocrite, to desire anything which needs walls and curtains: for he who has preferred to everything else his own intelligence and dæmon and the worship of its excellence, acts no tragic part, does not groan, will not need either solitude or much company; and, what is chief of all, he will live without either pursuing or flying from [death]; but whether for a longer or a shorter time he shall have the soul inclosed in the body, he cares not at all; for even if he must depart immediately, he will go as readily as if he were going to do anything else which can be done with decency and order; taking care of this only all through life, that his thoughts turn not away from anything which belongs to an intelligent animal and a member of a civil community.`,

  94: {

    book: `IV`,
    entry: 3,
    title: `Book IV, 3`,
    body: `Men seek retreats for themselves, houses in the country, seashores, and mountains; and thou too art wont to desire such things very much. But this is altogether a mark of the most common sort of men, for it is in thy power whenever thou shalt choose to retire into thyself. For nowhere, either with more quiet or more freedom from trouble, does a man retire than into his own soul, particularly when he has within him such thoughts that by looking into them he is immediately in perfect tranquility; and I affirm that tranquility is nothing else than the good ordering of the mind. Constantly then give to thyself this retreat, and renew thyself; and let thy principles be brief and fundamental, which, as soon as thou shalt recur to them, will be sufficient to cleanse the soul completely, and to send thee back free from all discontent with the things to which thou returnest. For with what art thou discontented? With the badness of men? Recall to thy mind this conclusion, that rational animals exist for one another, and that to endure is a part of justice, and that men do wrong involuntarily; and consider how many already, after mutual enmity, suspicion, hatred, and fighting, have been stretched dead, reduced to ashes; and be quiet at last. But perhaps thou art dissatisfied with that which is assigned to thee out of the universe. Recall to thy recollection this alternative; either there is providence or atoms [fortuitous concurrence of things]; or remember the arguments by which it has been proved that the world is a kind of political community [and be quiet at last]. But perhaps corporeal things will still fasten upon thee. Consider then further that the mind mingles not with the breath, whether moving gently or violently, when it has once drawn itself apart and discovered its own power, and think also of all that thou hast heard and assented to about pain and pleasure [and be quiet at last]. But perhaps the desire of the thing called fame will torment thee. See how soon everything is forgotten, and look at the chaos of infinite time on each side of [the present], and the emptiness of applause, and the changeableness and want of judgment in those who pretend to give praise, and the narrowness of the space within which it is circumscribed [and be quiet at last]. For the whole earth is a point, and how small a nook in it is this thy dwelling, and how few are there in it, and what kind of people are they who will praise thee.

This then remains: Remember to retire into this little territory of thy own, and, above all, do not distract or strain thyself, but be free, and look at things as a man, as a human being, as a citizen, as a mortal. But among the things readiest to thy hand to which thou shalt turn, let there be these, which are two. One is that things do not touch the soul, for they are external and remain immovable; but our perturbations come only from the opinion which is within. The other is that all these things, which thou seest, change immediately and will no longer be; and constantly bear in mind how many of these changes thou hast already witnessed. The universe is transformation: life is opinion.`,

    body: `He who has a vehement desire for posthumous fame does not consider that everyone of those who remember him will himself also die very soon; then again also they who have succeeded them, until the whole remembrance shall have been extinguished as it is transmitted through men who foolishly admire and perish. But suppose that those who will remember are even immortal, and that the remembrance will be immortal, what then is this to thee? And I say not, what is it to the dead? But, what is it to the living? What is praise, except indeed so far as it has a certain utility? For thou now rejectest unseasonably the gift of nature, clinging to something else . . .`,
  },
  111: {
    month: `April`,
    day: 20,
    book: `IV`,
    entry: 20,
    title: `Book IV, 20`,
    body: `Everything which is in anyway beautiful is beautiful in itself, and terminates in itself, not having praise as part of itself. Neither worse then nor better is a thing made by being praised. I affirm this also of the things which are called beautiful by the vulgar; for example, material things and works of art. That which is really beautiful has no need of anything; not more than law, not more than truth, not more than benevolence or modesty. Which of these things is beautiful because it is praised, or spoiled by being blamed? Is such a thing as an emerald made worse than it was, if it is not praised? Or gold, ivory, purple, a lyre, a little knife, a flower, a shrub?`,
  },
  112: {
    month: `April`,
    day: 21,
    book: `IV`,
    entry: 21,
    title: `Book IV, 21`,
    body: `If souls continue to exist, how does the air contain them from eternity? But how does the earth contain the bodies of those who have been buried from time so remote? For as here the mutation of these bodies after a certain continuance, whatever it may be, and their dissolution make room for other dead bodies; so the souls which are removed into the air after subsisting for sometime are transmuted and diffused, and assume a fiery nature by being received into the seminal intelligence of the universe, and in this way make room for the fresh souls which come to dwell there. And this is the answer which a man might give on the hypothesis of souls continuing to exist. But we must not only think of the number of bodies which are thus buried, but also of the number of animals which are daily eaten by us and the other animals. For what a number is consumed, and thus in a manner buried in the bodies of those who feed on them! And nevertheless this earth receives them by reason of the changes [of these bodies] into blood, and the transformations into the aërial or the fiery element.

What is the investigation into the truth in this matter? The division into that which is material and that which is the cause of form [the formal] (vii. 29).`,
  },
  113: {
    month: `April`,
    day: 22,
    book: `IV`,
    entry: 22,
    title: `Book IV, 22`,
    body: `Do not be whirled about, but in every movement have respect to justice, and on the occasion of every impression maintain the faculty of comprehension [or understanding].`,
  },
  114: {
    month: `April`,
    day: 23,
    book: `IV`,
    entry: 23,
    title: `Book IV, 23`,
    body: `Everything harmonizes with me which is harmonious to thee, O Universe. Nothing for me is too early nor too late, which is in due time for thee. Everything is fruit to me which thy seasons bring, O Nature: from thee are all things, in thee are all things, to thee all things return. The poet says, “Dear city of Cecrops”; and wilt not thou say, “Dear city of Zeus”?`,
  },
  115: {
    month: `April`,
    day: 24,
    book: `IV`,
    entry: 24,
    title: `Book IV, 24`,
    body: `“Occupy thyself with few things,” says the philosopher, “if thou wouldst be tranquil. But consider if it would not be better to say, Do what is necessary, and whatever the reason of the animal which is naturally social requires, and as it requires. For this brings not only the tranquility which comes from doing well, but also that which comes from doing few things. For the greatest part of what we say and do being unnecessary, if a man takes this away, he will have more leisure and less uneasiness. Accordingly on every occasion a man should ask himself, Is this one of the unnecessary things? Now a man should take away not only unnecessary acts but also unnecessary thoughts, for thus superfluous acts will not follow after.”`,
  },
  116: {
    month: `April`,
    day: 25,
    book: `IV`,
    entry: 25,
    title: `Book IV, 25`,
    body: `Try how the life of the good man suits thee, the life of him who is satisfied with his portion out of the whole, and satisfied with his own just acts and benevolent disposition.`,
  },
  117: {
    month: `April`,
    day: 26,
    book: `IV`,
    entry: 26,
    title: `Book IV, 26`,
    body: `Hast thou seen those things? Look also at these. Do not disturb thyself. Make thyself all simplicity. Does anyone do wrong? It is to himself that he does the wrong. Has anything happened to thee? Well, out of the universe from the beginning everything which happens has been apportioned and spun out to thee. In a word, thy life is short. Thou must turn to profit the present by the aid of reason and justice. Be sober in thy relaxation.`,

  118: {
    month: `April`,
    day: 27,
    book: `IV`,
    entry: 27,
    title: `Book IV, 27`,
    body: `Either it is a well arranged universe or a chaos huddled together, but still a universe. But can a certain order subsist in thee, and disorder in the All? And this, too, when all things are so separated and diffused and sympathetic.`,
  },
  119: {
    month: `April`,
    day: 28,
    book: `IV`,
    entry: 28,
    title: `Book IV, 28`,
    body: `A black character, a womanish character, a stubborn character, bestial, childish, animal, stupid, counterfeit, scurrilous, fraudulent, tyrannical.`,
  },
  120: {
    month: `April`,
    day: 29,
    book: `IV`,
    entry: 29,
    title: `Book IV, 29`,
    body: `If he is a stranger to the universe who does not know what is in it, no less is he a stranger who does not know what is going on in it. He is a runaway, who flies from social reason; he is blind, who shuts the eyes of the understanding; he is poor, who has need of another, and has not from himself all things which are useful for life. He is an abscess on the universe, who withdraws and separates himself from the reason of our common nature through being displeased with the things which happen, for the same nature produces this, and has produced thee too; he is a piece rent asunder from the state, who tears his own soul from that of reasonable animals, which is one.`,
  },
  121: {
    month: `April`,
    day: 30,
    book: `IV`,
    entry: 30,
    title: `Book IV, 30`,
    body: `The one is a philosopher without a tunic, and the other without a book: here is another half naked: “Bread I have not,” he says, “and I abide by reason. And I do not get the means of living out of my learning, and I abide [by my reason].”`,
  },
  122: {
    month: `May`,
    day: 1,
    book: `V`,
    entry: 1,
    title: `Book V, 1`,
    body: `In the morning when thou risest unwillingly, let this thought be present—I am rising to the work of a human being. Why then am I dissatisfied if I am going to do the things for which I exist and for which I was brought into the world? Or have I been made for this, to lie in the bedclothes and keep myself warm? But this is more pleasant. Dost thou exist then to take thy pleasure, and not at all for action or exertion? Dost thou not see the little plants, the little birds, the ants, the spiders, the bees working together to put in order their several parts of the universe? And art thou unwilling to do the work of a human being, and dost thou not make haste to do that which is according to thy nature? But it is necessary to take rest also. It is necessary: however nature has fixed bounds to this too: she has fixed bounds both to eating and drinking, and yet thou goest beyond these bounds, beyond what is sufficient; yet in thy acts it is not so, but thou stoppest short of what thou canst do. So thou lovest not thyself, for if thou didst, thou wouldst love thy nature and her will. But those who love their several arts exhaust themselves in working at them unwashed and without food; but thou valuest thy own nature less than the turner values the turning art, or the dancer the dancing art, or the lover of money values his money, or the vainglorious man his little glory. And such men, when they have a violent affection to a thing, choose neither to eat nor to sleep rather than to perfect the things which they care for. But are the acts which concern society more vile in thy eyes and less worthy of thy labor?`,
  },
  123: {
    month: `May`,
    day: 2,
    book: `V`,
    entry: 2,
    title: `Book V, 2`,
    body: `How easy it is to repel and to wipe away every impression which is troublesome or unsuitable, and immediately to be in all tranquility.`,
  },
  124: {
    month: `May`,
    day: 3,
    book: `V`,
    entry: 3,
    title: `Book V, 3`,
    body: `Judge every word and deed which are according to nature to be fit for thee; and be not diverted by the blame which follows from any people, nor by their words, but if a thing is good to be done or said, do not consider it unworthy of thee. For those persons have their peculiar leading principle and follow their peculiar movement; which things do not thou regard, but go straight on, following thy own nature and the common nature; and the way of both is one.`,
  },
  125: {
    month: `May`,
    day: 4,
    book: `V`,
    entry: 4,
    title: `Book V, 4`,
    body: `I go through the things which happen according to nature until I shall fall and rest, breathing out my breath into that element out of which I daily draw it in, and falling upon that earth out of which my father collected the seed, and my mother the blood, and my nurse the milk; out of which during so many years I have been supplied with food and drink; which bears me when I tread on it and abuse it for so many purposes.`,
  },
  126: {
    month: `May`,
    day: 5,
    book: `V`,
    entry: 5,
    title: `Book V, 5`,
    body: `Thou sayest, men cannot admire the sharpness of thy wits. Be it so; but there are many other things of which thou canst not say, I am not formed for them by nature. Show those qualities then which are altogether in thy power: sincerity, gravity, endurance of labour, aversion to pleasure, contentment with thy portion and with few things, benevolence, frankness, no love of superfluity, freedom from trifling magnanimity. Dost thou not see how many qualities thou art immediately able to exhibit, in which there is no excuse of natural incapacity and unfitness, and yet thou still remainest voluntarily below the mark? Or art thou compelled through being defectively furnished by nature to murmur, and to be stingy, and to flatter, and to find fault with thy poor body, and to try to please men, and to make great display, and to be restless in thy mind? No, by the gods: but thou mightest have been delivered from these things long ago. Only if in truth thou canst be charged with being rather slow and dull of comprehension, thou must exert thyself about this also, not neglecting it nor yet taking pleasure in thy dullness.`,
  },
  127: {
    month: `May`,
    day: 6,
    book: `V`,
    entry: 6,
    title: `Book V, 6`,
    body: `One man, when he has done a service to another, is ready to set it down to his account as a favour conferred. Another is not ready to do this, but still in his own mind he thinks of the man as his debtor, and he knows what he has done. A third in a manner does not even know what he has done, but he is like a vine which has produced grapes, and seeks for nothing more after it has once produced its proper fruit. As a horse when he has run, a dog when he has tracked the game, a bee when it has made the honey, so a man when he has done a good act, does not call out for others to come and see, but he goes on to another act, as a vine goes on to produce again the grapes in season. Must a man then be one of these, who in a manner act thus without observing it? Yes. But this very thing is necessary, the observation of what a man is doing; for it may be said, it is characteristic of the social animal to perceive that he is working in a social manner, and indeed to wish that his social partner also should perceive it. It is true what thou sayest, but thou dost not rightly understand what is now said; and for this reason thou wilt become one of those of whom I spoke before, for even they are misled by a certain show of reason. But if thou wilt choose to understand the meaning of what is said, do not fear that for this reason thou wilt omit any social act.`,
  },
  128: {
    month: `May`,
    day: 7,
    book: `V`,
    entry: 7,
    title: `Book V, 7`,
    body: `A prayer of the Athenians: Rain, rain, O dear Zeus, down on the plowed fields of the Athenians and on the plains. In truth we ought not to pray at all, or we ought to pray in this simple and noble fashion.`,
  },
  129: {
    month: `May`,
    day: 8,
    book: `V`,
    entry: 8,
    title: `Book V, 8`,
    body: `Just as we must understand when it is said, That Æsculapius prescribed to this man horse-exercise, or bathing in cold water, or going without shoes, so we must understand it when it is said, That the nature of the universe prescribed to this man disease or mutilation or loss or anything else of the kind. For in the first case prescribed means something like this: he prescribed this for this man as a thing adapted to procure health; and in the second case it means, That which happens to [or suits] every man is fixed in a manner for him suitably to his destiny. For this is what we mean when we say that things are suitable to us, as the workmen say of squared stones in walls or the pyramids, that they are suitable, when they fit them to one another in some kind of connection. For there is altogether one fitness [harmony]. And as the universe is made up out of all bodies to be such a body as it is, so out of all existing causes necessity [destiny] is made up to be such a cause as it is. And even those who are completely ignorant understand what I mean, for they say. It [necessity, destiny] brought this to such a person. This then was brought and this was prescribed to him. Let us then receive these things, as well as those which Æsculapius prescribes. Many, as a matter of course, even among his prescriptions, are disagreeable, but we accept them in the hope of health. Let the perfecting and accomplishment of the things, which the common nature judges to be good, be judged by thee to be of the same kind as thy health. And so accept everything which happens, even if it seem disagreeable, because it leads to this, to the health of the universe and to the prosperity and felicity of Zeus [the universe]. For he would not have brought on any man what he has brought, if it were not useful for the whole. Neither does the nature of anything, whatever it may be, cause anything which is not suitable to that which is directed by it. For two reasons, then, it is right to be content with that which happens to thee; the one, because it was done for thee and prescribed for thee, and in a manner had reference to thee, originally from the most ancient causes spun with thy destiny; and the other, because even that which comes severally to every man is to the power which administers the universe a cause of felicity and perfection, nay even of its very continuance. For the integrity of the whole is mutilated, if thou cuttest off anything whatever from the conjunction and the continuity either of the parts or of the causes. And thou dost cut off, as far as it is in thy power, when thou art dissatisfied, and in a manner triest to put anything out of the way.`,
  },
  130: {
    month: `May`,
    day: 9,
    book: `V`,
    entry: 9,
    title: `Book V, 9`,
    body: `Be not disgusted, nor discouraged, nor dissatisfied, if thou dost not succeed in doing everything according to right principles; but when thou hast failed, return back again, and be content if the greater part of what thou doest is consistent with man’s nature, and love this to which thou returnest; and do not return to philosophy as if she were a master, but act like those who have sore eyes and apply a bit of sponge and egg, or as another applies a plaster, or drenching with water. For thus thou wilt not fail to obey reason and thou wilt repose in it. And remember that philosophy requires only the things which thy nature requires; but thou wouldst have something else which is not according to nature. It may be objected. Why, what is more agreeable than this [which I am doing]? But is not this the very reason why pleasure deceives us? And consider if magnanimity, freedom, simplicity, equanimity, piety are not more agreeable. For what is more agreeable than wisdom itself, when thou thinkest of the security and the happy course of all things which depend on the faculty of understanding and knowledge?`,
  },
  131: {
    month: `May`,
    day: 10,
    book: `V`,
    entry: 10,
    title: `Book V, 10`,
    body: `Things are in such a kind of envelopment that they have seemed to philosophers, not a few nor those common philosophers, altogether unintelligible; nay even to the Stoics themselves they seem difficult to understand. And all our assent is changeable; for where is the man who never changes? Carry thy thoughts then to the objects themselves, and consider how short-lived they are and worthless, and that they may be in the possession of a filthy wretch or a whore or a robber. Then turn to the morals of those who live with thee, and it is hardly possible to endure even the most agreeable of them, to say nothing of a man being hardly able to endure himself. In such darkness, then, and dirt, and in so constant a flux, both of substance and of time, and of motion, and of things moved, what there is worth being highly prized, or even an object of serious pursuit, I cannot imagine. But on the contrary it is a man’s duty to comfort himself, and to wait for the natural dissolution and not to be vexed at the delay, but to rest in these principles only: the one, that nothing will happen to me which is not conformable to the nature of the universe; and the other, that it is in my power never to act contrary to my god and dæmon: for there is no man who will compel me to this.`,
  },
  132: {
    month: `May`,
    day: 11,
    book: `V`,
    entry: 11,
    title: `Book V, 11`,
    body: `About what am I now employing my own soul? On every occasion I must ask myself this question, and inquire, what have I now in this part of me which they call the ruling principle? And whose soul have I now? That of a child, or of a young man, or of a feeble woman, or of a tyrant, or of a domestic animal, or of a wild beast?`,
  },
  133: {
    month: `May`,
    day: 12,
    book: `V`,
    entry: 12,
    title: `Book V, 12`,
    body: `What kind of things those are which appear good to the many, we may learn even from this. For if any man should conceive certain things as being really good, such as prudence, temperance, justice, fortitude, he would not after having first conceived these endure to listen to anything which should not be in harmony with what is really good. But if a man has first conceived as good the things which appear to the many to be good, he will listen and readily receive as very applicable that which was said by the comic writer. Thus even the many perceive the difference. For were it not so, this saying would not offend and would not be rejected [in the first case], while we receive it when it is said of wealth, and of the means which further luxury and fame, as said fitly and wittily. Go on then and ask if we should value and think those things to be good, to which after their first conception in the mind the words of the comic writer might be aptly applied—that he who has them, through pure abundance has not a place to ease himself in.`,
  },
  134: {
    month: `May`,
    day: 13,
    book: `V`,
    entry: 13,
    title: `Book V, 13`,
    body: `I am composed of the formal and the material; and neither of them will perish into non-existence, as neither of them came into existence out of non-existence. Every part of me then will be reduced by change into some part of the universe, and that again will change into another part of the universe, and so on forever. And by consequence of such a change I too exist, and those who begot me, and so on forever in the other direction. For nothing hinders us from saying so, even if the universe is administered according to definite periods [of revolution].`,
  },
  135: {
    month: `May`,
    day: 14,
    book: `V`,
    entry: 14,
    title: `Book V, 14`,
    body: `Reason and the reasoning art [philosophy] are powers which are sufficient for themselves and for their own works. They move then from a first principle which is their own, and they make their way to the end which is proposed to them; and this is the reason why such acts are named *Catorthóseis* or right acts, which word signifies that they proceed by the right road.`,
  },
  136: {
    month: `May`,
    day: 15,
    book: `V`,
    entry: 15,
    title: `Book V, 15`,
    body: `None of these things ought to be called a man’s which do not belong to a man, as man. They are not required of a man, nor does man’s nature promise them, nor are they the means of man’s nature attaining its end. Neither then does the end of man lie in these things, nor yet that which aids to the accomplishment of this end, and that which aids toward this end is that which is good. Besides, if any of these things did belong to man, it would not be right for a man to despise them and to set himself against them; nor would a man be worthy of praise who showed that he did not want these things, nor would he who stinted himself in any of them be good, if indeed these things were good. But now the more of these things a man deprives himself of, or of other things like them, or even when he is deprived of any of them, the more patiently he endures the loss, just in the same degree he is a better man.`,
  },
  137: {
    month: `May`,
    day: 16,
    book: `V`,
    entry: 16,
    title: `Book V, 16`,
    body: `Such as are thy habitual thoughts, such also will be the character of thy mind; for the soul is dyed by the thoughts. Dye it then with a continuous series of such thoughts as these: for instance, that where a man can live, there he can also live well. But he must live in a palace—well then, he can also live well in a palace. And again, consider that for whatever purpose each thing has been constituted, for this it has been constituted, and toward this it is carried; and its end is in that toward which it is carried; and where the end is, there also is the advantage and the good of each thing. Now the good for the reasonable animal is society; for that we are made for society has been shown above. Is it not plain that the inferior exist for the sake of the superior? But the things which have life are superior to those which have not life, and of those which have life the superior are those which have reason.`,
  },
  138: {

    book: `V`,

    title: `Book V, 17`,

  139: {

    title: `Book V, 18`,
    body: `Nothing happens to any man which he is not formed by nature to bear. The same things happen to another, and either because he does not see that they have happened or because he would show a great spirit he is firm and remains unharmed. It is a shame then that ignorance and conceit should be stronger than wisdom.`,

  140: {

    book: `V`,

    title: `Book V, 19`,
    body: `Things themselves touch not the soul, not in the least degree; nor have they admission to the soul, nor can they turn or move the soul: but the soul turns and moves itself alone, and whatever judgments it may think proper to make, such it makes for itself the things which present themselves to it.`,

  141: {
    month: `May`,
    day: 20,
    book: `V`,
    entry: 20,
    title: `Book V, 20`,
    body: `In one respect man is the nearest thing to me, so far as I must do good to men and endure them. But so far as some men make themselves obstacles to my proper acts, man becomes to me one of the things which are indifferent, no less than the sun or wind or a wild beast. Now it is true that these may impede my action, but they are no impediments to my affects and disposition, which have the power of acting conditionally and changing: for the mind converts and changes every hindrance to its activity into an aid; and so that which is a hindrance is made a furtherance to an act; and that which is an obstacle on the road helps us on this road.`,

  142: {

    day: 21,
    book: `V`,
    entry: 21,
    title: `Book V, 21`,
    body: `Reverence that which is best in the universe; and this is that which makes use of all things and directs all things. And in like manner also reverence that which is best in thyself; and this is of the same kind as that. For in thyself also, that which makes use of everything else, is this, and thy life is directed by this.`,

  143: {

  },
  144: {
    month: `May`,
    day: 23,
    book: `V`,
    entry: 23,
    title: `Book V, 23`,
    body: `Often think of the rapidity with which things pass by and disappear, both the things which are and the things which are produced. For substance is like a river in a continual flow, and the activities of things are in constant change, and the causes work in infinite varieties; and there is hardly anything which stands still. And consider this which is near to thee, this boundless abyss of the past and of the future in which all things disappear. How then is he not a fool who is puffed up with such things or plagued about them or makes himself miserable? For they vex him only for a time, and a short time.`,

  145: {

  146: {

    day: 25,
    book: `V`,
    entry: 25,
    title: `Book V, 25`,

  147: {
    month: `May`,
    day: 26,
    book: `V`,
    entry: 26,
    title: `Book V, 26`,
    body: `Let the part of thy soul which leads and governs be undisturbed by the movements in the flesh, whether of pleasure or of pain; and let it not unite with them, but let it circumscribe itself and limit those affects to their parts. But when these affects rise up to the mind by virtue of that other sympathy that naturally exists in a body which is all one, then thou must not strive to resist the sensation, for it is natural: but let not the ruling part of itself add to the sensation the opinion that it is either good or bad.`,

  148: {
    month: `May`,

    book: `V`,
    entry: 27,
    title: `Book V, 27`,
    body: `Live with the gods. And he does live with the gods who constantly shows to them that his own soul is satisfied with that which is assigned to him, and that it does all that the dæmon wishes, which Zeus hath given to every man for his guardian and guide, a portion of himself. And this is every man’s understanding and reason.`,

  149: {

    book: `V`,

    title: `Book V, 28`,
    body: `Art thou angry with him whose arm-pits stink? Art thou angry with him whose mouth smells foul? What good will this anger do thee? He has such a mouth, he has such arm-pits: it is necessary that such an emanation must come from such things—but the man has reason, it will be said, and he is able, if he takes pains, to discover wherein he offends—I wish thee well of thy discovery. Well then, and thou hast reason: by thy rational faculty stir up his rational faculty; show him his error, admonish him. For if he listens, thou wilt cure him, and there is no need of anger. [Neither tragic actor nor whore.[1](08_Endnote.xhtml#ch5en1)]`,

  150: {

    body: `As thou intendest to live when thou are gone out . . . so it is in thy power to live here. But if men do not permit thee, then get away out of life, yet so as if thou wert suffering no harm. The house is smoky, and I quit it. Why dost thou think that this is any trouble? But so long as nothing of the kind drives me out, I remain, am free, and no man shall hinder me from doing what I choose; and I choose to do what is according to the nature of the rational and social animal.`,

    body: `The intelligence of the universe is social. Accordingly it has made the inferior things for the sake of the superior, and it has fitted the superior to one another. Thou seest how it has subordinated, coordinated and assigned to everything its proper portion, and has brought together into concord with one another the things which are the best.`,

  152: {
    month: `May`,
    day: 31,
    book: `V`,
    entry: 31,
    title: `Book V, 31`,
    body: `How hast thou behaved hitherto to the gods, thy parents, brethren, children, teachers, to those who looked after thy infancy, to thy friends, kinsfolk, to thy slaves? Consider if thou hast hitherto behaved to all in such a way that this may be said of thee:

Never has wronged a man in deed or word.

And call to recollection both how many things thou hast passed through, and how many things thou hast been able to endure: and that the history of thy life is now complete, and thy service is ended: and how many beautiful things thou hast seen: and how many pleasures and pains thou hast despised; and how many things called honorable thou hast spurned; and to how many ill-minded folks thou hast shown a kind disposition.`,
  },
  153: {
    month: `June`,
    day: 1,
    book: `VI`,
    entry: 1,
    title: `Book VI, 1`,
    body: `The substance of the universe is obedient and compliant; and the reason which governs it has in itself no cause for doing evil, for it has no malice, nor does it do evil to anything, nor is anything harmed by it. But all things are made and perfected according to this reason.`,

  154: {

  158: {

  159: {

  160: {
    month: `June`,
    day: 8,
    book: `VI`,
    entry: 8,
    title: `Book VI, 8`,
    body: `The ruling principle is that which rouses and turns itself, and while it makes itself such as it is and such as it wills to be, it also makes everything which happens appear to itself to be such as it wills.`,
  },
  161: {
    month: `June`,
    day: 9,
    book: `VI`,
    entry: 9,
    title: `Book VI, 9`,
    body: `In conformity to the nature of the universe every single thing is accomplished, for certainly it is not in conformity to any other nature that each thing is accomplished, either a nature which externally comprehends this, or a nature which is comprehended within this nature, or a nature external and independent of this (xi. 1; vi. 40; viii. 50).`,
  },
  162: {
    month: `June`,
    day: 10,
    book: `VI`,
    entry: 10,
    title: `Book VI, 10`,
    body: `The universe is either a confusion, and a mutual involution of things, and a dispersion; or it is unity and order and providence. If then it is the former, why do I desire to tarry in a fortuitous combination of things and such a disorder? And why do I care about anything else than how I shall at last become earth? And why am I disturbed, for the dispersion of my elements will happen whatever I do. But if the other supposition is true, I venerate, and I am firm, and I trust in him who governs (iv. 27).`,
  },
  163: {
    month: `June`,
    day: 11,
    book: `VI`,
    entry: 11,
    title: `Book VI, 11`,
    body: `When thou hast been compelled by circumstances to be disturbed in a manner, quickly return to thyself and do not continue out of tune longer than the compulsion lasts; for thou wilt have more mastery over the harmony by continually recurring to it.`,
  },
  164: {
    month: `June`,
    day: 12,
    book: `VI`,
    entry: 12,
    title: `Book VI, 12`,
    body: `If thou hadst a step-mother and a mother at the same time, thou wouldst be dutiful to thy step-mother, but still thou wouldst constantly return to thy mother. Let the court and philosophy now be to thee stepmother and mother; return to philosophy frequently and repose in her, through whom what thou meetest with in the court appears to thee tolerable, and thou appearest tolerable in the court.`,
  },
  165: {
    month: `June`,
    day: 13,
    book: `VI`,
    entry: 13,
    title: `Book VI, 13`,
    body: `When we have meat before us and such eatables, we receive the impression, that this is the dead body of a fish, and this is the dead body of a bird or of a pig; and again, that this Falernian is only a little grape juice, and this purple robe some sheep’s wool dyed with the blood of a shell-fish: such then are these impressions, and they reach the things themselves and penetrate them, and so we see what kind of things they are. Just in the same way ought we to act all through life, and where there are things which appear most worthy of our approbation, we ought to lay them bare and look at their worthlessness, and strip them of all the words by which they are exalted. For outward show is a wonderful perverter of the reason, and when thou art most sure that thou art employed about things worth thy pains, it is then that it cheats thee most. Consider then what Crates says of Xenocrates himself.`,
  },
  166: {
    month: `June`,
    day: 14,
    book: `VI`,
    entry: 14,
    title: `Book VI, 14`,
    body: `Most of the things which the multitude admire are referred to objects of the most general kind, those which are held together by cohesion or natural organization, such as stones, wood, fig trees, vines, olives. But those which are admired by men who are a little more reasonable are referred to the things which are held together by a living principle, as flocks, herds. Those which are admired by men who are still more instructed are the things which are held together by a rational soul, not however a universal soul, but rational so far as it is a soul skilled in some art, or expert in some other way, or simply rational so far as it possesses a number of slaves. But he who values a rational soul, a soul universal and fitted for political life, regards nothing else except this; and above all things he keeps his soul in a condition and in an activity conformable to reason and social life, and he cooperates to this end with those who are of the same kind as himself.`,
  },
  167: {
    month: `June`,
    day: 15,
    book: `VI`,
    entry: 15,
    title: `Book VI, 15`,
    body: `Some things are hurrying into existence, and others are hurrying out of it; and of that which is coming into existence part is already extinguished. Motions and changes are continually renewing the world, just as the uninterrupted course of time is always renewing the infinite duration of ages. In this flowing stream then, on which there is no abiding, what is there of the things which hurry by on which a man would set a high price? It would be just as if a man should fall in love with one of the sparrows which fly by, but it has already passed out of sight. Something of this kind is the very life of every man, like the exhalation of the blood and the respiration of the air. For such as it is to have once drawn in the air and to have given it back, which we do every moment, just the same is it with the whole respiratory power, which thou didst receive at thy birth yesterday and the day before, to give it back to the element from which thou didst first draw it.`,
  },
  168: {
    month: `June`,
    day: 16,
    book: `VI`,
    entry: 16,
    title: `Book VI, 16`,
    body: `Neither is transpiration, as in plants, a thing to be valued, nor respiration, as in domesticated animals and wild beasts, nor the receiving of impressions by the appearances of things, nor being moved by desires as puppets by strings, nor assembling in herds, nor being nourished by food; for this is just like the act of separating and parting with the useless part of our food. What then is worth being valued? To be received with clapping of hands? No. Neither must we value the clapping of tongues, for the praise which comes from the many is a clapping of tongues. Suppose then that thou hast given up this worthless thing called fame, what remains that is worth valuing? This, in my opinion, to move thyself and to restrain thyself in conformity to thy proper constitution, to which end both all employments and arts lead. For every art aims at this, that the thing which has been made should be adapted to the work for which it has been made; and both the vine-planter who looks after the vine, and the horse-breaker, and he who trains the dog, seek this end. But the education and the teaching of youth aim at something. In this then is the value of the education and the teaching. And if this is well, thou wilt not seek anything else. Wilt thou not cease to value many other things too? Then thou wilt be neither free, nor sufficient for thy own happiness, nor without passion. For of necessity thou must be envious, jealous, and suspicious of those who can take away those things, and plot against those who have that which is valued by thee. Of necessity a man must be altogether in a state of perturbation who wants any of these things; and besides, he must often find fault with the gods. But to reverence and honor thy own mind will make thee content with thyself, and in harmony with society, and in agreement with the gods, that is, praising all that they give and have ordered.`,
  },
  169: {
    month: `June`,
    day: 17,
    book: `VI`,
    entry: 17,
    title: `Book VI, 17`,
    body: `Above, below, all around are the movements of the elements. But the motion of virtue is in none of these: it is something more divine, and advancing by a way hardly observed it goes happily on its road.`,
  },
  170: {
    month: `June`,
    day: 18,
    book: `VI`,
    entry: 18,
    title: `Book VI, 18`,
    body: `How strangely men act. They will not praise those who are living at the same time and living with themselves; but to be themselves praised by posterity, by those whom they have never seen or ever will see, this they set much value on. But this is very much the same as if thou shouldst be grieved because those who have lived before thee did not praise thee.`,
  },
  171: {
    month: `June`,
    day: 19,
    book: `VI`,
    entry: 19,
    title: `Book VI, 19`,
    body: `If a thing is difficult to be accomplished by thyself, do not think that it is impossible for man; but if anything is possible for man and conformable to his nature, think that this can be attained by thyself too.`,
  },
  172: {
    month: `June`,
    day: 20,
    book: `VI`,
    entry: 20,
    title: `Book VI, 20`,
    body: `In the gymnastic exercises suppose that a man has torn thee with his nails, and by dashing against thy head has inflicted a wound. Well, we neither show any signs of vexation, nor are we offended, nor do we suspect him afterward as a treacherous fellow; and yet we are on our guard against him, not however as an enemy, nor yet with suspicion, but we quietly get out of his way. Something like this let thy behaviour be in all the other parts of life; let us overlook many things in those who are like antagonists in the gymnasium. For it is in our power, as I said, to get out of the way, and to have no suspicion nor hatred.`,
  },
  173: {

    day: 21,
    book: `VI`,
    entry: 21,
    title: `Book VI, 21`,
    body: `If any man is able to convince me and show me that I do not think or act right, I will gladly change; for I seek the truth by which no man was ever injured. But he is injured who abides in his error and ignorance.`,

  174: {
    month: `June`,
    day: 22,
    book: `VI`,

    book: `VI`,

    body: `As to the animals which have no reason, and generally all things and objects, do thou, since thou hast reason and they have none, make use of them with a generous and liberal spirit. But toward human beings, as they have reason, behave in a social spirit. And on all occasions call on the gods, and do not perplex thyself about the length of time in which thou shalt do this; for even three hours so spent are sufficient.`,

  176: {

    month: `June`,
    day: 25,
    book: `VI`,
    entry: 25,
    title: `Book VI, 25`,
    body: `Consider how many things in the same indivisible time take place in each of us, things which concern the body and things which concern the soul; and so thou wilt not wonder if many more things, or rather all things which come into existence in that which is the one and all, which we call Cosmos, exist in it at the same time.`,

  178: {
    month: `June`,
    day: 26,
    book: `VI`,
    entry: 26,
    title: `Book VI, 26`,
    body: `If any man should propose to thee the question, how the name Antoninus is written, wouldst thou with a straining of the voice utter each letter? What then if they grow angry, wilt thou be angry too? Wilt thou not go on with composure and number every letter? Just so then in this life also remember that every duty is made up of certain parts. These it is thy duty to observe and without being disturbed or showing anger toward those who are angry with thee to go on thy way and finish that which is set before thee.`,
  },
  179: {
    month: `June`,
    day: 27,
    book: `VI`,
    entry: 27,
    title: `Book VI, 27`,
    body: `How cruel it is not to allow men to strive after the things which appear to them to be suitable to their nature and profitable! And yet in a manner thou dost not allow them to do this, when thou art vexed because they do wrong. For they are certainly moved toward things because they suppose them to be suitable to their nature and profitable to them. But it is not so. Teach them then, and show them without being angry.`,

  180: {

    book: `VI`,
    entry: 28,
    title: `Book VI, 28`,

  181: {
    month: `June`,
    day: 29,
    book: `VI`,
    entry: 29,
    title: `Book VI, 29`,
    body: `It is a shame for the soul to be first to give way in this life, when thy body does not give way.`,
  },
  182: {
    month: `June`,
    day: 30,
    book: `VI`,
    entry: 30,
    title: `Book VI, 30`,
    body: `Take care that thou art not made into a Cæsar, that thou art not dyed with this dye; for such things happen. Keep thyself then simple, good, pure, serious, free from affectation, a friend of justice, a worshiper of the gods, kind, affectionate, strenuous in all proper acts. Strive to continue to be such as philosophy wished to make thee. Reverence the gods, and help men. Short is life. There is only one fruit of this terrene life, a pious disposition and social acts. Do everything as a disciple of Antoninus. Remember his constancy in every act which was conformable to reason, and his evenness in all things, and his piety, and the serenity of his countenance, and his sweetness, and his disregard of empty fame, and his efforts to understand things; and how he would never let anything pass without having first most carefully examined it and clearly understood it; and how he bore with those who blamed him unjustly without blaming them in return; how he did nothing in a hurry; and how he listened not to calumnies, and how exact an examiner of manners and actions he was; and not given to reproach people, nor timid, nor suspicious, nor a sophist; and with how little he was satisfied, such as lodging, bed, dress, food, servants; and how laborious and patient; and how he was able on account of his sparing diet to hold out to the evening, not even requiring to relieve himself by any evacuations except at the usual hour; and his firmness and uniformity in his friendships; and how he tolerated freedom of speech in those who opposed his opinions; and the pleasure that he had when any man showed him anything better; and how religious he was without superstition. Imitate all this that thou mayest have as good a conscience, when thy last hour comes, as he had (i. 16).`,
  },
  183: {
    month: `July`,
    day: 1,
    book: `VII`,
    entry: 1,
    title: `Book VII, 1`,
    body: `What is badness? It is that which thou hast often seen. And on the occasion of everything which happens keep this in mind, that it is that which thou hast often seen. Everywhere up and down thou wilt find the same things, with which the old histories are filled, those of the middle ages and those of our own day; with which cities and houses are filled now. There is nothing new; all things are both familiar and short-lived.`,
  },
  184: {
    month: `July`,
    day: 2,
    book: `VII`,
    entry: 2,
    title: `Book VII, 2`,
    body: `How can our principles become dead, unless the impressions [thoughts] which correspond to them are extinguished? But it is in thy power continuously to fan these thoughts into a flame. I can have that opinion about anything, which I ought to have. If I can, why am I disturbed? The things which are external to my mind have no relation at all to my mind. Let this be the state of thy affects, and thou standest erect. To recover thy life is in thy power. Look at things again as thou didst use to look at them; for in this consists the recovery of thy life.`,
  },
  185: {
    month: `July`,
    day: 3,
    book: `VII`,
    entry: 3,
    title: `Book VII, 3`,
    body: `The idle business of show, plays on the stage, flocks of sheep, herds, exercises with spears, a bone to cast to little dogs, a bit of bread into fishponds, laborings of ants and burden-carrying, runnings about of frightened little mice, puppets pulled by strings—[all alike]. It is thy duty then in the midst of such things to show good humour and not a proud air; to understand, however, that every man is worth just so much as the things are worth about which he busies himself.`,
  },
  186: {
    month: `July`,
    day: 4,
    book: `VII`,
    entry: 4,
    title: `Book VII, 4`,
    body: `In discourse thou must attend to what is said, and in every movement thou must observe what is doing. And in the one thou shouldst see immediately to what end it refers, but in the other watch carefully what is the thing signified.`,
  },
  187: {
    month: `July`,
    day: 5,
    book: `VII`,
    entry: 5,
    title: `Book VII, 5`,
    body: `Is my understanding sufficient for this or not? If it is sufficient I use it for the work as an instrument given by the universal nature. But if it is not sufficient, then either I retire from the work and give way to him who is able to do it better, unless there be some reason why I ought not to do so; or I do it as well as I can, taking to help me the man who with the aid of my ruling principle can do what is now fit and useful for the general good. For whatsoever either by myself or with another I can do, ought to be directed to this only, to that which is useful and well suited to society.`,
  },
  188: {
    month: `July`,
    day: 6,
    book: `VII`,
    entry: 6,
    title: `Book VII, 6`,
    body: `How many after being celebrated by fame have been given up to oblivion; and how many who have celebrated the fame of others have long been dead.`,
  },
  189: {
    month: `July`,
    day: 7,
    book: `VII`,
    entry: 7,
    title: `Book VII, 7`,

  190: {
    month: `July`,
    day: 8,
    book: `VII`,

  191: {

    day: 9,
    book: `VII`,
    entry: 9,
    title: `Book VII, 9`,
    body: `All things are implicated with one another, and the bond is holy; and there is hardly anything unconnected with any other thing. For things have been coordinated, and they combine to form the same universe [order]. For there is one universe made up of all things, and one god who pervades all things, and one substance, and one law, [one] common reason in all intelligent animals, and one truth; if indeed there is also one perfection for all animals which are of the same stock and participate in the same reason.`,

  192: {

  193: {

  194: {

    day: 12,

  195: {
    month: `July`,
    day: 13,
    book: `VII`,
    entry: 13,
    title: `Book VII, 13`,
    body: `Just as it is with the members in those bodies which are united in one, so it is with rational beings which exist separate, for they have been constituted for one cooperation. And the perception of this will be more apparent to thee, if thou often sayest to thyself that I am a member [*μέλος*] of the system of rational beings. But if [using the letter *r*] thou sayest that thou art a part [*μέρος*] thou dost not yet love men from thy heart; beneficence does not yet delight thee for its own sake; thou still doest it barely as a thing of propriety, and not yet as doing good to thyself.`,

  196: {

    day: 14,
    book: `VII`,
    entry: 14,
    title: `Book VII, 14`,
    body: `Let there fall externally what will on the parts which can feel the effects of this fall. For those parts which have felt will complain, if they choose. But I, unless I think that what has happened is an evil, am not injured. And it is in my power not to think so.`,
  },
  197: {
    month: `July`,
    day: 15,
    book: `VII`,
    entry: 15,
    title: `Book VII, 15`,
    body: `Whatever anyone does or says, I must be good, just as if the gold, or the emerald, or the purple were always saying this: Whatever anyone does or says, I must be emerald and keep my color.`,
  },
  198: {
    month: `July`,
    day: 16,
    book: `VII`,
    entry: 16,
    title: `Book VII, 16`,
    body: `The ruling faculty does not disturb itself; I mean, does not frighten itself or cause itself pain. But if anyone else can frighten or pain it, let him do so. For the faculty itself will not by its own opinion turn into such ways. Let the body itself take care, if it can, that it suffer nothing, and let it speak, if it suffers. But the soul itself, that which is subject to fear, to pain, which has completely the power of forming an opinion about these things, will suffer nothing, for it will never deviate into such a judgment. The leading principle in itself wants nothing, unless it makes a want for itself; and therefore it is both free from perturbation and unimpeded, if it does not disturb and impede itself.`,
  },
  199: {
    month: `July`,
    day: 17,
    book: `VII`,
    entry: 17,
    title: `Book VII, 17`,
    body: `*Eudæmonia* [happiness] is a good dæmon, or a good thing. What then art thou doing here, O imagination? Go away, I entreat thee by the gods, as thou didst come, for I want thee not. But thou art come according to thy old fashion. I am not angry with thee: only go away.`,
  },
  200: {
    month: `July`,
    day: 18,
    book: `VII`,
    entry: 18,
    title: `Book VII, 18`,
    body: `Is any man afraid of change? Why, what can take place without change? What then is more pleasing or more suitable to the universal nature? And canst thou take a bath unless the wood undergoes a change? And canst thou be nourished unless the food undergoes a change? And can anything else that is useful be accomplished without change? Dost thou not see then that for thy self also to change is just the same, and equally necessary for the universal nature?`,
  },
  201: {
    month: `July`,
    day: 19,
    book: `VII`,
    entry: 19,
    title: `Book VII, 19`,
    body: `Through the universal substance as through a furious torrent all bodies are carried, being by their nature united with and cooperating with the whole, as the parts of our body with one another. How many a Chrysippus, how many a Socrates, how many an Epictetus has time already swallowed up? And let the same thought occur to thee with reference to every man and thing (v. 23; vi. 15).`,
  },
  202: {

    day: 20,
    book: `VII`,
    entry: 20,
    title: `Book VII, 20`,
    body: `One thing only troubles me, lest I should do something which the constitution of man does not allow, or in the way which it does not allow, or what it does not allow now.`,
  },
  203: {
    month: `July`,
    day: 21,
    book: `VII`,
    entry: 21,
    title: `Book VII, 21`,
    body: `Near is thy forgetfulness of all things; and near the forgetfulness of thee by all.`,

  204: {

    book: `VII`,

    title: `Book VII, 22`,
    body: `It is peculiar to man to love even those who do wrong. And this happens, if when they do wrong it occurs to thee that they are kinsmen, and that they do wrong through ignorance and unintentionally, and that soon both of you will die; and above all, that the wrong-doer has done thee no harm, for he has not made thy ruling faculty worse than it was before.`,

  205: {

    body: `The universal nature out of the universal substance, as if it were wax, now moulds a horse, and when it has broken this up, it uses the material for a tree, then for a man, then for something else; and each of these things subsists for a very short time. But it is no hardship for the vessel to be broken up, just as there was none in its being fastened together (viii. 50).`,
  },
  206: {
    month: `July`,
    day: 24,
    book: `VII`,
    entry: 24,
    title: `Book VII, 24`,
    body: `A scowling look is altogether unnatural; when it is often assumed, the result is that all comeliness dies away, and at last is so completely extinguished that it cannot be again lighted up at all. Try to conclude from this very fact that it is contrary to reason. For if even the perception of doing wrong shall depart, what reason is there for living any longer?`,
  },
  207: {
    month: `July`,
    day: 25,
    book: `VII`,
    entry: 25,
    title: `Book VII, 25`,
    body: `Nature which governs the whole will soon change all things which thou seest, and out of their substance will make other things, and again other things from the substance of them, in order that the world may be ever new (xii. 23).`,
  },
  208: {
    month: `July`,
    day: 26,
    book: `VII`,
    entry: 26,
    title: `Book VII, 26`,
    body: `When a man has done thee any wrong, immediately consider with what opinion about good or evil he has done wrong. For when thou hast seen this, thou wilt pity him, and wilt neither wonder nor be angry. For either thou thyself thinkest the same thing to be good that he does, or another thing of the same kind. It is thy duty then to pardon him. But if thou dost not think such things to be good or evil, thou wilt more readily be well-disposed to him who is in error.`,

  209: {

    book: `VII`,
    entry: 27,
    title: `Book VII, 27`,
    body: `Think not so much of what thou hast not as of what thou hast: but of the things which thou hast select the best, and then reflect how eagerly they would have been sought, if thou hadst them not. At the same time, however, take care that thou dost not through being so pleased with them accustom thyself to overvalue them, so as to be disturbed if ever thou shouldst not have them.`,

  210: {

    book: `VII`,

    book: `VII`,

    body: `Wipe out the imagination. Stop the pulling of the strings. Confine thyself to the present. Understand well what happens either to thee or to another. Divide and distribute every object into the causal [formal] and the material. Think of thy last hour. Let the wrong which is done by a man stay there where the wrong was done (viii. 29).`,

  212: {

  213: {
    month: `July`,
    day: 31,
    book: `VII`,
    entry: 31,
    title: `Book VII, 31`,
    body: `Adorn thyself with simplicity and modesty and with indifference toward the things which lie between virtue and vice. Love mankind. Follow God. The poet says that Law rules all. And it is enough to remember that law rules all.[1](08_Endnote.xhtml#ch7en1)`,
  },
  214: {
    month: `August`,
    day: 1,
    book: `VIII`,
    entry: 1,
    title: `Book VIII, 1`,
    body: `This reflection also tends to the removal of the desire of empty fame, that it is no longer in thy power to have lived the whole of thy life, or at least thy life from thy youth upward, like a philosopher; but both to many others and to thyself it is plain that thou art far from philosophy. Thou hast fallen into disorder then, so that it is no longer easy for thee to get the reputation of a philosopher; and thy plan of life also opposes it. If then thou hast truly seen where the matter lies, throw away the thought, How thou shalt seem [to others], and be content if thou shalt live the rest of thy life in such wise as thy nature wills. Observe then what it wills, and let nothing else distract thee; for thou hast had experience of many wanderings without having found happiness anywhere, not in syllogisms, nor in wealth, nor in reputation, nor in enjoyment, nor anywhere. Where is it then? In doing what man’s nature requires. How then shall a man do this? If he has principles from which come his affects and his acts. What principles? Those which relate to good and bad: the belief that there is nothing good for man, which does not make him just, temperate, manly, free; and that there is nothing bad, which does not do the contrary to what has been mentioned.`,
  },
  215: {
    month: `August`,
    day: 2,
    book: `VIII`,
    entry: 2,
    title: `Book VIII, 2`,
    body: `On the occasion of every act ask thyself, How is this with respect to me? Shall I repent of it? A little time and I am dead, and all is gone. What more do I seek, if what I am doing now is the work of an intelligent living being, and a social being, and one who is under the same law with God?`,

  216: {

    book: `VIII`,
    entry: 3,
    title: `Book VIII, 3`,
    body: `Alexander and Caius and Pompeius, what are they in comparison with Diogenes and Heraclitus and Socrates? For they were acquainted with things, and their causes [forms], and their matter, and the ruling principles of these men were the same [or conformable to their pursuits]. But as to the others, how many things had they to care for, and to how many things were they slaves.`,

  217: {
    month: `August`,
    day: 4,
    book: `VIII`,
    entry: 4,
    title: `Book VIII, 4`,

  },
  218: {
    month: `August`,
    day: 5,
    book: `VIII`,
    entry: 5,
    title: `Book VIII, 5`,
    body: `This is the chief thing: Be not perturbed, for all things are according to the nature of the universal; and in a little time thou wilt be nobody and nowhere, like Hadrianus and Augustus. In the next place having fixed thy eyes steadily on thy business look at it, and at the same time remembering that it is thy duty to be a good man, and what man’s nature demands, do that without turning aside; and speak as it seems to thee most just, only let it be with a good disposition and with modesty and without hypocrisy.`,

  219: {
    month: `August`,
    day: 6,
    book: `VIII`,
    entry: 6,
    title: `Book VIII, 6`,
    body: `The nature of the universal has this work to do, to remove to that place the things which are in this, to change them, to take them away hence, and to carry them there. All things are change, yet we need not fear anything new. All things are familiar [to us]; but the distribution of them still remains the same.`,
  },
  220: {
    month: `August`,
    day: 7,
    book: `VIII`,
    entry: 7,
    title: `Book VIII, 7`,
    body: `Every nature is contented with itself when it goes on its way well; and a rational nature goes on its way well, when in its thoughts it assents to nothing false or uncertain, and when it directs its movements to social acts only, and when it confines its desires and aversions to the things which are in its power, and when it is satisfied with everything that is assigned to it by the common nature. For of this common nature every particular nature is a part, as the nature of the leaf is a part of the nature of the plant; except that in the plant the nature of the leaf is part of a nature which has not perception or reason, and is subject to be impeded; but the nature of man is part of a nature which is not subject to impediments, and is intelligent and just, since it gives to everything in equal portions and according to its worth, times, substance, cause [form], activity, and incident. But examine, not to discover that any one thing compared with any other single thing is equal in all respects, but by taking all the parts together of one thing and comparing them with all the parts together of another.`,
  },
  221: {
    month: `August`,
    day: 8,
    book: `VIII`,
    entry: 8,
    title: `Book VIII, 8`,
    body: `Thou hast not leisure [or ability] to read. But thou hast leisure [or ability] to check arrogance: thou hast leisure to be superior to pleasure and pain: thou hast leisure to be superior to love of fame, and not to be vexed at stupid and ungrateful people, nay even to care for them.`,

  222: {

    title: `Book VIII, 10`,
    body: `Repentance is a kind of self-reproof for having neglected something useful; but that which is good must be something useful, and the perfect good man should look after it. But no such man would ever repent of having refused any sensual pleasure. Pleasure then is neither good nor useful.`,

  227: {

    book: `VIII`,
    entry: 14,
    title: `Book VIII, 14`,

    book: `VIII`,

    title: `Book VIII, 16`,

  230: {

    book: `VIII`,
    entry: 17,
    title: `Book VIII, 17`,
    body: `If a thing is in thy own power, why dost thou do it? But if it is in the power of another, whom dost thou blame? The atoms [chance] or the gods? Both are foolish. Thou must blame nobody. For if thou canst, correct [that which is the cause]; but if thou canst not do this, correct at least the thing itself; but if thou canst not do even this, of what use is it to thee to find fault? For nothing should be done without a purpose.`,

  231: {

  234: {

  238: {
    month: `August`,

    book: `VIII`,
    entry: 25,
    title: `Book VIII, 25`,
    body: `Lucilla saw Verus die, and then Lucilla died. Secunda saw Maximus die, and then Secunda died. Epitynchanus saw Diotimus die, and then Epitynchanus died. Antoninus saw Faustina die, and then Antoninus died. Such is everything. Celer saw Hadrianus die, and then Celer died. And those sharp-witted men, either seers or men inflated with pride, where are they? For instance, the sharp-witted men, Charax and Demetrius the Platonist and Eudæmon, and anyone else like them. All ephemeral, dead long ago. Some indeed have not been remembered even for a short time, and others have become the heroes of fables, and again others have disappeared even from fables. Remember this, then, that this little compound, thyself, must either be dissolved, or thy poor breath must be extinguished, or be removed and placed elsewhere.`,

  244: {

    entry: 31,
    title: `Book VIII, 31`,
    body: `Augustus’ court, wife, daughter, descendants, ancestors, sister, Agrippa, kinsmen, intimates, friends, Areius, Mæcenas, physicians and sacrificing priests—the whole court is dead. Then turn to the rest, not considering the death of a single man, [but of a whole race], as of the Pompeii; and that which is inscribed on the tombs—the last of his race. Then consider what trouble those before them have had that they might leave a successor; and then, that of necessity someone must be the last. Again here consider the death of a whole race.`,
