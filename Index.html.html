  211: {
    month: `July`,
    day: 29,
    title: `A CURE FOR THE SELF`,
    body: `“The person who has practiced philosophy as a cure for the self becomes great of soul, filled with confidence, invincible—and greater as you draw near.”

SENECA, MORAL LETTERS, 111.2

What is “a cure for the self”? Perhaps Seneca means that, through nature and nurture, we develop a unique set of characteristics—some positive and some negative. When those negative characteristics begin to have consequences in our lives, some of us turn to therapy, psychoanalysis, or the help of a support group. The point? To cure certain selfish, destructive parts of ourselves.

But of all the avenues for curing our negative characteristics, philosophy has existed the longest and helped the most people. It is concerned not just with mitigating the effects of a mental illness or a neurosis, but it is designed to encourage human flourishing. It’s designed to help you live the Good Life.

Don’t you deserve to flourish? Wouldn’t you like to be great of soul, filled with confidence, and invincible to external events? Wouldn’t you like to be like the proverbial onion, packed with layers of greatness?

Then *practice* your philosophy.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  212: {
    month: `July`,
    day: 30,
    title: `STOIC JOY`,
    body: `“Trust me, real joy is a serious thing. Do you think someone can, in the charming expression, blithely dismiss death with an easy disposition? Or swing open the door to poverty, keep pleasures in check, or meditate on the endurance of suffering? The one who is comfortable with turning these thoughts over is truly full of joy, but hardly cheerful. It’s exactly such a joy that I would wish for you to possess, for it will never run dry once you’ve laid claim to its source.”

—SENECA, MORAL LETTERS, 23.4

We throw around the word “joy” casually. “I’m overjoyed at the news.” “She’s a joy to be around.” “It’s a joyous occasion.” But none of those examples really touches on true joy. They are closer to “cheer” than anything else. Cheerfulness is surface level.

Joy, to Seneca, is a deep state of being. It is what we feel inside us and has little to do with smiles or laughing. So when people say that the Stoics are dour or depressive, they’re really missing the point. Who cares if someone is bubbly when times are good? What kind of accomplishment is that?

But can you be fully content with your life, can you bravely face what life has in store from one day to the next, can you bounce back from every kind of adversity without losing a step, can you be a source of strength and inspiration to others around you? That’s *Stoic joy*—the joy that comes from purpose, excellence, and duty. It’s a serious thing—far more serious than a smile or a chipper voice.`,
    theme: `Duty`,
    discipline: `The Discipline of Action`,
  },
  213: {
    month: `July`,
    day: 31,
    title: `YOUR CAREER IS NOT A LIFE SENTENCE`,
    body: `“How disgraceful is the lawyer whose dying breath passes while at court, at an advanced age, pleading for unknown litigants and still seeking the approval of ignorant spectators.”

—SENECA, ON THE BREVITY OF LIFE, 20.2

Every few years, a sad spectacle is played out in the news. An old millionaire, still lord of his business empire, is taken to court. Shareholders and family members go to court to argue that he is no longer mentally competent to make decisions—that the patriarch is not fit to run his own company and legal affairs. Because this powerful person refused to ever relinquish control or develop a succession plan, he is subjected to one of life’s worst humiliations: the public exposure of his most private vulnerabilities.

We must not get so wrapped up in our work that we think we’re immune from the reality of aging and life. Who wants to be the person who can never let go? Is there so little meaning in your life that your only pursuit is work until you’re eventually carted off in a coffin?

Take pride in your work. But it is not all.

## AUGUST

## PRAGMATISM`,

  214: {
    month: `August`,
    day: 1,
    title: `DON’T GO EXPECTING PERFECTION`,
    body: `“That cucumber is bitter, so toss it out! There are thorns on the path, then keep away! Enough said. Why ponder the existence of nuisance? Such thinking would make you a laughing-stock to the true student of Nature, just as a carpenter or cobbler would laugh if you pointed out the sawdust and chips on the floors of their shops. Yet while those shopkeepers have dustbins for disposal, Nature has no need of them.”

—MARCUS AURELIUS, MEDITATIONS, 8.50

We want things to go perfectly, so we tell ourselves that we’ll get started once the conditions are right, or once we have our bearings. When, really, it’d be better to focus on making do with how things actually are.

Marcus reminded himself: “Don’t await the perfection of Plato’s *Republic*.” He wasn’t expecting the world to be exactly the way he wanted it to be, but Marcus knew instinctively, as the Catholic philosopher Josef Pieper would later write, that “he alone can do good who knows what things are like and what their situation is.”

Today, we won’t let our honest understanding of the world stop us from trying to make the best of it. Nor will we let petty annoyances and minor obstacles get in the way of the important job we have to do.`,

  215: {
    month: `August`,
    day: 2,
    title: `WE CAN WORK ANY WAY`,
    body: `“Indeed, how could exile be an obstacle to a person’s own cultivation, or to attaining virtue when no one has ever been cut off from learning or practicing what is needed by exile?”

—MUSONIUS RUFUS, LECTURES, 9.37.30–31, 9.39.1

Late in his life, after a surgery, Theodore Roosevelt was told he might be confined to a wheelchair for the remainder of his days. With his trademark ebullience, he responded, “All right! I can work that way too!”

This is how we can respond to even the most disabling turns of fate—by working within whatever room is left. Nothing can prevent us from learning. In fact, difficult situations are often opportunities for their own kinds of learning, even if they’re not the kinds of learning we’d have preferred.

Musonius Rufus, for his part, was exiled three times (twice by Nero and once by Vespasian), but being forcibly expelled from his life and his home didn’t impinge on his study of philosophy. In his way, he responded by saying “All right! I can work that way too.” And he did, managing to squeeze in some time between exiles with a student named Epictetus and thus helping to bring Stoicism to the world.`,

  216: {
    month: `August`,
    day: 3,
    title: `THE GOOD LIFE IS ANYWHERE`,
    body: `“At this moment you aren’t on a journey, but wandering about, being driven from place to place, even though what you seek—to live well—is found in all places. Is there any place more full of confusion than the Forum? Yet even there you can live at peace, if needed.”

—SENECA, MORAL LETTERS, 28.5b–6a

A well-known writer once complained that after becoming successful, wealthy friends were always inviting him to their beautiful, exotic houses. “Come to our home in the south of France,” they would say. Or, “Our Swiss ski chalet is a wonderful place to write.” The writer traveled the world, living in luxury, hoping to find inspiration and creativity in these inspiring manors and mansions. Yet it rarely happened. There was always the allure of another, better house. There were always distractions, always so many things to do—and the writer’s block and insecurity that plagues creative types traveled with him wherever he went.

We tell ourselves that we need the right setup before we finally buckle down and get serious. Or we tell ourselves that some vacation or time alone will be good for a relationship or an ailment. This is self-deceit at its finest.

  217: {
    month: `August`,
    day: 4,
    title: `NO BLAME, JUST FOCUS`,
    body: `“You must stop blaming God, and not blame any person. You must completely control your desire and shift your avoidance to what lies within your reasoned choice. You must no longer feel anger, resentment, envy, or regret.”

—EPICTETUS, DISCOURSES, 3.22.13

Nelson Mandela was imprisoned for resistance to the brutal apartheid regime in South Africa for twenty-seven years. For eighteen of those years, he had a bucket for a toilet, a hard cot in a small cell, and once a year he was allowed a single visitor—for thirty minutes. It was vicious treatment meant to isolate and break down the prisoners. And yet, in spite of that, Mandela became a figure of dignity within the prison.

Though he was deprived of many things, he still found creative ways to assert his will. As one of his fellow prisoners, Neville Alexander, explained on *Frontline*, “He [Mandela] always made the point, if they say you must run, insist on walking. If they say you must walk fast, insist on walking slowly. That was the whole point. We are going to set the terms.” He pretended to jump rope and shadowboxed to stay in shape. He held his head higher than other prisoners, encouraged them when times got tough, and always retained his sense of self-assurance.

That self-assurance is yours to claim as well. No matter what happens today, no matter where you find yourself, shift to what lies within your reasoned choices. Ignore, as best you can, the emotions that pop up, which would be so easy to distract yourself with. Don’t get emotional—get focused.`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,
  },
  218: {
    month: `August`,
    day: 5,
    title: `SILENCE IS STRENGTH`,
    body: `“Silence is a lesson learned from the many sufferings of life.”

—SENECA, THYESTES, 309

Recall the last time you said a really boneheaded thing, something that came back to bite you. Why did you say it? Chances are you didn’t need to, but you thought doing so would make you look smart or cool or part of the group.

“The more you say,” Robert Greene has written, “the more likely you are to say something foolish.” To that we add: the more you say, the more likely you are to blow past opportunities, ignore feedback, and cause yourself suffering.

  219: {
    month: `August`,
    day: 6,
    title: `THERE IS ALWAYS MORE ROOM TO MANEUVER THAN YOU THINK`,
    body: `“Apply yourself to thinking through difficulties—hard times can be softened, tight squeezes widened, and heavy loads made lighter for those who can apply the right pressure.”

—SENECA, ON TRANQUILITY OF MIND, 10.4b

Have you ever been hopelessly losing a game that suddenly broke wide open and you won? Remember that time when you thought you were certain to fail the test, but with an all-nighter and some luck you managed to eke out a decent score? That hunch you pursued that others would have given up on—that turned out brilliantly?

  220: {
    month: `August`,
    day: 7,
    title: `PRAGMATIC AND PRINCIPLED`,
    body: `“Wherever a person can live, there one can also live well; life is also in the demands of court, there too one can live well.”

—MARCUS AURELIUS, MEDITATIONS, 5.16

William Lee Miller, in his unique “ethical biography” of Abraham Lincoln, makes an important point about this famous president: our deification of the man makes a point to pretend he wasn’t a politician. We focus on his humble beginnings, his self-education, his beautiful speeches. But we gloss over his job, which was politics. That misses what was so truly impressive about him: Lincoln was all the things he was—compassionate, deliberate, fair, open-minded, and purposeful—*while* being a politician. He was what we admire in a profession we believe to be filled exclusively with the opposite of that type of person.

  221: {
    month: `August`,
    day: 8,
    title: `START WITH WHERE THE WORLD IS`,
    body: `“Do now what nature demands of you. Get right to it if that’s in your power. Don’t look around to see if people will know about it. Don’t await the perfection of Plato’s *Republic*, but be satisfied with even the smallest step forward and regard the outcome as a small thing.”

—MARCUS AURELIUS, MEDITATIONS, 9.29.(4)

Have you ever heard the expression “Don’t let perfect be the enemy of good enough”? The idea is not to settle or compromise your standards, but rather not to become trapped by idealism.

The community organizer Saul Alinsky opens his book *Rules for Radicals* with a pragmatic but inspiring articulation of that idea:

“As an organizer I start from where the world is, as it is, not as I would like it to be. That we accept the world as it is does not in any sense weaken our desire to change it into what we believe it should be—it is necessary to begin where the world is if we are going to change it to what we think it should be.”

There is plenty that you could do right now, today, that would make the world a better place. There are plenty of small steps that, were you to take them, would help move things forward. Don’t excuse yourself from doing them because the conditions aren’t right or because a better opportunity might come along soon. Do what you can, *now.* And when you’ve done it, keep it in perspective, don’t overblow the results. Shun both ego and excuse, before and after.`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,
  },
  222: {
    month: `August`,
    day: 9,
    title: `STICK WITH JUST THE FACTS`,
    body: `“Don’t tell yourself anything more than what the initial impressions report. It’s been reported to you that someone is speaking badly about you. This is the report—the report wasn’t that you’ve been harmed. I see that my son is sick—but not that his life is at risk. So always stay within your first impressions, and don’t add to them in your head—this way nothing can happen to you.”

—MARCUS AURELIUS, MEDITATIONS, 8.49

At first, this can seem like the opposite of everything you’ve been taught. Don’t we cultivate our minds and critical thinking skills precisely so we don’t simply accept things at face value? Yes, most of the time. But sometimes this approach can be counterproductive.

What a philosopher also has is the ability, as Nietzsche put it, “to stop courageously, at the surface” and see things in plain, objective form. Nothing more, nothing less. Yes, Stoics were “superficial,” he said, “*out of profundity*.” Today, while other people are getting carried away, that’s what you’re going to practice. A kind of straightforward pragmatism—seeing things as their initial impressions make them.`,

  223: {
    month: `August`,
    day: 10,
    title: `PERFECTION IS THE ENEMY OF ACTION`,
    body: `“We don’t abandon our pursuits because we despair of ever perfecting them.”

—EPICTETUS, DISCOURSES, 1.2.37b

Psychologists speak of cognitive distortions—exaggerated thinking patterns that have a destructive impact on the life of the patient. One of the most common is known as all-or-nothing thinking (also referred to as splitting). Examples of this include thoughts like:

- If you’re not with me, you’re against me.
- So-and-so is all good/bad.
- Because this wasn’t a complete success, it is a total failure.
This sort of extreme thinking is associated with depression and frustration. How could it not be? Perfectionism rarely begets perfection—only disappointment.

Pragmatism has no such hang-ups. It’ll take what it can get. That’s what Epictetus is reminding us. We’re never going to be perfect—if there is even such a thing. We’re human, after all. Our pursuits should be aimed at progress, however little that it’s possible for us to make.`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,
  },
  224: {
    month: `August`,
    day: 11,
    title: `NO TIME FOR THEORIES, JUST RESULTS`,
    body: `“When the problem arose for us whether habit or theory was better for getting virtue—if by theory is meant what teaches us correct conduct, and by habit we mean being accustomed to act according to this theory—Musonius thought habit to be more effective.”

—MUSONIUS RUFUS, LECTURES, 5.17.31–32, 5.19.1–2

As Hamlet says,

“There are more things in heaven and earth, Horatio,

Than are dreamt of in your philosophy.”

There is no time to chop logic over whether our theories are correct. We’re dealing with the real world here. What matters is how you’re going to deal with this situation right in front of you and whether you’re going to be able to move past it and onto the next one. That’s not saying that anything goes—but we can’t forget that although theories are clean and simple, situations rarely are.`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,
  },
  225: {
    month: `August`,
    day: 12,
    title: `MAKE THE WORDS YOUR OWN`,
    body: `“Many words have been spoken by Plato, Zeno, Chrysippus, Posidonius, and by a whole host of equally excellent Stoics. I’ll tell you how people can prove their words to be their own—by putting into practice what they’ve been preaching.”

—SENECA, MORAL LETTERS, 108.35; 38

One of the criticisms of Stoicism by modern translators and teachers is the amount of repetition. Marcus Aurelius, for example, has been dismissed by academics as not being original because his writing resembles that of other, earlier Stoics. This criticism misses the point.

Even before Marcus’s time, Seneca was well aware that there was a lot of borrowing and overlap among the philosophers. That’s because real philosophers weren’t concerned with authorship, only what worked. More important, they believed that what was *said* mattered less than what was *done.*

And this is as true now as it was then. You’re welcome to take all of the words of the great philosophers and use them to your own liking (they’re dead; they don’t mind). Feel free to tweak and edit and improve as you like. Adapt them to the real conditions of the real world. The way to prove that you truly understand what you speak and write, that you truly are original, is to put them into practice. Speak them with your actions more than anything else.`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,
  },
  226: {
    month: `August`,
    day: 13,
    title: `TAKE CHARGE AND END YOUR TROUBLES`,
    body: `“You’ve endured countless troubles—all from not letting your ruling reason do the work it was made for—enough already!”

—MARCUS AURELIUS, MEDITATIONS, 9.26

How many things you fear have actually come to pass? How many times has anxiety driven you to behave in a way you later regret? How many times have you let jealousy or frustration or greed lead you down a bad road?

Letting our reason rule the day might seem like more work, but it saves us quite a bit of trouble. As Ben Franklin’s proverb put it: “An ounce of prevention is worth a pound of cure.”

Your brain was designed to do this work. It was meant to separate what is important from what is senseless, to keep things in perspective, to only become troubled by that which is worth becoming troubled about. You only need to put it to use.`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,

  227: {
    month: `August`,
    day: 14,
    title: `THIS ISN’T FOR FUN. IT’S FOR LIFE`,
    body: `“Philosophy isn’t a parlor trick or made for show. It’s not concerned with words, but with facts. It’s not employed for some pleasure before the day is spent, or to relieve the uneasiness of our leisure. It shapes and builds up the soul, it gives order to life, guides action, shows what should and shouldn’t be done—it sits at the rudder steering our course as we vacillate in uncertainties. Without it, no one can live without fear or free from care. Countless things happen every hour that require advice, and such advice is to be sought out in philosophy.”

—SENECA, MORAL LETTERS, 16.3

There is a story about Cato the Elder, whose great-grandson Cato the Younger became a towering figure in Roman life. One day Cato witnessed a fine oration from Carneades, a Skeptic philosopher, who waxed poetically on the importance of justice. Yet the next day Cato found Carneades arguing passionately about the *problems* with justice—that it was merely a device invented by society to create order. Cato was aghast at this kind of “philosopher,” who treated such a precious topic like a debate where one would argue both sides of an issue purely for show. What on earth was the point?

And so he lobbied the Senate to have Carneades sent back to Athens, where he could no longer corrupt the Roman youth with his rhetorical tricks. To a Stoic, the idea of idly discussing some issue—of believing or arguing two contradictory ideas—is an absurd waste of time, energy, and belief. As Seneca said, philosophy is not a fun trick. It’s for use—for life.`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,
  },
  228: {
    month: `August`,
    day: 15,
    title: `THE SUPREME COURT OF YOUR MIND`,
    body: `“This can be swiftly taught in very few words: virtue is the only good; there is no certain good without virtue; and virtue resides in our nobler part, which is the rational one. And what can this virtue be? True and steadfast judgment. For from this will arise every mental impulse, and by it every appearance that spurs our impulses will be rendered clear.”

—SENECA, MORAL LETTERS, 71.32

Think about someone you know who has character of granite. Why are they so dependable, trustworthy, excellent? Why do they have a sterling reputation?

You might see a pattern: consistency. They are honest not only when it’s convenient. They are not only there for you when it counts. The qualities that make them admirable come through in every action (“arise with every mental impulse”).

Why do we revere people like Theodore Roosevelt, for example? It isn’t because he was brave once, or courageous once, or tough once. It’s because those qualities are shot through every one of the stories about him. When he was young and weak, he became a boxer. When he was younger and frail, he went to a gym in his home, every day, for hours on end. When he was shattered by the loss of his wife and mother on the same day, he went to The Badlands and herded cattle. And on and on.

  229: {
    month: `August`,
    day: 16,
    title: `ANYTHING CAN BE AN ADVANTAGE`,
    body: `“Just as the nature of rational things has given to each person their rational powers, so it also gives us this power—just as nature turns to its own purpose any obstacle or any opposition, sets its place in the destined order, and co-opts it, so every rational person can convert any obstacle into the raw material for their own purpose.”

—MARCUS AURELIUS, MEDITATIONS, 8.35

At five feet three inches tall, Muggsy Bogues was the shortest player ever to play professional basketball. Throughout his career, he was snickered at, underestimated, and counted out.

But Bogues succeeded by turning his height into the very thing that made him nationally known. Some people looked at his size as a curse, but he saw it as a blessing. He found the advantages contained within it. In fact, on the court small size has many advantages: speed and quickness, the ability to steal the ball from unsuspecting (and significantly taller) players, to say nothing of the fact that players just plain underestimated him.

Could this approach not be useful in your life? What things do you think have been holding you back that, in fact, can be a hidden source of strength?`,
    theme: `Pragmatism`,
    discipline: `The Discipline of Action`,
  },
  230: {
    month: `August`,
    day: 17,
    title: `THE BUCK STOPS HERE`,
    body: `“For nothing outside my reasoned choice can hinder or harm it—my reasoned choice alone can do this to itself. If we would lean this way whenever we fail, and would blame only ourselves and remember that nothing but opinion is the cause of a troubled mind and uneasiness, then by God, I swear we would be making progress.”

—EPICTETUS, DISCOURSES, 3.19.2–3

Today, see if you can go without blaming a single person or single thing. Someone messes up your instructions—it’s on you for expecting anything different. Someone says something rude—it’s your sensitivity that interpreted their remark this way. Your stock portfolio takes a big loss—what did you expect making such a big bet? Why are you checking the market day to day anyway?

  231: {
    month: `August`,
    day: 18,
    title: `ONLY FOOLS RUSH IN`,
    body: `“A good person is invincible, for they don’t rush into contests in which they aren’t the strongest. If you want their property, take it—take also their staff, profession, and body. But you will never compel what they set out for, nor trap them in what they would avoid. For the only contest the good person enters is that of their own reasoned choice. How can such a person not be invincible?”

—EPICTETUS, DISCOURSES, 3.6.5–7

One of the most fundamental principles of martial arts is that strength should not go against strength. That is: don’t try to beat your opponent where they are strongest. But that’s exactly what we do when we try to undertake some impossible task we haven’t bothered to think through. Or we let someone put us on the spot. Or we say yes to everything that comes our way.

Some people think that “choosing your battles” is weak or calculating. How could reducing the amount of times we fail or minimizing the number of needless injuries inflicted upon us be weak? How is that a bad thing? As the saying goes, discretion is the better part of valor. The Stoics call it reasoned choice. That means be reasonable! Think hard before choosing, and make yourself unbeatable.`,

  232: {
    month: `August`,
    day: 19,
    title: `CORRALLING THE UNNECESSARY`,
    body: `“It is said that if you would have peace of mind, busy yourself with little. But wouldn’t a better saying be do what you must and as required of a rational being created for public life? For this brings not only the peace of mind of doing few things, but the greater peace of doing them well. Since the vast majority of our words and actions are unnecessary, corralling them will create an abundance of leisure and tranquility. As a result, we shouldn’t forget at each moment to ask, is this one of the unnecessary things? But we must corral not only unnecessary actions but unnecessary thoughts, too, so needless acts don’t tag along after them.”

The key to accomplishing that is to ruthlessly expunge the inessential from our lives. What vanity obligates us to do, what greed signs us up for, what ill discipline adds to our plate, what a lack of courage prevents us from saying no to. All of this we must cut, cut, cut.`,

  233: {
    month: `August`,

    title: `WHERE IT COUNTS`,
    body: `“Inwardly, we ought to be different in every respect, but our outward dress should blend in with the crowd.”

—SENECA, MORAL LETTERS, 5.2

  234: {
    month: `August`,
    day: 21,
    title: `DON’T BE MISERABLE IN ADVANCE`,
    body: `“It’s ruinous for the soul to be anxious about the future and miserable in advance of misery, engulfed by anxiety that the things it desires might remain its own until the very end. For such a soul will never be at rest—by longing for things to come it will lose the ability to enjoy present things.”

The way we nervously worry about some looming bad news is strange if you think about it. By definition, the waiting means it hasn’t happened yet, so that feeling bad in advance is totally voluntary. But that’s what we do: chewing our nails, feeling sick to our stomachs, rudely brushing aside the people around us. Why? Because something bad *might* occur soon.

The pragmatist, the person of action, is too busy to waste time on such silliness. The pragmatist can’t worry about every possible outcome in advance. Think about it. Best case scenario—if the news turns out to be better than expected, all this time was wasted with needless fear. Worst case scenario—we were miserable for extra time, by choice.

  235: {

    title: `DON’T SWEAT THE SMALL STUFF`,
    body: `“It is essential for you to remember that the attention you give to any action should be in due proportion to its worth, for then you won’t tire and give up, if you aren’t busying yourself with lesser things beyond what should be allowed.”

Whether you read the book or not, Carlson’s pithy articulation of this timeless idea is worth remembering. Even Cornelius Fronto, Marcus Aurelius’s rhetoric teacher, would have thought it a superior way of expressing the wisdom his student attempted in the quote above. They both say the same thing: don’t spend your time (the most valuable and least renewable of all your resources) on the things that don’t matter. What about the things that don’t matter but you’re absolutely obligated to do? Well, spend as little time and worry on them as possible.

  236: {

    title: `IT’S IN YOUR SELF-INTEREST`,
    body: `“Therefore, explain why a wise person shouldn’t get drunk—not with words, but by the facts of its ugliness and offensiveness. It’s most easy to prove that so-called pleasures, when they go beyond proper measure, are but punishments.”

—SENECA, MORAL LETTERS, 83.27

Is there a less effective technique to persuading people to do something than haranguing them? Is there anything that turns people off more than abstract notions? That’s why the Stoics don’t say, “Stop doing this, it’s a sin.” Instead they say, “Don’t do this because it will make you miserable.” They don’t say, “Pleasure isn’t pleasurable.” They say, “Endless pleasure becomes its own form of punishment.” Their methods of persuasion hew the line in *The* *48 Laws of Power*: “Appeal to People’s Self-Interest Never to Their Mercy or Gratitude.”

  237: {
    month: `August`,

    title: `PILLAGE FROM ALL SOURCES`,
    body: `“I’ll never be ashamed to quote a bad writer with a good saying.”

  238: {
    month: `August`,
    day: 25,
    title: `RESPECT THE PAST, BUT BE OPEN TO THE FUTURE`,
    body: `“Won’t you be walking in your predecessors’ footsteps? I surely will use the older path, but if I find a shorter and smoother way, I’ll blaze a trail there. The ones who pioneered these paths aren’t our masters, but our guides. Truth stands open to everyone, it hasn’t been monopolized.”

  239: {
    month: `August`,
    day: 26,
    title: `SEEKING OUT SHIPWRECKS`,
    body: `“I was shipwrecked before I even boarded . . . the journey showed me this—how much of what we have is unnecessary, and how easily we can decide to rid ourselves of these things whenever it’s necessary, never suffering the loss.”

  240: {
    month: `August`,
    day: 27,
    title: `LAUGH, OR CRY?`,
    body: `“Heraclitus would shed tears whenever he went out in public—Democritus laughed. One saw the whole as a parade of miseries, the other of follies. And so, we should take a lighter view of things and bear them with an easy spirit, for it is more human to laugh at life than to lament it.”

  241: {
    month: `August`,

    title: `THE OPULENT STOIC`,
    body: `“The founder of the universe, who assigned to us the laws of life, provided that we should live well, but not in luxury. Everything needed for our well-being is right before us, whereas what luxury requires is gathered by many miseries and anxieties. Let us use this gift of nature and count it among the greatest things.”

Even in his own time, Seneca was criticized for preaching Stoic virtues while accumulating one of the largest fortunes in Rome. Seneca was so rich that some historians speculate that major loans he made to the inhabitants of what is now Britain caused what became a horrifically brutal uprising there. His critics’ derisive nickname for him was “The Opulent Stoic.”

Seneca’s response to this criticism is pretty simple: he might have wealth, but he didn’t *need* it. He wasn’t dependent on it or addicted to it. Nor, despite his large bank account, was he considered to be anything close to Rome’s most lavish spenders and pleasure hunters. Whether his rationalization was true or not (or whether he was a tad hypocritical), his is a decent prescription for navigating today’s materialistic and wealth-driven society.

  242: {

    title: `WANT NOTHING = HAVE EVERYTHING`,
    body: `“No person has the power to have everything they want, but it is in their power not to want what they don’t have, and to cheerfully put to good use what they do have.”

  243: {

    day: 30,
    title: `WHEN YOU FEEL LAZY`,
    body: `“Anything that must yet be done, virtue can do with courage and promptness. For anyone would call it a sign of foolishness for one to undertake a task with a lazy and begrudging spirit, or to push the body in one direction and the mind in another, to be torn apart by wildly divergent impulses.”

  244: {
    month: `August`,
    day: 31,
    title: `CONSIDER YOUR FAILINGS TOO`,
    body: `“Whenever you take offense at someone’s wrongdoing, immediately turn to your own similar failings, such as seeing money as good, or pleasure, or a little fame—whatever form it takes. By thinking on this, you’ll quickly forget your anger, considering also what compels them—for what else could they do? Or, if you are able, remove their compulsion.”

  245: {

    day: 1,
    title: `A STRONG SOUL IS BETTER THAN GOOD LUCK`,
    body: `“The rational soul is stronger than any kind of fortune—from its own share it guides its affairs here or there, and is itself the cause of a happy or miserable life.”

—SENECA, MORAL LETTERS, 98.2b

Cato the Younger had enough money to dress in fine clothing. Yet he often walked around Rome barefoot, indifferent to assumptions people made about him as he passed. He could have indulged in the finest food. He chose instead to eat simple fare. Whether it was raining or intensely hot, he went bareheaded by choice.

Why not indulge in some easy relief? Because Cato was training his soul to be strong and resilient. Specifically, he was learning indifference: an attitude of “let come what may” that would serve him well in the trenches with the army, in the Forum and the Senate, and in his life as a father and statesman.

  246: {
    month: `September`,
    day: 2,
    title: `THE PHILOSOPHER’S SCHOOL IS A HOSPITAL`,
    body: `“Men, the philosopher’s lecture-hall is a hospital—you shouldn’t walk out of it feeling pleasure, but pain, for you aren’t well when you enter it.”

—EPICTETUS, DISCOURSES, 3.23.30

Have you ever been to physical therapy or rehab? No matter what the name implies or how many people you see lying about, getting massages, it’s not a fun place to be. It turns out that healing *hurts.* The trained experts know exactly where to exert pressure and what to subject to stress so that they can strengthen where the patient is weak and help stimulate the areas that have atrophied.

  247: {
    month: `September`,
    day: 3,
    title: `FIRST, A HARD WINTER TRAINING`,
    body: `“We must undergo a hard winter training and not rush into things for which we haven’t prepared.”

—EPICTETUS, DISCOURSES, 1.2.32

Before the advent of modern warfare, armies typically disbanded during the winter. War was not the total war as we understand it today, but more like a series of raids punctuated by the rare decisive battle.

When Epictetus says we ought to go through “hard winter training”—the Greek word is *cheimaskêsai*—he was disputing the notion that there is such a thing as part-time soldiering (or part-time anything for that matter). In order to achieve victory, one must dedicate every second and every resource into preparation and training. LeBron James doesn’t take a summer break—he uses it to work on other aspects of his game. The U.S. military trains its soldiers day and night when not at war, in preparation for when they have to go to war; when they do go to war, they fight until it’s over.

The same is true for us. We can’t do this life thing halfheartedly. There’s no time off. There aren’t even weekends. We are always preparing for what life might throw at us—and when it does, we’re ready and don’t stop until we’ve handled it.`,

  248: {

    title: `HOW CAN YOU KNOW WHETHER YOU’VE NEVER BEEN TESTED?`,
    body: `“I judge you unfortunate because you have never lived through misfortune. You have passed through life without an opponent—no one can ever know what you are capable of, not even you.”

—SENECA, ON PROVIDENCE, 4.3

Most people who have gone through difficult periods in their life come to later wear those experiences as badges of honor. “Those were the days,” they might say, even though now they live in much better circumstances. “To be young and hungry again,” another might say wistfully. “It was the best thing that ever happened to me,” or “I wouldn’t change a thing about it.” As tough as those periods were, they were ultimately formative experiences. They made those people who they are.

There’s another benefit of so-called misfortune. Having experienced and survived it, we walk away with a better understanding of our own capacity and inner strength. Passing a trial by fire is empowering because you know that in the future you can survive similar adversity. “What does not kill me makes me stronger,” Nietzsche said.

  249: {
    month: `September`,
    day: 5,
    title: `FOCUS ON WHAT IS YOURS ALONE`,
    body: `“Remember, then, if you deem what is by nature slavish to be free, and what is not your own to be yours, you will be shackled and miserable, blaming both gods and other people. But if you deem as your own only what is yours, and what belongs to others as truly not yours, then no one will ever be able to coerce or to stop you, you will find no one to blame or accuse, you will do nothing against your will, you will have no enemy, no one will harm you, because no harm can affect you.”

—EPICTETUS, ENCHIRIDION, 1.3

After Captain James Stockdale was shot down over Vietnam, he endured seven and a half years in various prison camps. He was subjected to brutal torture but always struggled to resist. Once, when his captors intended to force him to appear in a propaganda video, he purposely and severely injured himself to make that impossible.

When Stockdale’s plane was hit, he told himself that he was “entering the world of Epictetus.” He didn’t mean that he was attending a philosophy seminar. He knew what he was to face when he crash-landed. He knew it wouldn’t be easy to survive.

  250: {
    month: `September`,
    day: 6,
    title: `THEY CAN THROW YOU IN CHAINS, BUT . . .`,
    body: `“You can bind up my leg, but not even Zeus has the power to break my freedom of choice.”

—EPICTETUS, DISCOURSES, 1.1.23

It was said that Epictetus walked with a permanent limp as a result of being chained up as a slave. Two thousand years later, James Stockdale also had his legs chained in irons (and his arms bound behind his back and pulled from the ceiling, repeatedly wrenching them from their sockets). Future senator John McCain was in that same prison, subjected to much of the same abuse. Because his father was famous, McCain was repeatedly offered by his captors a chance to abandon his men and be sent home early. He too held tightly to his freedom of choice, declining to submit to that temptation even though it meant a loss of the physical freedom he must have ached for.

None of these men broke. No one could make them sacrifice their principles. That’s the thing—someone can throw you in chains, but they don’t have the power to change who you are. Even under the worst torture and cruelties that humans can inflict on one another, our power over our own mind and our power to make our own decisions can’t be broken—only relinquished.`,

  251: {
    month: `September`,
    day: 7,
    title: `OUR HIDDEN POWER`,
    body: `“Consider who you are. Above all, a human being, carrying no greater power than your own reasoned choice, which oversees all other things, and is free from any other master.”

—EPICTETUS, DISCOURSES, 2.10.1

The psychologist Viktor Frankl spent three years imprisoned in various concentration camps, including Auschwitz. His family and his wife had been killed, his life’s work destroyed, his freedom taken from him. He quite literally had nothing left. Yet, as he discovered after much thought, he still retained one thing: the ability to determine *what this suffering meant. *Not even the Nazis could take that from him.

Further, Frankl realized that he could actually find positives in his situation. Here was an opportunity to continue testing and exploring his psychological theories (and perhaps revise them). He could still be of service to others. He even took some solace in the fact that his loved ones were spared the pain and misery that he faced daily in that camp.

Your hidden power is your ability to use reason and make choices, however limited or small. Think about the areas of your life where you are under duress or weighed down by obligation. What are the choices available to you, day after day? You might be surprised at how many there actually are. Are you taking advantage? Are you finding the positives?`,

  252: {
    month: `September`,
    day: 8,
    title: `DO NOT BE DECEIVED BY FORTUNE`,
    body: `“No one is crushed by Fortune, unless they are first deceived by her . . . those who aren’t pompous in good times, don’t have their bubbles burst with change. Against either circumstance, the stable person keeps their rational soul invincible, for it’s precisely in the good times they prove their strength against adversity.”

—SENECA, ON CONSOLATION TO HELVIA, 5.4b, 5b–6

In 41 AD, Seneca was exiled from Rome to Corsica—for what exactly, we are not sure, but the rumors were that he had an affair with the sister of the emperor. Shortly afterward, he sent a letter to his mother seeking to reassure her and comfort her in her grief. But in many ways, he must have been speaking to himself as well—scolding himself a little for this unexpected twist he was taking pretty hard.

How would he respond? How would he deal with it? Well, at the very least, his instincts were to comfort his mother instead of simply bemoaning his own suffering. Though some other letters show that Seneca begged and lobbied for his return to Rome and power (a request eventually granted), he seems to have borne the pain and disgrace of exile fairly well. The philosophy that he’d long studied prepared him for this kind of adversity and gave him the determination and patience he needed to wait it out. When he found his fortune restored as he returned to power, philosophy prevented him from taking it for granted or becoming dependent on it. This was good because fortune had another turn in store for him. When the new emperor turned his wrath on Seneca, philosophy found him ready and prepared once again.`,

    title: `NOTHING TO FEAR BUT FEAR ITSELF`,
    body: `“But there is no reason to live and no limit to our miseries if we let our fears predominate.”

—SENECA, MORAL LETTERS, 13.12b

In the early days of what would become known as the Great Depression, a new president named Franklin Delano Roosevelt was sworn in and gave his first inaugural address. As the last president to hold office before the Twentieth Amendment was ratified, FDR wasn’t able to take office until March—meaning that the country had been without strong leadership for months. Panic was in the air, banks were failing, and people were scared.

You’ve probably heard the “nothing to fear but fear itself” sound bite that FDR gave in that famous speech, but the full line is worth reading because it applies to many difficult things we face in life:

“Let me assert my firm belief that the only thing we have to fear is fear itself—nameless, unreasoning, unjustified terror which paralyzes needed efforts to convert retreat into advance.”

The Stoics knew that fear was to be feared because of the miseries it creates. The things we fear pale in comparison to the damage we do to ourselves and others when we unthinkingly scramble to avoid them. An economic depression is bad; a panic is worse. A tough situation isn’t helped by terror—it only makes things harder. And that’s why we must resist it and reject it if we wish to turn this situation around.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  254: {
    month: `September`,
    day: 10,
    title: `PREPARING ON THE SUNNY DAY`,
    body: `“Here’s a lesson to test your mind’s mettle: take part of a week in which you have only the most meager and cheap food, dress scantly in shabby clothes, and ask yourself if this is really the worst that you feared. It is when times are good that you should gird yourself for tougher times ahead, for when Fortune is kind the soul can build defenses against her ravages. So it is that soldiers practice maneuvers in peacetime, erecting bunkers with no enemies in sight and exhausting themselves under no attack so that when it comes they won’t grow tired.”

—SENECA, MORAL LETTERS, 18.5–6

What if you spent one day a month experiencing the effects of poverty, hunger, complete isolation, or any other thing you might fear? After the initial culture shock, it would start to feel normal and no longer quite so scary.

There are plenty of misfortunes one can practice, plenty of problems one can solve in advance. Pretend your hot water has been turned off. Pretend your wallet has been stolen. Pretend your cushy mattress was far away and that you have to sleep on the floor, or that your car was repossessed and you have to walk everywhere. Pretend you lost your job and need to find a new one. Again, don’t just *think* about these things, but *live them.* And do it now, while things are good. As Seneca reminds us: “It is precisely in times of immunity from care that the soul should toughen itself beforehand for occasions of greater stress. . . . If you would not have a man flinch when the crisis comes, train him before it comes.”`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  255: {
    month: `September`,
    day: 11,
    title: `WHAT WOULD LESS LOOK LIKE?`,
    body: `“Let us get used to dining out without the crowds, to being a slave to fewer slaves, to getting clothes only for their real purpose, and to living in more modest quarters.”

—SENECA, ON TRANQUILITY OF MIND, 9.3b

The writer Stefan Zweig—known for his Stoic-esque wisdom—was at one point one of the bestselling authors in the world, only to have his life destroyed by the rise of Hitler. It’s a sad yet timeless rhythm of history: politicians are run out of office for taking a stand we later recognize as courageous. Countless hardworking and prosperous couples have their money stolen by financial crooks. Someone is accused of a crime but not vindicated until years later.

At any moment we may be toppled from our perch and made to do with *less*—less money, less recognition, less access, less resources. Even the “less-es” that come with age: less mobility, less energy, less freedom. But we can prepare for that, in some way, by familiarizing ourselves with what that might feel like.

One way to protect yourself from the swings of fate—and from the emotional vertigo that can result—is by living within your means *now.* So today, we can try to get used to having and surviving on less so that if we are ever forced to have less, it would not be so bad.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  256: {
    month: `September`,
    day: 12,
    title: `BE DOWN TO EARTH, OR BE BROUGHT DOWN`,
    body: `“Zeno always said that nothing was more unbecoming than putting on airs, especially with the young.”

—DIOGENES LAERTIUS, LIVES OF THE EMINENT PHILOSOPHERS, 7.1.22

Isocrates’s famous letter to Demonicus (which later became the inspiration for Polonius’s “To thine own self be true” speech) holds a similar warning to Zeno. Writing to the young man, Isocrates advises: “Be affable in your relations with those who approach you, and never haughty; for the pride of the arrogant even slaves can hardly endure.”

One of the most common tropes in art—from ancient literature to popular movies—is the brash and overconfident young man who has to be taken down a peg by an older, wiser man. It’s a cliché because it’s a fact of life: people tend to get ahead of themselves, thinking they’ve got it all figured out and are better than those that don’t. It becomes so unpleasant to put up with that someone has to drop some knowledge on them.

But this is an entirely avoidable confrontation. If the bubble is never inflated, it won’t need to be popped. Overconfidence is a great weakness and a liability. But if you are already humble, no one will need to humble you—and the world is much less likely to have nasty surprises in store for you. If you stay down to earth, no one will need to bring you—oftentimes crushingly so—back down.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  257: {
    month: `September`,
    day: 13,
    title: `PROTECTING OUR INNER FORTRESS FROM FEAR`,
    body: `“No, it is events that give rise to fear—when another has power over them or can prevent them, that person becomes able to inspire fear. How is the fortress destroyed? Not by iron or fire, but by judgments . . . here is where we must begin, and it is from this front that we must seize the fortress and throw out the tyrants.”

—EPICTETUS, DISCOURSES, 4.1.85–86; 87a

The Stoics give us a marvelous concept: the Inner Citadel. It is this fortress, they believed, that protects our soul. Though we might be physically vulnerable, though we might be at the mercy of fate in many ways, our inner domain is impenetrable. As Marcus Aurelius put it (repeatedly, in fact), “stuff cannot touch the soul.”

But history teaches us that impenetrable fortresses can still be breached, if betrayed from the inside. The citizens inside the walls—if they fall prey to fear or greed or avarice—can open the gates and let the enemy in. This is what many of us do when we lose our nerve and give in to fear.

You’ve been granted a strong fortress. Don’t betray it.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  258: {
    month: `September`,
    day: 14,
    title: `A DIFFERENT WAY TO PRAY`,
    body: `“Try praying differently, and see what happens: Instead of asking for ‘a way to sleep with her,’ try asking for ‘a way to stop desiring to sleep with her.’ Instead of ‘a way to get rid of him,’ try asking for ‘a way to not crave his demise.’ Instead of ‘a way to not lose my child,’ try asking for ‘a way to lose my fear of it.’”

—MARCUS AURELIUS, MEDITATIONS, 9.40.(6)

Prayer has a religious connotation, but in life we all find ourselves hoping and asking for things. In a tough situation, we might silently ask for help; or, after a tough break, for a second chance from above; during a sports game, we might sit on the edge of our seat wishing for some outcome. “C’mon, c’mon, c’mon,” we say. “*Please* *.* *.* *.”* Even if it is to no one in particular, we’re still praying. Yet it’s so revealing in these moments, when we’re privately, powerfully yearning for something, just how nakedly selfish our requests usually are.

We want divine intervention so that our lives will magically be easier. But what about asking for fortitude and strength so you can do what you need to do? What if you sought clarity on what you do control, what is already within your power? You might find your prayers have already been answered.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,

  259: {
    month: `September`,
    day: 15,
    title: `A GARDEN IS NOT FOR SHOW`,
    body: `“First practice not letting people know who you are—keep your philosophy to yourself for a bit. In just the manner that fruit is produced—the seed buried for a season, hidden, growing gradually so it may come to full maturity. But if the grain sprouts before the stalk is fully developed, it will never ripen. . . . That is the kind of plant you are, displaying fruit too soon, and the winter will kill you.”

—EPICTETUS, DISCOURSES, 4.8.35b–37

After all you’ve read, it might be tempting to think: *This stuff is great. I get it. I’m a Stoic.* But it’s not that easy. Just because you agree with the philosophy doesn’t mean the roots have fully taken hold in your mind.

Fooling with books so you can sound smart or have an intimidating library is like tending a garden to impress your neighbors. Growing one to feed a family? That’s a pure and profitable use of your time. The seeds of Stoicism are long underground. Do the work required to nurture and tend to them. So that they—and you—are prepared and sturdy for the hard winters of life.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  260: {
    month: `September`,
    day: 16,
    title: `ANYONE CAN GET LUCKY, NOT EVERYONE CAN PERSEVERE`,
    body: `“Success comes to the lowly and to the poorly talented, but the special characteristic of a great person is to triumph over the disasters and panics of human life.”

—SENECA, ON PROVIDENCE, 4.1

Perhaps you know people who’ve been extraordinarily lucky in life. Maybe they hit the genetic lottery or have skated through classes and careers with ease. Despite never planning, making reckless decisions, jumping from one thing to the next, they’ve somehow survived without a scratch. There’s a saying: “God favors fools.”

It’s natural to be a bit envious of these folks. We want the easy life too—or so we think. But is the easy life really that admirable?

Anyone can get lucky. There’s no skill in being oblivious, and no one would consider that greatness.

On the other hand, the person who perseveres through difficulties, who keeps going when others quit, who makes it to their destination through hard work and honesty? That’s admirable, because their survival was the result of fortitude and resilience, not birthright or circumstance. A person who overcame not just the external obstacles to success but mastered themselves and their emotions along the way? That’s much more impressive. The person who has been dealt a harder hand, understood it, but still triumphed? That’s greatness.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  261: {
    month: `September`,
    day: 17,
    title: `DEALING WITH HATERS`,
    body: `“What if someone despises me? Let them see to it. But I will see to it that I won’t be found doing or saying anything contemptible. What if someone hates me? Let them see to that. But I will see to it that I’m kind and good-natured to all, and prepared to show even the hater where they went wrong. Not in a critical way, or to show off my patience, but genuinely and usefully.”

—MARCUS AURELIUS, MEDITATIONS, 11.13

When someone has a strong opinion about something, it usually says more about *them* than whatever or whomever the opinion happens to be about. This is especially true when it comes to resentment and hatred of other people. (It is a sad irony that the prejudiced often harbor secret attractions to those they so publicly hate.)

For this reason, the Stoic does two things when encountering hatred or ill opinion in others. They ask: *Is this opinion inside my control?* If there is a chance for influence or change, they take it. But if there isn’t, they accept this person as they are (and never hate a hater). Our job is tough enough already. We don’t have time to think about what other people are thinking, even if it’s about us.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  262: {
    month: `September`,
    day: 18,
    title: `DEALING WITH PAIN`,
    body: `“Whenever you suffer pain, keep in mind that it’s nothing to be ashamed of and that it can’t degrade your guiding intelligence, nor keep it from acting rationally and for the common good. And in most cases you should be helped by the saying of Epicurus, that pain is never unbearable or unending, so you can remember these limits and not add to them in your imagination. Remember too that many common annoyances are pain in disguise, such as sleepiness, fever and loss of appetite. When they start to get you down, tell yourself you are giving in to pain.”

—MARCUS AURELIUS, MEDITATIONS, 7.64

In 1931, on a trip to New York City, Winston Churchill was struck crossing the street by a car going more than thirty miles an hour. A witness at the scene was sure that he had been killed. He would spend some eight days in the hospital, with cracked ribs and a severe head wound.

Churchill somehow retained consciousness. When he spoke to the police, he went to great lengths to insist that he was completely to blame and wanted no harm to come to the driver. Later, the driver came to visit Churchill at the hospital. When Churchill heard that the driver was out of work, he tried to offer *him—*the man who had nearly killed him—some money. More than his own pain, he was worried that the publicity from the accident would hurt the man’s job prospects and sought to help how he could.

“Nature is merciful,” he later wrote in a newspaper article about the experience, “and does not try her children, man or beast, beyond their compass. It is only where the cruelty of man intervenes that hellish torments appear. For the rest—live dangerously; take things as they come; dread naught, all will be well.”

In the years to come, Churchill and the world would witness some of the most hellish torments that man could invent. Yet he—along with many of our ancestors—endured that pain as well. As horrible as it was, eventually all would be well again. Because like Epicurus says, nothing is unending. You just need to be strong and gracious enough to get through it.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  263: {
    month: `September`,
    day: 19,
    title: `FLEXIBILITY OF THE WILL`,
    body: `“Remember that to change your mind and to follow someone’s correction are consistent with a free will. For the action is yours alone—to fulfill its purpose in keeping with your impulse and judgment, and yes, with your intelligence.”

—MARCUS AURELIUS, MEDITATIONS, 8.16

When you set your mind to a task, do you always follow through? It’s an impressive feat if you do. But don’t let yourself become a prisoner of that kind of determination. That asset might become a liability someday.

Conditions change. New facts come in. Circumstances arise. If you can’t adapt to them—if you simply proceed onward, unable to adjust according to this additional information—you are no better than a robot. The point is not to have an iron will, but an *adaptable *will—a will that makes full use of reason to clarify perception, impulse, and judgment to act effectively for the right purpose.

It’s not weak to change and adapt. Flexibility is its own kind of strength. In fact, this flexibility *combined* with strength is what will make us resilient and unstoppable.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,

  264: {
    month: `September`,
    day: 20,
    title: `LIFE ISN’T A DANCE`,
    body: `“The art of living is more like wrestling than dancing, because an artful life requires being prepared to meet and withstand sudden and unexpected attacks.”

—MARCUS AURELIUS, MEDITATIONS, 7.61

Dancing is a popular metaphor for life. One must be limber and agile and go along with the music. One must feel and follow and flow with their partner. But anyone who has tried to do something difficult, where there is competition or an adversary, knows that the dancing metaphor is insufficient. Nobody ever gets up on stage and tries to tackle a dancer. The dancer never gets choked out by a rival.

For a wrestler, on the other hand, adversity and the unexpected are part and parcel of what they do. Their sport is a battle, just like life. They are fighting an opponent as well as their own limitations, emotions, and training.

Life, like wrestling, requires more than graceful movement. We have to undergo hard training and cultivate an indomitable will to prevail. Philosophy is the steel against which we sharpen that will and strengthen that resolve.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  265: {
    month: `September`,
    day: 21,
    title: `MAINTAIN COMPOSURE, MAINTAIN CONTROL`,
    body: `“When forced, as it seems, by circumstances into utter confusion, get a hold of yourself quickly. Don’t be locked out of the rhythm any longer than necessary. You’ll be able to keep the beat if you are constantly returning to it.”

—MARCUS AURELIUS, MEDITATIONS, 6.11

We’re going to get caught off guard from time to time. Not just by “black swan” type events—a terrorist attack or a financial panic—but also by minor, unexpected occurrences. Your car battery dies, your friend cancels at the last minute, you suddenly don’t feel well. These situations have a way of throwing us into confusion and disarray. We’ve made an assumption about the world and built plans on top of that assumption. Now that the assumption has collapsed, so too might our organization or understanding.

That’s perfectly OK! It happens. A line of infantrymen will face withering attacks—what’s key is that they don’t allow chaos to reign. Musicians will experience technical difficulties and lose their place from time to time. In both cases, it just matters that they get back into position as quickly as possible.

The same is true for you today. The order and the peace might be interrupted by a new circumstance. OK. Get a hold of yourself and find your way back.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,

  266: {
    month: `September`,
    day: 22,
    title: `NO PAIN, NO GAIN`,
    body: `“Difficulties show a person’s character. So when a challenge confronts you, remember that God is matching you with a younger sparring partner, as would a physical trainer. Why? Becoming an Olympian takes sweat! I think no one has a better challenge than yours, if only you would use it like an athlete would that younger sparring partner.”

—EPICTETUS, DISCOURSES, 1.24.1–2

The Stoics loved to use metaphors from the Olympics, especially wrestling. Like us, they saw sports as both a fun pastime as well as a training ground to practice for the challenges one will inevitably face in the course of living. As General Douglas MacArthur once said, in words later engraved at the gymnasium at West Point:

UPON THE FIELDS OF FRIENDLY STRIFE

ARE SOWN THE SEEDS

THAT, UPON OTHER FIELDS, ON OTHER DAYS

WILL BEAR THE FRUITS OF VICTORY.

Everyone has found themselves outmatched by an opponent, frustrated by some skill or attribute they have that we don’t—height, speed, vision, whatever. How we choose to respond to that struggle tells us about who we are as athletes and who we’ll be as people. Do we see it as a chance to learn and get stronger? Do we get frustrated and complain? Or worse, do we call it off and find an easier game to play, one that makes us feel good instead of challenged?

The greats don’t avoid these tests of their abilities. They seek them out because they are not just the measure of greatness, they are the pathway to it.`,

    discipline: `The Discipline of Will`,

  267: {
    month: `September`,
    day: 23,
    title: `THE MOST SECURE FORTRESS`,
    body: `“Remember that your ruling reason becomes unconquerable when it rallies and relies on itself, so that it won’t do anything contrary to its own will, even if its position is irrational. How much more unconquerable if its judgments are careful and made rationally? Therefore, the mind freed from passions is an impenetrable fortress—a person has no more secure place of refuge for all time.

—MARCUS AURELIUS, MEDITATIONS, 8.48

Bruce Lee once made an interesting claim: “I fear not the man who has practiced ten thousand kicks once,” he said, “but I fear the man who has practiced one kick ten thousand times.” When we repeat an action so often it becomes unconscious behavior, we can default to it without thinking.

Training in the martial arts or combat is a deeply thoughtful study of movement. We sometimes think of soldiers as automatons, but what they’ve actually built is a steady pattern of unconscious behaviors. Any of us can build these.

When Marcus says that a mind can get to a place where “it won’t do anything contrary to its own will, even if its position is irrational,” what he means is that proper training can change your default habits. Train yourself to give up anger, and you won’t be angry at every fresh slight. Train yourself to avoid gossip, and you won’t get pulled into it. Train yourself on any habit, and you’ll be able to unconsciously go to that habit in trying times.

Think about which behaviors you’d like to be able to default to if you could. How many of them have you practiced only once? Let today be twice.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  268: {
    month: `September`,
    day: 24,
    title: `IT COULD HAPPEN TO YOU`,
    body: `“Being unexpected adds to the weight of a disaster, and being a surprise has never failed to increase a person’s pain. For that reason, nothing should ever be unexpected by us. Our minds should be sent out in advance to all things and we shouldn’t just consider the normal course of things, but what could actually happen. For is there anything in life that Fortune won’t knock off its high horse if it pleases her?”

—SENECA, MORAL LETTERS, 91.3a–4

In the year 64, during the reign of Nero, a fire tore through the city of Rome. The French city of Lyons sent a large sum of money to aid the victims. The next year the citizens of Lyons were suddenly struck by a tragic fire of their own, prompting Nero to send an equal sum to its victims. As Seneca wrote about the event to a friend in one of his letters, he must have been struck by the poetry—one city helping another, only to be struck by similar disaster not long after.

How often does that happen to us? We comfort a friend during a breakup, only to be surprised when our own relationship ends. We must prepare in our minds for the possibility of extreme reversals of fate. The next time you make a donation to charity, don’t just think about the good turn you’re doing, but take a moment to consider that one day you may need to receive charity yourself.

As far as we know, Seneca truly *lived* these words. Just a year or so after writing this letter, he was falsely accused of plotting against Nero. The price? Seneca was sentenced to commit suicide. As the historian Tacitus relates the scene, Seneca’s closest friends wept and protested the verdict. “Where,” Seneca asked them repeatedly, “are your maxims of philosophy, or the preparations of so many years’ study against evils to come? Who knew not Nero’s cruelty?” That is: he knew it could happen to him too, and so he was prepared for it.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  269: {
    month: `September`,
    day: 25,
    title: `THE VULNERABILITY OF DEPENDENCE`,
    body: `“Show me someone who isn’t a slave! One is a slave to lust, another to greed, another to power, and all are slaves to fear. I could name a former Consul who is a slave to a little old woman, a millionaire who is the slave of the cleaning woman. . . . No servitude is more abject than the self-imposed.”

—SENECA, MORAL LETTERS, 47.17

We’re *all* addicts in one way or another. We’re addicted to our routines, to our coffee, to our comfort, to someone else’s approval. These dependencies mean we’re not in control of our own lives—the dependency is.

“Anyone who truly wants to be free,” Epictetus said, “won’t desire something that is actually in someone else’s control, unless they want to be a slave.” The subjects of our affection can be removed from us at a moment’s notice. Our routines can be disrupted, the doctor can forbid us from drinking coffee, we can be thrust into uncomfortable situations.

This is why we must strengthen ourselves by testing these dependencies before they become too great. Can you try going without this or that for a day? Can you put yourself on a diet for a month? Can you resist the urge to pick up the phone to make that call? Have you ever taken a cold shower? It’s not so bad after the first couple of times. Have you ever driven a friend’s car while the nicer one you own was in the shop? Was it really that bad? Make yourself invulnerable to your dependency on comfort and convenience, or one day your vulnerability might bring you to your knees.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  270: {
    month: `September`,
    day: 26,
    title: `WHAT TIME OFF IS FOR`,
    body: `“Leisure without study is death—a tomb for the living person.”

—SENECA, MORAL LETTERS, 82.4

You deserve a vacation. You work hard. You sacrifice. You push yourself. It’s time for a break. Hop a plane, check into your hotel, and head to the beach—but tuck a book under your arm (and not a trashy beach read). Make sure you enjoy your relaxation like a poet—not idly but *actively*, observing the world around you, taking it all in, better understanding your place in the universe. Take a day off from work every now and then, but not a day off from learning.

Maybe your goal is to make enough money so that you can retire early. Good for you! But the purpose of retirement is not to live a life of indolence or to run out the clock, as easy as that might be to do. Rather, it’s to allow for the pursuit of your real calling now that a big distraction is out of the way. To sit around all day and do nothing? To watch endless amounts of television or simply travel from place to place so that you might cross locations off a checklist? That is not life. It’s not freedom either.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  271: {
    month: `September`,
    day: 27,
    title: `WHAT WILL PROSPERITY REVEAL?`,
    body: `“For even peace itself will supply more reason for worry. Not even safe circumstances will bring you confidence once your mind has been shocked—once it gets in the habit of blind panic, it can’t provide for its own safety. For it doesn’t really avoid danger, it just runs away. Yet we are exposed to greater danger with our backs turned.”

—SENECA, MORAL LETTERS, 104.10b

There’s an old proverb that money doesn’t change people, it just makes them more of who they are. Robert Caro has written that “power doesn’t corrupt, it *reveals*.” In some ways, prosperity—financial and personal—is the same way.

If your mind has developed a certain cast—the habit of panicking, in Seneca’s example—then it won’t matter how good things get for you. You’re still primed for panic. Your mind will still find things to worry about, and you’ll still be miserable. Perhaps more so even, because now you have more to lose.

This is why it’s foolish to hope for good fortune. If you were to hope for one thing, you could hope for the strength of character that’s able to thrive in good fortune. Or better, *work* for that kind of character and confidence. Consider every action and every thought—think of them as building blocks of your indestructible character. Then work to make each one strong and significant in its own right.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  272: {
    month: `September`,
    day: 28,
    title: `YOU HOLD THE TRUMP CARD`,
    body: `“How appropriate that the gods put under our control only the most powerful ability that governs all the rest—the ability to make the right use of external appearances—and that they didn’t put anything else under our control. Was this simply because they weren’t willing to give us more? I think if it had been possible they would have given us more, but it was impossible.

—EPICTETUS, DISCOURSES, 1.1.7–8

We could look at the upcoming day and despair at all the things we don’t control: other people, our health, the temperature, the outcome of a project once it leaves our hands.

Or we could look out at that very same day and rejoice at the one thing we do control: the ability to decide what any event means.

This second option offers the ultimate power—a true and fair form of control. If you had control over other people, wouldn’t other people have control over you? Instead, what you’ve been granted is the fairest and most usable of trump cards. While you don’t control external events, you retain the ability to decide how you *respond* to those events. You control what every external event means to you personally*.*

This includes the difficult one in front of you right now. You’ll find, if you approach it right, that this trump card is plenty.`,
    theme: `Fortitude and Resilience`,
    discipline: `The Discipline of Will`,
  },
  273: {
    month: `September`,
    day: 29,
    title: `YOUR ACTUAL NEEDS ARE SMALL`,
    body: `“Nothing can satisfy greed, but even a small measure satisfies nature. So it is that the poverty of an exile brings no misfortune, for no place of exile is so barren as not to produce ample support for a person.”

—SENECA, ON CONSOLATION TO HELVIA, 10.11b

It can be beneficial to reflect on what you used to accept as normal. Consider your first paycheck—how *big* it seemed then. Or your first apartment, with its own bedroom and bathroom and the ramen you gladly scarfed down in the kitchen. Today, as you’ve become more successful, these conditions would hardly feel sufficient. In fact, you probably want even more than what you have right now. Yet just a few years ago those paltry conditions were not only enough, they felt great!

When we become successful, we forget how strong we used to be. We are so used to what we have, we half believe we’d die without it. Of course, this is just the comfort talking. In the days of the world wars, our parents and grandparents made do with rationed gas, butter, and electricity. They were fine, just as you have been fine when you had less.

  274: {

    title: `YOU CAN’T TOUCH ME`,
    body: `“If you lay violent hands on me, you’ll have my body, but my mind will remain with Stilpo.”

—ZENO, QUOTED IN DIOGENES LAERTIUS, LIVES OF THE EMINENT PHILOSOPHERS, 7.1.24

  276: {

    title: `THE MOST VALUABLE ASSET`,
    body: `“But the wise person can lose nothing. Such a person has everything stored up for themselves, leaving nothing to Fortune, their own goods are held firm, bound in virtue, which requires nothing from chance, and therefore can’t be either increased or diminished.”

—SENECA, ON THE FIRMNESS OF THE WISE, 5.4

Some people put their money in assets—stocks, bonds, property. Others invest in relationships or accomplishments, knowing that they can draw on these things just as easily as others can draw funds from a bank account. But a third type, Seneca says, invests in themselves—in being a good and wise person.

Which of these assets is most immune to market fluctuations and disasters? Which is most resilient in the face of trials and tribulations? Which will never abandon you? Seneca’s own life is an interesting example. He became quite wealthy as a friend of the emperor, but as Nero became more and more deranged, Seneca realized he needed to get out. He offered Nero a deal: he would give Nero all his money and return all of Nero’s gifts in exchange for complete and total freedom.

Ultimately, Nero rejected this offer, but Seneca left anyway, retiring in relative peace. But one day, the executioners came with their mortal decree. In that moment, what did Seneca rely on? It wasn’t his money. It wasn’t his friends, who, although they meant well, were a considerable source of grief and mourning. It was his virtue and inner strength.

    title: `A MANTRA OF MUTUAL INTERDEPENDENCE`,
    body: `“Meditate often on the interconnectedness and mutual interdependence of all things in the universe. For in a sense, all things are mutually woven together and therefore have an affinity for each other—for one thing follows after another according to their tension of movement, their sympathetic stirrings, and the unity of all substance.”

  278: {

    title: `ALL FOR ONE, ONE FOR ALL`,
    body: `“That which isn’t good for the hive, isn’t good for the bee.”

—MARCUS AURELIUS, MEDITATIONS, 6.54

Inherent in the Stoic concept of *sympatheia* is the notion of an interconnected cosmos in which everything in the universe is part of a larger whole. Marcus Aurelius was one of the first writers to articulate the notion of cosmopolitanism—saying that he was a citizen of the world, not just of Rome.

  280: {
    month: `October`,
    day: 6,
    title: `LOOKING OUT FOR EACH OTHER`,
    body: `“It’s in keeping with Nature to show our friends affection and to celebrate their advancement, as if it were our very own. For if we don’t do this, virtue, which is strengthened only by exercising our perceptions, will no longer endure in us.”

  281: {

    title: `A SELFISH REASON TO BE GOOD`,
    body: `“The person who does wrong, does wrong to themselves. The unjust person is unjust to themselves—making themselves evil.”

  282: {

    title: `A HIGHER PLEASURE`,
    body: `“Yes, getting your wish would have been so nice. But isn’t that exactly why pleasure trips us up? Instead, see if these things might be even nicer—a great soul, freedom, honesty, kindness, saintliness. For there is nothing so pleasing as wisdom itself, when you consider how sure-footed and effortless the works of understanding and knowledge are.”

  283: {

    title: `SET THE STANDARDS AND USE THEM`,
    body: `“When the standards have been set, things are tested and weighed. And the work of philosophy is just this, to examine and uphold the standards, but the work of a truly good person is in using those standards when they know them.”

  284: {

    body: `“Leave the past behind, let the grand design take care of the future, and instead only rightly guide the present to reverence and justice. Reverence so that you’ll love what you’ve been allotted, for nature brought you both to each other. Justice so that you’ll speak the truth freely and without evasion, and so that you’ll act only as the law and value of things require.”

  285: {
    month: `October`,
    day: 11,
    title: `HONESTY AS OUR DEFAULT`,
    body: `“How rotten and fraudulent when people say they intend to ‘give it to you straight.’ What are you up to, dear friend? It shouldn’t need your announcement, but be readily seen, as if written on your forehead, heard in the ring of your voice, a flash in your eyes—just as the beloved sees it all in the lover’s glance. In short, the straightforward and good person should be like a smelly goat—you know when they are in the room with you.”

  287: {
    month: `October`,
    day: 13,
    title: `REVENGE IS A DISH BEST NOT SERVED`,
    body: `“The best way to avenge yourself is to not be like that.”

—MARCUS AURELIUS, MEDITATIONS, 6.6

“How much better to heal than seek revenge from injury. Vengeance wastes a lot of time and exposes you to many more injuries than the first that sparked it. Anger always outlasts hurt. Best to take the opposite course. Would anyone think it normal to return a kick to a mule or a bite to a dog?”
