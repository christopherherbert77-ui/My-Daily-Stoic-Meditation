  289: {
    month: `October`,
    day: 15,
    title: `GIVE PEOPLE THE BENEFIT OF THE DOUBT`,
    body: `“Everything turns on your assumptions about it, and that’s on you. You can pluck out the hasty judgment at will, and like steering a ship around the point, you will find calm seas, fair weather and a safe port.”

—MARCUS AURELIUS, MEDITATIONS, 12.22

“Even a dog,” Supreme Court Justice Oliver Wendell Holmes once said, “distinguishes between being stumbled over and being kicked.” Yet if you’ve ever accidentally stepped on your dog, you know that the first reaction is usually a bark or a yelp or a quick snap of the jaws. In the instant, there is no distinction—just pain. Then it sees who it was, hears your soothing voice, and goes right back to wagging its tail.

  290: {
    month: `October`,
    day: 16,
    title: `SPREAD THE WORD`,
    body: `“Some people with exceptional minds quickly grasp virtue, or produce it within themselves. But other dim and lazy types, hindered by bad habits, must have their rusty souls constantly scrubbed down. . . . The weaker sorts will be helped and lifted from their bad opinions if we put them in the care of philosophy’s principles.”

  291: {
    month: `October`,
    day: 17,
    title: `THE BENEFIT OF KINDNESS`,
    body: `“A benefit should be kept like a buried treasure, only to be dug up in necessity. . . . Nature bids us to do well by all. . . . Wherever there is a human being, we have an opportunity for kindness.”

—SENECA, ON THE HAPPY LIFE, 24.2–3

The first person you meet today—passing acquaintance or friend—no matter the context—positive or negative—is an opportunity for kindness. Or as different translators have taken this line from Seneca to mean, it is an opportunity for *benefit*. For both of you. You can seek to understand where they are coming from. You can seek to understand who they are, what they need, and what forces or impulses might be acting on them. And you can treat them well and be better off for it.

The same is true with the second person you encounter, and the third. Of course, there is no guarantee that they will return the favor, but that’s not our concern. As always, we’re going to focus on what we control: in this case, the ability to choose to respond with kindness.`,

  292: {
    month: `October`,
    day: 18,
    title: `FRENEMIES`,
    body: `“There’s nothing worse than a wolf befriending sheep. Avoid false friendship at all costs. If you are good, straightforward, and well meaning it should show in your eyes and not escape notice.”

—MARCUS AURELIUS, MEDITATIONS, 11.15

It’s pretty obvious that one should keep away from the wicked and two-faced as much as possible—the jealous friend, the narcissistic parent, the untrustworthy partner. At first glance, Marcus Aurelius is reminding us to avoid false friends.

But what if we turn it around? What if, instead, we ask about the times that we have been false to *our* friends? Ultimately that’s what Stoicism is about—not judging other people’s behavior, but judging our own.

  293: {
    month: `October`,
    day: 19,
    title: `GOOD HABITS DRIVE OUT BAD HABITS`,
    body: `“Since habit is such a powerful influence, and we’re used to pursuing our impulses to gain and avoid outside our own choice, we should set a contrary habit against that, and where appearances are really slippery, use the counterforce of our training.”

—EPICTETUS, DISCOURSES, 3.12.6

When a dog is barking loudly because someone is at the door, the worst thing you can do is yell. To the dog, it’s like you’re barking too! When a dog is running away, it’s not helpful to chase it—again, now it’s like you’re both running. A better option in both scenarios is to give the dog something else to do. Tell it to sit. Tell it to go to its bed or kennel. Run in the other direction. Break the pattern, interrupt the negative impulse.

The same goes for us. When a bad habit reveals itself, counteract it with a commitment to a contrary virtue. For instance, let’s say you find yourself procrastinating today—don’t dig in and fight it. Get up and take a walk to clear your head and reset instead. If you find yourself saying something negative or nasty, don’t kick yourself. Add something positive and nice to qualify the remark.

Oppose established habits, and use the counterforce of training to get traction and make progress. If you find yourself cutting corners during a workout or on a project, say to yourself: “OK, now I am going to go even further or do even better.”

  294: {
    month: `October`,
    day: 20,
    title: `MARKS OF THE GOOD LIFE`,
    body: `“You have proof in the extent of your wanderings that you never found the art of living anywhere—not in logic, nor in wealth, fame, or in any indulgence. Nowhere. Where is it then? In doing what human nature demands. How is a person to do this? By having principles be the source of desire and action. What principles? Those to do with good and evil, indeed in the belief that there is no good for a human being except what creates justice, self-control, courage and freedom, and nothing evil except what destroys these things.”

—MARCUS AURELIUS, MEDITATIONS, 8.1.(5)

W*hat’s the meaning of life? Why was I born?* Most of us struggle with these questions—sometimes when we’re young, sometimes not until we’re older. Rarely do we find much in the way of direction. But that’s simply because we miss the point. As Viktor Frankl points out in *Man’s Search for Meaning*, it is not our question to ask. Instead, it is *we* who are being asked the question. It’s our lives that are the answer.

No amount of travel or reading or clever sages can tell you what you want to know. Instead, it is *you* who must find the answer in your actions, in living the good life—by embodying the self-evident principles of justice, self-control, courage, freedom, and abstaining from evil.`,

  295: {
    month: `October`,
    day: 21,
    title: `HEROES, HERE AND NOW`,
    body: `“Such behavior! People don’t want to praise their contemporaries whose lives they actually share, but hold great expectations for the praise of future generations—people they haven’t met or ever will! This is akin to being upset that past generations didn’t praise you.”

—MARCUS AURELIUS, MEDITATIONS, 6.18

Alexandria, the city in Egypt, still bears the name of its founder, Alexander the Great, some 2,300 years after he set foot there. How cool would it feel to have a city named after you for so many centuries? To know that people are still saying your name?

Here’s a thought: it wouldn’t be cool. Because, like Alexander, you’ll be dead. You’ll have no idea whether your name lasted down through the centuries. No one gets to enjoy their own legacy—by definition.

  296: {
    month: `October`,
    day: 22,
    title: `IT’S EASY TO GET BETTER. BUT BETTER AT WHAT?`,
    body: `“So someone’s good at taking down an opponent, but that doesn’t make them more community-minded, or modest, or well-prepared for any circumstance, or more tolerant of the faults of others.”

  297: {
    month: `October`,
    day: 23,
    title: `SHOW THE QUALITIES YOU WERE MADE FOR`,
    body: `“People aren’t in awe of your sharp mind? So be it. But you have many other qualities you can’t claim to have been deprived of at birth. Display then those qualities in your own power: honesty, dignity, endurance, chastity, contentment, frugality, kindness, freedom, persistence, avoiding gossip, and magnanimity.”

    title: `THE FOUNTAIN OF GOODNESS`,

  299: {
    month: `October`,

    title: `TWO TASKS`,
    body: `“What, then, makes a person free from hindrance and self-determining? For wealth doesn’t, neither does high-office, state or kingdom—rather, something else must be found . . . in the case of living, it is the knowledge of how to live.”

  301: {
    month: `October`,

    title: `WE REAP WHAT WE SOW`,
    body: `“Crimes often return to their teacher.”

—SENECA, THYESTES, 311

It’s ironic that Seneca would have one of his characters utter this line. As we know, for many years Seneca served as the tutor and mentor to the emperor Nero. There is a lot of evidence that Seneca was, in fact, a positive moral influence on the deranged young man, but even at the time, Seneca’s contemporaries found it strange that a philosopher would serve as the right hand to such an evil person. They even used the Greek word *tyrannodidaskalos—*tyrant teacher—to describe him. And just as Shakespeare observed in *Macbeth*, “Bloody instructions, which, being taught, return / To plague th’inventor,” Seneca’s collaboration with Nero ultimately ended with the student murdering the teacher.

It’s something to think about when you consider whom to work with and whom to do business with in life. If you show a client how to do something unethical or illegal, might they return the favor to an unsuspecting you later on? If you provide a bad example to your employees, to your associates, to your children, might they betray you or hurt you down the road? What goes around comes around, is the saying. Karma is a notion we have imported from the East, along similar lines.

  302: {

    title: `WE WERE MADE FOR EACH OTHER`,
    body: `“You’ll more quickly find an earthly thing kept from the earth than you will a person cut off from other human beings.”

—MARCUS AURELIUS, MEDITATIONS, 9.9.3

Naturally, Marcus Aurelius and the rest of the Stoics were not familiar with Newtonian physics. But they knew that what went up must come down. That’s the analogy he’s using here: our mutual interdependence with our fellow human beings is stronger than the law of gravity.

  303: {
    month: `October`,
    day: 29,
    title: `CHARACTER IS FATE`,
    body: `“Each person acquires their own character, but their official roles are designated by chance. You should invite some to your table because they are deserving, others because they may come to deserve it.”

—SENECA, MORAL LETTERS, 47.15b

In the hiring process, most employers look at where someone went to school, what jobs they’ve held in the past. This is because past success can be an indicator of future successes. But is it always? There are plenty of people who were successful because of luck. Maybe they got into Oxford or Harvard because of their parents. And what about a young person who hasn’t had time to build a track record? Are they worthless?

  304: {

    title: `WHO GETS THE LION’S SHARE?`,
    body: `“Aren’t you ashamed to reserve for yourself only the remnants of your life and to dedicate to wisdom only that time can’t be directed to business?”

—SENECA, ON THE BREVITY OF LIFE, 3.5b

In one of his letters, Seneca tells a story about Alexander the Great. Apparently as Alexander was conquering the world, certain countries would offer him pieces of their territory in hopes that he’d leave them alone in exchange. Alexander would tell them, writes Seneca, that he hadn’t come all the way to Asia to accept whatever they would give him, but instead they were going to have to accept whatever he chose to leave them.

  305: {
    month: `October`,
    day: 31,
    title: `YOU WERE BORN GOOD`,
    body: `“The human being is born with an inclination toward virtue.”

—MUSONIUS RUFUS, LECTURES, 2.7.1–2

The notion of original sin has weighed down humankind for centuries. In reality, we’re made to help each other and be good to each other. We wouldn’t have survived as a species otherwise.

  306: {

    title: `ACCEPTING WHAT IS`,
    body: `“Don’t seek for everything to happen as you wish it would, but rather wish that everything happens as it actually will—then your life will flow well.”

—EPICTETUS, ENCHIRIDION, 8

“It is easy to praise providence for anything that may happen if you have two qualities: a complete view of what has actually happened in each instance and a sense of gratitude. Without gratitude what is the point of seeing, and without seeing what is the object of gratitude?”

Something happened that we wish had not. Which of these is easiest to change: our opinion or the event that is past?

The answer is obvious. Accept what happened and change your wish that it had not happened. Stoicism calls this the “art of acquiescence”—to accept rather than fight every little thing.

And the most practiced Stoics take it a step further. Instead of simply *accepting* what happens, they urge us to actually *enjoy *what has happened—whatever it is. Nietzsche, many centuries later, coined the perfect expression to capture this idea: *amor fati *(a love of fate). It’s not just accepting, it’s* loving* everything that happens.

  307: {

    title: `BINDING OUR WISHES TO WHAT WILL BE`,
    body: `“But I haven’t at any time been hindered in my will, nor forced against it. And how is this possible? I have bound up my choice to act with the will of God. God wills that I be sick, such is my will. He wills that I should choose something, so do I. He wills that I reach for something, or something be given to me—I wish for the same. What God doesn’t will, I do not wish for.”

When General Dwight D. Eisenhower wrote to his wife on the eve of the invasion of Normandy, he told her, “Everything we could think of has been done, the troops are fit everybody is doing his best. The answer is in the lap of the gods.” He’d done everything he could—and now, what would happen would happen and as Epictetus might say, he was ready to bear whatever that was. In fact, Eisenhower had written another letter that night and prepared it for release in case the invasion failed. If failure was what God—or fate or luck or whatever you want to call it—willed, he was ready.

    title: `FOLLOWING THE DOCTOR’S ORDERS`,
    body: `“Just as we commonly hear people say the doctor prescribed someone particular riding exercises, or ice baths, or walking without shoes, we should in the same way say that nature prescribed someone to be diseased, or disabled, or to suffer any kind of impairment. In the case of the doctor, prescribed means something ordered to help aid someone’s healing. But in the case of nature, it means that what happens to each of us is ordered to help aid our destiny.”

  309: {

    title: `NOT GOOD, NOR BAD`,
    body: `“There is no evil in things changing, just as there is no good in persisting in a new state.”

When people say change is good, they’re usually trying to reassure someone (or themselves). Because instinctively we view change as bad—or at least we’re suspicious of it.

  310: {
    month: `November`,
    day: 5,
    title: `A HIGHER POWER`,
    body: `“This is the very thing which makes up the virtue of the happy person and a well-flowing life—when the affairs of life are in every way tuned to the harmony between the individual divine spirit and the will of the director of the universe.”

In undergoing a twelve-step program, many addicts struggle most with step 2: acknowledging a higher power. Addicts often fight this one. At first they claim it’s because they’re atheists or because they don’t like religion or because they don’t understand why it matters.

But they later realize that this is just the addiction talking—it’s another form of selfishness and self-absorption. The actual language of the step is pretty easy to swallow: “[We] came to believe that a Power greater than ourselves could restore us to sanity.” Subsequent steps ask the addict to submit and let go. The second step really has less to do with “god” than those other steps—the letting go. It’s about attuning to the universe and discarding the toxic idea that we’re at the center of it.

    body: `“Don’t trust in your reputation, money, or position, but in the strength that is yours—namely, your judgments about the things that you control and don’t control. For this alone is what makes us free and unfettered, that picks us up by the neck from the depths and lifts us eye to eye with the rich and powerful.”

  313: {
    month: `November`,
    day: 8,
    title: `ACTORS IN A PLAY`,
    body: `“Remember that you are an actor in a play, playing a character according to the will of the playwright—if a short play, then it’s short; if long, long. If he wishes you to play the beggar, play even that role well, just as you would if it were a cripple, a honcho, or an everyday person. For this is your duty, to perform well the character assigned you. That selection belongs to another.”

—EPICTETUS, ENCHIRIDION, 17

Marcus Aurelius didn’t want to be emperor. He wasn’t a politician who sought office, and he wasn’t a true heir to the throne. As far as we can tell from his letters and from history, what he really wanted was to be a philosopher. But the powerful elite in Rome, including the emperor Hadrian, saw something in him. Groomed for power, Marcus was adopted and put in line for the throne because they knew he could handle it. Meanwhile, Epictetus lived much of his life as a slave and was persecuted for his philosophical teachings. Both did quite a lot with the roles they were assigned.

Our station in life can be as random as a roll of the dice. Some of us are born into privilege, others into adversity. Sometimes we’re given exactly the opportunities we want. At other times we’re given a lucky break, but to us it feels like a burden.

  314: {
    month: `November`,
    day: 9,
    title: `ALL IS FLUID`,
    body: `“The universe is change. Life is opinion.”

—MARCUS AURELIUS, MEDITATIONS, 4.3.4b

In Plutarch’s *Life of Theseus, *he describes how the ship of Theseus, an Athenian hero, was preserved by the people of Athens in battle-ready condition for many centuries. Each time a board decayed, it would be replaced until eventually every stick of wood in it had been replaced. Plutarch asks: Is it still the ship of Theseus, or is it a new one?

In Japan, a famous Shinto shrine is rebuilt every twenty-three years. It’s gone through more than sixty of those cycles. Is it one shrine, 1,400 years old? Or sixty consecutive shrines? Even the U.S. Senate, given its staggered elections, could be said to have never been fully turned over. Is it the same body formed in the days of George Washington?

Our understanding of what something *is* is just a snapshot—an ephemeral opinion. The universe is in a constant state of change. Our nails grow and are cut and keep growing. New skin replaces dead skin. Old memories are replaced by new memories. Are we still the same people? Are the people around us the same? Nothing is exempt from this fluidity, not even the things we hold most sacred.`,

  315: {
    month: `November`,
    day: 10,
    title: `ALWAYS THE SAME`,
    body: `“Think by way of example on the times of Vespasian, and you’ll see all these things: marrying, raising children, falling ill, dying, wars, holiday feasts, commerce, farming, flattering, pretending, suspecting, scheming, praying that others die, grumbling over one’s lot, falling in love, amassing fortunes, lusting after office and power. Now that life of theirs is dead and gone . . . the times of Trajan, again the same . . .”

Ernest Hemingway opens his book *The Sun Also Rises* with a Bible verse: “One generation passeth, and another generation cometh; but the earth abideth forever. The sun also riseth, and the sun goeth down, and resteth to the place where he arose.” It was this passage, his editor would say, that “contained all the wisdom of the ancient world.”

And what wisdom is that? One of the most striking things about history is just how long human beings have been doing what they do. Though certain attitudes and practices have come and gone, what’s left are people—living, dying, loving, fighting, crying, laughing.

  316: {

    title: `IT’S NOT THE THING, IT’S WHAT WE MAKE OF IT`,
    body: `“When you are distressed by an external thing, it’s not the thing itself that troubles you, but only your judgment of it. And you can wipe this out at a moment’s notice.”

—MARCUS AURELIUS, MEDITATIONS, 8.47

Imagine you’ve dreamed of a life in politics. You’re young, you’re vigorous, and you’ve held increasingly powerful positions over the course of your career. Then at thirty-nine, you start to feel run down. Your doctors tell you that you have polio and your life will never be the same. Your career is over—right?

  317: {

    title: `THE STRONG ACCEPT RESPONSIBILITY`,
    body: `“If we judge as good and evil only the things in the power of our own choice, then there is no room left for blaming gods or being hostile to others.”

—MARCUS AURELIUS, MEDITATIONS, 6.41

  318: {

    body: `“Don’t allow yourself to be heard any longer griping about public life, not even with your own ears!”

Not only do even the most fortunate of us complain, it often seems like the more fortunate we are, the more time we have to do so. Marcus Aurelius was a reluctant chief executive—just as you might be a reluctant accountant, kid’s soccer coach, or lawyer. Or perhaps you generally like your job, but you could do without a few of its attendant responsibilities. Where does that thinking get you? Nowhere, other than in a negative state of mind.

  321: {

    title: `HOPE AND FEAR ARE THE SAME`,
    body: `“Hecato says, ‘cease to hope and you will cease to fear.’ . . . The primary cause of both these ills is that instead of adapting ourselves to present circumstances we send out thoughts too far ahead.”

—SENECA, MORAL LETTERS, 5.7b–8

Hope is generally regarded as good. Fear is generally regarded as bad. To a Stoic like Hecato (known as Hecato of Rhodes), they are the same—both are projections into the future about things we do not control. Both are the enemy of this present moment that you are actually in. Both mean you’re living a life in opposition to *amor fati.*

    title: `JUDGE NOT, LEST . . .`,

  323: {
    month: `November`,
    day: 18,
    title: `FOUR HABITS OF THE STOIC MIND`,
    body: `“Our rational nature moves freely forward in its impressions when it:

1) accepts nothing false or uncertain;

2) directs its impulses only to acts for the common good;

3) limits its desires and aversions only to what’s in its own power;

4) embraces everything nature assigns it.”

—MARCUS AURELIUS, MEDITATIONS, 8.7

If you notice, Marcus repeatedly reminds himself what Stoicism is. These bullet points are helpful to those of us reading thousands of years later, but really they were intended to be helpful to him. Maybe that day he had accepted a bad impression or had acted selfishly. Maybe he had pinned his hopes on something outside his control or complained and fought against something that had happened. Or maybe it had just been awhile since he’d thought about these things and wanted a reminder.

Whatever his case was, or whatever ours is today, let’s align our minds along these four critical habits:

    body: `“For any challenge we should hold three thoughts at our command:

  325: {
    month: `November`,
    day: 20,
    title: `BEHOLD, NOW AS EVER`,
    body: `“If you’ve seen the present, you’ve seen all things, from time immemorial into all of eternity. For everything that happens is related and the same.”

—MARCUS AURELIUS, MEDITATIONS, 6.37

The events that will transpire today are the same as the things that have always occurred. People living and dying, animals living and dying, clouds rolling in and rolling out, air sucked in and sucked out, as it has for aeons. This moment right now, to paraphrase Emerson, is a quotation of the moments that have come before and will come ever after.

  326: {
    month: `November`,
    day: 21,
    title: `ONCE IS ENOUGH, ONCE IS FOREVER`,
    body: `“A good isn’t increased by the addition of time, but if one is wise for even a moment, they will be no less happy than the person who exercises virtue for all time and happily passes their life in it.”

—CHRYSIPPUS QUOTED BY PLUTARCH IN MORALIA: “AGAINST THE STOICS ON COMMON CONCEPTIONS,” 1062 (LOEB, P. 682)

Perhaps wisdom and happiness are like winning a medal in the Olympics. It doesn’t matter whether you won a hundred years ago or ten minutes ago, or whether you won just once or in multiple events. It doesn’t matter whether someone beats your time or score down the road, and it doesn’t matter whether you never compete again. You’ll always be a medalist, and you’ll always know what it feels like. No one can take that away—and it would be impossible to feel *more* of that feeling.

The Juilliard-trained actor Evan Handler, who not only survived acute myeloid leukemia but also severe depression, has talked about his decision to take antidepressants, which he did for a deliberately brief time. He took them because he wanted to know what true, normal happiness felt like. Once he did, he knew he would stop. He could go back to the struggle like everyone else. He had the ideal for a moment and that was enough.

Perhaps today will be the day when we experience happiness or wisdom. Don’t try to grab that moment and hold on to it with all your might. It’s not under your control how long it lasts. Enjoy it, recognize it, remember it. Having it for a moment is the same as having it forever.`,

  327: {
    month: `November`,
    day: 22,
    title: `THE GLASS IS ALREADY BROKEN`,
    body: `“Fortune falls heavily on those for whom she’s unexpected. The one always on the lookout easily endures.”

—SENECA, ON CONSOLATION TO HELVIA, 5.3

There is a story of a Zen master who had a beautiful prized cup. The master would repeat to himself, “The glass is already broken.” He enjoyed the cup. He used it. He showed it off to visitors. But in his mind, it was already broken. And so one day, when it actually did break, he simply said, “Of course.”

This is how the Stoics think too. There is supposedly a true story about Epictetus and a lamp. He never locked his house, and so his expensive lamp was stolen. When Epictetus replaced it, he replaced it with a cheaper one so he could be less attached to it if it were stolen again.

Devastation—that feeling that we’re absolutely crushed and shocked by an event—is a factor of how unlikely we considered that event in the first place. No one is *wrecked* by the fact that it’s snowing in the winter, because we’ve accepted (and even anticipated) this turn of events. What about the occurrences that surprise us? We might not be so shocked if we took the time to consider their possibility.`,

  328: {

    title: `ATTACHMENTS ARE THE ENEMY`,
    body: `“In short, you must remember this—that if you hold anything dear outside of your own reasoned choice, you will have destroyed your capacity for choice.”

—EPICTETUS, DISCOURSES, 4.4.23

According to Anthony de Mello, “there is one thing and only one thing that causes unhappiness. The name of that thing is Attachment.” Attachments to an image you have of a person, attachments to wealth and status, attachments to a certain place or time, attachments to a job or to a lifestyle. All of those things are dangerous for one reason: they are outside of our reasoned choice. How long we keep them is not in our control.

As Epictetus realized some two thousand years before de Mello, our attachments are what make it so hard to accept change. Once we have them, we don’t want to let go. We become slaves to maintaining the status quo. We are like the Red Queen in *Alice in Wonderland*—running faster and faster to stay in the same place.

    title: `TRAIN TO LET GO OF WHAT’S NOT YOURS`,
    body: `“Whenever you experience the pangs of losing something, don’t treat it like a part of yourself but as a breakable glass, so when it falls you will remember that and won’t be troubled. So too, whenever you kiss your child, sibling, or friend, don’t layer on top of the experience all the things you might wish, but hold them back and stop them, just as those who ride behind triumphant generals remind them they are mortal. In the same way, remind yourself that your precious one isn’t one of your possessions, but something given for now, not forever . . .”

  330: {

    title: `FUNNY HOW THAT WORKS OUT`,
    body: `“As for me, I would choose being sick over living in luxury, for being sick only harms the body, whereas luxury destroys both the body and the soul, causing weakness and incapacity in the body, and lack of control and cowardice in the soul. What’s more, luxury breeds injustice because it also breeds greediness.”

  331: {
    month: `November`,

    title: `THE ALTAR OF NO DIFFERENCE`,
    body: `“We are like many pellets of incense falling on the same altar. Some collapse sooner, others later, but it makes no difference.”

—MARCUS AURELIUS, MEDITATIONS, 4.15

What’s the difference between you and the richest person in the world? One has a little more money than the other. What’s the difference between you and the oldest person in the world? One has been around a little longer than the other. Same goes for the tallest, smartest, fastest, and on down the line.

  332: {
    month: `November`,
    day: 27,
    title: `THE PLEASURE OF TUNING OUT THE NEGATIVE`,
    body: `“How satisfying it is to dismiss and block out any upsetting or foreign impression, and immediately to have peace in all things.”

—MARCUS AURELIUS, MEDITATIONS, 5.2

The Stoics were mercifully spared the information overload endemic to today’s society. They had no social media, no newspapers, no television chatter to rile them up. But even back then, an undisciplined person would have found plenty to be distracted and upset by.

Part of the Stoic mindset then was a sort of a cultivated ignorance. Publilius Syrus’s epigram expresses it well: “Always shun that which makes you angry.” Meaning: turn your mind away from the things that provoke it. If you find that discussing politics at the dinner table leads to fighting, why do you keep bringing it up? If your sibling’s life choices bother you, why don’t you stop picking at them and making them your concern? The same goes for so many other sources of aggravation.

  333: {

  335: {
    month: `November`,
    day: 30,
    title: `FOLLOW THE LOGOS`,
    body: `“The person who follows reason in all things will have both leisure and a readiness to act—they are at once both cheerful and self-composed.”

—MARCUS AURELIUS, MEDITATIONS, 10.12b

The guiding reason of the world—the Stoics called this the *logos*—works in mysterious ways. Sometimes, the *logos* gives us what we want, other times it gives us precisely what we do not want. In either case, they believed that the *logos* was an all-powerful force that governed the universe.

There is a helpful analogy to explain the *logos*: We are like a dog leashed to a moving cart. The direction of the cart will determine where we go. Depending on the length of the leash, we also have a fair amount of room to explore and determine the pace, but ultimately what each of us must choose is whether we will go willingly or be painfully dragged. Which will it be?

  336: {
    month: `December`,
    day: 1,
    title: `PRETEND TODAY IS THE END`,
    body: `“Let us prepare our minds as if we’d come to the very end of life. Let us postpone nothing. Let us balance life’s books each day. . . . The one who puts the finishing touches on their life each day is never short of time.”

—SENECA, MORAL LETTERS, 101.7b–8a

“Live each day as if it were your last” is a cliché. Plenty say it, few actually do it. How reasonable would that be anyway? Surely Seneca isn’t saying to forsake laws and considerations—to find some orgy to join because the world is ending.

A better analogy would be a soldier about to leave on deployment. Not knowing whether they’ll return or not, what do they do?

They get their affairs in order. They handle their business. They tell their children or their family that they love them. They don’t have time for quarreling or petty matters. And then in the morning they are ready to go—hoping to come back in one piece but prepared for the possibility that they might not.

  337: {

    title: `DON’T MIND ME, I’M ONLY DYING SLOW`,
    body: `“Let each thing you would do, say or intend be like that of a dying person.”

Have you ever heard some ask: “What would you do if you found out tomorrow that you had cancer?” The question is designed to make you consider how different life might be if you were suddenly given just a few months or weeks to live. There’s nothing like a terminal illness to wake people up.

  338: {
    month: `December`,
    day: 3,
    title: `THE PHILOSOPHER AS AN ARTISAN OF LIFE AND DEATH`,
    body: `“Philosophy does not claim to get a person any external possession. To do so would be beyond its field. As wood is to the carpenter, bronze to the sculptor, so our own lives are the proper material in the art of living.”

—EPICTETUS, DISCOURSES, 1.15.2

Philosophy is not some idle pursuit appropriate only for academics or the rich. Instead, it is one of the most essential activities that a human being can engage in. Its purpose, as Henry David Thoreau said a few thousand years after Epictetus, is to help us “solve the problems of life, not only theoretically but practically.” This aligns nicely with Cicero’s famous line: “*To philosophize is to learn how to die*.”

You’re not reading these quotes and doing these thought exercises for fun. Though they may be enjoyable and help you lighten up, their aim is to help you sculpt and improve your life. And because all of us have but one life and one death, we should treat each experience like a sculptor with his chisels, carving until, to paraphrase Michelangelo, we set free the angel in the marble.

  339: {
    month: `December`,
    day: 4,
    title: `YOU DON’T OWN THAT`,
    body: `“Anything that can be prevented, taken away, or coerced is not a person’s own—but those things that can’t be blocked are their own.”

—EPICTETUS, DISCOURSES, 3.24.3

The conservationist Daniel O’Brien has said that he doesn’t “own” his several-thousand-acre buffalo ranch in South Dakota, he just lives there while the bank lets him make mortgage payments on it. It’s a joke about the economic realities of ranching, but it also hints at the idea that land doesn’t belong to one individual, that it will far outlast us and our descendants. Marcus Aurelius used to say that we don’t own anything and that even our lives are held in trust.

We may claw and fight and work to own things, but those things can be taken away in a second. The same goes for other things we like to think are “ours” but are equally precarious: our status, our physical health or strength, our relationships. How can these really be ours if something other than us—fate, bad luck, death, and so on—can dispossess us of them without notice?

  340: {
    month: `December`,
    day: 5,
    title: `THE BENEFITS OF SOBERING THOUGHTS`,
    body: `“Keep death and exile before your eyes each day, along with everything that seems terrible—by doing so, you’ll never have a base thought nor will you have excessive desire.”

—EPICTETUS, ENCHIRIDION, 21

  341: {
    month: `December`,
    day: 6,
    title: `THE SWORD DANGLES OVER YOU`,
    body: `“Don’t behave as if you are destined to live forever. What’s fated hangs over you. As long as you live and while you can, become good now.”

—MARCUS AURELIUS, MEDITATIONS, 4.17

There is an ancient story of a courtier who had made light of the responsibilities of his king. To prove he was mistaken, the king arranged to switch places with the courtier so he could experience what it was like to be a king. The king made one other adjustment: he hung a sword by a hair over the throne to illustrate the peril and burden of kingship as well as the constant fear of assassination. We call that dangling reminder of death and difficulty the Sword of Damocles.

The reality is that a similar sword hangs over all of us—life can be taken from us at any moment. And that threat can send us in one of two directions: we can fear and dread it, or we can use it to motivate us. To do good, to be good. Because the sword is dangling, and there’s nothing else to be concerned with. Would you rather it catch you in the middle of some shameful, selfish act? Would you rather it catch you *waiting* to be good in the future?`,

  342: {
    month: `December`,
    day: 7,
    title: `THE CARDS WE’RE DEALT`,
    body: `“Think of the life you have lived until now as over and, as a dead man, see what’s left as a bonus and live it according to Nature. Love the hand that fate deals you and play it as your own, for what could be more fitting?”

—MARCUS AURELIUS, MEDITATIONS, 7.56–57

We have an irrational fear of acknowledging our own mortality. We avoid thinking about it because we think it will be depressing. In fact, reflecting on mortality often has the opposite effect—invigorating us more than saddening us. Why? Because it gives us clarity.

If you were suddenly told you had but a week to live, what changes would you make? If you died but were resuscitated, how different would your perspective be?

When, as Shakespeare’s Prospero puts it, “every third thought shall be my grave,” there’s no risk of getting caught up in petty matters or distractions. Instead of denying our fear of death, let’s let it make us the best people we can be.

  343: {
    month: `December`,
    day: 8,
    title: `DON’T HIDE FROM YOUR FEELINGS`,
    body: `“It’s better to conquer grief than to deceive it.”

—SENECA, ON CONSOLATION TO HELVIA, 17.1b

We’ve all lost people we were close to—a friend, a colleague, a parent, a grandparent. While we were suffering from our grief, some well-meaning person did their best to take our mind off it or make us think about something else for a couple hours. However kind, these gestures are misguided.

The Stoics are stereotyped as suppressing their emotions, but their philosophy was actually intended to teach us to face, process, and deal with emotions *immediately* instead of running from them. Tempting as it is to deceive yourself or hide from a powerful emotion like grief—by telling yourself and other people that you’re fine—awareness and understanding are better. Distraction might be pleasant in the short term—by going to gladiatorial games, as a Roman might have done, for example. Focusing is better in the long term.

That means facing it now. Process and parse what you are feeling. Remove your expectations, your entitlements, your sense of having been wronged. Find the positive in the situation, but also sit with your pain and accept it, remembering that it is a part of life. That’s how one conquers grief.`,

  344: {
    month: `December`,
    day: 9,
    title: `SPENDTHRIFTS OF TIME`,
    body: `“Were all the geniuses of history to focus on this single theme, they could never fully express their bafflement at the darkness of the human mind. No person would give up even an inch of their estate, and the slightest dispute with a neighbor can mean hell to pay; yet we easily let others encroach on our lives—worse, we often pave the way for those who will take it over. No person hands out their money to passersby, but to how many do each of us hand out our lives! We’re tight-fisted with property and money, yet think too little of wasting time, the one thing about which we should all be the toughest misers.”

—SENECA, ON THE BREVITY OF LIFE, 3.1–2

Today there will be endless interruptions: phone calls, emails, visitors, unexpected events. Booker T. Washington observed that “the number of people who stand ready to consume one’s time, to no purpose, is almost countless.”

A philosopher, on the other hand, knows that their default state should be one of reflection and inner awareness. This is why they so diligently protect their personal space and thoughts from the intrusions of the world. They know that a few minutes of contemplation are worth more than any meeting or report. They also know how little time we’re actually given in life—and how quickly our stores can be depleted.

Seneca reminds us that while we might be good at protecting our physical property, we are far too lax at enforcing our mental boundaries. Property can be regained; there is quite a bit of it out there—some of it still untouched by man. But time? Time is our most irreplaceable asset—we cannot buy more of it. We can only strive to waste as little as possible.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  345: {
    month: `December`,
    day: 10,
    title: `DON’T SELL YOURSELF TOO CHEAPLY`,
    body: `“I say, let no one rob me of a single day who isn’t going to make a full return on the loss.”

—SENECA, ON TRANQUILITY OF MIND, 1.11b

People spend a lot more money when they use credit cards than when they have to pull out actual cash. If you ever wondered why credit card companies and banks push cards so aggressively, this is why. The more credit cards you have, the more you’ll spend.

Do we treat the days of our lives like we treat our money? Because we don’t exactly know how many days we’ll be alive, and because we try our hardest *not* to think about the fact that someday we’ll die, we’re pretty liberal with how freely we spend our time. We let people and obligations impose on that time, only rarely asking: *What am I getting in return here?*

Seneca’s maxim is the equivalent of cutting up your credit cards and switching to cash. He says to put real thought into every transaction: *Am I getting my money’s worth here? Is this a fair trade?*`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  346: {
    month: `December`,
    day: 11,
    title: `DIGNITY AND BRAVERY`,
    body: `“As Cicero says, we hate gladiators if they are quick to save their lives by any means; we favor them if they show contempt for their lives.”

—SENECA, ON TRANQUILITY OF MIND, 11.4b

Lyndon Johnson’s college classmates used to tell an embarrassing story about him. Johnson apparently had a big mouth and felt he had to constantly dominate and intimidate others. Yet his biographer, Robert Caro, makes it clear that when someone stood up to young Lyndon, he proved himself to be a complete coward. In one instance, during an argument over a poker game, instead of fighting, Johnson threw himself on a bed and “began kicking his feet in the air with a frantic, windmilling motion . . . like a girl.” He shouted, “If you hit me, I’ll kick you! If you hit me, I’ll kick you!”

Later in his life, Johnson also worked extremely hard to avoid serving in World War II and lived it up in California while other soldiers fought and died abroad. He later claimed to be a war hero. It was one of his most shameful lies.

We do not need to disregard our physical safety or engage in wanton acts of violence to be brave. But nobody respects a coward. Nobody likes a shirker of duty. Nobody admires a person who puts too high a price on their own comfort and needs.

That’s the irony of cowardice. It’s aimed at self-protection, but it creates shameful secrets. Self-preservation is hardly worth it because of everything it costs in return.

Be brave. Be dignified.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  347: {
    month: `December`,
    day: 12,
    title: `THE BEAT GOES ON`,
    body: `“Walk the long gallery of the past, of empires and kingdoms succeeding each other without number. And you can also see the future, for surely it will be exactly the same, unable to deviate from the present rhythm. It’s all one whether we’ve experienced forty years or an aeon. What more is there to see?”

—MARCUS AURELIUS, MEDITATIONS, 7.49

All things die. Not just people but companies, kingdoms, religions, and ideas—eventually. The Roman Republic lasted 450 years. The Roman Empire, of which Marcus Aurelius was considered to be one of the “five good emperors,” lasted 500 years. The longest recorded life of a human being is 122 years. The average life expectancy in the United States is a little over seventy-eight years. In other countries, in other eras, it has been more and it has been less. But in the end, we all succumb, as Marcus said, to the rhythm of events—of which there is always a final, determined beat. There is no need to dwell on this fact, but there is no point in ignoring it either.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  348: {
    month: `December`,
    day: 13,
    title: `IT’S JUST A NUMBER`,
    body: `“You aren’t bothered, are you, because you weigh a certain amount and not twice as much? So why get worked up that you’ve been given a certain lifespan and not more? Just as you are satisfied with your normal weight, so you should be with the time you’ve been given.”

—MARCUS AURELIUS, MEDITATIONS, 6.49

They say age is just a number, but to some people it’s a very important one—otherwise, women wouldn’t lie about being younger, and ambitious young men wouldn’t lie about being older. Rich people and health nuts spend billions of dollars in an effort to move the expiration date from around seventy-eight years to hopefully *forever*.

The number of years we manage to eke out doesn’t matter, only what those years are composed of. Seneca put it best when he said, “Life is long if you know how to use it.” Sadly, most people don’t—they waste the life they’ve been given. Only when it is too late do they try to compensate for that waste by vainly hoping to put more time on the clock.

Use today. Use every day. Make yourself satisfied with what you have been given.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  349: {
    month: `December`,
    day: 14,
    title: `WHAT WE SHOULD KNOW BY THE END`,
    body: `“Soon you will die, and still you aren’t sincere, undisturbed, or free from suspicion that external things can harm you, nor are you gracious to all, knowing that wisdom and acting justly are one and the same.”

—MARCUS AURELIUS, MEDITATIONS, 4.37

From what we understand, Marcus wrote many of his meditations later in life, when he was suffering from serious illnesses. So when he says, “Soon you will die,” he was speaking frankly to himself about his own mortality. How scary that must have been. He was staring at the real possibility of death and not liking what he saw in these last minutes.

Sure, he’d accomplished many things in his life, but his emotions were still the cause of discomfort, pain, and frustration. He knew that with his limited time left, better choices would provide relief.

Hopefully, you have a lot more time left—but that makes it even more important to make headway while you still can. We are unfinished products up until the end, as Marcus knew very well. But the earlier we learn it, the more we can enjoy the fruits of the labor on our character—and the sooner we can be free (or *freer*) of insincerity, anxiety, ungraciousness, and un-Stoic-ness.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  350: {
    month: `December`,
    day: 15,
    title: `A SIMPLE WAY TO MEASURE OUR DAYS`,
    body: `“This is the mark of perfection of character—to spend each day as if it were your last, without frenzy, laziness, or any pretending.”

—MARCUS AURELIUS, MEDITATIONS, 7.69

The Stoics didn’t think that anyone could be perfect. The idea of becoming a sage—the highest aspiration of a philosopher—wasn’t realistic. This was just their Platonic ideal.

Still, they started every day hoping to get a little closer to that mark. There was much to gain in the trying. Can you actually live today like it is your last day? Is it even possible to embody completeness or perfection in our *ethos* (character), effortlessly doing the right thing for a full twenty-four hours? Is it possible for more than a minute?

Maybe not. But if trying was enough for the Stoics, it should be enough for us too.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  351: {
    month: `December`,
    day: 16,
    title: `EVERLASTING GOOD HEALTH`,
    body: `“I tell you, you only have to learn to live like the healthy person does . . . living with complete confidence. What confidence? The only one worth holding, in what is trustworthy, unhindered, and can’t be taken away—your own reasoned choice.”

—EPICTETUS, DISCOURSES, 3.26.23b–24

As the Stoics say repeatedly, it’s dangerous to have faith in what you do not control. But your own reasoned choice? Well, for now that *is* in your control. Therefore it is one of the few things you can have confidence in. It’s the one area of health that can’t suddenly be given a terminal diagnosis (except for the one we all get the day we’re born). It’s the only one that remains pristine and never wears down—it’s only the user who quits it; never will it quit the user.

In this passage, Epictetus points out that slaves and workers and philosophers alike can live this way. Socrates, Diogenes, and Cleanthes lived this way—even while they had families and while they were struggling students.

And so can you.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  352: {
    month: `December`,
    day: 17,
    title: `KNOW THYSELF—BEFORE IT’S TOO LATE`,
    body: `“Death lies heavy upon one

who, known exceedingly well by all,

dies unknown to himself.”

—SENECA, THYESTES, 400

Some of the most powerful and important people in the world seem to have almost no self-awareness. Although total strangers know endless amounts of trivia about them, celebrities—because they are too busy or because it hurts too much—appear to know very little about themselves.

We can be guilty of the same sin. We ignore Socrates’s dictum to “know thyself”—often realizing we have done so at our peril, years later, when we wake up one day and realize how rarely we have asked ourselves questions like: *Who am I? What’s important to me? What do I like? What do I* *need?*

Now—right now—you have the time to explore yourself, to understand your own mind and body. Don’t wait. Know yourself. Before it’s impossibly late.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  353: {
    month: `December`,
    day: 18,
    title: `WHAT COMES TO US ALL`,
    body: `“Both Alexander the Great and his mule-keeper were both brought to the same place by death—they were either received into the all-generative reason, or scattered among the atoms.”

—MARCUS AURELIUS, MEDITATIONS, 6.24

In a world that is in many ways becoming more and more unequal, there aren’t many truly equalitarian experiences left. When Benjamin Franklin observed that “in this world nothing can be said to be certain, except death and taxes,” he couldn’t have known how good some people would get at avoiding their taxes. But death? That’s still the one thing that everyone experiences.

We all face the same end. Whether you conquer the known world or shine the shoes of the people who do, at the end death will be a radical equalizer—a lesson in abject humility. Shakespeare had Hamlet trace out the logic in stark terms for both Alexander and Julius Caesar:

“Imperious Caesar, dead and turn’d to clay,

Might stop a hole to keep the wind away:

O, that that earth, which kept the world in awe,

Should patch a wall to expel the winter flaw!”

The next time you feel yourself getting high and mighty—or conversely, feeling low and inferior—just remember, we all end up the same way. In death, no one is better, no one is worse. All our stories have the same finale.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  354: {
    month: `December`,
    day: 19,
    title: `HUMAN SCALE`,
    body: `“Think of the whole universe of matter and how small your share. Think about the expanse of time and how brief—almost momentary—the part marked for you. Think of the workings of fate and how infinitesimal your role.”

—MARCUS AURELIUS, MEDITATIONS, 5.24

The amount of matter in the universe is immense—on the order of trillions of atoms. What percentage of that matter does one human body constitute?

The earth, as far as science tells us, is some 4.5 billion years old and shows no sign of ending soon. Our time on the earth, on the other hand, will be what? Several decades, maybe?

Sometimes we need to have the facts and figures spelled out in front of us to fully realize the scale at which humans happen to exist in the big scheme of things.

Consider this the next time you feel self-important, or like everything rises and falls on what you do next. It doesn’t. You’re just one person among many, doing your best among many. That’s all you need to do.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  355: {
    month: `December`,
    day: 20,
    title: `FEAR THE FEAR OF DEATH`,
    body: `“Do you then ponder how the supreme of human evils, the surest mark of the base and cowardly, is not death, but the fear of death? I urge you to discipline yourself against such fear, direct all your thinking, exercises, and reading this way—and you will know the only path to human freedom.”

—EPICTETUS, DISCOURSES, 3.26.38–39

To steel himself before he committed suicide rather than submit to Julius Caesar’s destruction of the Roman Republic, the great Stoic philosopher Cato read a bit of Plato’s *Phaedo*. In it, Plato writes, “It is the child within us that trembles before death.” Death is scary because it is such an unknown. No one can come back and tell us what it is like. We are in the dark about it.

As childlike and ultimately ignorant as we are about death, there are plenty of wise men and women who can at least provide some guidance. There’s a reason that the world’s oldest people never seem to be afraid of death: they’ve had more time to think about it than we have (and they realized how pointless worrying was). There are other wonderful resources: Florida Scott-Maxwell’s Stoic diary during her terminal illness, *The* *Measure of My Days*, is one. Seneca’s famous words to his family and friends, who had broken down and begged with his executioners, is another. “Where,” Seneca gently chided them, “are your maxims of philosophy, or the preparation of so many years’ study against evils to come?” Throughout philosophy there are inspiring, brave words from brave men and women who can help us face this fear.

There is another helpful consideration about death from the Stoics. If death is truly the end, then what is there exactly to fear? For everything from your fears to your pain receptors to your worries and your remaining wishes, they will perish with you. As frightening as death might seem, remember: it contains within it the end of fear.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  356: {
    month: `December`,
    day: 21,
    title: `WHAT DO YOU HAVE TO SHOW FOR YOUR YEARS?`,
    body: `“Many times an old man has no other evidence besides his age to prove he has lived a long time.”

—SENECA, ON TRANQUILITY OF MIND, 3.8b

How long have you been alive? Take the years, multiply them by 365, and then by 24. How many hours have you lived? What do you have to show for all of them?

The answer for many people is: not enough. We had so many hours that we took them for granted. All we have to show for our time on this planet are rounds of golf, years spent at the office, time spent watching mediocre movies, a stack of mindless books we hardly remember reading, and maybe a garage full of toys. We’re like the character in Raymond Chandler’s *The Long Goodbye*: “Mostly, I just kill time,” he says, “and it dies hard.”

One day, our hours will begin to run out. It would be nice to be able to say: “Hey, I really made the most of it.” Not in the form of achievements, not money, not status—you know what the Stoics think of all that—but in wisdom, insight, and real progress in the things that all humans struggle against.

What if you could say that you really made something of this time that you had? What if you could prove that you really did live [insert number] years? And not just lived them, but lived them* fully*?`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  357: {
    month: `December`,
    day: 22,
    title: `STAKE YOUR OWN CLAIM`,
    body: `“For it’s disgraceful for an old person, or one in sight of old age, to have only the knowledge carried in their notebooks. Zeno said this . . . what do you say? Cleanthes said that . . . what do you say? How long will you be compelled by the claims of another? Take charge and stake your own claim—something posterity will carry in its notebook.”

—SENECA, MORAL LETTERS, 33.7

Musing in his notebook about the topic of immortality, Ralph Waldo Emerson complained how writers dance around a difficult topic by relying on quotes. “I hate quotation,” he wrote. “Tell me what you know.”

Seneca was throwing down the same gauntlet some twenty centuries before. It’s easier to quote, to rely on the wise words of others. Especially when the people you’re deferring to are such towering figures!

It’s harder (and more intimidating) to venture out on your own and express your own thoughts. But how do you think those wise and true quotes from those towering figures were created in the first place?

Your own experiences have value. You have accumulated your own wisdom too. Stake your claim. Put something down for the ages—in words and also in example.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  358: {
    month: `December`,
    day: 23,
    title: `WHAT ARE YOU SO AFRAID OF LOSING?`,
    body: `“You are afraid of dying. But, come now, how is this life of yours anything but death?”

—SENECA, MORAL LETTERS, 77.18

Seneca tells an amazing story about an obscenely wealthy Roman who was carried around by slaves on a litter. On one occasion, after being lifted out of a bath, the Roman asked, “Am I sitting down yet?” Seneca’s point was essentially: What kind of sad pathetic life is it if you’re so disconnected from the world that you don’t even know whether you’re on the ground? How did the man know whether he was even *alive* at all?

Most of us are afraid of dying. But sometimes this fear begs the question: To protect what exactly? For a lot of people the answer is: hours of television, gossiping, gorging, wasting potential, reporting to a boring job, and on and on and on. Except, in the strictest sense, is this actually a life? Is this worth gripping so tightly and being afraid of losing?

It doesn’t sound like it.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  359: {
    month: `December`,
    day: 24,
    title: `MEANINGLESS . . . LIKE A FINE WINE`,
    body: `“You know what wine and liqueur tastes like. It makes no difference whether a hundred or a thousand bottles pass through your bladder—you are nothing more than a filter.”

—SENECA, MORAL LETTERS, 77.16

Here we have another contemptuous expression, this time from Seneca, who, given his reputation for opulence, probably enjoyed a nice drink from time to time. His point will probably rattle anyone for whom success and adulthood has turned them into a wine snob (though the logic can be applied just as easily to foodies, techies, audiophiles, and the like).

As fun and exciting and pleasurable as these pleasures are, it’s worth putting them in their place. You don’t get a prize at the end of your life for having consumed more, worked more, spent more, collected more, or learned more about the various vintages than everyone else. You are just a conduit, a vessel that temporarily held or interacted with these fancy items.

  360: {
    month: `December`,
    day: 25,
    title: `DON’T BURN THE CANDLE AT BOTH ENDS`,
    body: `“The mind must be given relaxation—it will rise improved and sharper after a good break. Just as rich fields must not be forced—for they will quickly lose their fertility if never given a break—so constant work on the anvil will fracture the force of the mind. But it regains its powers if it is set free and relaxed for a while. Constant work gives rise to a certain kind of dullness and feebleness in the rational soul.”

—SENECA, ON TRANQUILITY OF MIND, 17.5

One can’t read Marcus Aurelius and Seneca and not be struck by the difference between these two radically different personalities. Each had his own strengths and weaknesses. Which would you rather have entrusted with the immense responsibility of an empire? Probably Marcus. But who would you rather be as a person? Probably Seneca.

One of the reasons is that Seneca seems to have had what we would now refer to as work/life balance. Whereas Marcus can read as though he’s worn down and tired, Seneca always feels energetic, fresh, robust. His philosophy of rest and relaxation—intermixed with his rigorous study and other Stoic rituals—probably had a lot to do with it.

The mind is a muscle, and like the rest, it can be strained, overworked, even injured. Our physical health is also worn down by overcommitment, a lack of rest, and bad habits. Remember the tall tale about John Henry—the man who challenged the machine? He died of exhaustion at the end. Don’t forget that.

Today, you may face things that try your patience, require considerable focus or clarity, or demand creative breakthroughs. Life is a long haul—it will mean many such moments. Are you going to be able to handle them if you’ve burned the candle at both ends? If you’ve been abusing and overworking your body?`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  361: {
    month: `December`,
    day: 26,
    title: `LIFE IS LONG—IF YOU KNOW HOW TO USE IT`,
    body: `“It’s not at all that we have too short a time to live, but that we squander a great deal of it. Life is long enough, and it’s given in sufficient measure to do many great things if we spend it well. But when it’s poured down the drain of luxury and neglect, when it’s employed to no good end, we’re finally driven to see that it has passed by before we even recognized it passing. And so it is—we don’t receive a short life, we make it so.”

—SENECA, ON THE BREVITY OF LIFE, 1.3–4a

No one knows how long they have to live, but sadly, we can be sure of one thing: we’ll waste far too much of life. Waste it sitting around, waste it chasing the wrong things, waste it by refusing to take the time to ask ourselves what’s actually important to us. Far too often, we’re like the overconfident academics that Petrarch criticized in his classic essay on ignorance—the types who “fritter away their powers incessantly in caring for things outside of them and seek themselves there.” Yet they have no idea this is what they’re doing.

So today, if you find yourself rushed or uttering the words “I just don’t have enough time,” stop and take a second. Is this actually true? Or have you just committed to a lot of unnecessary things? Are you actually being efficient, or have you assumed a great deal of waste into your life? The average American spends something like forty hours a year in traffic. That’s *months* over the course of a life. And for “traffic,” you can substitute so many activities—from fighting with others to watching television to daydreaming.

Your life is plenty long—just use it properly.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  362: {
    month: `December`,
    day: 27,
    title: `DON’T LET YOUR SOUL GO FIRST`,
    body: `“It’s a disgrace in this life when the soul surrenders first while the body refuses to.”

—MARCUS AURELIUS, MEDITATIONS, 6.29

Despite his privileges, Marcus Aurelius had a difficult life. The Roman historian Cassius Dio mused that Marcus “did not meet with the good fortune that he deserved, for he was not strong in body and was involved in a multitude of troubles throughout practically his entire reign.” At one point, he was so sick that a rumor spread that he had died—and matters were made worse when his most trusted general used it as an opportunity to declare himself the new emperor.

But throughout these struggles—the years at war, the crippling illnesses, his troubled son—he never gave up. It’s an inspiring example for us to think about today if we get tired, frustrated, or have to deal with some crisis. Here was a guy who had every reason to be angry and bitter, who could have abandoned his principles and lived in luxury or ease, who could have put his responsibilities aside and focused on his own health.

But he never did. His soul stayed strong even after his body became weak. He didn’t give up, right up to the second until his body finally did—when he died near Vienna in 180 AD.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,

  363: {
    month: `December`,
    day: 28,
    title: `ON BEING REMEMBERED`,
    body: `“Everything lasts for a day, the one who remembers and the remembered.”

—MARCUS AURELIUS, MEDITATIONS, 4.35

Take a walk down Forty-first Street toward the beautiful New York City Public Library, with its majestic stone lions. On your way up “Library Way,” you’ll pass a gold placard laid into the cement, part of a series of quotations from great writers throughout history. This one is from Marcus Aurelius: “Everything is only for a day, both that which remembers and that which is remembered.”

The library itself was designed by the firm of John Merven Carrère, one of the twentieth century’s most accomplished architects. It combines the collections of such luminaries and philanthropists as Samuel Tilden, John Jacob Astor, and James Lenox, and their names are carved into the stone. Today, the naming rights go to hedge fund manager Stephen A. Schwarzman. The opening of the library in 1911 was attended by President William Howard Taft, Governor John Alden Dix, and New York City mayor William Jay Gaynor. The plaques you pass on your way were designed by the excellent Gregg LeFevre.

Marcus’s quote makes us ponder: How many of these people have we even heard of? The people involved in the story of the library were some of the most famous men in the world, masters of their respective crafts, rich beyond imagination in some cases. Even along “Library Way,” many of the famous authors are unfamiliar to the modern reader. They are all long gone, as are the people who remembered them.

All of us, including Marcus—who is passed over by just as many unaware pedestrians—last for just a day, at most.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  364: {
    month: `December`,
    day: 29,
    title: `GIVE THANKS`,
    body: `“In all things we should try to make ourselves be as grateful as possible. For gratitude is a good thing for ourselves, in a manner in which justice, commonly held to belong to others, is not. Gratitude pays itself back in large measure.”

—SENECA, MORAL LETTERS, 81.19

Think of all the things you can be grateful for today. That you are alive, that you live in a time primarily of peace, that you have enough health and leisure to read this book. What of the little things? The person who smiled at you, the woman who held the door open, that song you like on the radio, the pleasant weather.

Gratitude is infectious. Its positivity is radiant.

Even if today was your last day on earth—if you knew in advance that it was going to end in a few short hours—would there still be plenty to be grateful for? How much better would your life be if you kicked off every day like that? If you let it carry through from morning to night and touch every part of your life?`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  365: {
    month: `December`,
    day: 30,
    title: `TAKING THE BITE OUT OF IT`,
    body: `“To bear trials with a calm mind

robs misfortune of its strength and burden.”

—SENECA, HERCULES OETAEUS, 231–232

The people you admire, the ones who seem to be able to successfully handle and deal with adversity and difficulty, what do they have in common? Their sense of equilibrium, their orderly discipline. On the one-yard line, in the midst of criticism, after a heartbreaking tragedy, during a stressful period, they keep going.

Not because they’re better than you. Not because they’re smarter. But because they have learned a little secret. You can take the bite out of any tough situation by bringing a calm mind to it. By considering it and meditating on it in advance.

And this is true not just for our day-to-day adversities but for the greatest and most unavoidable trial of all: our own eventual death. It could come tomorrow, it could come in forty years. It could be quick and painless, or it could be excruciating. Our greatest asset in that ordeal will not be religion, it will not even be the wise words of the philosophers. It will be, simply, our calm and reasoned mind.`,
    theme: `Meditation on Mortality`,
    discipline: `The Discipline of Will`,
  },
  366: {
    month: `December`,
    day: 31,
    title: `GET ACTIVE IN YOUR OWN RESCUE`,
    body: `“Stop wandering about! You aren’t likely to read your own notebooks, or ancient histories, or the anthologies you’ve collected to enjoy in your old age. Get busy with life’s purpose, toss aside empty hopes, get active in your own rescue—if you care for yourself at all—and do it while you can.”

—MARCUS AURELIUS, MEDITATIONS, 3.14

The purpose of all our reading and studying is to aid us in the pursuit of the good life (and death). At some point, we must put our books aside and take action. So that, as Seneca put it, the “words become works.” There is an old saying that a “scholar made is a soldier spoiled.” We want to be both scholars and soldiers—soldiers in the good fight.

  62: {

    entry: 2,
    title: `Book III, 2`,
    body: `We ought to observe also that even the things which follow after the things which are produced according to nature contain something pleasing and attractive. For instance, when bread is baked some parts are split at the surface, and these parts which thus open, and have a certain fashion contrary to the purpose of the baker’s art, are beautiful in a manner, and in a peculiar way excite a desire for eating. And again, figs, when they are quite ripe, gape open, and in the ripe olives the very circumstance of their being near to rottenness adds a peculiar beauty to the fruit. And the ears of corn bending down, and the lion’s eyebrows, and the foam which flows from the mouth of wild boars, and many other things—though they are far from being beautiful, if a man should examine them severally—still, because they are consequent upon the things which are formed by nature, help to adorn them, and they please the mind; so that if a man should have a feeling and deeper insight with respect to the things which are produced in the universe, there is hardly one of those which follow by way of consequence which will not seem to him to be in a manner disposed so as to give pleasure. And so he will see even the real gaping jaws of wild beasts with no less pleasure than those which painters and sculptors show by imitation; and in an old woman and an old man he will be able to see a certain maturity and comeliness; and the attractive loveliness of young persons he will be able to look on with chaste eyes; and many such things will present themselves, not pleasing to every man, but to him only who has become truly familiar with nature and her works.`,

  64: {

    body: `Do not waste the remainder of thy life in thoughts about others, when thou dost not refer thy thoughts to some object of common utility. For thou losest the opportunity of doing something else when thou hast such thoughts as these. What is such a person doing, and why, and what is he saying, and what is he thinking of, and what is he contriving, and whatever else of the kind makes us wander away from the observation of our own ruling power. We ought then to check in the series of our thoughts everything that is without a purpose and useless, but most of all the overcurious feeling and the malignant; and a man should use himself to think of those things only about which if one should suddenly ask, What hast thou now in thy thoughts? With perfect openness thou mightest immediately answer, This or That; so that from thy words it should be plain that everything in thee is simple and benevolent, and such as befits a social animal, one that cares not for thoughts about pleasure or sensual enjoyments at all, nor has any rivalry or envy and suspicion, or anything else for which thou wouldst blush if thou shouldst say that thou hadst it in thy mind. For the man who is such and no longer delays being among the number of the best, is like a priest and minister of the gods, using too the [deity] which is planted within him, which makes the man uncontaminated by pleasure, unharmed by any pain, untouched by any insult, feeling no wrong, a fighter in the noblest fight, one who cannot be overpowered by any passion, dyed deep with justice, accepting with all his soul everything which happens and is assigned to him as his portion; and not often, nor yet without great necessity and for the general interest, imagining what another says, or does, or thinks. For it is only what belongs to himself that he makes the matter for his activity; and he constantly thinks of that which is allotted to himself out of the sum total of things, and he makes his own acts fair, and he is persuaded that his own portion is good. For the lot which is assigned to each man is carried along with him and carries him along with it. And he remembers also that every rational animal is his kinsman, and that to care for all men is according to man’s nature; and a man should hold on to the opinion not of all but of those only who confessedly live according to nature. But as to those who live not so, he always bears in mind what kind of men they are both at home and from home, both by night and by day, and what they are, and with what men they live an impure life. Accordingly, he does not value at all the praise which comes from such men, since they are not even satisfied with themselves.`,

    body: `To the aids which have been mentioned let this one still be added—Make for thyself a definition or description of the thing which is presented to thee, so as to see distinctly what kind of a thing it is in its substance, in its nudity, in its complete entirety, and tell thyself its proper name, and the names of the things of which it has been compounded, and into which it will be resolved. For nothing is so productive of elevation of mind as to be able to examine methodically and truly every object which is presented to thee in life, and always to look at things so as to see at the same time what kind of universe this is, and what kind of use everything performs in it, and what value everything has with reference to the whole, and what with reference to man, who is a citizen of the highest city, of which all other cities are like families; what each thing is, and of what it is composed, and how long it is the nature of this thing to endure which now makes an impression on me, and what virtue I have need of with respect to it, such as gentleness, manliness, truth, fidelity, simplicity, contentment, and the rest. Wherefore, on every occasion a man should say: This comes from God; and this is according to the apportionment and spinning of the thread of destiny, and suchlike coincidence and chance; and this is from one of the same stock and a kinsman and partner, one who knows not however what is according to his nature. But I know; for this reason I behave toward him according to the natural law of fellowship with benevolence and justice. At the same time however in things indifferent I attempt to ascertain the value of each.`,
