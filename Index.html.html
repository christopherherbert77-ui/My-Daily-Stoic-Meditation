  245: {
    month: `September`,
    day: 1,
    book: `IX`,
    entry: 1,
    title: `Book IX, 1`,
    body: `He who acts unjustly acts impiously. For since the universal nature has made rational animals for the sake of one another to help one another according to their deserts, but in no way to injure one another, he who transgresses her will, is clearly guilty of impiety toward the highest divinity. And he too who lies is guilty of impiety to the same divinity; for the universal nature is the nature of things that are; and things that are have a relation to all things that come into existence. And further, this universal nature is named truth, and is the prime cause of all things that are true. He then who lies intentionally is guilty of impiety inasmuch as he acts unjustly by deceiving; and he also who lies unintentionally, inasmuch as he is at variance with the universal nature, and inasmuch as he disturbs the order by fighting against the nature of the world; for he fights against it, who is moved of himself to that which is contrary to truth, for he had received powers from nature through the neglect of which he is not able now to distinguish falsehood from truth. And indeed he who pursues pleasure as good, and avoids pain as evil, is guilty of impiety. For of necessity such a man must often find fault with the universal nature, alleging that it assigns things to the bad and the good contrary to their deserts, because frequently the bad are in the enjoyment of pleasure and possess the things which procure pleasure, but the good have pain for their share and the things which cause pain. And further, he who is afraid of pain will sometimes also be afraid of some of the things which will happen in the world, and even this is impiety. And he who pursues pleasure will not abstain from injustice, and this is plainly impiety. Now with respect to the things toward which the universal nature is equally affected—for it would not have made both, unless it was equally affected toward both—toward these they who wish to follow nature should be of the same mind with it, and equally affected.

With respect to pain, then, and pleasure, or death and life, or honor and dishonor, which the universal nature employs equally, whoever is not equally affected is manifestly acting impiously. And I say that the universal nature employs them equally, instead of saying that they happen alike to those who are produced in continuous series and to those who come after them by virtue of a certain original movement of Providence, according to which it moved from a certain beginning to this ordering of things, having conceived certain principles of the things which were to be, and having determined powers productive of beings and of changes and of suchlike successions (vii. 75).`,
  },
  246: {
    month: `September`,
    day: 2,
    book: `IX`,
    entry: 2,
    title: `Book IX, 2`,
    body: `It would be a man’s happiest lot to depart from mankind without having had any taste of lying and hypocrisy and luxury and pride. However to breathe out one’s life when a man has had enough of these things is the next best voyage, as the saying is. Hast thou determined to abide with vice, and has not experience yet induced thee to fly from this pestilence? For the destruction of the understanding is a pestilence, much more indeed than any such corruption and change of this atmosphere which surrounds us. For this corruption is a pestilence of animals so far as they are animals; but the other is a pestilence of men so far as they are men.`,
  },
  247: {
    month: `September`,
    day: 3,
    book: `IX`,
    entry: 3,
    title: `Book IX, 3`,
    body: `Do not despise death, but be well content with it, since this too is one of those things which nature wills. For such as it is to be young and to grow old, and to increase and to reach maturity, and to have teeth and beard and gray hairs, and to beget, and to be pregnant, and to bring forth, and all the other natural operations which the seasons of thy life bring, such also is dissolution. This, then, is consistent with the character of a reflecting man, to be neither careless nor impatient nor contemptuous with respect to death, but to wait for it as one of the operations of nature. As thou now waitest for the time when the child shall come out of thy wife’s womb, so be ready for the time when thy soul shall fall out of this envelope.

But if thou requires! Also a vulgar kind of comfort which shall reach thy heart, thou wilt be made best reconciled to death by observing the objects from which thou art going to be removed, and the morals of those with whom thy soul will no longer be mingled. For it is no way right to be offended with men, but it is thy duty to care for them and to bear with them gently; and yet to remember that thy departure will be not from men who have the same principles as thyself. For this is the only thing, if there be any, which could draw us the contrary way and attach us to life, to be permitted to live with those who have the same principles as ourselves. But now thou seest how great is the trouble arising from the discordance of those who live together, so that thou mayst say, Come quick, O death, lest perchance I, too, should forget myself.`,
  },

  252: {

    book: `IX`,
    entry: 8,
    title: `Book IX, 8`,
    body: `Among the animals which have not reason one life is distributed; but among reasonable animals one intelligent soul is distributed: just as there is one earth of all things which are of an earthy nature, and we see by one light, and breathe one air, all of us that have the faculty of vision and all that have life.`,

  253: {
    month: `September`,
    day: 9,
    book: `IX`,
    entry: 9,
    title: `Book IX, 9`,
    body: `All things which participate in anything which is common to them all move toward that which is of the same kind with themselves. Everything which is earthy turns toward the earth, everything which is liquid flows together, and everything which is of an aerial kind does the same, so that they require something to keep them asunder, and the application of force. Fire indeed moves upward on account of the elemental fire, but it is so ready to be kindled together with all the fire which is here, that even every substance which is somewhat dry, is easily ignited, because there is less mingled with it of that which is a hindrance to ignition. Accordingly then everything also which participates in the common intelligent nature moves in like manner toward that which is of the same kind with itself, or moves even more. For so much as it is superior in comparison with all other things, in the same degree also is it more ready to mingle with and to be fused with that which is akin to it. Accordingly among animals devoid of reason we find swarms of bees, and herds of cattle, and the nurture of young birds, and in a manner, loves; for even in animals there are souls, and that power which brings them together is seen to exert itself in the superior degree, and in such a way as never has been observed in plants nor in stones nor in trees. But in rational animals there are political communities and friendships, and families and meetings of people; and in wars, treaties and armistices. But in the things which are still superior, even though they are separated from one another, unity in a manner exists, as in the stars. Thus the ascent to the higher degree is able to produce a sympathy even in things which are separated. See then what now takes place. For only intelligent animals have now forgotten this mutual desire and inclination, and in them alone the property of flowing together is not seen. But still, though men strive to avoid [this union], they are caught and held by it, for their nature is too strong for them; and thou wilt see what I say, if thou only observest. Sooner then will one find anything earthy which comes in contact with no earthy thing than a man altogether separated from other men.`,

    title: `Book IX, 15`,

  263: {

  264: {

  },
  265: {
    month: `September`,
    day: 21,
    book: `IX`,
    entry: 21,
    title: `Book IX, 21`,
    body: `Termination of activity, cessation from movement and opinion, and in a sense their death, is no evil. Turn thy thoughts now to the consideration of thy life, thy life as a child, as a youth, thy manhood, thy old age, for in these also every change was a death. Is this anything to fear? Turn thy thoughts now to thy life under thy grandfather, then to thy life under thy mother, then to thy life under thy father; and as thou findest many other differences and changes and terminations, ask thyself. Is this anything to fear? In like manner, then, neither are the termination and cessation and change of thy whole life a thing to be afraid of.`,
  },
  266: {
    month: `September`,
    day: 22,
    book: `IX`,
    entry: 22,
    title: `Book IX, 22`,
    body: `Hasten [to examine] thy own ruling faculty and that of the universe and that of thy neighbour: thy own, that thou mayst make it just; and that of the universe, that thou mayst remember of what thou art a part; and that of thy neighbour, that thou mayst know whether he has acted ignorantly or with knowledge, and that thou mayst also consider that his ruling faculty is akin to thine.`,
  },
  267: {
    month: `September`,
    day: 23,
    book: `IX`,
    entry: 23,
    title: `Book IX, 23`,
    body: `As thou thyself art a component part of a social system, so let every act of thine be a component part of social life. Whatever act of thine then has no reference, either immediately or remotely, to a social end, this tears asunder thy life, and does not allow it to be one, and it is of the nature of a mutiny, just as when in a popular assembly a man acting by himself stands apart from the general agreement.`,
  },
  268: {
    month: `September`,
    day: 24,
    book: `IX`,
    entry: 24,
    title: `Book IX, 24`,
    body: `Quarrels of little children and their sports, and poor spirits carrying about dead bodies [such is everything]; and so what is exhibited in the representation of the mansions of the dead strikes our eyes more clearly.`,
  },
  269: {
    month: `September`,
    day: 25,
    book: `IX`,
    entry: 25,
    title: `Book IX, 25`,
    body: `Examine into the quality of the form of an object, and detach it altogether from its material part, and then contemplate it; then determine the time, the longest which a thing of this peculiar form is naturally made to endure.`,
  },
  270: {
    month: `September`,
    day: 26,
    book: `IX`,
    entry: 26,
    title: `Book IX, 26`,
    body: `Thou hast endured infinite troubles through not being contented with thy ruling faculty, when it does the things which it is constituted by nature to do. But enough [of this].`,
  },
  271: {
    month: `September`,
    day: 27,
    book: `IX`,
    entry: 27,
    title: `Book IX, 27`,
    body: `When another blames thee or hates thee, or when men say about thee anything injurious, approach their poor souls, penetrate within, and see what kind of men they are. Thou wilt discover that there is no reason to take any trouble that these men may have this or that opinion about thee. However thou must be well-disposed toward them, for by nature they are friends. And the gods too aid them in all ways, by dreams, by signs, toward the attainment of those things on which they set a value.`,
  },
  272: {
    month: `September`,
    day: 28,
    book: `IX`,
    entry: 28,
    title: `Book IX, 28`,
    body: `The periodic movements of the universe are the same, up and down from age to age. And either the universal intelligence puts itself in motion for every separate effect, and if this is so, be thou content with that which is the result of its activity; or it puts itself in motion once, and everything else comes by way of sequence in a manner; or indivisible elements are the origin of all things. In a word, if there is a god, all is well; and if chance rules, do not thou also be governed by it (vi. 44; vii. 75).

Soon will the earth cover us all: then the earth, too, will change, and the things also which result from change will continue to change forever, and these again forever. For if a man reflects on the changes and transformations which follow one another like wave after wave and their rapidity, he will despise everything which is perishable (xii. 21).`,
  },
  273: {
    month: `September`,
    day: 29,
    book: `IX`,
    entry: 29,
    title: `Book IX, 29`,
    body: `The universal cause is like a winter torrent: it carries everything along with it. But how worthless are all these poor people who are engaged in matters political, and, as they suppose, are playing the philosopher! All drivelers. Well then, man: do what nature now requires. Set thyself in motion, if it is in thy power, and do not look about thee to see if anyone will observe it; nor yet expect Plato’s Republic: but be content if the smallest thing goes on well, and consider such an event to be no small matter. For who can change men’s opinions? And without a change of opinions what else is there than the slavery of men who groan while they pretend to obey? Come now and tell me of Alexander and Philippus and Demetrius and Phalerum. They themselves shall judge whether they discovered what the common nature required, and trained themselves accordingly. But if they acted like tragedy heroes, no one has condemned me to imitate them. Simple and modest is the work of philosophy. Draw me not aside to insolence and pride.`,
  },
  274: {
    month: `September`,
    day: 30,
    book: `IX`,
    entry: 30,
    title: `Book IX, 30`,
    body: `Look down from above on the countless herds of men and their countless solemnities, and the infinitely varied voyagings in storms and calms, and the differences among those who are born, who live together, and die. And consider, too, the life lived by others in olden time, and the life of those who will live after thee, and the life now lived among barbarous nations, and how many know not even thy name, and how many will soon forget it, and how they who perhaps now are praising thee will very soon blame thee, and that neither a posthumous name is of any value, nor reputation, nor anything else.`,
  },
  275: {
    month: `October`,
    day: 1,
    book: `X`,
    entry: 1,
    title: `Book X, 1`,
    body: `Wilt thou then, my soul, never be good and simple and me and naked, more manifest than the body which surrounds thee? Wilt thou never enjoy an affectionate and contented disposition? Wilt thou never be full and without a want of any kind, longing for nothing more, nor desiring anything, either animate or inanimate, for the enjoyment of pleasures? Nor yet desiring time wherein thou shalt have longer enjoyment, or place, or pleasant climate, or society of men with whom thou mayst live in harmony? But wilt thou be satisfied with thy present condition, and pleased with all that is about thee, and wilt thou convince thyself that thou hast everything and that it comes from the gods, that everything is well for thee, and will be well whatever shall please them, and whatever they shall give for the conservation of the perfect living being, the good and just and beautiful, which generates and holds together all things, and contains and embraces all things which are dissolved for the production of other like things? Wilt thou never be such that thou shalt so dwell in community with gods and men as neither to find fault with them at all, nor to be condemned by them?`,
  },
  276: {
    month: `October`,
    day: 2,
    book: `X`,
    entry: 2,
    title: `Book X, 2`,
    body: `Observe what thy nature requires, so far as thou art governed by nature only; then do it and accept it, if thy nature, so far as thou art a living being, shall not be made worse by it. And next thou must observe what thy nature requires so far as thou art a living being. And all this thou mayst allow thyself, if thy nature, so far as thou art a rational animal, shall not be made worse by it. But the rational animal is consequently also a political [social] animal. Use these rules then, and trouble thyself about nothing else.`,
  },
  277: {
    month: `October`,
    day: 3,
    book: `X`,
    entry: 3,
    title: `Book X, 3`,
    body: `Everything which happens either happens in such wise as thou art formed by nature to bear it, or as thou art not formed by nature to bear it. If then it happens to thee in such way as thou art formed by nature to bear it, do not complain, but bear it as thou art formed by nature to bear it. But if it happens in such wise as thou art not formed by nature to bear it, do not complain, for it will perish after it has consumed thee. Remember, however, that thou art formed by nature to bear everything, with respect to which it depends on thy own opinion to make it endurable and tolerable, by thinking that it is either thy interest or thy duty to do this.`,
  },
  278: {
    month: `October`,
    day: 4,
    book: `X`,
    entry: 4,
    title: `Book X, 4`,
    body: `If a man is mistaken, instruct him kindly and show him his error. But if thou art not able, blame thyself, or blame not even thyself.`,
  },
  279: {
    month: `October`,
    day: 5,
    book: `X`,
    entry: 5,
    title: `Book X, 5`,
    body: `Whatever may happen to thee, it was prepared for thee from all eternity; and the implication of causes was from eternity spinning the thread of thy being, and of that which is incident to it (iii. 11; iv. 26).`,
  },
  280: {
    month: `October`,
    day: 6,
    book: `X`,
    entry: 6,
    title: `Book X, 6`,
    body: `Whether the universe is [a concourse of] atoms, or nature [is a system], let this first be established, that I am a part of the whole which is governed by nature; next, I am in a manner intimately related to the parts which are of the same kind with myself. For remembering this, inasmuch as I am a part, I shall be discontented with none of the things which are assigned to me out of the whole; for nothing is injurious to the part, if it is for the advantage of the whole. For the whole contains nothing which is not for its advantage; and all natures indeed have this common principle, but the nature of the universe has this principle besides, that it cannot be compelled even by any external cause to generate anything harmful to itself. By remembering then that I am a part of such a whole, I shall be content with everything that happens. And inasmuch as I am in a manner intimately related to the parts which are of the same kind with myself, I shall do nothing unsocial, but I shall rather direct myself to the things which are of the same kind with myself, and I shall turn all my efforts to the common interest, and divert them from the contrary. Now, if these things are done so, life must flow on happily, just as thou mayst observe that the life of a citizen is happy, who continues a course of action which is advantageous to his fellow-citizens, and is content with whatever the state may assign to him.`,
  },
  281: {
    month: `October`,
    day: 7,
    book: `X`,
    entry: 7,
    title: `Book X, 7`,
    body: `The parts of the whole, everything, I mean, which is naturally comprehended in the universe, must of necessity perish; but let this be understood in this sense, that they must undergo change. But if this is naturally both an evil and a necessity for the parts, the whole would not continue to exist in a good condition, the parts being subject to change and constituted so as to perish in various ways. For whether did nature herself design to do evil to the things which are parts of herself, and to make them subject to evil and of necessity fall into evil, or have such results happened without her knowing it? Both these suppositions, indeed, are incredible. But if a man should even drop the term Nature [as an efficient power], and should speak of these things as natural, even then it would be ridiculous to affirm at the same time that the parts of the whole are in their nature subject to change, and at the same time to be surprised or vexed as if something were happening contrary to nature, particularly as the dissolution of things is into those things of which each thing is composed. For there is either a dispersion of the elements out of which everything has been compounded, or a change from the solid to the earthy and from the airy to the aerial, so that these parts are taken back into the universal reason, whether this at certain periods is consumed by fire or renewed by eternal changes. And do not imagine that the solid and the airy part belong to thee from the time of generation. For all this received its accretion only yesterday, and the day before, as one may say, from the food and the air which is inspired. This, then, which has received [the accretion], changes, not that which thy mother brought forth. But suppose that this [which thy mother brought forth] implicates thee very much with that other part, which has the peculiar quality [of change], this is nothing in fact in the way of objection to what is said.`,
  },
  282: {
    month: `October`,
    day: 8,
    book: `X`,
    entry: 8,
    title: `Book X, 8`,
    body: `When thou hast assumed these names, good, modest, true, rational, a man of equanimity, and magnanimous, take care thou dost not change these names; and if thou shouldst lose them, quickly return to them. And remember that the term Rational was intended to signify a discriminating attention to every several thing and freedom from negligence; and that Equanimity is the voluntary acceptance of the things which are assigned to thee by the common nature; and that Magnanimity is the elevation of the intelligent part above the pleasurable or painful sensations of the flesh, and above that poor thing called fame, and death, and all such things. If, then, thou maintainest thyself in the possession of these names, without desiring to be called by these names by others, thou wilt be another person and wilt enter on another life. For to continue to be such as thou hast hitherto been, and to be torn in pieces and defiled in such a life, is the character of a very stupid man and one overfond of his life, and like those half-devoured fighters with wild beasts, who, though covered with wounds and gore, still entreat to be kept to the following day, though they will be exposed in the same state to the same claws and bites. Therefore fix thyself in the possession of these few names: and if thou art able to abide in them, abide as if thou wast removed to certain islands of the Happy. But if thou shalt perceive that thou fallest out of them and dost not maintain thy hold, go courageously into some nook where thou shalt maintain them, or even depart at once from life, not in passion, but with simplicity and freedom and modesty, after doing this one [laudable] thing at least in thy life, to have gone out of it thus. In order, however, to the remembrance of these names, it will greatly help thee, if thou rememberest the gods, and that they wish not to be flattered, but wish all reasonable beings to be made like themselves; and if thou rememberest that what does the work of a fig tree is a fig tree, and that what does the work of a dog is a dog, and that what does the work of a bee is a bee, and that what does the work of a man is a man.`,
  },
  283: {
    month: `October`,
    day: 9,
    book: `X`,
    entry: 9,
    title: `Book X, 9`,
    body: `Mimi, war, astonishment, torpor, slavery, will daily wipe out those holy principles of thine. How many things without studying nature dost thou imagine, and how many dost thou neglect? But it is thy duty so to look on and so to do everything, that at the same time the power of dealing with circumstances is perfected, and the contemplative faculty is exercised, and the confidence which comes from the knowledge of each several thing is maintained without showing it, but yet not concealed. For when wilt thou enjoy simplicity, when gravity, and when the knowledge of every several thing, both what it is in substance, and what place it has in the universe, and how long it is formed to exist, and of what things it is compounded, and to whom it can belong, and who are able both to give it and take it away?`,
  },
  284: {
    month: `October`,
    day: 10,
    book: `X`,
    entry: 10,
    title: `Book X, 10`,
    body: `A spider is proud when it has caught a fly, and another when he has caught a poor hare, and another when he has taken the little fish in a net, and another when he has taken wild boars, and another when he has taken bears, and another when he has taken Sarmatians. Are not these robbers, if thou examines! Their opinions?`,
  },
  285: {
    month: `October`,
    day: 11,
    book: `X`,
    entry: 11,
    title: `Book X, 11`,
    body: `Acquire the contemplative way of seeing how all things change into one another, and constantly attend to it, and exercise thyself about this part [of philosophy]. For nothing is so much adapted to produce magnanimity. Such a man has put off the body, and as he sees that he must, no one knows how soon, go away from among men and leave everything here, he gives himself up entirely to just doing in all his actions, and in everything else that happens he resigns himself to the universal nature. But as to what any man shall say or think about him, or do against him, he never even thinks of it, being himself contented with these two things, with acting justly in what he now does, and being satisfied with what is now assigned to him; and he lays aside all distracting and busy pursuits, and desires nothing else than to accomplish the straight course through the law, and by accomplishing the straight course to follow God.`,
  },
  286: {
    month: `October`,
    day: 12,
    book: `X`,
    entry: 12,
    title: `Book X, 12`,
    body: `What need is there of suspicious fear, since it is in thy power to inquire what ought to be done? And if thou seest clear, go by this way content, without turning back: but if thou dost not see clear, stop and take the best advisers. But if any other things oppose thee, go on according to thy powers with due consideration, keeping to that which appears to be just. For it is best to reach this object, and if thou dost fail, let thy failure be in attempting this. He who follows reason in all things is both tranquil and active at the same time, and also cheerful and collected.`,
  },
  287: {
    month: `October`,
    day: 13,
    book: `X`,
    entry: 13,
    title: `Book X, 13`,
    body: `Inquire of thyself as soon as thou wakest from sleep whether it will make any difference to thee, if another does what is just and right. It will make no difference (vi. 32; viii. 55).

Thou hast not forgotten, I suppose, that those who assume arrogant airs in bestowing their praise or blame on others, are such as they are at bed and at board, and thou hast not forgotten what they do, and what they avoid and what they pursue, and how they steal and how they rob, not with hands and feet, but with their most valuable part, by means of which there is produced, when a man chooses, fidelity, modesty, truth, law, a good dæmon [happiness]? (vii. 17.)`,
  },
  288: {
    month: `October`,
    day: 14,
    book: `X`,
    entry: 14,
    title: `Book X, 14`,
    body: `To her who gives and takes back all, to nature, the man who is instructed and modest says, Give what thou wilt; take back what thou wilt. And he says this not proudly, but obediently and well pleased with her.`,
  },
  289: {
    month: `October`,

    book: `X`,
    entry: 15,
    title: `Book X, 15`,
    body: `Short is the little which remains to thee of life. Live as on a mountain. For it makes no difference whether a man lives there or here, if he lives everywhere in the world as in a state [political community]. Let men see, let them know a real man who lives according to nature. If they cannot endure him, let them kill him. For that is better than to live thus [as men do].`,

  290: {

    book: `X`,

  },
  291: {
    month: `October`,
    day: 17,
    book: `X`,
    entry: 17,
    title: `Book X, 17`,
    body: `Constantly contemplate the whole of time and the whole of substance, and consider that all individual things as to substance are a grain of a fig, and as to time the turning of a gimlet.`,
  },
  292: {
    month: `October`,
    day: 18,
    book: `X`,
    entry: 18,

    body: `Look at everything that exists, and observe that it is already in dissolution and in change, and as it were putrefaction or dispersion, or that everything is so constituted by nature as to die.`,
  },
  293: {
    month: `October`,
    day: 19,
    book: `X`,
    entry: 19,
    title: `Book X, 19`,
    body: `Consider what men are when they are eating, sleeping, generating, easing themselves and so forth. Then what kind of men they are when they are imperious and arrogant, or angry and scolding from their elevated place. But a short time ago to how many they were slaves and for what things: and after a little time consider in what a condition they will be.`,
  },
  294: {
    month: `October`,
    day: 20,
    book: `X`,
    entry: 20,
    title: `Book X, 20`,
    body: `That is for the good of each thing, which the universal nature brings to each. And it is for its good at the time when nature brings it.`,
  },
  295: {
    month: `October`,
    day: 21,
    book: `X`,
    entry: 21,
    title: `Book X, 21`,
    body: `“The earth loves the shower;” and “the solemn æther loves:” and the universe loves to make whatever is about to be. I say then to the universe, that I love as thou lovest. And is not this too said, that “this or that loves [is wont] to be produced”?`,
  },
  296: {
    month: `October`,
    day: 22,
    book: `X`,
    entry: 22,
    title: `Book X, 22`,
    body: `Either thou livest here and hast already accustomed thyself to it, or thou art going away, and this was thy own will; or thou art dying and hast discharged thy duty. But besides these things there is nothing. Be of good cheer, then.`,
  },
  297: {
    month: `October`,
    day: 23,
    book: `X`,
    entry: 23,
    title: `Book X, 23`,
    body: `Let this always be plain to thee, that this piece of land is like any other; and that all things here are the same with things on the top of a mountain, or on the sea-shore, or wherever thou choosest to be. For thou wilt find just what Plato says, Dwelling within the walls of a city as in a shepherd’s fold on a mountain. [The three last words are omitted in the translation.]`,
  },
  298: {
    month: `October`,
    day: 24,
    book: `X`,
    entry: 24,
    title: `Book X, 24`,
    body: `What is my ruling faculty now to me? And of what nature am I now making it? And for what purpose am I now using it? Is it void of understanding? Is it loosed and rent asunder from social life? Is it melted into and mixed with the poor flesh so as to move together with it?`,
  },
  299: {
    month: `October`,
    day: 25,
    book: `X`,
    entry: 25,
    title: `Book X, 25`,
    body: `He who flies from his master is a runaway; but the law is master, and he who breaks the law is a runaway. And he also who is grieved or angry or afraid, is dissatisfied because something has been or is or shall be of the things which are appointed by him who rules all things, and he is Law, and assigns to every man what is fit. He then who fears or is grieved or is angry is a runaway.`,
  },
  300: {
    month: `October`,
    day: 26,
    book: `X`,
    entry: 26,
    title: `Book X, 26`,
    body: `A man deposits seed in a womb and goes away, and then another cause takes it, and labors on it and makes a child. What a thing from such a material! Again, the child passes food down through the throat, and then another cause takes it and makes perception and motion, and in fine life and strength and other things; how many and how strange! Observe then the things which are produced in such a hidden way, and see the power just as we see the power which carries things downward and upward, not with the eyes, but still no less plainly (vii. 75).`,
  },
  301: {
    month: `October`,
    day: 27,
    book: `X`,
    entry: 27,
    title: `Book X, 27`,
    body: `Constantly consider how all things such as they now are, in time past also were; and consider that they will be the same again. And place before thy eyes entire dramas and stages of the same form, whatever thou hast learned from thy experience or from older history; for example, the whole court of Hadrianus, and the whole court of Antoninus, and the whole court of Philippus, Alexander, Croesus; for all those were such dramas as we see now, only with different actors.`,
  },
  302: {

    day: 28,

    entry: 28,
    title: `Book X, 28`,
    body: `Imagine every man who is grieved at anything or discontented to be like a pig which is sacrificed and kicks and screams.

Like this pig also is he who on his bed in silence laments the bonds in which we are held. And consider that only to the rational animal is it given to follow voluntarily what happens; but simply to follow is a necessity imposed on all.`,
  },
  303: {
    month: `October`,
    day: 29,
    book: `X`,
    entry: 29,
    title: `Book X, 29`,
    body: `Severally on the occasion of everything that thou doest, pause and ask thyself, if death is a dreadful thing because it deprives thee of this.`,
  },
  304: {
    month: `October`,
    day: 30,
    book: `X`,
    entry: 30,
    title: `Book X, 30`,
    body: `When thou art offended at any man’s fault, forthwith turn to thyself and reflect in what like manner thou dost err thyself; for example, in thinking that money is a good thing, or pleasure, or a bit of reputation, and the like. For by attending to this thou wilt quickly forget thy anger, if this consideration also is added, that the man is compelled; for what else could he do? Or, if thou art able, take away from him the compulsion.`,
  },
  305: {
    month: `October`,
    day: 31,
    book: `X`,
    entry: 31,
    title: `Book X, 31`,
    body: `When thou hast seen Satyron the Socratic, think of either Eutyches or Hymen, and when thou hast seen Euphrates, think of Eutychion or Silvanus, and when thou hast seen Alciphron, think of Tropæophorus, and when thou hast seen Xenophon, think of Crito or Severus, and when thou hast looked on thyself, think of any other Cæsar, and in the case of everyone do in like manner. Then let this thought be in thy mind, Where then are those men? Nowhere, or nobody knows where. For thus continuously thou wilt look at human things as smoke and nothing at all; especially if thou reflectest at the same time that what has once changed will never exist again in the infinite duration of time. But thou, in what a brief space of time is thy existence? And why art thou not content to pass through this short time in an orderly way? What matter and opportunity [for thy activity] art thou avoiding? For what else are all these things, except exercises for the reason, when it has viewed carefully and by examination into their nature the things which happen in life? Persevere then until thou shalt have made these things thy own, as the stomach which is strengthened makes all things its own, as the blazing fire makes flame and brightness out of everything that is thrown into it.`,
  },
  306: {
    month: `November`,
    day: 1,
    book: `XI`,
    entry: 1,
    title: `Book XI, 1`,
    body: `These are the properties of the rational soul: it sees itself, analyzes itself, and makes itself such as it chooses; the fruit which it bears itself enjoys—for the fruits of plants and that in animals which corresponds to fruits others enjoy—it obtains its own end, wherever the limit of life may be fixed. Not as in a dance and in a play and in suchlike things, where the whole action is incomplete, if anything cuts it short; but in every part and wherever it may be stopped, it makes what has been set before it full and complete, so that it can say, I have what is my own. And further it traverses the whole universe, and the surrounding vacuum, and surveys its form, and it extends itself into the infinity of time, and embraces and comprehends the periodical renovation of all things, and it comprehends that those who come after us will see nothing new, nor have those before us seen anything more, but in a manner he who is forty years old, if he has any understanding at all, has seen by virtue of the uniformity that prevails all things which have been and all that will be. This too is a property of the rational soul, love of one’s neighbour, and truth and modesty, and to value nothing more than itself, which is also the property of Law. Thus then right reason differs not at all from the reason of justice.`,

  311: {

    book: `XI`,
    entry: 6,
    title: `Book XI, 6`,
    body: `At first tragedies were brought on the stage as means of reminding men of the things which happen to them, and that it is according to nature for things to happen so, and that, if you are delighted with what is shown on the stage, you should not be troubled with that which takes place on the larger stage. For you see that these things must be accomplished thus, and that even they bear them who cry out, “O Cithæron.” And, indeed, some things are said well by the dramatic writers, of which kind is the following especially—

Me and my children if the gods neglect,
This has its reason too.

And again—

We must not chafe and fret at that which happens.

And—

Life’s harvest reap like the wheat’s fruitful ear.

And other things of the same kind.

After tragedy the old comedy was introduced, which had a magisterial freedom of speech, and by its very plainness of speaking was useful in reminding men to beware of insolence; and for this purpose too Diogenes used to take from these writers.

But as to the middle comedy which came next, observe what it was, and again, for what object the new comedy was introduced, which gradually sunk down into a mere mimic artifice. That some good things are said even by these writers, everybody knows: but the whole plan of such poetry and dramaturgy, to what end does it look!`,

  313: {

    book: `XI`,
    entry: 8,
    title: `Book XI, 8`,
    body: `A branch cut off from the adjacent branch must of necessity be cut off from the whole tree also. So too a man when he is separated from another man has fallen off from the whole social community. Now as to a branch, another cuts it off, but a man by his own act separates himself from his neighbour when he hates him and turns away from him, and he does not know that he has at the same time cut himself off from the whole social system. Yet he has this privilege certainly from Zeus who framed society, for it is in our power to grow again to that which is near to us, and again to become a part which helps to make up the whole. However, if it often happens, this kind of separation, it makes it difficult for that which detaches itself to be brought to unity and to be restored to its former condition. Finally, the branch, which from the first grew together with the tree, and has continued to have one life with it, is not like that which after being cut off is then ingrafted, for this is something like what the gardeners mean when they say that it grows with the rest of the tree, but that it has not the same mind with it.`,

  320: {

    entry: 15,
    title: `Book XI, 15`,
    body: `How unsound and insincere is he who says, I have determined to deal with thee in a fair way. What art thou doing, man? There is no occasion to give this notice. It will soon show itself by acts. The voice ought to be plainly written on the forehead. Such as a man’s character is, he immediately shows it in his eyes, just as he who is beloved forthwith reads everything in the eyes of lovers. The man who is honest and good ought to be exactly like a man who smells strong, so that the bystander as soon as he comes near him must smell whether he choose or not. But the affectation of simplicity is like a crooked stick. Nothing is more disgraceful than a wolfish friendship [false friendship]. Avoid this most of all. The good and simple and benevolent show all these things in the eyes, and there is no mistaking.`,

  321: {
    month: `November`,
    day: 16,
    book: `XI`,
    entry: 16,
    title: `Book XI, 16`,
    body: `As to living in the best way, this power is in the soul, if it be indifferent to things which are indifferent. And it will be indifferent, if it looks on each of these things separately and all together, and if it remembers that not one of them produces in us an opinion about itself, nor comes to us; but these things remain immovable, and it is we ourselves who produce the judgments about them, and, as we may say, write them in ourselves, it being in our power not to write them, and it being in our power, if perchance these judgments have imperceptibly got admission to our minds, to wipe them out; and if we remember also that such attention will only be for a short time, and then life will be at an end. Besides, what trouble is there at all in doing this? For if these things are according to nature, rejoice in them, and they will be easy to thee: but if contrary to nature, seek what is conformable to thy own nature, and strive toward this, even if it bring no reputation; for every man is allowed to seek his own good.`,

  323: {
    month: `November`,
    day: 18,
    book: `XI`,
    entry: 18,
    title: `Book XI, 18`,
    body: `[If any have offended against thee, consider first]: What is my relation to men, and that we are made for one another; and in another respect, I was made to be set over them, as a ram over the flock or a bull over the herd. But examine the matter from first principles, from this: If all things are not mere atoms, it is nature which orders all things: if this is so, the inferior things exist for the sake of the superior, and these for the sake of one another (ii. 1; ix. 39; v. 16; iii. 4).

Second, consider what kind of men they are at table, in bed, and so forth; and particularly, under what compulsions in respect of opinions they are; and as to their acts, consider with what pride they do what they do (viii. 14; ix. 34).

Third, that if men do rightly what they do, we ought not to be displeased; but if they do not right, it is plain that they do so involuntarily and in ignorance. For as every soul is unwillingly deprived of the truth, so also is it unwillingly deprived of the power of behaving to each man according to his deserts. Accordingly men are pained when they are called unjust, ungrateful, and greedy, and in a word wrong-doers to their neighbours (vii. 62, 63; ii. 1; vii. 26; viii. 29).

Fourth, consider that thou also doest many things wrong, and that thou art a man like others; and even if thou dost abstain from certain faults, still thou hast the disposition to commit them, though either through cowardice, or concern about reputation or some such mean motive, thou dost abstain from such faults (i. 17).

Fifth, consider that thou dost not even understand whether men are doing wrong or not, for many things are done with a certain reference to circumstances. And, in short, a man must learn a great deal to enable him to pass a correct judgment on another man’s acts (ix. 38; iv. 51).

Sixth, consider when thou art much vexed or grieved, that man’s life is only a moment, and after a short time we are all laid out dead (vii. 58; iv. 48).

Seventh, that it is not men’s acts which disturb us, for those acts have their foundation in men’s ruling principles, but it is our own opinions which disturb us. Take away these opinions then, and resolve to dismiss thy judgment about an act as if it were something grievous, and thy anger is gone. How then shall I take away these opinions? By reflecting that no wrongful act of another brings shame on thee: for unless that which is shameful is alone bad, thou also must of necessity do many things wrong, and become a robber and everything else (v. 25; vii. 16).

Eighth, consider how much more pain is brought on us by the anger and vexation caused by such acts than by the acts themselves, at which we are angry and vexed (iv. 39, 49; vii. 24).

Ninth, consider that a good disposition is invincible, if it be genuine, and not an affected smile and acting a part. For what will the most violent man do to thee, if thou continuest to be of a kind disposition toward him, and if, as opportunity offers, thou gently admonishest him and calmly correctest his errors at the very time when he is trying to do thee harm, saying, Not so, my child: we are constituted by nature for something else: I shall certainly not be injured, but thou art injuring thyself, my child. And show him with gentle tact and by general principles that this is so, and that even bees do not do as he does, nor any animals which are formed by nature to be gregarious. And thou must do this neither with any double meaning nor in the way of reproach, but affectionately and without any rancour in thy soul; and not as if thou wert lecturing him, nor yet that any bystander may admire, but either when he is alone, and if others are present . . .[1](08_Endnote.xhtml#ch11en1)

Remember these nine rules, as if thou hadst received them as a gift from the Muses, and begin at last to be a man while thou livest. But thou must equally avoid flattering men and being vexed at them, for both are unsocial and lead to harm. And let this truth be present to thee in the excitement of anger, that to be moved by passion is not manly, but that mildness and gentleness, as they are more agreeable to human nature, so also are they more manly; and he who possesses these qualities possesses strength, nerves and courage, and not the man who is subject to fits of passion and discontent. For in the same degree in which a man’s mind is nearer to freedom from all passion, in the same degree also is it nearer to strength: and as the sense of pain is a characteristic of weakness, so also is anger. For he who yields to pain and he who yields to anger, both are wounded and both submit.

But if thou wilt, receive also a tenth present from the leader of the [Muses, Apollo], and it is this—that to expect bad men not to do wrong is madness, for he who expects this desires an impossibility. But to allow men to behave so to others, and to expect them not to do thee any wrong, is irrational and tyrannical.`,

    body: `Thy aerial part and all the fiery parts which are mingled in thee, though by nature they have an upward tendency, still in obedience to the disposition of the universe they are overpowered here in the compound mass [the body]. And also the whole of the earthy part in thee and the watery, though their tendency is downward, still are raised up and occupy a position which is not their natural one. In this manner then the elemental parts obey the universal, for when they have been fixed in any place perforce they remain there until again the universal shall sound the signal for dissolution. Is it not then strange that thy intelligent part only should be disobedient and discontented with its own place? And yet no force is imposed on it, but only those things which are conformable to its nature: still it does not submit, but is carried in the opposite direction. For the movement toward injustice and intemperance and to anger and grief and fear is nothing else than the act of one who deviates from nature. And also when the ruling faculty is discontented with anything that happens, then too it deserts its post: for it is constituted for piety and reverence toward the gods no less than for justice. For these qualities also are comprehended under the generic term of contentment with the constitution of things, and indeed they are prior to acts of justice.`,

  336: {

    body: `All those things at which thou wishest to arrive by a circuitous road, thou canst have now, if thou dost not refuse them to thyself. And this means, if thou wilt take no notice of all the past, and trust the future to providence, and direct the present only conformably to piety and justice. Conformably to piety, that thou mayest be content with the lot which is assigned to thee, for nature designed it for thee and thee for it. Conformably to justice, that thou mayest always speak the truth freely and without disguise, and do the things which are agreeable to law and according to the worth of each. And let neither another man’s wickedness hinder thee, nor opinion nor voice, nor yet the sensations of the poor flesh which has grown about thee; for the passive part will look to this. If then, whatever the time may be when thou shalt be near to thy departure, neglecting everything else thou shalt respect only thy ruling faculty and the divinity within thee, and if thou shalt be afraid not because thou must sometime cease to live, but if thou shalt fear never to have begun to live according to nature—then thou wilt be a man worthy of the universe which has produced thee, and thou wilt cease to be a stranger in thy native land, and to wonder at things which happen daily as if they were something unexpected, and to be dependent on this or that.`,

function monthMeta(month){ return S.book==='stoic'?STOIC_MONTHS[month]:MED_MONTHS[month] }
function monthStartDOY(month){
  let d=0; for(const m of MONTHS){if(m===month)return d+1; d+=monthMeta(month)?.days||31; d=0;break;}
  let t=0; for(const m of MONTHS){if(m===month)return t+1; t+=(S.book==='stoic'?STOIC_MONTHS[m]:MED_MONTHS[m]).days;}
  return 1;
}
function doyToMonthDay(doy){

}

// ── Element helper ────────────────────────────────────────────────────────────
function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='cls')e.className=v;
    else if(k==='style'&&typeof v==='string')e.style.cssText=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids.flat(2)){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}
function frag(...kids){
  const f=document.createDocumentFragment();
  kids.flat(2).forEach(k=>k&&k!==false&&f.appendChild(typeof k==='string'?document.createTextNode(k):k));
  return f;
}

      if((p.title||''  ).toLowerCase().includes(q)||(p.theme||''  ).toLowerCase().includes(q)||
         (p.month||''  ).toLowerCase().includes(q)||(p.body||''   ).toLowerCase().includes(q)||
         (p.book||''   ).toLowerCase().includes(q))
        results.push(doy);
    }
  }
  const count=h('div',{cls:'result-count'},
    q.length>=2?results.length+' result'+(results.length!==1?'s':''): 'Search all 366 entries'
  );
  const list=h('div',{cls:'card-list'});
  if(results.length)results.forEach(doy=>list.appendChild(listCard(doy)));
  else if(q.length>=2)list.appendChild(h('div',{cls:'empty-state'},h('div',{cls:'es-icon'},'⌕'),h('div',{cls:'es-title'},'No results')));
  return frag(wrap,count,list);
}
function renderCalendar(){
  const hint=h('div',{cls:'cal-hint'},'Tap a month to browse every day');
  const list=h('div',{cls:'cal-list'});
  const meta=S.book==='stoic'?STOIC_MONTHS:MED_MONTHS;
  let startDOY=1;
  MONTHS.forEach(month=>{
    const mm=meta[month],isOpen=S.expandedMonth===month;
    let refCount=0,favCount=0;
    for(let d=0;d<mm.days;d++){const doy=startDOY+d;refCount+=getRefs(doy).length;if(isFav(doy))favCount++}
    const badge=(favCount||refCount)?h('span',{cls:'cm-badge'},[favCount?favCount+'★':null,refCount?refCount+'✎':null].filter(Boolean).join('  ')):null;
    const head=h('div',{cls:'cal-month-head'},
      h('div',{cls:'cm-left'},
        h('div',{cls:'cm-name'},month),
        h('div',{cls:'cm-theme'},mm.theme),
        h('div',{cls:'cm-sub'},mm.sub)
      ),
      h('div',{cls:'cm-right'},badge||'',h('span',{cls:'chevron'},isOpen?'▲':'▼'))
    );
    const capturedStart=startDOY;
    head.addEventListener('click',()=>set({expandedMonth:isOpen?null:month,expandedCard:null}));
    const card=h('div',{cls:'cal-month-card'},head);
    if(isOpen){
      const days=h('div',{cls:'cal-days'});
      for(let d=0;d<mm.days;d++){
        const doy=capturedStart+d,p=getP(doy),isToday=doy===TODAY_DOY,refs=getRefs(doy);
        const row=h('div',{cls:'cal-day-row'+(isToday?' is-today':'')},
          h('span',{cls:'cd-num'},String(d+1).padStart(2,'0')),
          h('span',{cls:'cd-title'},p.title),
          isFav(doy)?h('span',{cls:'cd-fav'},'★'):'',
          refs.length?h('span',{cls:'cd-ref'},refs.length+'✎'):''
        );
        row.addEventListener('click',()=>set({view:'search',searchMode:'text',searchQuery:p.title,expandedCard:doy,expandedMonth:null}));
        days.appendChild(row);
      }
      card.appendChild(days);
    }
    list.appendChild(card);
    startDOY+=mm.days;
  });
  return frag(hint,list);
}
function renderBrowse(){
  const tabs=h('div',{cls:'search-tabs'});
  [['text','🔍  Text Search'],['calendar','📅  Browse Months']].forEach(([mode,label])=>{
    const tab=h('button',{cls:'s-tab'+(S.searchMode===mode?' active':'')},label);
    tab.addEventListener('click',()=>set({searchMode:mode,expandedCard:null}));
    tabs.appendChild(tab);
  });
  return frag(h('div',{style:'padding-top:14px'},tabs),S.searchMode==='text'?renderTextSearch():renderCalendar());
}

// ── SETTINGS SHEET ────────────────────────────────────────────────────────────
function renderSettings(){
  const themes=[{id:'amber',name:'Amber',sub:'Warm dark',cls:'t-amber'},{id:'slate',name:'Slate',sub:'Cool dark',cls:'t-slate'},{id:'chalk',name:'Chalk',sub:'Light',cls:'t-chalk'},{id:'obsidian',name:'Obsidian',sub:'Stark',cls:'t-obsidian'}];
  const sizes=[{id:'sm',demo:'A',size:'14px',label:'Small'},{id:'md',demo:'A',size:'18px',label:'Default'},{id:'lg',demo:'A',size:'22px',label:'Large'},{id:'xl',demo:'A',size:'26px',label:'X-Large'}];
  const overlay=h('div',{cls:'sheet-overlay'});
  overlay.addEventListener('click',e=>{if(e.target===overlay)set({showSettings:false})});
  const sheet=h('div',{cls:'sheet'},
    h('div',{cls:'sheet-handle'}),
    h('div',{cls:'sheet-title'},'Appearance'),
    h('div',{cls:'sheet-section'},
      h('div',{cls:'sheet-label'},'Colour Theme'),
      h('div',{cls:'theme-grid'},
        ...themes.map(t=>{
          const sw=h('button',{cls:'t-swatch '+t.cls+(settings.theme===t.id?' active':'')},h('span',{cls:'t-name'},t.name),h('span',{cls:'t-sub'},t.sub));
          sw.addEventListener('click',()=>{settings.theme=t.id;saveSettings();applySettings();renderSettingsSheet()});
          return sw;
        })
      )
    ),
    h('div',{cls:'sheet-section'},
      h('div',{cls:'sheet-label'},'Text Size'),
      h('div',{cls:'size-grid'},
        ...sizes.map(f=>{
          const btn=h('button',{cls:'sz-btn'+(settings.fontSize===f.id?' active':'')},h('span',{cls:'sz-demo',style:'font-size:'+f.size},f.demo),h('span',{cls:'sz-label'},f.label));
          btn.addEventListener('click',()=>{settings.fontSize=f.id;saveSettings();applySettings();renderSettingsSheet()});
          return btn;
        })
      )
    ),
    h('button',{cls:'sheet-close',onclick:()=>set({showSettings:false})},'Done')
  );
  overlay.appendChild(sheet);
  return overlay;
}
function renderSettingsSheet(){
  const p=document.getElementById('sheet-portal');
  p.innerHTML='';
  if(S.showSettings)p.appendChild(renderSettings());
}

// ── Badge ─────────────────────────────────────────────────────────────────────
function updateFavBadge(){
  const badge=document.getElementById('fav-badge');if(!badge)return;
  const n=appData[favsKey()].length;
  badge.style.display=n?'flex':'none';badge.textContent=n>99?'99+':n;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const content=document.getElementById('page-content');
  content.innerHTML='';
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===S.view));
  updateFavBadge();
  let view;
  if(S.view==='today')view=renderToday();
  else if(S.view==='favourites')view=renderFavourites();
  else if(S.view==='notes')view=renderNotes();
  else view=renderBrowse();
  content.appendChild(view);
  renderSettingsSheet();
  if(S.view==='search'&&S.searchMode==='text'&&S.searchQuery){
    const inp=content.querySelector('.search-input');
    if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length)}
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.bnav-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    const v=b.dataset.view;
    if(S.view!==v)document.getElementById('scroll-area').scrollTop=0;
    set({view:v,expandedCard:null});
  });
});
document.getElementById('settings-btn').addEventListener('click',()=>set({showSettings:true}));
applySettings();
render();
</script>
</body>
