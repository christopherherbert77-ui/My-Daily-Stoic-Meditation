<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Daily Stoic">
<title>My Daily Stoic</title>
<style>
:root {
  --fs-base:16px;--fs-sm:13px;--fs-xs:11px;
  --fs-body:16px;--fs-title:clamp(17px,4vw,23px);--fs-h1:clamp(22px,5.5vw,38px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
/* AMBER */
[data-theme="amber"]{
  --bg:#0d0b08;--bg2:#181309;--bg3:#110e06;--surface:#1e1810;
  --border:rgba(210,155,60,0.4);--border2:rgba(210,155,60,0.2);--border3:rgba(210,155,60,0.1);
  --accent:#e8a83a;--accent2:#b87e22;--accent-bg:rgba(232,168,58,0.12);
  --text:#f6f0dd;--text2:#d8ca9e;--text3:#9e8c5e;--text4:#5e5034;
  --input-bg:#110e06;--card-shadow:0 6px 32px rgba(0,0,0,0.55);
  --rule:linear-gradient(90deg,transparent,#e8a83a,transparent);
  --badge-bg:rgba(232,168,58,0.15);--badge-text:#e8a83a;--glow:rgba(200,140,40,0.1);
  --nav-bg:rgba(10,8,4,0.96);--nav-border:rgba(210,155,60,0.3);
  --nav-icon:#6a5840;--nav-icon-active:#e8a83a;--nav-label:#5a4e30;--nav-label-active:#e8a83a;
  --nav-active-bg:rgba(232,168,58,0.12);
}
/* SLATE */
[data-theme="slate"]{
  --bg:#090b12;--bg2:#0f1220;--bg3:#0b0e1a;--surface:#141828;
  --border:rgba(100,170,240,0.38);--border2:rgba(100,170,240,0.18);--border3:rgba(100,170,240,0.09);
  --accent:#70b8f8;--accent2:#3d8cd8;--accent-bg:rgba(100,170,240,0.11);
  --text:#eef3fc;--text2:#b8c8e0;--text3:#6878a0;--text4:#3a4660;
  --input-bg:#0b0e1a;--card-shadow:0 6px 32px rgba(0,0,0,0.6);
  --rule:linear-gradient(90deg,transparent,#70b8f8,transparent);
  --badge-bg:rgba(100,170,240,0.14);--badge-text:#70b8f8;--glow:rgba(60,120,210,0.07);
  --nav-bg:rgba(6,8,14,0.97);--nav-border:rgba(100,170,240,0.2);
  --nav-icon:#3a4a6a;--nav-icon-active:#70b8f8;--nav-label:#2e3c58;--nav-label-active:#70b8f8;
  --nav-active-bg:rgba(100,170,240,0.1);
}
/* CHALK */
[data-theme="chalk"]{
  --bg:#f2efe8;--bg2:#faf8f4;--bg3:#e8e4da;--surface:#ffffff;
  --border:rgba(30,28,18,0.22);--border2:rgba(30,28,18,0.12);--border3:rgba(30,28,18,0.06);
  --accent:#2e6030;--accent2:#1e4820;--accent-bg:rgba(46,96,48,0.09);
  --text:#141410;--text2:#282818;--text3:#585840;--text4:#989870;
  --input-bg:#f2efe8;--card-shadow:0 3px 18px rgba(0,0,0,0.07);
  --rule:linear-gradient(90deg,transparent,#2e6030,transparent);
  --badge-bg:rgba(46,96,48,0.1);--badge-text:#2e6030;--glow:transparent;
  --nav-bg:rgba(240,237,230,0.97);--nav-border:rgba(30,28,18,0.15);
  --nav-icon:#a8a878;--nav-icon-active:#2e6030;--nav-label:#a0a078;--nav-label-active:#2e6030;
  --nav-active-bg:rgba(46,96,48,0.08);
}
/* OBSIDIAN */
[data-theme="obsidian"]{
  --bg:#080808;--bg2:#111111;--bg3:#0a0a0a;--surface:#161616;
  --border:rgba(255,255,255,0.18);--border2:rgba(255,255,255,0.1);--border3:rgba(255,255,255,0.05);
  --accent:#e0e0e0;--accent2:#909090;--accent-bg:rgba(255,255,255,0.06);
  --text:#f0f0f0;--text2:#c0c0c0;--text3:#707070;--text4:#404040;
  --input-bg:#0a0a0a;--card-shadow:0 6px 32px rgba(0,0,0,0.7);
  --rule:linear-gradient(90deg,transparent,#888,transparent);
  --badge-bg:rgba(255,255,255,0.08);--badge-text:#c0c0c0;--glow:transparent;
  --nav-bg:rgba(4,4,4,0.98);--nav-border:rgba(255,255,255,0.1);
  --nav-icon:#383838;--nav-icon-active:#e0e0e0;--nav-label:#303030;--nav-label-active:#e0e0e0;
  --nav-active-bg:rgba(255,255,255,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:Georgia,'Times New Roman',serif;font-size:var(--fs-base);
  transition:background .25s,color .25s;overscroll-behavior:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
[data-theme="chalk"] .grain,[data-theme="obsidian"] .grain{display:none}
.glow{position:fixed;top:-140px;left:50%;transform:translateX(-50%);
  width:700px;height:340px;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse,var(--glow) 0%,transparent 68%)}

/* Shell */
.shell{display:flex;flex-direction:column;min-height:100vh}
.scroll-area{flex:1;overflow-y:auto;position:relative;z-index:1;
  padding-top:calc(54px + var(--safe-top));
  padding-bottom:calc(64px + var(--safe-bottom))}
.page{max-width:680px;margin:0 auto;padding:0 18px 32px}

/* Top bar */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--nav-border);
  padding-top:var(--safe-top);
}
.topbar-inner{max-width:680px;margin:0 auto;padding:0 16px;height:54px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.wordmark{flex:1;min-width:0}
.wordmark-main{font-size:17px;font-weight:400;color:var(--text);letter-spacing:-.01em;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wordmark-sub{font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--text3);margin-top:2px}
.topbar-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--border3);color:var(--text3);
  width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .18s}
.icon-btn:hover{border-color:var(--border2);color:var(--text2);background:var(--accent-bg)}

/* Book switcher pill */
.book-switcher{
  display:flex;background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:3px;gap:2px
}
.book-pill{
  padding:5px 12px;border-radius:16px;cursor:pointer;border:none;
  background:transparent;color:var(--text3);font-family:Georgia,serif;
  font-size:11px;letter-spacing:.06em;transition:all .18s;white-space:nowrap
}
.book-pill:hover{color:var(--text2)}
.book-pill.active{background:var(--accent);color:var(--bg);font-weight:600}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--nav-border);
  padding-bottom:var(--safe-bottom);
}
.bottom-nav-inner{max-width:680px;margin:0 auto;display:flex;height:60px}
.bnav-btn{
  flex:1;background:none;border:none;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:all .18s;padding:0;border-radius:0;
}
.bnav-btn::before{
  content:'';position:absolute;inset:6px 8px;border-radius:10px;
  background:transparent;transition:background .18s;
}
.bnav-btn:hover::before{background:var(--nav-active-bg)}
.bnav-btn.active::before{background:var(--nav-active-bg)}
.bnav-icon-wrap{position:relative;display:inline-flex;z-index:1}
.bnav-icon{font-size:22px;line-height:1;color:var(--nav-icon);transition:all .18s;display:block}
.bnav-btn.active .bnav-icon{color:var(--nav-icon-active);transform:scale(1.1)}
.bnav-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--nav-label);transition:color .18s;z-index:1}
.bnav-btn.active .bnav-label{color:var(--nav-label-active)}
.bnav-badge{
  position:absolute;top:-4px;right:-6px;
  background:var(--accent);color:var(--bg);font-size:8px;
  min-width:15px;height:15px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:system-ui,sans-serif;font-weight:700;padding:0 3px;
}

/* Section header */
.section-header{padding:24px 0 16px;text-align:center}
.date-line{font-size:13px;color:var(--text3);letter-spacing:.06em}
.doy-line{font-size:var(--fs-xs);color:var(--text4);margin-top:3px;letter-spacing:.18em;text-transform:uppercase}

/* Month/Book banner */
.month-banner{
  background:var(--accent-bg);border:1px solid var(--border2);
  border-radius:8px;padding:13px 17px;margin-bottom:15px;
  display:flex;justify-content:space-between;align-items:center;gap:10px
}
.banner-left{}
.banner-theme{font-size:calc(var(--fs-base) + 1px);color:var(--text);font-weight:400}
.banner-sub{font-size:var(--fs-xs);letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-top:3px}
.banner-right{font-size:var(--fs-xs);letter-spacing:.18em;text-transform:uppercase;color:var(--accent);text-align:right;flex-shrink:0}

/* Today card */
.today-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:26px 22px;box-shadow:var(--card-shadow);margin-bottom:15px;position:relative;overflow:hidden
}
.today-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
.passage-eyebrow{font-size:var(--fs-xs);letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.passage-title{font-size:var(--fs-title);font-weight:400;color:var(--text);margin-bottom:15px;letter-spacing:-.01em;line-height:1.25}
.passage-body{font-size:var(--fs-body);line-height:1.9;color:var(--text2);white-space:pre-wrap}
.fav-btn{position:absolute;top:13px;right:13px;background:none;border:none;cursor:pointer;
  font-size:20px;line-height:1;padding:4px;transition:all .2s;color:var(--border2)}
.fav-btn.active{color:var(--accent)}
.fav-btn:hover{transform:scale(1.15)}

/* Reflections */
.reflection-add{background:var(--bg3);border:1px solid var(--border3);border-radius:10px;padding:17px;margin-bottom:13px}
.block-label{font-size:var(--fs-xs);letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
textarea{width:100%;min-height:88px;background:var(--input-bg);border:1px solid var(--border2);
  border-radius:7px;padding:11px 13px;color:var(--text);font-size:var(--fs-body);line-height:1.7;
  font-family:Georgia,serif;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text4)}
.btn-row{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:8px}
.saved-hint{font-size:var(--fs-xs);color:var(--accent);letter-spacing:.1em}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:5px;
  padding:9px 20px;color:var(--bg);cursor:pointer;font-size:var(--fs-sm);letter-spacing:.08em;
  font-family:Georgia,serif;font-weight:700;transition:opacity .18s}
.btn-primary:disabled{background:var(--border3);color:var(--text4);cursor:default}
.btn-primary:not(:disabled):hover{opacity:.82}
.past-label{font-size:var(--fs-xs);letter-spacing:.24em;text-transform:uppercase;color:var(--text4);text-align:center;margin:16px 0 10px}
.reflection-entry{background:var(--accent-bg);border-left:2px solid var(--accent);border-radius:0 7px 7px 0;padding:10px 14px;margin-bottom:8px}
.ref-meta{font-size:var(--fs-xs);color:var(--text3);margin-bottom:5px;letter-spacing:.05em}
.ref-text{font-size:calc(var(--fs-base) - 1px);line-height:1.75;color:var(--text2)}

/* List cards */
.card-list{display:flex;flex-direction:column;gap:7px}
.list-card{border:1px solid var(--border2);border-radius:10px;background:var(--bg2);overflow:hidden}
.list-card-head{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:flex-start;gap:10px;transition:background .14s}
.list-card-head:hover{background:var(--accent-bg)}
.lc-info{flex:1;min-width:0}
.lc-eyebrow{font-size:var(--fs-xs);color:var(--text4);letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
.lc-title{font-size:var(--fs-base);color:var(--text);line-height:1.3}
.lc-meta{font-size:var(--fs-xs);color:var(--text3);margin-top:4px}
.lc-actions{display:flex;gap:7px;align-items:center;flex-shrink:0}
.chevron{color:var(--text4);font-size:9px;margin-top:2px}
.list-card-body{border-top:1px solid var(--border2);padding:0 16px 17px}
.list-card-body .passage-body{font-size:calc(var(--fs-body) - 1px);margin:13px 0}

/* Search */
.search-tabs{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:16px}
.s-tab{flex:1;padding:10px 10px;cursor:pointer;background:transparent;border:none;
  color:var(--text3);font-family:Georgia,serif;font-size:var(--fs-sm);letter-spacing:.04em;
  transition:all .14s;text-align:center}
.s-tab:hover{background:var(--accent-bg);color:var(--text2)}
.s-tab.active{background:var(--accent-bg);color:var(--accent);border-bottom:2px solid var(--accent)}
.s-tab:not(:last-child){border-right:1px solid var(--border2)}
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;background:var(--input-bg);border:1px solid var(--border2);
  border-radius:8px;padding:11px 14px 11px 38px;color:var(--text);
  font-size:var(--fs-body);font-family:Georgia,serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text4)}
.s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:14px;pointer-events:none}
.result-count{font-size:var(--fs-xs);color:var(--text4);text-align:right;margin-bottom:9px;letter-spacing:.1em}

/* Calendar */
.cal-hint{font-size:var(--fs-xs);color:var(--text4);letter-spacing:.1em;margin-bottom:13px;text-align:center}
.cal-list{display:flex;flex-direction:column;gap:7px}
.cal-month-card{border:1px solid var(--border2);border-radius:10px;background:var(--bg2);overflow:hidden}
.cal-month-head{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;transition:background .14s}
.cal-month-head:hover{background:var(--accent-bg)}
.cm-left{}
.cm-name{font-size:calc(var(--fs-base) + 2px);color:var(--text);font-weight:400;margin-bottom:2px}
.cm-theme{font-size:var(--fs-xs);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:1px}
.cm-sub{font-size:var(--fs-xs);color:var(--text4);letter-spacing:.06em}
.cm-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.cm-badge{background:var(--badge-bg);color:var(--badge-text);font-size:var(--fs-xs);
  padding:2px 7px;border-radius:20px;letter-spacing:.06em;white-space:nowrap}
.cal-days{border-top:1px solid var(--border2)}
.cal-day-row{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:9px;
  border-bottom:1px solid var(--border3);transition:background .12s}
.cal-day-row:last-child{border-bottom:none}
.cal-day-row:hover{background:var(--accent-bg)}
.cal-day-row.is-today{background:var(--accent-bg);border-left:2px solid var(--accent)}
.cd-num{font-size:var(--fs-xs);color:var(--text4);letter-spacing:.1em;min-width:24px;flex-shrink:0}
.cd-title{font-size:calc(var(--fs-base) - 1px);color:var(--text2);flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-day-row.is-today .cd-title{color:var(--text)}
.cd-fav{color:var(--accent);font-size:11px;flex-shrink:0}
.cd-ref{font-size:var(--fs-xs);color:var(--text3);flex-shrink:0}

/* Empty */
.empty-state{text-align:center;padding:54px 20px}
.es-icon{font-size:26px;color:var(--border2);margin-bottom:11px}
.es-title{font-size:calc(var(--fs-base)+1px);color:var(--text3);margin-bottom:4px}
.es-sub{font-size:var(--fs-sm);color:var(--text4)}

/* Settings sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
[data-theme="chalk"] .sheet-overlay{background:rgba(0,0,0,.22)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);border:1px solid var(--border);border-bottom:none;
  border-radius:18px 18px 0 0;padding:20px 22px calc(28px + var(--safe-bottom));
  width:100%;max-width:680px;animation:slideUp .22s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.sheet-title{font-size:19px;font-weight:400;color:var(--text);margin-bottom:20px}
.sheet-section{margin-bottom:20px}
.sheet-label{font-size:var(--fs-xs);letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.t-swatch{padding:11px 6px;border-radius:9px;cursor:pointer;border:2px solid transparent;
  text-align:center;transition:all .15s;font-family:Georgia,serif}
.t-swatch:hover{transform:translateY(-1px)}
.t-swatch.active{border-color:var(--accent)}
.t-amber{background:#1a1408;color:#e8a83a}
.t-slate{background:#0f1220;color:#70b8f8}
.t-chalk{background:#f0ece4;color:#2e6030;border:1px solid #ccc8bc}
.t-obsidian{background:#141414;color:#c0c0c0}
.t-name{font-size:12px;font-weight:600;display:block;margin-bottom:2px}
.t-sub{font-size:9px;opacity:.65;display:block;letter-spacing:.04em}
.size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.sz-btn{padding:10px 6px;border-radius:7px;cursor:pointer;border:1px solid var(--border3);
  background:transparent;color:var(--text2);font-family:Georgia,serif;transition:all .15s;text-align:center}
.sz-btn:hover{border-color:var(--border2);background:var(--accent-bg)}
.sz-btn.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.sz-demo{display:block;margin-bottom:2px;line-height:1}
.sz-label{font-size:9px;display:block;letter-spacing:.08em;text-transform:uppercase;color:var(--text4)}
.sheet-close{width:100%;padding:12px;border-radius:9px;cursor:pointer;
  border:1px solid var(--border);background:var(--accent-bg);color:var(--accent);
  font-family:Georgia,serif;font-size:var(--fs-sm);letter-spacing:.1em;transition:all .15s;margin-top:2px}
.sheet-close:hover{background:var(--accent);color:var(--bg)}
.month-group-label{font-size:var(--fs-xs);letter-spacing:.2em;text-transform:uppercase;
  color:var(--text3);padding:10px 2px 6px}

@media(max-width:400px){
  .theme-grid{grid-template-columns:repeat(2,1fr)}
  .month-banner{flex-direction:column;align-items:flex-start;gap:3px}
  .banner-right{text-align:left}
  .book-pill{padding:5px 9px;font-size:10px}
}
</style>
</head>
<body data-theme="amber">
<div class="grain"></div>
<div class="glow"></div>
<div class="shell">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="wordmark">
        <div class="wordmark-main" id="wordmark-title">My Daily Stoic</div>

    body: `“The chief task in life is simply this: to identify and separate matters so that I can say clearly to myself which are externals not under my control, and which have to do with the choices I actually control. Where then do I look for good and evil? Not to uncontrollable externals, but within myself to the choices that are my own . . .”

—EPICTETUS, DISCOURSES, 2.5.4–5

The single most important practice in Stoic philosophy is differentiating between what we can change and what we can’t. What we have influence over and what we do not. A flight is delayed because of weather—no amount of yelling at an airline representative will end a storm. No amount of wishing will make you taller or shorter or born in a different country. No matter how hard you try, you can’t* make* someone like you. And on top of that, time spent hurling yourself at these immovable objects is time not spent on the things we *can* change.

The recovery community practices something called the Serenity Prayer: “God, grant me the serenity to accept the things I cannot change, the courage to change the things I can, and the wisdom to know the difference.” Addicts cannot change the abuse suffered in childhood. They cannot undo the choices they have made or the hurt they have caused. But they *can* change the future—through the power they have in the present moment. As Epictetus said, they can control the choices they make right now.

  19: {

  21: {

    body: `“Ask yourself the following first thing in the morning:

Many successful people have a morning ritual. For some, it’s meditation. For others, it’s exercise. For many, it’s journaling—just a few pages where they write down their thoughts, fears, hopes. In these cases, the point is not so much the activity itself as it is the ritualized reflection. The idea is to take some time to look inward and examine.

Taking that time is what Stoics advocated more than almost anything else. We don’t know whether Marcus Aurelius wrote his *Meditations* in the morning or at night, but we know he carved out moments of quiet alone time—and that he wrote for himself, not for anyone else. If you’re looking for a place to start your own ritual, you could do worse than Marcus’s example and Epictetus’s checklist.

Every day, starting today, ask yourself these same tough questions. Let philosophy and hard work guide you to better answers, one morning at a time, over the course of a life.`,

  22: {
    month: `January`,
    day: 22,
    title: `THE DAY IN REVIEW`,
    body: `“I will keep constant watch over myself and—most usefully—will put each day up for review. For this is what makes us evil—that none of us looks back upon our own lives. We reflect upon only that which we are about to do. And yet our plans for the future descend from the past.”

—SENECA, MORAL LETTERS, 83.2

In a letter to his older brother Novatus, Seneca describes a beneficial exercise he borrowed from another prominent philosopher. At the end of each day he would ask himself variations of the following questions: *What bad habit did I curb today? How am I better? Were my actions just? How can I improve?*

At the beginning or end of each day, the Stoic sits down with his journal and reviews: what he did, what he thought, what could be improved. It’s for this reason that Marcus Aurelius’s *Meditations* is a somewhat inscrutable book—it was for personal clarity and not public benefit. Writing down Stoic exercises was and is also a form of practicing them, just as repeating a prayer or hymn might be.

Keep your own journal, whether it’s saved on a computer or in a little notebook. Take time to consciously recall the events of the previous day. Be unflinching in your assessments. Notice what contributed to your happiness and what detracted from it. Write down what you’d like to work on or quotes that you like. By making the effort to record such thoughts, you’re less likely to forget them. An added bonus: you’ll have a running tally to track your progress too.`,

    discipline: `The Discipline of Perception`,

  23: {

    title: `THE TRUTH ABOUT MONEY`,
    body: `“Let’s pass over to the really rich—how often the occasions they look just like the poor! When they travel abroad they must restrict their baggage, and when haste is necessary, they dismiss their entourage. And those who are in the army, how few of their possessions they get to keep . . .”

The author F. Scott Fitzgerald, who often glamorized the lifestyles of the rich and famous in books like *The Great Gatsby*, opens one of his short stories with the now classic lines: “Let me tell you about the very rich. They are different from you and me.” A few years after this story was published, his friend Ernest Hemingway teased Fitzgerald by writing, “Yes, they have more money.”

That’s what Seneca is reminding us. As someone who was one of the richest men in Rome, he knew firsthand that money only marginally changes life. It doesn’t solve the problems that people without it seem to think it will. In fact, no material possession will. External things can’t fix internal issues.

We constantly forget this—and it causes us so much confusion and pain. As Hemingway would later write of Fitzgerald, “He thought [the rich] were a special glamorous race and when he found they weren’t it wrecked him as much as any other thing that wrecked him.” Without a change the same will be true for us.`,

  24: {
    month: `January`,
    day: 24,
    title: `PUSH FOR DEEP UNDERSTANDING`,
    body: `“From Rusticus . . . I learned to read carefully and not be satisfied with a rough understanding of the whole, and not to agree too quickly with those who have a lot to say about something.”

—MARCUS AURELIUS, MEDITATIONS, 1.7.3

The first book of Marcus Aurelius’s *Meditations* begins with a catalog of gratitude. He thanks, one by one, the leading influences in his life. One of the people he thanks is Quintus Junius Rusticus, a teacher who developed in his student a love of deep clarity and understanding—a desire to not just stop at the surface when it comes to learning.

It was also from Rusticus that Marcus was introduced to Epictetus. In fact, Rusticus loaned Marcus his personal copy of Epictetus’s lectures. Marcus clearly wasn’t satisfied with just getting the gist of these lectures and didn’t simply accept them on his teacher’s recommendation. Paul Johnson once joked that Edmund Wilson read books “as though the author was on trial for his life.” That’s how Marcus read Epictetus—and when the lessons passed muster, he *absorbed *them. They became part of his DNA as a human being. He quoted them at length over the course of his life, finding real clarity and strength in words, even amid the immense luxury and power he would come to possess.

That’s the kind of deep reading and study we need to cultivate as well, which is why we’re reading just one page a day instead of a chapter at a time. So we can take the time to read attentively and deeply.`,

  25: {
    month: `January`,
    day: 25,
    title: `THE ONLY PRIZE`,
    body: `“What’s left to be prized? This, I think—to limit our action or inaction to only what’s in keeping with the needs of our own preparation . . . it’s what the exertions of education and teaching are all about—here is the thing to be prized! If you hold this firmly, you’ll stop trying to get yourself all the other things. . . . If you don’t, you won’t be free, self-sufficient, or liberated from passion, but necessarily full of envy, jealousy, and suspicion for any who have the power to take them, and you’ll plot against those who do have what you prize. . . . But by having some self-respect for your own mind and prizing it, you will please yourself and be in better harmony with your fellow human beings, and more in tune with the gods—praising everything they have set in order and allotted you.”

—MARCUS AURELIUS, MEDITATIONS, 6.16.2b–4a

Warren Buffett, whose net worth is approximately $65 billion, lives in the same house he bought in 1958 for $31,500. John Urschel, a lineman for the Baltimore Ravens, makes millions but manages to live on $25,000 a year. San Antonio Spurs star Kawhi Leonard gets around in the 1997 Chevy Tahoe he’s had since he was a teenager, even with a contract worth some $94 million. Why? It’s not because these men are cheap. It’s because the things *that matter to them are cheap*.

Neither Buffett nor Urschel nor Leonard ended up this way by accident. Their lifestyle is the result of prioritizing. They cultivate interests that are decidedly below their financial means, and as a result, *any* income would allow them freedom to pursue the things they most care about. It just happens that they became wealthy beyond any expectation. This kind of clarity—about what they love most in the world—means they can enjoy their lives. It means they’d still be happy even if the markets were to turn or their careers were cut short by injury.

The more things we desire and the more we have to do to earn or attain those achievements, the less we actually enjoy our lives—and the less free we are.`,

  26: {
    month: `January`,
    day: 26,
    title: `THE POWER OF A MANTRA`,
    body: `“Erase the false impressions from your mind by constantly saying to yourself, I have it in my soul to keep out any evil, desire or any kind of disturbance—instead, seeing the true nature of things, I will give them only their due. Always remember this power that nature gave you.”

—MARCUS AURELIUS, MEDITATIONS, 8.29

Anyone who has taken a yoga class or been exposed to Hindu or Buddhist thought has probably heard of the concept of a mantra. In Sanskrit, it means “sacred utterance”—essentially a word, a phrase, a thought, even a sound—intended to provide clarity or spiritual guidance. A mantra can be especially helpful in the meditative process because it allows us to block out everything else while we focus.

It’s fitting, then, that Marcus Aurelius would suggest this Stoic mantra—a reminder or watch phrase to use when we feel false impressions, distractions, or the crush of everyday life upon us. It says, essentially, “I have the power within me to keep that out. I can see the truth.”

  27: {
    month: `January`,
    day: 27,
    title: `THE THREE AREAS OF TRAINING`,
    body: `“There are three areas in which the person who would be wise and good must be trained. The first has to do with desires and aversions—that a person may never miss the mark in desires nor fall into what repels them. The second has to do with impulses to act and not to act—and more broadly, with duty—that a person may act deliberately for good reasons and not carelessly. The third has to do with freedom from deception and composure and the whole area of judgment, the assent our mind gives to its perceptions. Of these areas, the chief and most urgent is the first which has to do with the passions, for strong emotions arise only when we fail in our desires and aversions.”

—EPICTETUS, DISCOURSES, 3.2.1–3a

Today, let’s focus on the three areas of training that Epictetus laid out for us.

First, we must consider what we should desire and what we should be averse to. Why? So that we want what is good and avoid what is bad. It’s not enough to just listen to your body—because our attractions often lead us astray.

Next, we must examine our impulses to act—that is, our *motivations.* Are we doing things for the right reasons? Or do we act because we haven’t stopped to think? Or do we believe that we *have* to do something?

Finally, there is our judgment. Our ability to see things clearly and properly comes when we use our great gift from nature: *reason.*

These are three distinct areas of training, but in practice they are inextricably intertwined. Our judgment affects what we desire, our desires affect how we act, just as our judgment determines how we act. But we can’t just expect this to happen. We must put real thought and energy into each area of our lives. If we do, we’ll find real clarity and success.`,
    theme: `Clarity`,

  28: {

  29: {

    title: `KEEP IT SIMPLE`,
    body: `“At every moment keep a sturdy mind on the task at hand, as a Roman and human being, doing it with strict and simple dignity, affection, freedom, and justice—giving yourself a break from all other considerations. You can do this if you approach each task as if it is your last, giving up every distraction, emotional subversion of reason, and all drama, vanity, and complaint over your fair share. You can see how mastery over a few things makes it possible to live an abundant and devout life—for, if you keep watch over these things, the gods won’t ask for more.”

  30: {

    day: 30,
    title: `YOU DON’T HAVE TO STAY ON TOP OF EVERYTHING`,
    body: `“If you wish to improve, be content to appear clueless or stupid in extraneous matters—don’t wish to seem knowledgeable. And if some regard you as important, distrust yourself.”

—EPICTETUS, ENCHIRIDION, 13a

One of the most powerful things you can do as a human being in our hyperconnected, 24/7 media world is say: “I don’t know.” Or, more provocatively: “I don’t care.” Most of society seems to have taken it as a commandment that one must know about every single current event, watch every episode of every critically acclaimed television series, follow the news religiously, and present themselves to others as an informed and worldly individual.

    title: `PHILOSOPHY AS MEDICINE OF THE SOUL`,
    body: `“Don’t return to philosophy as a task-master, but as patients seek out relief in a treatment of sore eyes, or a dressing for a burn, or from an ointment. Regarding it this way, you’ll obey reason without putting it on display and rest easy in its care.”

  32: {

    title: `FOR THE HOT-HEADED MAN`,
    body: `“Keep this thought handy when you feel a fit of rage coming on—it isn’t manly to be enraged. Rather, gentleness and civility are more human, and therefore manlier. A real man doesn’t give way to anger and discontent, and such a person has strength, courage, and endurance—unlike the angry and complaining. The nearer a man comes to a calm mind, the closer he is to strength.”

Why do athletes talk trash to each other? Why do they deliberately say offensive and nasty things to their competitors when the refs aren’t looking? To provoke a reaction. Distracting and angering opponents is an easy way to knock them off their game.

  33: {
    month: `February`,
    day: 2,
    title: `A PROPER FRAME OF MIND`,
    body: `“Frame your thoughts like this—you are an old person, you won’t let yourself be enslaved by this any longer, no longer pulled like a puppet by every impulse, and you’ll stop complaining about your present fortune or dreading the future.”

—MARCUS AURELIUS, MEDITATIONS, 2.2

We resent the person who comes in and tries to boss us around. *Don’t tell me how to dress, how to think, how to do my job, how to live*. This is because we are independent, self-sufficient people.

We would never let another person jerk us around the way we let our impulses do. It’s time we start seeing it that way—that we’re not puppets that can be made to dance this way or that way just because we feel like it. We should be the ones in control, not our emotions, because we are independent, self-sufficient people.`,

  34: {
    month: `February`,
    day: 3,
    title: `THE SOURCE OF YOUR ANXIETY`,
    body: `“When I see an anxious person, I ask myself, what do they want? For if a person wasn’t wanting something outside of their own control, why would they be stricken by anxiety?”

—EPICTETUS, DISCOURSES, 2.13.1

The anxious father, worried about his children. What does he want? A world that is always safe. A frenzied traveler—what does she want? For the weather to hold and for traffic to part so she can make her flight. A nervous investor? That the market will turn around and an investment will pay off.

All of these scenarios hold the same thing in common. As Epictetus says, it’s wanting something outside our control. Getting worked up, getting excited, nervously pacing—these intense, pained, and anxious moments show us at our most futile and servile. Staring at the clock, at the ticker, at the next checkout lane over, at the sky—it’s as if we all belong to a religious cult that believes the gods of fate will only give us what we want if we sacrifice our peace of mind.

  35: {
    month: `February`,
    day: 4,
    title: `ON BEING INVINCIBLE`,
    body: `“Who then is invincible? The one who cannot be upset by anything outside their reasoned choice.”

—EPICTETUS, DISCOURSES, 1.18.21

Have you ever watched a seasoned pro handle the media? No question is too tough, no tone too pointed or insulting. They parry every blow with humor, poise, and patience. Even when stung or provoked, they *choose *not to flinch or react. They’re able to do this not only because of training and experience, but because they understand that reacting emotionally will only make the situation worse. The media is waiting for them to slip up or get upset, so to successfully navigate press events they have internalized the importance of keeping themselves under calm control.

It’s unlikely you’ll face a horde of probing reporters bombarding you with insensitive questions today. But it might be helpful—whatever stresses or frustrations or overload that do come your way—to picture that image and use it as your model for dealing with them. Our reasoned choice—our *prohairesis*, as the Stoics called it—is a kind of invincibility that we can cultivate. We can shrug off hostile attacks and breeze through pressure or problems. And, like our model, when we finish, we can point back into the crowd and say, “Next!”`,

  36: {

    title: `STEADY YOUR IMPULSES`,
    body: `“Don’t be bounced around, but submit every impulse to the claims of justice, and protect your clear conviction in every appearance.”

Think of the manic people in your life. Not the ones suffering from an unfortunate disorder, but the ones whose lives and choices are *in* disorder. Everything is soaring highs or crushing lows; the day is either amazing or awful. Aren’t those people exhausting? Don’t you wish they just had a filter through which they could test the good impulses versus the bad ones?

There is such a filter. Justice. Reason. Philosophy. If there’s a central message of Stoic thought, it’s this: impulses of all kinds are going to come, and your work is to control them, like bringing a dog to heel. Put more simply: think before you act. Ask: *Who is in control here? What principles are guiding me?*`,

  37: {
    month: `February`,
    day: 6,
    title: `DON’T SEEK OUT STRIFE`,
    body: `“I don’t agree with those who plunge headlong into the middle of the flood and who, accepting a turbulent life, struggle daily in great spirit with difficult circumstances. The wise person will endure that, but won’t choose it—choosing to be at peace, rather than at war.”

—SENECA, MORAL LETTERS, 28.7

It has become a cliché to quote Theodore Roosevelt’s “Man in the Arena” speech, which lionizes “the one whose face is marred by dust and sweat and blood; who strives valiantly . . .” compared with the critic who sits on the sidelines. Roosevelt gave that speech shortly after he left office, at the height of his popularity. In a few years, he would run against his former protégé in an attempt to retake the White House, losing badly and nearly assassinated in the process. He would also nearly die exploring a river in the Amazon, kill thousands of animals in African safaris, and then beg Woodrow Wilson to allow him to enlist in World War I despite being 59 years old. He would do a *lot* of things that seem somewhat baffling in retrospect.

Theodore Roosevelt was a truly great man. But he was also driven by a compulsion, a work and activity addiction that was seemingly without end. Many of us share this affliction—being driven by something we can’t control. We’re afraid of being still, so we seek out strife and action as a distraction. We choose to be at war—in some cases, literally—when peace is in fact the more honorable and fitting choice.

Yes, the man in the arena is admirable. As is the soldier and the politician and the businesswoman and all the other occupations. But, and this is a big *but*, only if we’re in the arena for the right reasons.`,

  38: {
    month: `February`,
    day: 7,
    title: `FEAR IS A SELF-FULFILLING PROPHECY`,
    body: `“Many are harmed by fear itself, and many may have come to their fate while dreading fate.”

—SENECA, OEDIPUS, 992

“Only the paranoid survive,” Andy Grove, a former CEO of Intel, famously said. It might be true. But we also know that the paranoid often destroy themselves quicker and more spectacularly than any enemy. Seneca, with his access and insight into the most powerful elite in Rome, would have seen this dynamic play out quite vividly. Nero, the student whose excesses Seneca tried to curb, killed not only his own mother and wife but eventually turned on Seneca, his mentor, too.

The combination of power, fear, and mania can be deadly. The leader, convinced that he might be betrayed, acts first and betrays others first. Afraid that he’s not well liked, he works so hard to get others to like him that it has the opposite effect. Convinced of mismanagement, he micromanages and becomes the source of the mismanagement. And on and on—the things we fear or dread, we blindly inflict on ourselves.

The next time you are afraid of some supposedly disastrous outcome, remember that if you don’t control your impulses, if you lose your self-control, you may be the very source of the disaster you so fear. It has happened to smarter and more powerful and more successful people. It can happen to us too.`,

  39: {
    month: `February`,
    day: 8,
    title: `DID THAT MAKE YOU FEEL BETTER?`,
    body: `“You cry, I’m suffering severe pain! Are you then relieved from feeling it, if you bear it in an unmanly way?”

—SENECA, MORAL LETTERS, 78.17

The next time someone gets upset near you—crying, yelling, breaking something, being pointed or cruel—watch how quickly this statement will stop them cold: “I hope this is making you feel better.” Because, of course, it isn’t. Only in the bubble of extreme emotion can we justify any of that kind of behavior—and when called to account for it, we usually feel sheepish or embarrassed.

It’s worth applying that standard to yourself. The next time you find yourself in the middle of a freakout, or moaning and groaning with flulike symptoms, or crying tears of regret, just ask: *Is this actually making me feel better? Is this actually relieving *any* of the symptoms I wish were gone?*`,

  40: {
    month: `February`,
    day: 9,
    title: `YOU DON’T HAVE TO HAVE AN OPINION`,
    body: `“We have the power to hold no opinion about a thing and to not let it upset our state of mind—for things have no natural power to shape our judgments.”

—MARCUS AURELIUS, MEDITATIONS, 6.52

Here’s a funny exercise: think about all the upsetting things you *don’t* know about—stuff people might have said about you behind your back, mistakes you might have made that never came to your attention, things you dropped or lost without even realizing it. What’s your reaction? You don’t have one because you don’t know about it.

In other words, it *is* possible to hold no opinion about a negative thing. You just need to cultivate that power instead of wielding it accidentally. Especially when having an opinion is likely to make us aggravated. Practice the ability of having absolutely no thoughts about something—act as if you had no idea it ever occurred. Or that you’ve never heard of it before. Let it become irrelevant or nonexistent to you. It’ll be a lot less powerful this way.`,

  41: {
    month: `February`,
    day: 10,
    title: `ANGER IS BAD FUEL`,
    body: `“There is no more stupefying thing than anger, nothing more bent on its own strength. If successful, none more arrogant, if foiled, none more insane—since it’s not driven back by weariness even in defeat, when fortune removes its adversary it turns its teeth on itself.”

—SENECA, ON ANGER, 3.1.5

As the Stoics have said many times, getting angry almost never solves anything. Usually, it makes things worse. We get upset, then the other person gets upset—now everyone is upset, and the problem is no closer to getting solved.

Many successful people will try to tell you that anger is a powerful fuel in their lives. The desire to “prove them all wrong” or “shove it in their faces” has made many a millionaire. The anger at being called fat or stupid has created fine physical specimens and brilliant minds. The anger at being rejected has motivated many to carve their own path.

But that’s shortsighted. Such stories ignore the pollution produced as a side effect and the wear and tear it put on the engine. It ignores what happens when that initial anger runs out—and how now more and more must be generated to keep the machine going (until, eventually, the only source left is anger at oneself). “Hate is too great a burden to bear,” Martin Luther King Jr. warned his fellow civil rights leaders in 1967, even though they had every reason to respond to hate with hate.

  42: {
    month: `February`,
    day: 11,
    title: `HERO OR NERO?`,
    body: `“Our soul is sometimes a king, and sometimes a tyrant. A king, by attending to what is honorable, protects the good health of the body in its care, and gives it no base or sordid command. But an uncontrolled, desire-fueled, over-indulged soul is turned from a king into that most feared and detested thing—a tyrant.”

—SENECA, MORAL LETTERS, 114.24

There is that saying that absolute power corrupts absolutely. At first glance, that’s true. Seneca’s pupil Nero and his litany of crimes and murders is a perfect example. Another emperor, Domitian, arbitrarily banished all philosophers from Rome (Epictetus was forced to flee as a result). Many of Rome’s emperors were tyrants. Yet, not many years later, Epictetus would become a close friend of another emperor, Hadrian, who would help Marcus Aurelius to the throne, one of the truest examples of a wise philosopher king.

So it’s not so clear that power *always *corrupts. In fact, it looks like it comes down, in many ways, to the inner strength and self-awareness of individuals—what they value, what desires they keep in check, whether their understanding of fairness and justice can counteract the temptations of unlimited wealth and deference.

The same is true for you. Both personally and professionally. Tyrant or king? Hero or Nero? Which will you be?`,

  43: {
    month: `February`,
    day: 12,
    title: `PROTECT YOUR PEACE OF MIND`,
    body: `“Keep constant guard over your perceptions, for it is no small thing you are protecting, but your respect, trustworthiness and steadiness, peace of mind, freedom from pain and fear, in a word your freedom. For what would you sell these things?”

—EPICTETUS, DISCOURSES, 4.3.6b–8

The dysfunctional job that stresses you out, a contentious relationship, life in the spotlight. Stoicism, because it helps us manage and think through our emotional reactions, can make these kinds of situations easier to bear. It can help you manage and mitigate the triggers that seem to be so constantly tripped.

But here’s a question: Why are you subjecting yourself to this? Is this really the environment you were made for? To be provoked by nasty emails and an endless parade of workplace problems? Our adrenal glands can handle only so much before they become exhausted. Shouldn’t you preserve them for life-and-death situations?

So yes, use Stoicism to manage these difficulties. But don’t forget to ask: *Is this really the life I want?* Every time you get upset, a little bit of life leaves the body. Are these really the things on which you want to spend that priceless resource? Don’t be afraid to make a change—a big one.`,
    theme: `Passions and Emotions`,
    discipline: `The Discipline of Perception`,

  44: {
    month: `February`,
    day: 13,
    title: `PLEASURE CAN BECOME PUNISHMENT`,
    body: `“Whenever you get an impression of some pleasure, as with any impression, guard yourself from being carried away by it, let it await your action, give yourself a pause. After that, bring to mind both times, first when you have enjoyed the pleasure and later when you will regret it and hate yourself. Then compare to those the joy and satisfaction you’d feel for abstaining altogether. However, if a seemingly appropriate time arises to act on it, don’t be overcome by its comfort, pleasantness, and allure—but against all of this, how much better the consciousness of conquering it.”

—EPICTETUS, ENCHIRIDION, 34

Self-control is a difficult thing, no question. Which is why a popular trick from dieting might be helpful. Some diets allow a “cheat day”—one day per week in which dieters can eat anything and everything they want. Indeed, they’re encouraged to write a list during the week of all the foods they craved so they can enjoy them all at once as a treat (the thinking being that if you’re eating healthy six out of seven days, you’re still ahead).

At first, this sounds like a dream, but anyone who has actually done this knows the truth: each cheat day you eat yourself sick and hate yourself afterward. Soon enough, you’re willingly abstaining from cheating at all. Because you don’t need it, and you definitely don’t want it. It’s not unlike a parent catching her child with cigarettes and forcing him to smoke the whole pack.

It’s important to connect the so-called temptation with its actual effects. Once you understand that indulging might actually be worse than resisting, the urge begins to lose its appeal. In this way, self-control becomes the real pleasure, and the temptation becomes the regret.`,

    discipline: `The Discipline of Perception`,

  45: {
    month: `February`,
    day: 14,
    title: `THINK BEFORE YOU ACT`,
    body: `“For to be wise is only one thing—to fix our attention on our intelligence, which guides all things everywhere.”

—HERACLITUS, QUOTED IN DIOGENES LAERTIUS, LIVES OF THE EMINENT PHILOSOPHERS, 9.1

W*hy did I *do* that?* you’ve probably asked yourself. We all have. *How could I have been so stupid? What was I thinking?*

You weren’t. That’s the problem. Within that head of yours is all the reason and intelligence you need. It’s making sure that it’s deferred to and utilized that’s the tough part. It’s making sure that your mind is in charge, not your emotions, not your immediate physical sensations, not your surging hormones.

  46: {
    month: `February`,
    day: 15,
    title: `ONLY BAD DREAMS`,
    body: `“Clear your mind and get a hold on yourself and, as when awakened from sleep and realizing it was only a bad dream upsetting you, wake up and see that what’s there is just like those dreams.”

—MARCUS AURELIUS, MEDITATIONS, 6.31

The author Raymond Chandler was describing most of us when he wrote in a letter to his publisher, “I never looked back, although I had many uneasy periods looking forward.” Thomas Jefferson once joked in a letter to John Adams, “How much pain have cost us the evils which have never happened!” And Seneca would put it best: “There is nothing so certain in our fears that’s not yet more certain in the fact that most of what we dread comes to nothing.”

Many of the things that upset us, the Stoics believed, are a product of the imagination, not reality. Like dreams, they are vivid and realistic at the time but preposterous once we come out of it. In a dream, we never stop to think and say: “Does this make any sense?” No, we go along with it. The same goes with our flights of anger or fear or other extreme emotions.

Getting upset is like continuing the dream while you’re awake. The thing that provoked you wasn’t real—but your reaction was. And so from the fake comes real consequences. Which is why you need to wake up right now instead of creating a nightmare.`,

  47: {
    month: `February`,
    day: 16,
    title: `DON’T MAKE THINGS HARDER THAN THEY NEED TO BE`,
    body: `“If someone asks you how to write your name, would you bark out each letter? And if they get angry, would you then return the anger? Wouldn’t you rather gently spell out each letter for them? So then, remember in life that your duties are the sum of individual acts. Pay attention to each of these as you do your duty . . . just methodically complete your task.”

Here’s a common scenario. You’re working with a frustrating coworker or a difficult boss. They ask you to do something and, because you dislike the messenger, you immediately object. There’s this problem or that one, or their request is obnoxious and rude. So you tell them, “No, I’m not going to do it.” Then they retaliate by not doing something that you had previously asked of them. And so the conflict escalates.

Meanwhile, if you could step back and see it objectively, you’d probably see that not *everything* they’re asking for is unreasonable. In fact, some of it is pretty easy to do or is, at least, agreeable. And if you did it, it might make the rest of the tasks a bit more tolerable too. Pretty soon, you’ve done the entire thing.

  48: {
    month: `February`,
    day: 17,
    title: `THE ENEMY OF HAPPINESS`,
    body: `“It is quite impossible to unite happiness with a yearning for what we don’t have. Happiness has all that it wants, and resembling the well-fed, there shouldn’t be hunger or thirst.”

—EPICTETUS, DISCOURSES, 3.24.17

I*’ll be happy when I graduate,* we tell ourselves. *I’ll be happy when I get this promotion, when this diet pays off, when I have the money that my parents never had.* Conditional happiness is what psychologists call this kind of thinking. Like the horizon, you can walk for miles and miles and never reach it. You won’t even get any closer.

Eagerly anticipating some future event, passionately imagining something you desire, looking forward to some happy scenario—as pleasurable as these activities might seem, they ruin your chance at happiness here and now. Locate that yearning for *more, better, someday* and see it for what it is: the enemy of your contentment. Choose it or your happiness. As Epictetus says, the two are not compatible.`,

  49: {

    title: `PREPARE FOR THE STORM`,
    body: `“This is the true athlete—the person in rigorous training against false impressions. Remain firm, you who suffer, don’t be kidnapped by your impressions! The struggle is great, the task divine—to gain mastery, freedom, happiness, and tranquility.”

Epictetus also used the metaphor of a storm, saying that our impressions are not unlike extreme weather that can catch us and whirl us about. When we get worked up or passionate about an issue, we can relate.

    title: `THE BANQUET OF LIFE`,
    body: `“Remember to conduct yourself in life as if at a banquet. As something being passed around comes to you, reach out your hand and take a moderate helping. Does it pass you by? Don’t stop it. It hasn’t yet come? Don’t burn in desire for it, but wait until it arrives in front of you. Act this way with children, a spouse, toward position, with wealth—one day it will make you worthy of a banquet with the gods.”

    title: `THE GRAND PARADE OF DESIRE`,
    body: `“Robbers, perverts, killers, and tyrants—gather for your inspection their so-called pleasures!”

It’s never great to judge other people, but it’s worth taking a second to investigate how a life dedicated to indulging every whim actually works out. The writer Anne Lamott jokes in *Bird by Bird*, “Ever wonder what God thinks of money? Just look at the people he gives it to.” The same goes for pleasure. Look at the dictator and his harem filled with plotting, manipulative mistresses. Look how quickly the partying of a young starlet turns to drug addiction and a stalled career.

  52: {
    month: `February`,

    title: `WISH NOT, WANT NOT`,
    body: `“Remember that it’s not only the desire for wealth and position that debases and subjugates us, but also the desire for peace, leisure, travel, and learning. It doesn’t matter what the external thing is, the value we place on it subjugates us to another . . . where our heart is set, there our impediment lies.”

Surely, Epictetus isn’t saying that peace, leisure, travel, and learning are bad, is he? Thankfully, no. But ceaseless, ardent *desire*—if not bad in and of itself—is fraught with potential complications. What we desire makes us vulnerable. Whether it’s an opportunity to travel the world or to be the president or for five minutes of peace and quiet, when we pine for something, when we hope against hope, we set ourselves up for disappointment. Because fate can always intervene and then we’ll likely lose our self-control in response.

  53: {
    month: `February`,
    day: 22,
    title: `WHAT’S BETTER LEFT UNSAID`,
    body: `“Cato practiced the kind of public speech capable of moving the masses, believing proper political philosophy takes care like any great city to maintain the warlike element. But he was never seen practicing in front of others, and no one ever heard him rehearse a speech. When he was told that people blamed him for his silence, he replied, ‘Better they not blame my life. I begin to speak only when I’m certain what I’ll say isn’t better left unsaid.’”

—PLUTARCH, CATO THE YOUNGER, 4

It’s easy to act—to just dive in. It’s harder to stop, to pause, to think: *No, I’m not sure I need to do that yet. I’m not sure I am ready.* As Cato entered politics, many expected swift and great things from him—stirring speeches, roaring condemnations, wise analyses. He was aware of this pressure—a pressure that exists on all of us at all times—and resisted. It’s easy to pander to the mob (and to our ego).

Instead, he waited and *prepared.* He parsed his own thoughts, made sure he was not reacting emotionally, selfishly, ignorantly, or prematurely. Only then would he speak—when he was confident that his words were worthy of being heard.

  54: {
    month: `February`,
    day: 23,
    title: `CIRCUMSTANCES HAVE NO CARE FOR OUR FEELINGS`,
    body: `“You shouldn’t give circumstances the power to rouse anger, for they don’t care at all.”

—MARCUS AURELIUS, MEDITATIONS, 7.38

A significant chunk of Marcus Aurelius’s *Meditations* is made up of short quotes and passages from other writers. This is because Marcus wasn’t necessarily trying to produce an original work—instead he was *practicing*, reminding himself here and there of important lessons, and sometimes these lessons were things he had read.

This particular quote is special because it comes from a play by Euripides, which, except for a handful of quoted fragments like this, is lost to us. From what we can gather about the play, Bellerophon, the hero, comes to doubt the existence of the gods. But in this line, he is saying: Why bother getting mad at causes and forces far bigger than us? Why do we take these things personally? After all, external events are not sentient beings—they cannot respond to our shouts and cries—and neither can the mostly indifferent gods.

That’s what Marcus was reminding himself of here: circumstances are incapable of considering or caring for your feelings, your anxiety, or your excitement. They don’t care about your reaction. They are not people. So stop acting like getting worked up is having an impact on a given situation. Situations don’t care at all.`,

  55: {
    month: `February`,
    day: 24,
    title: `THE REAL SOURCE OF HARM`,
    body: `“Keep in mind that it isn’t the one who has it in for you and takes a swipe that harms you, but rather the harm comes from your own belief about the abuse. So when someone arouses your anger, know that it’s really your own opinion fueling it. Instead, make it your first response not to be carried away by such impressions, for with time and distance self-mastery is more easily achieved.”

—EPICTETUS, ENCHIRIDION, 20

The Stoics remind us that there really is no such thing as an objectively good or bad occurrence. When a billionaire loses $1 million in market fluctuation, it’s not the same as when you or I lose a million dollars. Criticism from your worst enemy is received differently than negative words from a spouse. If someone sends you an angry email but you never see it, did it actually happen? In other words, these situations require our participation, context, and categorization in order to be “bad.”

Our reaction is what actually decides whether harm has occurred. If we feel that we’ve been wronged and get angry, of course that’s how it will seem. If we raise our voice because we feel we’re being confronted, naturally a confrontation will ensue.

But if we retain control of ourselves, we decide whether to label something good or bad. In fact, if that same event happened to us at different points in our lifetime, we might have very different reactions. So why not choose now to *not* apply these labels? Why not choose *not* to react?`,

  56: {

    title: `THE SMOKE AND DUST OF MYTH`,
    body: `“Keep a list before your mind of those who burned with anger and resentment about something, of even the most renowned for success, misfortune, evil deeds, or any special distinction. Then ask yourself, how did that work out? Smoke and dust, the stuff of simple myth trying to be legend . . .”

  57: {
    month: `February`,
    day: 26,
    title: `TO EACH HIS OWN`,
    body: `“Another has done me wrong? Let him see to it. He has his own tendencies, and his own affairs. What I have now is what the common nature has willed, and what I endeavor to accomplish now is what my nature wills.”

—MARCUS AURELIUS, MEDITATIONS, 5.25

Abraham Lincoln occasionally got fuming mad with a subordinate, one of his generals, even a friend. Rather than taking it out on that person directly, he’d write a long letter, outlining his case why they were wrong and what he wanted them to know. Then Lincoln would fold it up, put the letter in the desk drawer, and never send it. Many of these letters survive only by chance.

He knew, as the former emperor of Rome knew, that it’s easy to fight back. It’s tempting to give them a piece of your mind. But you almost always end up with regret. You almost always wish you *hadn’t* sent the letter. Think of the last time you flew off the handle. What was the outcome? Was there any benefit?`,

  58: {
    month: `February`,
    day: 27,
    title: `CULTIVATING INDIFFERENCE WHERE OTHERS GROW PASSION`,
    body: `“Of all the things that are, some are good, others bad, and yet others indifferent. The good are virtues and all that share in them; the bad are the vices and all that indulge them; the indifferent lie in between virtue and vice and include wealth, health, life, death, pleasure, and pain.”

—EPICTETUS, DISCOURSES, 2.19.12b–13

Imagine the power you’d have in your life and relationships if all the things that trouble everyone else—how thin they are, how much money they have, how long they have left to live, how they will die—didn’t matter so much. What if, where others were upset, envious, excited, possessive, or greedy, you were objective, calm, and clearheaded? Can you envision that? Imagine what it would do for your relationships at work, or for your love life, or your friendships.

Seneca was an incredibly wealthy, even famous, man—yet he was a Stoic. He had many material things, yet, as the Stoics say, he was also indifferent to them. He enjoyed them while they were there, but he accepted that they might someday disappear. What a better attitude than desperately craving *more *or fearfully dreading losing even one penny. Indifference is solid middle ground.

  59: {
    month: `February`,
    day: 28,
    title: `WHEN YOU LOSE CONTROL`,
    body: `“The soul is like a bowl of water, and our impressions are like the ray of light falling upon the water. When the water is troubled, it appears that the light itself is moved too, but it isn’t. So, when a person loses their composure it isn’t their skills and virtues that are troubled, but the spirit in which they exist, and when that spirit calms down so do those things.”

—EPICTETUS, DISCOURSES, 3.3.20–22

You messed up a little. Or maybe you messed up *a lot.*

  60: {
    month: `February`,
    day: 29,
    title: `YOU CAN’T ALWAYS (BE) GET(TING) WHAT YOU WANT`,
    body: `“When children stick their hand down a narrow goody jar they can’t get their full fist out and start crying. Drop a few treats and you will get it out! Curb your desire—don’t set your heart on so many things and you will get what you need.”

—EPICTETUS, DISCOURSES, 3.9.22

“We can have it all” is the mantra of our modern lives. Work, family, purpose, success, leisure time—we want all of this, at the same time (right now, to boot).

In Greece, the lecture hall (*scholeion*) was a leisure center where students contemplated the higher things (the good, true, and beautiful) for the purpose of living a better life. It was about prioritization, about questioning the priorities of the outside world. Today, we’re too busy getting things, just like kids jamming their hand down a jar of goodies, to do much of this questioning.

“Don’t set your heart on so many things,” says Epictetus. Focus. Prioritize. Train your mind to ask: *Do I need this thing? What will happen if I do not get it? Can I make do without it?*

  61: {

    day: 1,
    title: `WHERE PHILOSOPHY BEGINS`,
    body: `“An important place to begin in philosophy is this: a clear perception of one’s own ruling principle.”

—EPICTETUS, DISCOURSES, 1.26.15

Philosophy is intimidating. Where does one start? With books? With lectures? With the sale of your worldly possessions?

None of these things. Epictetus is saying that one becomes a philosopher when they begin to exercise their guiding reason and start to question the emotions and beliefs and even language that others take for granted. It is thought that an animal has self-awareness when it is able to fully recognize itself in a mirror. Perhaps we could say that we begin our journey into philosophy when we become aware of the ability to analyze our own minds.

  62: {
    month: `March`,
    day: 2,
    title: `ACCURATE SELF-ASSESSMENT`,
    body: `“Above all, it is necessary for a person to have a true self-estimate, for we commonly think we can do more than we really can.”

—SENECA, ON TRANQUILITY OF MIND, 5.2

Most people resist the idea of a true self-estimate, probably because they fear it might mean *downgrading* some of their beliefs about who they are and what they’re capable of. As Goethe’s maxim goes, it is a great failing “to see yourself as more than you are.” How could you really be considered self-aware if you refuse to consider your weaknesses?

Don’t fear self-assessment because you’re worried you might have to admit some things about yourself. The second half of Goethe’s maxim is important too. He states that it is equally damaging to “value yourself at less than your true worth.” Is it not equally common to be surprised at how well we’re able to handle a previously feared scenario? The way that we’re able to put aside the grief for a loved one and care for others—though we always thought we’d be wrecked if something were to happen to our parents or a sibling. The way we’re able to rise to the occasion in a stressful situation or a life-changing opportunity.

We underestimate our capabilities just as much and just as dangerously as we overestimate other abilities. Cultivate the ability to judge yourself accurately and honestly. Look inward to discern what you’re capable of and what it will take to unlock that potential.`,

  63: {
    month: `March`,
    day: 3,
    title: `(DIS)INTEGRATION`,
    body: `“These things don’t go together. You must be a unified human being, either good or bad. You must diligently work either on your own reasoning or on things out of your control—take great care with the inside and not what’s outside, which is to say, stand with the philosopher, or else with the mob!”

—EPICTETUS, DISCOURSES, 3.15.13

We’re all complicated people. We have multiple sides to ourselves—conflicting wants, desires, and fears. The outside world is no less confusing and contradictory. If we’re not careful, all these forces—pushing and pulling—will eventually tear us apart. We can’t live as both Jekyll and Hyde. Not for long, anyway.

We have a choice: to stand with the philosopher and focus strenuously on the inside, or to behave like a leader of a mob, becoming whatever the crowd needs at a given moment.

  64: {
    month: `March`,
    day: 4,
    title: `AWARENESS IS FREEDOM`,
    body: `“The person is free who lives as they wish, neither compelled, nor hindered, nor limited—whose choices aren’t hampered, whose desires succeed, and who don’t fall into what repels them. Who wishes to live in deception—tripped up, mistaken, undisciplined, complaining, in a rut? No one. These are base people who don’t live as they wish; and so, no base person is free.”

—EPICTETUS, DISCOURSES, 4.1.1–3a

It is sad to consider how much time many people spend in the course of a day doing things they “have” to do—not necessary obligations like work or family, but the obligations we needlessly accept out of vanity or ignorance. Consider the actions we take in order to impress other people or the lengths we’ll go to fulfill urges or sate desires we don’t even question. In one of his famous letters, Seneca observes how often powerful people are slaves to their money, to their positions, to their mistresses, even—as was legal in Rome—to their slaves. “No slavery is more disgraceful,” he quipped, “than one which is self-imposed.”

We see this slavery all the time—a codependent person who can’t help but clean up after a dysfunctional friend, a boss who micromanages employees and sweats every penny. The countless causes, events, and get-togethers we’re too busy to attend but agree to anyway.

Take an inventory of your obligations from time to time. How many of these are self-imposed? How many of them are truly necessary? Are you as free as you think?`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  65: {
    month: `March`,
    day: 5,
    title: `CUTTING BACK ON THE COSTLY`,
    body: `“So, concerning the things we pursue, and for which we vigorously exert ourselves, we owe this consideration—either there is nothing useful in them, or most aren’t useful. Some of them are superfluous, while others aren’t worth that much. But we don’t discern this and see them as free, when they cost us dearly.”

—SENECA, MORAL LETTERS, 42.6

Of Seneca’s many letters, this is probably one of the most important—and one of the least understood. He’s making a point that goes unheard in a society of ever-bigger houses and ever more possessions: that there’s a hidden cost to all that accumulating. And the sooner we’re aware of it, the better.

Remember: even what we get for free has a cost, if only in what we pay to store it—in our garages and in our minds. As you walk past your possessions today, ask yourself: *Do I need this? Is it superfluous? What’s this actually worth? What is it costing me?*

You might be surprised by the answers and how much we’ve been paying without even knowing it.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  66: {
    month: `March`,
    day: 6,
    title: `DON’T TELL YOURSELF STORIES`,
    body: `“In public avoid talking often and excessively about your accomplishments and dangers, for however much you enjoy recounting your dangers, it’s not so pleasant for others to hear about your affairs.”

—EPICTETUS, ENCHIRIDION, 33.14

Modern philosopher Nassim Taleb has warned of the “narrative fallacy”—the tendency to assemble unrelated events of the past into stories. These stories, however gratifying to create, are inherently misleading. They lead to a sense of cohesion and certainty that isn’t real.

If that’s too heady, remember that as Epictetus points out, there is another reason not to tell stories about your past. It’s boring, annoying, and self-absorbed. It might make you feel good to dominate the conversation and make it all about you, but how do you think it is for everyone else? Do you think people are really enjoying the highlights of your high school football days? Is this really the time for another exaggerated tale of your sexual prowess?

Try your best not to create this fantasy bubble—live in what’s real. *Listen* and *connect* with people, don’t perform for them.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  67: {
    month: `March`,
    day: 7,
    title: `DON’T TRUST THE SENSES`,
    body: `“Heraclitus called self-deception an awful disease and eyesight a lying sense.”

—DIOGENES LAERTIUS, LIVES OF THE EMINENT PHILOSOPHERS, 9.7

Self-awareness is the ability to objectively evaluate the self. It’s the ability to question our own instincts, patterns, and assumptions. *Oiêsis*, self-deception or arrogant and unchallenged opinion, requires that we hold all our opinions up to hard scrutiny; even our eyes deceive us.

On the one hand, that’s alarming. *I can’t even trust my own senses?! *Sure, you could think about it that way. Or you could take it another way: because our senses are often wrong, our emotions overly alarmed, our projections overly optimistic, we’re better off not rushing into conclusions about anything. We can take a beat with everything we do and become aware of everything that’s going on so we can make the right decision.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  68: {
    month: `March`,
    day: 8,
    title: `DON’T UNINTENTIONALLY HAND OVER YOUR FREEDOM`,
    body: `“If a person gave away your body to some passerby, you’d be furious. Yet you hand over your mind to anyone who comes along, so they may abuse you, leaving it disturbed and troubled—have you no shame in that?”

—EPICTETUS, ENCHIRIDION, 28

Instinctively, we protect our physical selves. We don’t let people touch us, push us around, control where we go. But when it comes to the mind, we’re less disciplined. We hand it over willingly to social media, to television, to what other people are doing, thinking, or saying. We sit down to work and the next thing you know, we’re browsing the Internet. We sit down with our families, but within minutes we have our phones out. We sit down peacefully in a park, but instead of looking inward, we’re judging people as they pass by.

We don’t even know that we’re doing this. We don’t realize how much waste is in it, how inefficient and distracted it makes us. And what’s worse—no one is *making* this happen. It’s totally self-inflicted.

To the Stoics, this is an abomination. They know that the world can control our bodies—we can be thrown in jail or be tossed about by the weather. But the mind? That’s ours. We *must* protect it. Maintain control over your mind and perceptions, they’d say. It’s your most prized possession.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  69: {
    month: `March`,
    day: 9,
    title: `FIND THE RIGHT SCENE`,
    body: `“Above all, keep a close watch on this—that you are never so tied to your former acquaintances and friends that you are pulled down to their level. If you don’t, you’ll be ruined. . . . You must choose whether to be loved by these friends and remain the same person, or to become a better person at the cost of those friends . . . if you try to have it both ways you will neither make progress nor keep what you once had.”

—EPICTETUS, DISCOURSES, 4.2.1; 4–5

“From good people you’ll learn good, but if you mingle with the bad you’ll destroy such soul as you had.”

—MUSONIUS RUFUS, QUOTING THEOGNIS OF MEGARA, LECTURES, 11.53.21–22

Jim Rohn’s widely quoted line is: “You are the average of the five people you spend the most time with.” James Altucher advises young writers and entrepreneurs to find their “scene”—a group of peers who push them to be better. Your father might have given you a warning when he saw you spending time with some bad kids: “Remember, you become like your friends.” One of Goethe’s maxims captures it better: “Tell me with whom you consort and I will tell you who you are.”

Consciously consider whom you allow into your life—not like some snobby elitist but like someone who is trying to cultivate the best life possible. Ask yourself about the people you meet and spend time with: *Are they making me better? Do they encourage me to push forward and hold me accountable? Or do they drag me down to their level?* Now, with this in mind, ask the most important question: *Should I spend more or less time with these folks?*

The second part of Goethe’s quote tells us the stakes of this choice: “If I know how you spend your time,” he said, “then I know what might become of you.”`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  70: {
    month: `March`,
    day: 10,
    title: `FIND YOURSELF A CATO`,
    body: `“We can remove most sins if we have a witness standing by as we are about to go wrong. The soul should have someone it can respect, by whose example it can make its inner sanctum more inviolable. Happy is the person who can improve others, not only when present, but even when in their thoughts!”

—SENECA, MORAL LETTERS, 11.9

Cato the Younger, a Roman politician best known for his self-discipline and for his heroic defense of the Republic against Julius Caesar, appears constantly throughout Stoic literature—which is interesting because he didn’t write anything down. He taught no classes. He gave no interviews. His bold and brave example is what made him such a commonly cited and quoted philosopher.

Seneca tells us that we should each have our own Cato—a great and noble person we can allow into our minds and use to guide our actions, even when they’re not physically present. The economist Adam Smith had a similar concept, which he called the indifferent spectator. It doesn’t have to be an actual person, just someone who, like Seneca said, can stand witness to our behavior. Someone who can quietly admonish us if we are considering doing something lazy, dishonest, or selfish.

And if we do it right, and live our lives in such a way, perhaps we can serve as someone else’s Cato or indifferent spectator when they need it.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
  },
  71: {
    month: `March`,
    day: 11,
    title: `LIVING WITHOUT RESTRICTION`,
    body: `“The unrestricted person, who has in hand what they will in all events, is free. But anyone who can be restricted, coerced, or pushed into something against what they will is a slave.”

—EPICTETUS, DISCOURSES, 4.1.128b–129a

Take a look at some of the most powerful, rich, and famous people in the world. Ignore the trappings of their success and what they’re able to buy. Look instead at what they’re forced to trade in return—look at what success has cost them.

Mostly? Freedom. Their work demands they wear a suit. Their success depends on attending certain parties, kissing up to people they don’t like. It will require—inevitably—realizing they are unable to say what they actually think. Worse, it demands that they become a different type of person or do bad things.

Sure, it might pay well—but they haven’t truly examined the transaction. As Seneca put it, “Slavery resides under marble and gold.” Too many successful people are prisoners in jails of their own making. Is that what you want? Is that what you’re working hard toward? Let’s hope not.`,
    theme: `Awareness`,
    discipline: `The Discipline of Perception`,
